<script>

const PHILS=[{"key":"Platon_ET","name":"Platon","dates":"428–347 v. Chr.","sem":"Erkenntnistheorie","stroemung":"Idealismus / Rationalismus","topic_id":"rationalismus","pos_idx":0,"bio":"Platon (427–347 v. Chr.) war Schüler des Sokrates und Lehrer des Aristoteles. Die Hinrichtung seines Lehrers Sokrates erschütterte ihn so tief, dass er sich der Philosophie widmete und die Akademie gründete.","merksatz":"Hinter den vergänglichen Dingen liegen ewige Ideen — wahres Wissen ist Erkenntnis dieser Ideen, nicht der Sinneswelt."},{"key":"Descartes","name":"René Descartes","dates":"1596–1650","sem":"Erkenntnistheorie","stroemung":"Rationalismus","topic_id":"rationalismus","pos_idx":0,"bio":"René Descartes (1596–1650) gilt als Begründer des neuzeitlichen Rationalismus. Er wollte ein Fundament für Wissen schaffen, das so sicher ist wie Mathematik — durch radikalen Zweifel.","merksatz":"«Cogito ergo sum» — Ich denke, also bin ich. Das Denken selbst ist die einzige unerschütterliche Gewissheit."},{"key":"Locke_Hume","name":"John Locke","dates":"1632–1704","sem":"Erkenntnistheorie","stroemung":"Empirismus","topic_id":"rationalismus","pos_idx":1,"bio":"John Locke (1632–1704) und David Hume (1711–1776) vertreten den Empirismus: Alles Wissen entsteht aus Erfahrung, nicht aus angeborenen Ideen.","merksatz":"Der Geist ist bei Geburt eine leere Tafel (Tabula rasa). Alle Erkenntnis kommt aus Sinneserfahrung — keine angeborenen Ideen."},{"key":"Locke_Hume","name":"David Hume","dates":"1711–1776","sem":"Erkenntnistheorie","stroemung":"Empirismus / Skepsis","topic_id":"rationalismus","pos_idx":1,"bio":"John Locke (1632–1704) und David Hume (1711–1776) vertreten den Empirismus: Alles Wissen entsteht aus Erfahrung, nicht aus angeborenen Ideen.","merksatz":"Der Geist ist bei Geburt eine leere Tafel (Tabula rasa). Alle Erkenntnis kommt aus Sinneserfahrung — keine angeborenen Ideen."},{"key":"Kant_ET","name":"Immanuel Kant","dates":"1724–1804","sem":"Erkenntnistheorie","stroemung":"Kritizismus","topic_id":"rationalismus","pos_idx":2,"bio":"Immanuel Kant (1724–1804) vollzog eine «Kopernikanische Wende»: Nicht der Geist passt sich den Dingen an — die Dinge passen sich den Strukturen unseres Verstandes an.","merksatz":"Wissen entsteht, wenn Erfahrung durch die Kategorien des Verstandes geordnet wird. Das «Ding an sich» bleibt uns verborgen."},{"key":"Popper","name":"Karl Popper","dates":"1902–1994","sem":"Erkenntnistheorie","stroemung":"Kritischer Rationalismus","topic_id":"wissenschaft","pos_idx":0,"bio":"Karl Popper (1902–1994) entwickelte den Kritischen Rationalismus. Als Kritiker des Totalitarismus zeigte er, wie offene Gesellschaften gegen ihre Feinde verteidigt werden müssen.","merksatz":"Eine Theorie ist nur dann wissenschaftlich, wenn sie grundsätzlich widerlegt werden kann. Wissenschaft schreitet durch Widerlegung voran."},{"key":"Kuhn","name":"Thomas Kuhn","dates":"1922–1996","sem":"Erkenntnistheorie","stroemung":"Wissenschaftstheorie","topic_id":"wissenschaft","pos_idx":1,"bio":"Thomas Kuhn (1922–1996) revolutionierte unser Bild von Wissenschaft: Nicht ruhiger Fortschritt, sondern radikale Brüche (Paradigmenwechsel) prägen die Wissenschaftsgeschichte.","merksatz":"Wissenschaft arbeitet in Paradigmen. Fortschritt geschieht nicht graduell, sondern durch revolutionäre Paradigmenwechsel."},{"key":"Feyerabend","name":"Paul Feyerabend","dates":"1924–1994","sem":"Erkenntnistheorie","stroemung":"Methodenpluralismus","topic_id":"wissenschaft","pos_idx":2,"bio":"Paul Feyerabend (1924–1994) war der Rebell der Wissenschaftstheorie. Er argumentierte, dass es keine universelle wissenschaftliche Methode gibt — und das sei gut so.","merksatz":"«Anything goes» — Es gibt keine universelle wissenschaftliche Methode. Große Entdeckungen entstanden oft durch Regelbruch."},{"key":"Aristoteles_Eth","name":"Aristoteles","dates":"384–322 v. Chr.","sem":"Ethik","stroemung":"Eudämonismus / Tugendethik","topic_id":"hedonismus","pos_idx":2,"bio":"Aristoteles (384–322 v. Chr.) war Schüler Platons und Lehrer Alexanders des Großen. Er entwickelte eine Ethik, die nicht auf abstrakten Regeln, sondern auf dem guten Leben beruht.","merksatz":"Das Ziel des Menschen ist Eudaimonia — Glückseligkeit durch Tugend. Die Tugend liegt in der goldenen Mitte zwischen zwei Extremen."},{"key":"Epikur","name":"Epikur","dates":"341–271 v. Chr.","sem":"Ethik","stroemung":"Epikureismus / Hedonismus","topic_id":"hedonismus","pos_idx":1,"bio":"Epikur (341–271 v. Chr.) gründete in Athen den «Garten» — eine Gemeinschaft, die Philosophie als Heilmittel für Lebensängste verstand. Sein Hedonismus ist kein Aufruf zu Exzessen.","merksatz":"Wahre Lust ist Seelenruhe (Ataraxia) und Schmerzfreiheit (Aponie) — nicht Exzess, sondern die Befreiung von irrationalen Ängsten."},{"key":"Kant_Eth","name":"Immanuel Kant","dates":"1724–1804","sem":"Ethik","stroemung":"Pflichtethik / Deontologie","topic_id":"utilitarismus","pos_idx":0,"bio":"Kant (1724–1804) entwickelte eine Ethik, die völlig unabhängig von Ergebnissen und Gefühlen gilt: Der kategorische Imperativ als Grundgesetz der Moral.","merksatz":"«Handle nur nach der Maxime, die du als allgemeines Gesetz wollen könntest.» — Der gute Wille ist das einzig uneingeschränkt Gute."},{"key":"Bentham","name":"Jeremy Bentham","dates":"1748–1832","sem":"Ethik","stroemung":"Quantitätsutilitarismus","topic_id":"utilitarismus","pos_idx":1,"bio":"Jeremy Bentham (1748–1832) begründete den Utilitarismus: Eine Handlung ist gut, wenn sie das größte Glück für die größte Zahl bewirkt. Lust lässt sich berechnen.","merksatz":"Das größte Glück der größten Zahl ist der einzige Maßstab jeder Handlung — messbar durch das hedonistische Kalkül."},{"key":"Mill","name":"John Stuart Mill","dates":"1806–1873","sem":"Ethik","stroemung":"Qualitätsutilitarismus","topic_id":"utilitarismus","pos_idx":2,"bio":"John Stuart Mill (1806–1873) verfeinerte Benthams Utilitarismus: Nicht alle Lust ist gleich. Geistige Freuden sind wertvoller als körperliche.","merksatz":"«Besser ein unzufriedener Sokrates als ein zufriedenes Schwein.» — Qualität der Lust zählt mehr als Quantität."},{"key":"Nida_Rumelin","name":"Julian Nida-Rümelin","dates":"*1954","sem":"Ethik","stroemung":"Ethischer Universalismus","topic_id":"relativismus","pos_idx":1,"bio":"Julian Nida-Rümelin (*1954) ist ein zeitgenössischer Vertreter des ethischen Universalismus. Er argumentiert für eine vernunftbasierte Moral jenseits von Relativismus.","merksatz":"Moralische Normen beanspruchen universelle Gültigkeit — sie gelten für alle Menschen, unabhängig von Kultur und Tradition."},{"key":"Nussbaum","name":"Martha Nussbaum","dates":"*1947","sem":"Ethik","stroemung":"Fähigkeitenansatz","topic_id":"menschenrechte","pos_idx":1,"bio":"Martha Nussbaum (*1947) entwickelte den Fähigkeitenansatz: Menschenwürde besteht nicht in abstrakten Rechten, sondern in konkreten Fähigkeiten, die ein gutes Leben ermöglichen.","merksatz":"Gerechtigkeit bedeutet, dass jeder Mensch seine zentralen Fähigkeiten entfalten kann — Gesundheit, Bildung, politische Teilhabe gehören dazu."},{"key":"Pieper","name":"Annemarie Pieper","dates":"*1941","sem":"Ethik","stroemung":"Kritische Toleranz","topic_id":"relativismus","pos_idx":2,"bio":"Annemarie Pieper (*1941) vertritt eine Ethik, die kritischen Dialog statt blinder Toleranz fordert: Nicht alle kulturellen Praktiken sind gleich schützenswert.","merksatz":"Toleranz bedeutet nicht Schweigen — wo fundamentale Rechte verletzt werden, ist kritischer Dialog Pflicht, ohne moralische Überheblichkeit."},{"key":"Nietzsche","name":"Friedrich Nietzsche","dates":"1844–1900","sem":"Ethik","stroemung":"Moralkritik","topic_id":"moralkritik","pos_idx":0,"bio":"Friedrich Nietzsche (1844–1900) radikalisierte die Moralkritik: Unsere moralischen Werte sind keine ewigen Wahrheiten, sondern historische Konstrukte — erfunden von den Schwachen.","merksatz":"Traditionelle Moral ist «Sklavenmoral» — erfunden, um die Starken zu bändigen. Der Übermensch schafft eigene Werte statt tradierte zu übernehmen."},{"key":"Marx_Eth","name":"Karl Marx","dates":"1818–1883","sem":"Ethik","stroemung":"Ideologiekritik","topic_id":"moralkritik","pos_idx":1,"bio":"Karl Marx (1818–1883) entlarvte Moral als Ideologie: Moralische Überzeugungen spiegeln nicht ewige Wahrheiten, sondern die Interessen der herrschenden Klasse wider.","merksatz":"Moral ist Teil des ideologischen Überbaus — sie verschleiert Klassenverhältnisse. Nur durch Überwindung der Klassengesellschaft entsteht wahre Freiheit."},{"key":"Foucault","name":"Michel Foucault","dates":"1926–1984","sem":"Ethik","stroemung":"Macht-Wissen-Analyse","topic_id":"moralkritik","pos_idx":2,"bio":"Michel Foucault (1926–1984) analysierte, wie Normen durch Diskurse und Institutionen erzeugt und durchgesetzt werden. Macht und Wissen sind untrennbar verbunden.","merksatz":"Moral ist kein neutrales Regelwerk — sie ist Machtausübung. Normen entstehen historisch und disziplinieren die Subjekte."},{"key":"Butler","name":"Judith Butler","dates":"*1956","sem":"Ethik","stroemung":"Performativität","topic_id":"moralkritik","pos_idx":3,"bio":"Judith Butler (*1956) zeigte, dass Identität — auch Geschlecht — nicht natürlich vorgegeben, sondern durch ständige Wiederholung von Handlungen performativ hergestellt wird.","merksatz":"Geschlecht und Identität sind keine natürlichen Tatsachen, sondern Effekte wiederholter gesellschaftlicher Praktiken — und damit veränderbar."},{"key":"Platon_Staat","name":"Platon","dates":"428–347 v. Chr.","sem":"Staatsphilosophie","stroemung":"Philosophenkönig / Epistokratie","topic_id":"platon","pos_idx":0,"bio":"Platon entwarf in der Politeia einen idealen Staat. Erschüttert von der Ungerechtigkeit der Demokratie — die Sokrates hinrichten ließ — plädierte er für die Herrschaft der Philosophen.","merksatz":"Nur wer das Gute kennt, kann gerecht regieren — der Philosophenkönig. Demokratie ist Herrschaft der Unwissenden."},{"key":"Aristoteles_Staat","name":"Aristoteles","dates":"384–322 v. Chr.","sem":"Staatsphilosophie","stroemung":"Politie / Mischverfassung","topic_id":"platon","pos_idx":1,"bio":"Aristoteles (384–322 v. Chr.) sah den Menschen als «zoon politikon» — ein Wesen, das nur in der Gemeinschaft seine volle Vernunft entfalten kann. Der Staat ist keine Notlösung, sondern Vollendung.","merksatz":"Der Mensch ist von Natur aus ein Gemeinschaftswesen. Der beste Staat ist die Politie — eine Mischung aus Demokratie und Oligarchie, getragen vom Mittelstand."},{"key":"Hobbes","name":"Thomas Hobbes","dates":"1588–1679","sem":"Staatsphilosophie","stroemung":"Vertragstheorie / Absolutismus","topic_id":"vertragstheorie","pos_idx":0,"bio":"Thomas Hobbes (1588–1679) schrieb den Leviathan im Schatten des englischen Bürgerkriegs. Seine Staatstheorie beginnt mit einer düsteren Anthropologie: Der Mensch ist dem Menschen ein Wolf.","merksatz":"Ohne Staat herrscht der Krieg aller gegen alle. Nur durch den absoluten Souverän — den Leviathan — entsteht Frieden und Ordnung."},{"key":"Locke_Staat","name":"John Locke","dates":"1632–1704","sem":"Staatsphilosophie","stroemung":"Vertragstheorie / Liberalismus","topic_id":"vertragstheorie","pos_idx":1,"bio":"John Locke (1632–1704) begründete den liberalen Staat: Der Staat schützt natürliche Rechte — er verleiht sie nicht. Das Volk behält das Widerstandsrecht.","merksatz":"Der Staat schützt Leben, Freiheit und Eigentum. Verletzt er diese Rechte, hat das Volk das Recht zum Widerstand."},{"key":"Rousseau","name":"Jean-Jacques Rousseau","dates":"1712–1778","sem":"Staatsphilosophie","stroemung":"Gemeinwille / Demokratie","topic_id":"vertragstheorie","pos_idx":2,"bio":"Jean-Jacques Rousseau (1712–1778) glaubte, der Mensch sei ursprünglich gut — erst die Gesellschaft habe ihn korrumpiert. Sein Gesellschaftsvertrag soll die verlorene Freiheit zurückbringen.","merksatz":"«Der Mensch ist frei geboren, und überall liegt er in Ketten.» Der Gemeinwille (volonté générale) allein kann wahre Freiheit sichern."},{"key":"Rawls","name":"John Rawls","dates":"1921–2002","sem":"Staatsphilosophie","stroemung":"Liberaler Egalitarismus","topic_id":"vertragstheorie","pos_idx":3,"bio":"John Rawls (1921–2002) fragte: Welche Gerechtigkeitsprinzipien würden Menschen wählen, wenn sie nicht wüssten, ob sie arm oder reich, gesund oder krank geboren werden?","merksatz":"Hinter dem «Schleier des Nichtwissens» würden alle Menschen faire Grundregeln wählen — Gleichheit der Freiheiten und das Differenzprinzip."},{"key":"Machiavelli","name":"Niccolò Machiavelli","dates":"1469–1527","sem":"Staatsphilosophie","stroemung":"Machttheorie / Staatsraison","topic_id":"machttheorie","pos_idx":0,"bio":"Niccolò Machiavelli (1469–1527) war der erste Denker, der Politik von Moral radikal trennte. Sein Fürst soll weder gut noch böse sein — sondern klug und wirksam.","merksatz":"«Der Zweck heiligt die Mittel.» Der Fürst muss Löwe (Stärke) und Fuchs (List) zugleich sein — Moral tritt zurück, wo Stabilität auf dem Spiel steht."},{"key":"Arendt","name":"Hannah Arendt","dates":"1906–1975","sem":"Staatsphilosophie","stroemung":"Macht als Konsens","topic_id":"machttheorie","pos_idx":1,"bio":"Hannah Arendt (1906–1975) erlebte als jüdische Philosophin Verfolgung und Exil. Sie analysierte Totalitarismus und entwickelte einen Begriff von Macht als geteiltem Handeln.","merksatz":"Macht entsteht durch gemeinsames Handeln — Gewalt ist ihr Gegenteil. Wo Gewalt herrscht, ist echte Macht bereits verschwunden."},{"key":"Weber","name":"Max Weber","dates":"1864–1920","sem":"Staatsphilosophie","stroemung":"Herrschaftssoziologie","topic_id":"machttheorie","pos_idx":2,"bio":"Max Weber (1864–1920) schuf die Grundlagen der modernen Herrschaftssoziologie. Er unterschied drei Typen legitimer Herrschaft: traditionell, charismatisch und legal-rational.","merksatz":"Macht ist die Chance, den eigenen Willen durchzusetzen. Legitime Herrschaft braucht Anerkennung — durch Tradition, Charisma oder Recht."},{"key":"Strauss","name":"Leo Strauss","dates":"1899–1973","sem":"Staatsphilosophie","stroemung":"Naturrecht / Politische Philosophie","topic_id":"naturrecht","pos_idx":1,"bio":"Leo Strauss (1899–1973) war ein politischer Philosoph, der gegen den Positivismus und Relativismus seiner Zeit das klassische Naturrecht verteidigte. Er sah in der antiken Philosophie die Grundlage für ein Leben nach der Natur des Menschen.","merksatz":"Es gibt ein objektives Naturrecht jenseits des positiven Rechts — gegründet auf das Wesen des Menschen, nicht auf historische Konvention."},{"key":"Radbruch","name":"Gustav Radbruch","dates":"1878–1949","sem":"Staatsphilosophie","stroemung":"Rechtspositivismus / Naturrecht","topic_id":"naturrecht","pos_idx":2,"bio":"Gustav Radbruch (1878–1949) entwickelte nach der NS-Zeit die berühmte Radbruchsche Formel: Positives Recht gilt — aber nicht, wenn es extrem ungerecht ist.","merksatz":"Rechtssicherheit ist wichtig — aber extrem ungerechtes Recht verliert seine Verbindlichkeit. Gesetzliches Unrecht bleibt Unrecht."},{"key":"Popper_Staat","name":"Karl Popper","dates":"1902–1994","sem":"Staatsphilosophie","stroemung":"Kritiker des Totalitarismus","topic_id":"grenzen","pos_idx":2,"bio":"Karl Popper (1902–1994) analysierte in «Die offene Gesellschaft und ihre Feinde» den Totalitarismus und zeigte, wie Platon, Hegel und Marx zu ideologischen Vorläufern wurden.","merksatz":"Die offene Gesellschaft muss bereit sein, sich gegen ihre Feinde zu verteidigen — auch gegen demokratisch gewählte Feinde der Demokratie."},{"key":"Bakunin","name":"Michail Bakunin","dates":"1814–1876","sem":"Staatsphilosophie","stroemung":"Anarchismus","topic_id":"grenzen","pos_idx":0,"bio":"Michail Bakunin (1814–1876) war der bekannteste Vertreter des Anarchismus. Gegen Marx bestand er darauf: Jeder Staat — auch der Arbeiterstaat — ist Unterdrückung.","merksatz":"Jede Herrschaft korrumpiert, auch die gut gemeinte. Wahre Freiheit entsteht nur durch freiwillige Kooperation ohne Zwang und ohne Staat."},{"key":"Marx_Staat","name":"Karl Marx","dates":"1818–1883","sem":"Staatsphilosophie","stroemung":"Soziale Gerechtigkeit / Egalitarismus","topic_id":"sozgerechtigkeit","pos_idx":0,"bio":"Karl Marx (1818–1883) analysierte den Kapitalismus als System struktureller Ausbeutung: Der Arbeiter wird von seinem Produkt, seiner Tätigkeit und seinen Mitmenschen entfremdet.","merksatz":"«Jeder nach seinen Fähigkeiten, jedem nach seinen Bedürfnissen.» — Nur die Überwindung der Klassengesellschaft beendet Entfremdung und Ausbeutung."},{"key":"Nozick","name":"Robert Nozick","dates":"1938–2002","sem":"Staatsphilosophie","stroemung":"Libertarismus","topic_id":"sozgerechtigkeit","pos_idx":2,"bio":"Robert Nozick (1938–2002) antwortete direkt auf Rawls: Gerechtigkeit entsteht nicht durch gleiche Verteilung, sondern durch faire Prozesse. Umverteilung durch Steuern ist Zwang.","merksatz":"Gerechtigkeit ist kein Ergebnis, sondern ein Prozess. Was rechtmäßig erworben wurde, gehört dem Einzelnen — Umverteilung verletzt Eigentumsrechte."},{"key":"Sartre","name":"Jean-Paul Sartre","dates":"1905–1980","sem":"Anthropologie","stroemung":"Existentialismus","topic_id":"essentialismus","pos_idx":1,"bio":"Jean-Paul Sartre (1905–1980) prägte den Existentialismus. Sein Schlüsselsatz — «Die Existenz geht der Essenz voraus» — bedeutet: Es gibt kein vorgegebenes menschliches Wesen.","merksatz":"Der Mensch ist «zur Freiheit verurteilt» — es gibt keine Ausreden, keine vorgegebene Natur. Wir erschaffen uns durch unsere Entscheidungen selbst."},{"key":"Beauvoir","name":"Simone de Beauvoir","dates":"1908–1986","sem":"Anthropologie","stroemung":"Feminismus / Existentialismus","topic_id":"essentialismus","pos_idx":2,"bio":"Simone de Beauvoir (1908–1986) verbindet Existentialismus mit Feminismus: Freiheit ist immer situiert — und Frauen waren historisch in ihrer Freiheit strukturell blockiert.","merksatz":"«Man wird nicht als Frau geboren, man wird es.» Weiblichkeit ist kein natürliches Schicksal, sondern aufgezwungene gesellschaftliche Konstruktion."},{"key":"Camus","name":"Albert Camus","dates":"1913–1960","sem":"Anthropologie","stroemung":"Absurdismus","topic_id":"sinn","pos_idx":1,"bio":"Albert Camus (1913–1960) stellte die radikalste philosophische Frage: Warum sollte man angesichts eines sinnlosen Universums weiterleben? Seine Antwort ist die Revolte.","merksatz":"Das Leben ist absurd — das Universum ist gleichgültig gegenüber unseren Sinnfragen. Trotzdem: «Man muss sich Sisyphos als glücklichen Menschen vorstellen.»"},{"key":"Gehlen","name":"Arnold Gehlen","dates":"1904–1976","sem":"Anthropologie","stroemung":"Mängelwesen / Institutionen","topic_id":"menschenmodelle","pos_idx":2,"bio":"Arnold Gehlen (1904–1976) sah den Menschen als biologisches Mängelwesen: Ohne Instinkte, ohne Naturwaffen, mit langer Kindheit — und gerade deshalb zum Kulturschaffen gezwungen.","merksatz":"Der Mensch ist biologisch unfertig — er kompensiert seine Mängel durch Kultur, Technik und Institutionen. Technik ist keine Wahl, sondern Notwendigkeit."},{"key":"Cassirer","name":"Ernst Cassirer","dates":"1874–1945","sem":"Anthropologie","stroemung":"Animal Symbolicum","topic_id":"menschenmodelle","pos_idx":3,"bio":"Ernst Cassirer (1874–1945) definierte den Menschen neu: nicht als vernünftiges Tier, sondern als «animal symbolicum» — ein Wesen, das in symbolischen Formen lebt.","merksatz":"Der Mensch lebt nicht in einer natürlichen, sondern in einer symbolischen Wirklichkeit. Sprache, Mythos, Kunst und Wissenschaft sind seine eigentliche Welt."},{"key":"Smith","name":"Adam Smith","dates":"1723–1790","sem":"Anthropologie","stroemung":"Homo Economicus / Liberalismus","topic_id":"menschenmodelle","pos_idx":1,"bio":"Adam Smith (1723–1790) begründete die moderne Ökonomie. Sein «homo economicus» handelt rational und eigennützig — doch aus dem Zusammenspiel vieler Eigeninteressen entsteht gesellschaftlicher Wohlstand.","merksatz":"Der Mensch handelt rational und eigennützig — durch die «unsichtbare Hand» des Marktes wird Eigeninteresse zum gesellschaftlichen Vorteil."},{"key":"Jonas_Anth","name":"Hans Jonas","dates":"1903–1993","sem":"Anthropologie","stroemung":"Verantwortungsethik","topic_id":"technologie","pos_idx":1,"bio":"Hans Jonas (1903–1993) entwickelte eine Ethik für das technologische Zeitalter: Moderne Technik sprengt alle bisherigen moralischen Dimensionen — wir brauchen neue Verantwortung.","merksatz":"«Handle so, dass die Wirkungen deiner Handlung verträglich sind mit der Permanenz echten menschlichen Lebens auf Erden.» Im Zweifel: Heuristik der Furcht."}];
const SEM={
  "Erkenntnistheorie":{"bg":"#D6E4F0","text":"#185FA5","bar":"#2E75B6"},
  "Ethik":            {"bg":"#E1F5EE","text":"#0F6E56","bar":"#1D9E75"},
  "Staatsphilosophie":{"bg":"#FAEEDA","text":"#854F0B","bar":"#BA7517"},
  "Anthropologie":    {"bg":"#FBEAF0","text":"#993556","bar":"#D4537E"}
};
let fil="Alle",exp=new Set(),sq="";

function render(){
  const q=sq.toLowerCase();
  let vis=PHILS.filter(p=>{
    if(fil!=="Alle"&&p.sem!==fil)return false;
    if(!q)return true;
    return (p.name+p.stroemung+p.merksatz+p.bio+p.dates).toLowerCase().includes(q);
  });
  const g=document.getElementById("pg");
  if(!vis.length){g.innerHTML='<div class="no-r">Keine Philosophen gefunden.</div>';return;}
  g.innerHTML=vis.map(p=>{
    const s=SEM[p.sem]||{bg:"#eee",text:"#555",bar:"#888"};
    const k=p.name+"_"+p.sem+"_"+p.key;
    const isExp=exp.has(k);
    return `<div class="pcard ${isExp?'exp':''}" id="pc_${k.replace(/\s/g,'_')}">
      <div class="pbar" style="background:${s.bar}"></div>
      <div class="phdr" onclick="tog('${k}')">
        <div class="pname">${p.name}</div>
        <div class="pdates">${p.dates}</div>
        <div class="pstroem" style="color:${s.text}">${p.stroemung}</div>
      </div>
      ${p.merksatz?`<div class="pmerk" onclick="tog('${k}')">${p.merksatz}</div>`:''}
      ${isExp?`<div class="pdet">
        ${p.bio?`<div class="pbio">${p.bio}</div>`:''}
        <div class="plink-row">
          <a class="plink" style="background:${s.bg};color:${s.text};border-color:${s.bar}50"
            href="vergleiche.html?id=${p.topic_id}">📊 Positionenvergleich</a>
          <a class="plink" style="background:#FFF8DC;color:#7B5800;border-color:#C49A0050"
            href="fachwissen.html?id=${p.topic_id}">📖 Fachwissen</a>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}
function tog(k){if(exp.has(k))exp.delete(k);else exp.add(k);render();}
function setFil(f){
  fil=f;
  document.querySelectorAll('.fbtn').forEach(b=>{
    const on=b.dataset.f===f;b.classList.toggle('on',on);
    const s=SEM[f];
    if(on&&s){b.style.background=s.bg;b.style.color=s.text;b.style.borderColor=s.bar;}
    else{b.style.background='';b.style.color='';b.style.borderColor='';}
  });render();
}
document.getElementById('psi').addEventListener('input',e=>{sq=e.target.value.trim();render();});
render();

</script>
