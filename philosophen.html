<script>

const PHILS=[{"name":"Platon","dates":"428–348 v. Chr.","sem":"Erkenntnistheorie","stroemung":"Idealismus / Rationalistmus","topic_id":"platon","pos_idx":0,"fw_id":"platon_erk","merksatz":"Nur wer das Gute kennt, kann gerecht regieren. Der Staat ist Seele im Großen – gerecht ist er, wenn jeder das tut, wozu er befähigt ist."},{"name":"René Descartes","dates":"1596–1650","sem":"Erkenntnistheorie","stroemung":"Rationalismus","topic_id":"rationalismus","pos_idx":0,"fw_id":"descartes","merksatz":"Wahrheit entsteht im Denken, nicht in der Erfahrung."},{"name":"John Locke","dates":"1632–1704","sem":"Erkenntnistheorie","stroemung":"Empirismus","topic_id":"rationalismus","pos_idx":1,"fw_id":"empirismus","merksatz":"Alles Wissen beginnt mit der Erfahrung."},{"name":"David Hume","dates":"1711–1776","sem":"Erkenntnistheorie","stroemung":"Empirismus / Skepsis","topic_id":"rationalismus","pos_idx":1,"fw_id":"empirismus","merksatz":"Alles Wissen beginnt mit der Erfahrung."},{"name":"Immanuel Kant","dates":"1724–1804","sem":"Erkenntnistheorie","stroemung":"Kritizismus","topic_id":"rationalismus","pos_idx":2,"fw_id":"kant_erk","merksatz":"Wissen entsteht, wenn Erfahrung durch Verstandesstrukturen geordnet wird."},{"name":"Karl Popper","dates":"1902–1994","sem":"Erkenntnistheorie","stroemung":"Kritischer Rationalismus","topic_id":"wissenschaft","pos_idx":0,"fw_id":"popper","merksatz":"Wissenschaft kann nie absolute Wahrheiten finden. Sie muss sich stets korrigieren."},{"name":"Thomas Kuhn","dates":"1922–1996","sem":"Erkenntnistheorie","stroemung":"Wissenschaftstheorie","topic_id":"wissenschaft","pos_idx":1,"fw_id":"kuhn","merksatz":"Wissenschaftler lösen Rätsel innerhalb eines akzeptierten Paradigmas – Wahrheitsfindung ist nicht ihr oberstes Ziel."},{"name":"Paul Feyerabend","dates":"1924–1994","sem":"Erkenntnistheorie","stroemung":"Methodenpluralismus","topic_id":"wissenschaft","pos_idx":2,"fw_id":"feyerabend","merksatz":"Es gibt keine universelle wissenschaftliche Methode. Nur «Anything goes» beschreibt, wie Wissenschaft wirklich funktioniert."},{"name":"Aristoteles","dates":"384–322 v. Chr.","sem":"Ethik","stroemung":"Eudämonismus / Tugendethik","topic_id":"hedonismus","pos_idx":2,"fw_id":"aristoteles_eth","merksatz":"«Suche mit Vernunft die goldene Mitte für ein tugendhaftes und damit glückseliges Leben.»"},{"name":"Epikur","dates":"341–271 v. Chr.","sem":"Ethik","stroemung":"Epikureismus / Hedonismus","topic_id":"hedonismus","pos_idx":1,"fw_id":"epikur","merksatz":"«Genieße das Leben in Maßen – und finde so zur dauerhaften Seelenruhe.»"},{"name":"Immanuel Kant","dates":"1724–1804","sem":"Ethik","stroemung":"Pflichtethik / Deontologie","topic_id":"utilitarismus","pos_idx":0,"fw_id":"kant_eth","merksatz":"Handle nur nach der Maxime, die du zugleich als allgemeines Gesetz wollen könntest."},{"name":"Jeremy Bentham","dates":"1748–1832","sem":"Ethik","stroemung":"Quantitätsutilitarismus","topic_id":"utilitarismus","pos_idx":1,"fw_id":"utilitarismus_fw","merksatz":"Das größte Glück der größten Zahl ist der einzige Maßstab jeder Handlung."},{"name":"John Stuart Mill","dates":"1806–1873","sem":"Ethik","stroemung":"Qualitätsutilitarismus","topic_id":"utilitarismus","pos_idx":2,"fw_id":"utilitarismus_fw","merksatz":"Besser ein unzufriedener Sokrates als ein zufriedenes Schwein. Qualität zählt mehr als Quantität."},{"name":"Julian Nida-Rümelin","dates":"*1954","sem":"Ethik","stroemung":"Universalismus","topic_id":"relativismus","pos_idx":1,"fw_id":"relativismus_fw","merksatz":"Menschenrechte gelten für alle Menschen überall – unabhängig von Kultur, Tradition oder Geschichte."},{"name":"Martha Nussbaum","dates":"*1947","sem":"Ethik","stroemung":"Fähigkeitenansatz","topic_id":"menschenrechte","pos_idx":1,"fw_id":"menschenrechte_fw","merksatz":"Ein Mensch verdient kein würdiges Leben, weil er abstrakt «gleich» ist, sondern weil er konkrete Fähigkeiten besitzt, die entfaltet werden müssen."},{"name":"Annemarie Pieper","dates":"*1941","sem":"Ethik","stroemung":"Kritische Toleranz","topic_id":"relativismus","pos_idx":2,"fw_id":"relativismus_fw","merksatz":"Toleranz bedeutet nicht Schweigen. Wo fundamentale Rechte verletzt werden, ist kritischer Dialog Pflicht – aber ohne moralische Überlegenheit."},{"name":"Friedrich Nietzsche","dates":"1844–1900","sem":"Ethik","stroemung":"Moralkritik","topic_id":"moralkritik","pos_idx":0,"fw_id":"relativismus_fw","merksatz":"Traditionelle Moral ist eine Erfindung der Schwachen, um die Starken zu bändigen. Es braucht eine neue, lebensbejahende Moral – die des Übermenschen."},{"name":"Karl Marx","dates":"1818–1883","sem":"Ethik","stroemung":"Ideologiekritik","topic_id":"moralkritik","pos_idx":1,"fw_id":"sozgerech_fw","merksatz":"Moral ist kein neutrales Regelwerk, sondern Ideologie: Sie verschleiert, dass die herrschende Klasse ihre Interessen als allgemeingültig darstellt."},{"name":"Michel Foucault","dates":"1926–1984","sem":"Ethik","stroemung":"Macht-Wissen-Analyse","topic_id":"moralkritik","pos_idx":2,"fw_id":"ess_exist","merksatz":"Moral ist Macht. Sie entsteht nicht aus Vernunft, sondern aus historischen Diskursen, die festlegen, was als «normal» und «abweichend» gilt."},{"name":"Judith Butler","dates":"*1956","sem":"Ethik","stroemung":"Performativität / Queerness","topic_id":"moralkritik","pos_idx":3,"fw_id":"ess_exist","merksatz":"Normen entstehen nicht durch Dekrete, sondern durch ständige Wiederholung – wer sie versteht, kann sie auch verschieben und unterlaufen."},{"name":"Platon","dates":"428–348 v. Chr.","sem":"Staatsphilosophie","stroemung":"Philosophenkönig / Epistokratie","topic_id":"platon","pos_idx":0,"fw_id":"platon_staat","merksatz":"Nur wer das Gute kennt, kann gerecht regieren. Der Staat ist Seele im Großen – gerecht ist er, wenn jeder das tut, wozu er befähigt ist."},{"name":"Aristoteles","dates":"384–322 v. Chr.","sem":"Staatsphilosophie","stroemung":"Politie / Mischverfassung","topic_id":"platon","pos_idx":1,"fw_id":"aristoteles_staat","merksatz":"Der Mensch ist von Natur ein Gemeinschaftswesen. Ein guter Staat schafft die Bedingungen, unter denen Bürger tugendhaft handeln und ein glückseliges Leben führen können."},{"name":"Thomas Hobbes","dates":"1588–1679","sem":"Staatsphilosophie","stroemung":"Vertragstheorie / Absolutismus","topic_id":"vertragstheorie","pos_idx":0,"fw_id":"hobbes","merksatz":"Ohne starken Staat herrscht der Krieg aller gegen alle. Menschen geben alle Rechte ab – dafür erhalten sie Schutz und Frieden."},{"name":"John Locke","dates":"1632–1704","sem":"Staatsphilosophie","stroemung":"Vertragstheorie / Liberalismus","topic_id":"vertragstheorie","pos_idx":1,"fw_id":"locke","merksatz":"Der Staat schützt natürliche Rechte, die der Mensch im Naturzustand bereits besitzt. Missbraucht er sie, hat das Volk das Recht zum Widerstand."},{"name":"Jean-Jacques Rousseau","dates":"1712–1778","sem":"Staatsphilosophie","stroemung":"Gemeinwille / Demokratie","topic_id":"vertragstheorie","pos_idx":2,"fw_id":"rousseau","merksatz":"Der Mensch ist gut – die Gesellschaft hat ihn verdorben. Nur ein Vertrag, der den Gemeinwillen verkörpert, kann wahre Freiheit sichern."},{"name":"John Rawls","dates":"1921–2002","sem":"Staatsphilosophie","stroemung":"Liberaler Egalitarismus","topic_id":"vertragstheorie","pos_idx":3,"fw_id":"sozgerech_fw","merksatz":"Hinter dem «Schleier des Nichtwissens» würden alle Menschen faire Grundregeln wählen. Ungleichheiten sind nur gerechtfertigt, wenn sie den Schwächsten zugutekommen."},{"name":"Niccolò Machiavelli","dates":"1469–1527","sem":"Staatsphilosophie","stroemung":"Machttheorie / Staatsraison","topic_id":"machttheorie","pos_idx":0,"fw_id":"macht_fw","merksatz":"«Der Zweck heiligt die Mittel.» Wer Macht behalten will, muss bereit sein, moralische Prinzipien dem Staatswohl unterzuordnen."},{"name":"Hannah Arendt","dates":"1906–1975","sem":"Staatsphilosophie","stroemung":"Macht als Konsens","topic_id":"machttheorie","pos_idx":1,"fw_id":"macht_fw","merksatz":"Macht entsteht nicht durch Gewalt, sondern durch gemeinsames Handeln. Wo Gewalt herrscht, ist echte Macht bereits verschwunden."},{"name":"Max Weber","dates":"1864–1920","sem":"Staatsphilosophie","stroemung":"Herrschaftssoziologie","topic_id":"machttheorie","pos_idx":2,"fw_id":"macht_fw","merksatz":"Macht ist die Chance, den eigenen Willen durchzusetzen – auch gegen Widerstand. Legitime Herrschaft braucht einen anerkannten Grund."},{"name":"Leo Strauss","dates":"1899–1973","sem":"Staatsphilosophie","stroemung":"Naturrecht / Politische Philosophie","topic_id":"naturrecht","pos_idx":1,"fw_id":"naturrecht_fw","merksatz":"Es gibt ein Recht über dem Recht. Gesetze, die grundlegende Menschenwürde verletzen, sind kein Recht – sondern gesetzliches Unrecht."},{"name":"Gustav Radbruch","dates":"1878–1949","sem":"Staatsphilosophie","stroemung":"Rechtspositivismus / Naturrecht","topic_id":"naturrecht","pos_idx":2,"fw_id":"naturrecht_fw","merksatz":""},{"name":"Karl Popper","dates":"1902–1994","sem":"Staatsphilosophie","stroemung":"Kritiker des Totalitarismus","topic_id":"grenzen","pos_idx":2,"fw_id":"popper","merksatz":"Freiheit bedeutet: keiner willkürlichen Herrschaft ausgeliefert sein. Institutionen sichern das."},{"name":"Michail Bakunin","dates":"1814–1876","sem":"Staatsphilosophie","stroemung":"Anarchismus","topic_id":"grenzen","pos_idx":0,"fw_id":"polphil_intro","merksatz":"Jeder Staat ist Unterdrückung. Wahre Freiheit entsteht nur ohne Zwang und Herrschaft."},{"name":"Karl Marx","dates":"1818–1883","sem":"Staatsphilosophie","stroemung":"Soziale Gerechtigkeit","topic_id":"sozgerechtigkeit","pos_idx":0,"fw_id":"sozgerech_fw","merksatz":"«Jeder nach seinen Fähigkeiten, jedem nach seinen Bedürfnissen.» Soziale Gerechtigkeit erfordert die Überwindung des Kapitalismus und die kollektive Verwaltung der Produktionsmittel."},{"name":"Robert Nozick","dates":"1938–2002","sem":"Staatsphilosophie","stroemung":"Libertarismus","topic_id":"sozgerechtigkeit","pos_idx":2,"fw_id":"sozgerech_fw","merksatz":"Soziale Gerechtigkeit ergibt sich aus gerechten Prozessen, nicht aus gerechten Ergebnissen. Umverteilung ist Zwang – und Zwang ist Ungerechtigkeit."},{"name":"Jean-Paul Sartre","dates":"1905–1980","sem":"Anthropologie","stroemung":"Existentialismus","topic_id":"essentialismus","pos_idx":1,"fw_id":"sartre","merksatz":"«Die Existenz geht der Essenz voraus.» Der Mensch ist nicht, was er ist – er wird erst durch seine Entscheidungen, was er sein wird."},{"name":"Simone de Beauvoir","dates":"1908–1986","sem":"Anthropologie","stroemung":"Feminismus / Existentialismus","topic_id":"essentialismus","pos_idx":2,"fw_id":"ess_exist","merksatz":"«Man wird nicht als Frau geboren, man wird es.» Weiblichkeit ist kein natürliches Schicksal, sondern ein aufgezwungenes Dasein – und das Ziel ist Befreiung durch Freiheit."},{"name":"Albert Camus","dates":"1913–1960","sem":"Anthropologie","stroemung":"Absurdismus","topic_id":"sinn","pos_idx":1,"fw_id":"sartre","merksatz":"Das Leben ist sinnlos – aber der Mensch kann trotzdem in Würde und Revolte leben. Man muss sich Sisyphos als glücklichen Menschen vorstellen."},{"name":"Arnold Gehlen","dates":"1904–1976","sem":"Anthropologie","stroemung":"Mängelwesen / Institutionen","topic_id":"menschenmodelle","pos_idx":2,"fw_id":"gehlen","merksatz":"Der Mensch ist biologisch mangelhaft ausgestattet – gerade deshalb schafft er Kultur, Technik und Institutionen."},{"name":"Ernst Cassirer","dates":"1874–1945","sem":"Anthropologie","stroemung":"Animal Symbolicum","topic_id":"menschenmodelle","pos_idx":3,"fw_id":"anthr_intro","merksatz":"Der Mensch ist das einzige Lebewesen, das Symbole schafft und deutet – Sprache, Kunst und Mythos sind seine Welt."},{"name":"Adam Smith","dates":"1723–1790","sem":"Anthropologie","stroemung":"Homo Economicus / Liberalismus","topic_id":"menschenmodelle","pos_idx":1,"fw_id":"arbeit_fw","merksatz":"Der Mensch handelt rational und eigennützig – er maximiert seinen Nutzen, minimiert seine Kosten."},{"name":"Hans Jonas","dates":"1903–1993","sem":"Anthropologie","stroemung":"Verantwortungsethik","topic_id":"technologie","pos_idx":1,"fw_id":"jonas","merksatz":"Moderne Technik übersteigt unsere moralische Urteilskraft – wir brauchen eine neue Ethik der Verantwortung für die Zukunft."}];
const TOPICS={"rationalismus":{"sem":"Erkenntnistheorie","name":"Klassische Erkenntnistheorie","leitfrage":"Woher stammt unser Wissen — aus der Vernunft, der Erfahrung, oder beiden?","conn":["wissenschaft","freiheit"],"positions":["Rationalismus","Empirismus","Kritizismus"],"rows":[{"label":"Hauptvertreter","values":["René Descartes (1596–1650)","John Locke (1632–1704)","Immanuel Kant (1724–1804)"]},{"label":"Hauptwerk","values":["Meditationen über die Grundlagen der Philosophie (1641)","Versuch über den menschlichen Verstand (1689)","Kritik der reinen Vernunft (1781/1787)"]},{"label":"Merksatz","values":["Wahrheit entsteht im Denken, nicht in der Erfahrung.","Alles Wissen beginnt mit der Erfahrung.","Wissen entsteht, wenn Erfahrung durch Verstandesstrukturen geordnet wird."]},{"label":"Grundannahmen","values":["• Descartes beginnt mit einem methodischen Zweifel. Alles wird infrage gestellt: Sinneswahrnehmungen, mathematische Überzeugungen, sogar die Existenz der Außenwelt.\n• Traum-Argument und Täuschergott-Hypothese.\n• Ziel: eine Erkenntnis finden, die absolut unerschütterlich ist.","• Für Locke beginnt Erkenntnis ohne angeborenes Wissen. Der Geist ist eine leere Tafel (Tabula Rasa).\n• Alles Wissen entsteht durch Erfahrung: Sinneseindrücke (sensation) und innere Reflexionen (reflection).\n• Einfache Ideen (Farben, Töne) werden zu komplexen Ideen kombiniert (Freundschaft, Freiheit).","• Kant akzeptiert Lockes Punkt: Wir brauchen Erfahrung. Doch unser Verstand formt diese Erfahrungen erst.\n• Ohne Kategorien wie Raum, Zeit, Kausalität könnte keine Erfahrung verstanden werden.\n• Wir erleben nie «Ursache» direkt, aber wir ordnen Ereignisse automatisch kausal."]},{"label":"Erkenntnisquelle","values":["Nur der Verstand kann zur Wahrheit führen. Sinneswahrnehmungen sind trügerisch und unsicher.","Alle Erkenntnisse basieren auf Sinneserfahrungen und Reflexionen.","Kombination aus Empirismus und Rationalismus: Erkenntnis beginnt mit Erfahrung, doch diese wird durch angeborene Kategorien des Verstandes strukturiert."]},{"label":"Wahrheitskriterium","values":["Klarheit und Deutlichkeit: Wahr ist, was wir so klar und eindeutig einsehen, dass kein Zweifel möglich bleibt.","Objektivität durch sinnliche Erfahrung. Unterscheidung: Primäre Qualitäten (Form, Bewegung) = objektiv. Sekundäre Qualitäten (Farbe, Geschmack) = subjektiv.","Objektivität durch Kategorien des Verstandes. Wissen ist nur dann objektiv, wenn es in den a priori vorgegebenen Kategorien geordnet ist."]},{"label":"Konsequenzen","values":["Trennung zwischen sicherem rationalen Wissen und unsicherem sinnlichem Wissen. Vernunft dominiert, Sinneswelt ist potenziell Illusion.","Erkenntnis bleibt an Erfahrung gebunden und realitätsnah. Wissenschaft braucht Beobachtung und Experimente.","Wir erkennen nur die Welt, wie sie uns erscheint, nicht wie sie «an sich» ist. Grenzen menschlicher Erkenntnis sind unvermeidbar."]},{"label":"Kritikpunkte","values":["• Zu abstrakt, zu wenig alltagsnah.\n• Überbewertung des Zweifels.\n• Abwertung der Sinneserfahrung problematisch.","• Verstand wird unterschätzt.\n• Tabula-Rasa-Modell wirkt zu schlicht.\n• Abstrakte Begriffe schwer nur aus Erfahrung zu erklären.","• Sehr komplexe Theorie.\n• «Ding an sich» bleibt unerreichbar.\n• Erkenntnis stark an menschliche Perspektive gebunden."]}]},"wissenschaft":{"sem":"Erkenntnistheorie","name":"Wissenschaftstheorie","leitfrage":"Was macht eine Theorie wissenschaftlich — und wie funktioniert wissenschaftlicher Fortschritt?","conn":["rationalismus","freiheit"],"positions":["Karl Popper (1902–1994)","Thomas Kuhn (1922–1996)","Paul Feyerabend (1924–1994)"],"rows":[{"label":"Hauptwerk","values":["Logik der Forschung (1934)","Die Struktur wissenschaftlicher Revolutionen (1962)","Wider den Methodenzwang (1976)"]},{"label":"Merksatz","values":["Wissenschaft kann nie absolute Wahrheiten finden. Sie muss sich stets korrigieren.","Wissenschaftler lösen Rätsel innerhalb eines akzeptierten Paradigmas – Wahrheitsfindung ist nicht ihr oberstes Ziel.","Es gibt keine universelle wissenschaftliche Methode. Nur «Anything goes» beschreibt, wie Wissenschaft wirklich funktioniert."]},{"label":"Grundannahmen","values":["• Falsifizierbarkeit: Wissenschaftliche Theorien müssen widerlegbar sein: Es muss möglich sein, Beweise zu finden, die sie widerlegen könnten – im Gegensatz zur bloßen Bestätigung durch Beobachtung.\n\n• Fallibilismus: Keine Theorie ist absolut sicher oder wahr. Selbst die am besten bestätigte Theorie bleibt vorläufig und kann durch neue Beobachtungen widerlegt werden.","• Paradigma: Ein gemeinsamer theoretischer und methodischer Rahmen, der von einer wissenschaftlichen Gemeinschaft geteilt wird. Er legt fest, welche Fragen als sinnvoll gelten, welche Methoden legitim sind und welche Erklärungen akzeptiert werden (z. B. ptolemäisches Weltbild, Newtonsche Physik).\n\n• Normalwissenschaft: In dieser Phase arbeiten Forschende vollständig innerhalb des Paradigmas. Ziel ist das «Rätsellösen»: Probleme werden nach festgelegten Regeln bearbeitet. Das Paradigma selbst wird nicht infrage gestellt.\n\n• Anomalien und Krise: Mit der Zeit treten Beobachtungen auf, die nicht zum Paradigma passen (Anomalien). Häufen sich diese, gerät das Vertrauen in das Paradigma ins Wanken – es entsteht eine wissenschaftliche Krise.\n\n• Inkommensurabilität: Alte und neue Paradigmen sind nicht direkt vergleichbar: Sie verwenden unterschiedliche Begriffe, stellen andere Fragen und nutzen verschiedene Bewertungskriterien. Ein rein logischer Vergleich ist daher nicht möglich.","• «Anything goes»: Es gibt keine universelle Methode. Logik und starre Methodologie versperren den Blick auf relevante Phänomene.\n\n• Wissenschaftlicher Erfolg: Der Erfolg einer Wissenschaft verdankt sich nicht bestimmten Ideen und Methoden, sondern liegt oft im Verstoß gegen die herrschende Methodik (z. B. Galilei, Kopernikus)."]},{"label":"Argumente","values":["• Kritik des Induktivismus: Es gibt keine logische Rechtfertigung für den Schluss von spezifischen Beobachtungen auf allgemeine Gesetze (Induktionsproblem).\n\n• Deduktive Methode: Theorien werden deduktiv aus bestehenden Theorien abgeleitet und dann empirisch überprüft – im Gegensatz zur induktiven Methode.\n\n• Kritischer Rationalismus: Wissenschaftler sollen Theorien auf Grundlage neuer Beweise und Argumente verwerfen oder überarbeiten. Wissenschaft sucht nach Fehlern, nicht nach Bestätigung.\n\n• Revolutionäre Wissenschaft: Wissenschaftlicher Fortschritt erfolgt oft durch revolutionäre Theorien, die alte Theorien ersetzen, wenn sie besser zu Daten passen oder neue empirische Vorhersagen liefern.","1. Normalwissenschaft → Anomalien\n• Wissenschaftler arbeiten im Normalbetrieb innerhalb des akzeptierten Paradigmas. Sie hinterfragen es nicht, sondern lösen Rätsel nach festgelegten Regeln. Erste Beobachtungen, die nicht ins Paradigma passen (Anomalien), werden zunächst ignoriert oder als Messfehler abgetan.\n\n2. Krise\n• Häufen sich Anomalien, verliert das Paradigma seine Überzeugungskraft. Forschende beginnen, nach Alternativen zu suchen – es entsteht eine Krise.\n\n3. Wissenschaftliche Revolution\n• Ein neues Paradigma entsteht, das die bisherigen Probleme besser erklärt. Es wird von der wissenschaftlichen Gemeinschaft akzeptiert und ersetzt das alte vollständig. Dieser Wechsel ist kein schrittweiser Wissenszuwachs, sondern ein revolutionärer Bruch.\n\n4. Inkommensurabilität\n• Altes und neues Paradigma sind nicht direkt vergleichbar («inkommensurabel»): Wie zwei Menschen, die verschiedene Sprachen sprechen, verwenden sie unterschiedliche Begriffe und Maßstäbe. Deshalb ist ein Paradigmenwechsel keine rein rationale Entscheidung, sondern auch ein sozialer und kultureller Prozess.\n\n5. Keine kumulative Wahrheit\n• Neue Paradigmen sind nicht einfach «wahrer» als alte. Fortschritt bedeutet bei Kuhn: mehr Probleme lösen können – nicht: der objektiven Endwahrheit näherkommen.\n\n• Beispiel: Kopernikus ersetzte das ptolemäische Weltbild, Einstein die Newtonsche Physik – jeweils als revolutionärer Bruch, nicht als schrittweise Erweiterung.","• Gegen Poppers Rationalismus: Poppers Modell (Problem → Theorie → Fehlerelimination → neues Problem) ist zu grob und einseitig. Es gibt auch falsch formulierte Probleme, die man nicht lösen, sondern nur auflösen kann.\n\n• Eine gute Theorie erklärt nicht mehr als eine andere – entscheidend ist die Perspektive, die sie eröffnet.\n\n• Aus Tatsachen lassen sich keine Theorien zwingend ableiten. Sie beweisen letztlich nichts, weil das Denken einen viel zu weiten Spielraum eröffnet.\n\n• Der Erkenntnisprozess erfasst fortwährend die Welt neu.\n\n• Auch irrationales Vorgehen führt zu Wissenschaftsfortschritt – historische Beispiele (Galilei, Kopernikus) beweisen dies."]},{"label":"Konsequenzen","values":["• Kritischer Rationalismus: Wissenschaftler sollen ihre Theorien stets hinterfragen und immer nach Fehlern suchen, nicht nach Bestätigung.\n\n• Revolutionäre Wissenschaft: Wissenschaftlicher Fortschritt kann durch revolutionäre Theorien entstehen, die alte Theorien ersetzen, wenn sie besser zu Daten passen oder neue empirische Vorhersagen liefern.","• Weltbild-Wechsel: Mit einem Paradigmenwechsel verändert sich nicht nur die Theorie, sondern das gesamte wissenschaftliche Weltbild: Alte Probleme müssen mit anderen Augen gesehen und neu interpretiert werden.\n\n• Wissenschaft ist sozial eingebettet: Paradigmen werden von wissenschaftlichen Gemeinschaften getragen. Akzeptanz und Ausbildung spielen eine zentrale Rolle – nicht nur logische Argumente.\n\n• Kein linearer Fortschritt: Phasen stabiler Normalwissenschaft wechseln sich mit Krisen und Revolutionen ab. Fortschritt verläuft in Brüchen, nicht stetig.","• Theoriepluralismus & Methodenanarchismus: Intuition und Kreativität sind gefragt. Man darf und soll alle Ideen und Methoden verwenden, wenn es um Erkenntnis und Problemlösung geht.\n\n• Wissenschaftliche Autonomie: Jeder Wissenschaftler muss die Freiheit haben, selbst zu entscheiden, welche Wege er gehen will.\n\nTrennung von Staat/Schule und Wissenschaft – aber keine Trennung von Wissenschaft und Mythos."]},{"label":"Kritikpunkte","values":["• Ist Falsifikation selbst falsifizierbar?\n• Wissenschaftler halten oft an Theorien fest, auch wenn Anomalien auftreten (Problem der Hilfshypothesen).\n• Beschreibt Ideal-Wissenschaft, nicht die reale Praxis.","• Relativistisch: Wenn Paradigmen inkommensurabel sind, gibt es keinen objektiven Maßstab für Fortschritt – wie soll man dann Theorien überhaupt vergleichen?\n• Kuhn beschreibt, erklärt aber nicht, warum ein Paradigma besser ist als ein anderes.\n• Wissenschaftliche Revolutionen erscheinen irrational, da logische Argumente keine entscheidende Rolle spielen – soziale Akzeptanz scheint wichtiger.","• «Anything goes» kann als Ablehnung jeder Qualitätskontrolle missverstanden werden.\n• Wie unterscheidet man dann noch Wissenschaft von Pseudowissenschaft?\n• Bietet keine normative Orientierung für die wissenschaftliche Praxis."]}]},"hedonismus":{"sem":"Ethik","name":"Hedonismus vs. Eudämonismus","leitfrage":"Was ist das Ziel des menschlichen Lebens — Lust, Seelenruhe oder tugendhafte Vollendung?","conn":["utilitarismus","verantwortung","sinn"],"positions":["(Purer) Hedonismus","Hedonismus nach Epikur (Epikurismus)","Eudämonismus (Tugendethik)"],"rows":[{"label":"Philosoph","values":["Aristippos (435–355 v. Chr.)","Epikur (341–271 v. Chr.)","Aristoteles (384–322 v. Chr.)"]},{"label":"Zentrales Werk","values":["Nur Fragmente überliefert","Brief an Menoikeus","Nikomachische Ethik"]},{"label":"Merksatz","values":["«Suche nach dem größten Lustgewinn.»","«Genieße das Leben in Maßen – und finde so zur dauerhaften Seelenruhe.»","«Suche mit Vernunft die goldene Mitte für ein tugendhaftes und damit glückseliges Leben.»"]},{"label":"Zentrale Annahmen / Voraussetzungen","values":["• Hedonistisches Prinzip: Das Streben nach Lust und Vergnügen ist das primäre Ziel des menschlichen Lebens. Alle Handlungen werden danach beurteilt, ob sie Freude bringen oder nicht.\n\n• Lust als höchstes Gut: Lust steht über allem anderen. Das Streben nach persönlichem Vergnügen hat Vorrang vor moralischen oder spirituellen Prinzipien.","• Materialistisches Weltbild: Kein göttlicher Plan, keine unsterbliche Seele – der Mensch kann sein Leben frei gestalten.\n\n• Ziel: Lustgewinn und Vermeidung von Unlust: Philosophie soll über Quellen seelischer Not aufklären und Wege zur «wahren» Lust zeigen.\n\n• Rolle der Vernunft: Nur durch Vernunft erlangt der Mensch die richtige Einsicht und kann sich von irrationalen Ängsten (Tod, Götter, Schmerz) befreien.\n\n• Zwei Lustformen: Kinetische Lust (kurzfristiger Genuss) vs. katastematische Lust (dauerhafte Zustandslust). Epikur lehnt die kinetische Lust ab – sie führt zu Abhängigkeit statt Glück.\n\n• Bedürfnislehre: Natürliche und notwendige Bedürfnisse (Nahrung) vs. nichtige Bedürfnisse (Ruhm, Luxus). Reduktion auf das Wesentliche schafft Unabhängigkeit.","• Teleologisches Weltbild: Alles in der Natur hat eine Bestimmung (Telos). Der Mensch strebt von Natur aus nach Eudaimonia – einem gelungenen, erfüllten Leben.\n\n• Höchstes Gut: Aristoteles definiert Gut als «das Ziel, zu dem alles strebt». Das Endziel für den Menschen ist Eudaimonia (Glückseligkeit) – nicht bloßes Vergnügen, sondern ein dauerhafter Zustand sittlicher und geistiger Vollendung.\n\n• Vernunft als Wesenskern: Vernunft ist das Spezifische des Menschen (ergon). Glück erreicht man, indem man seine Vernunft vollendet – in Gemeinschaft mit anderen.\n\n• Tugend entsteht durch Übung: Tugend (areté) ist keine angeborene Eigenschaft, sondern wird durch wiederholtes Handeln eingeübt. «Wir werden gerecht, indem wir gerecht handeln.»"]},{"label":"Praktische Ethik","values":["• Maximierung von Vergnügen: Das Ziel des Lebens ist, so viel Lust wie möglich zu erleben und Schmerz zu minimieren. Jede Handlung soll das persönliche Wohlbefinden maximieren.","Epikur wendet das Lustprinzip nicht auf rohen Genuss an, sondern auf katastematische (dauerhafte) Lust:\n\n• Kinetische Lust (abgelehnt): Sofortige, unkontrollierte Bedürfnisbefriedigung. Führt zu Ruhelosigkeit, Abhängigkeit und langfristigem Unglück.\n\n• Katastematische Lust (angestrebt): Dauerhafte Zustandslust = innerer Frieden. Grundlage ist die Ataraxia (Seelenruhe) durch Freiheit von Angst und Schmerz.\n\n• Praktische Wege zur Ataraxia:\n  – Ataraxia: Freiheit von seelischem Schmerz und Angst\n  – Aponie: Freiheit von körperlichem Schmerz\n  – Bedürfnisreduktion: Reduktion auf natürliche, notwendige Bedürfnisse\n  – Freundschaft: wichtigste Quelle dauerhafter Freude\n  – Verzicht auf Ruhm, Luxus, politische Macht\n→ Weniger wollen = mehr innere Ruhe","• Glück (Eudaimonia) erreicht man durch Ausübung der Tugend, nicht durch bloßes Wissen.\n\n• Goldene Mitte (mesotes): Jede Tugend ist die Mitte zwischen zwei Extremen (z. B. Tapferkeit = Mitte zwischen Feigheit und Leichtsinn).\n\n• Phronesis (praktische Klugheit): Die Schlüsseltugend: die Fähigkeit, in konkreten Situationen das Richtige zu erkennen und zu tun. Nicht regelbasiert, sondern situationsabhängig.\n\n• Tugendethik: Aristoteles identifiziert Tugenden wie Tapferkeit, Mäßigung, Gerechtigkeit und Weisheit – alle tragen zur Eudaimonia bei.\n\n• Gemeinschaft als Bedingung: Der Mensch ist zoon politikon – nur in der Polis kann er seine Vernunft und Tugend vollständig entfalten."]},{"label":"Konsequenzen","values":["• Lebensstil des Genusses: Individuen streben danach, alle möglichen Quellen der Lust zu erleben und Schmerz zu vermeiden. Kein Maßstab für den Umgang mit anderen.","• Wahres Glück = Richtige Einsicht (Vernunft) → Optimum an Lust:\n  – Ataraxia: Abwesenheit von Angst und seelischem Schmerz\n  – Aponie: Abwesenheit von körperlichem Schmerz\n  – Verzicht, Reduktion der Ansprüche\n  – Verschiebung der Befriedigung (Investition in spätere, dauerhafte Freude)\n  – Freundschaft, Selbstgenügsamkeit, Selbstzucht\n\n  → Tugend wird nicht um ihrer selbst willen angestrebt, sondern wegen der damit verbundenen Seelenruhe.\n→ Falsches Glück (kinetische Lust) führt zu Stress und Ruhelosigkeit","• Entwicklung von Charakter und Tugend: Ein erfülltes Leben entsteht durch lebenslange Praxis tugendhaften Verhaltens – nicht durch einmalige Einsicht.\n\n• Bedeutung der praktischen Vernunft: Die Fähigkeit, vernünftige Entscheidungen zu treffen und moralische Prinzipien in die Praxis umzusetzen, ist entscheidend für Eudaimonia.\n\n• Leben in Gemeinschaft: Eudaimonia ist kein privates Gefühl, sondern entfaltet sich im politischen und sozialen Leben der Polis."]},{"label":"Kritikpunkte","values":["• Reiner Egoismus: kein Maßstab für den Umgang mit anderen.\n• Führt zu kurzfristigem Denken und vernachlässigt langfristige Konsequenzen.\n• Keine soziale Verantwortung: Was, wenn die eigene Lust anderen schadet?\n• Selbstwiderspruch: Wer Lustmaximierung als Prinzip aufstellt, kann es nicht zugleich verallgemeinern (Spaemann).","• Rückzug aus dem politischen Leben vernachlässigt gesellschaftliche Verantwortung.\n• Glück bleibt auf Schmerzvermeidung ausgerichtet – aktive Selbstverwirklichung tritt in den Hintergrund.\n• Stark reduziertes Leben ist nicht für alle realistisch oder erstrebenswert.\n• Abgrenzung zu Aristoteles teils fließend: Auch Epikur betont Vernunft und Tugend.","• Tugend ist kulturabhängig – was gilt als Tapferkeit, Mäßigung, Gerechtigkeit?\n• Schließt externe Faktoren (Schicksal, Gesundheit, Glück) für Eudaimonia ein – nicht jeder hat dieselben Chancen.\n• Ausschluss von Frauen, Sklaven und Nicht-Griechen aus der Polis widerspricht dem Anspruch auf Universalität.\n• Phronesis bleibt vage: Wie genau erkennt man die goldene Mitte?"]}]},"utilitarismus":{"sem":"Ethik","name":"Utilitarismus vs. Pflichtethik","leitfrage":"Ist die gute Absicht oder das gute Ergebnis entscheidend für die moralische Beurteilung?","conn":["hedonismus","verantwortung","sozgerechtigkeit"],"positions":["Pflichtethik (Deontologie)","Utilitarismus (Konsequentialismus)","Utilitarismus (Konsequentialismus)","Utilitarismus (Konsequentialismus)"],"rows":[{"label":"","values":["","Klassischer Utilitarismus (Quantitativ)","Klassischer Utilitarismus (Qualitativ)","Präferenz-Utilitarismus"]},{"label":"Philosoph","values":["Immanuel Kant (1724–1804)","Jeremy Bentham (1748–1832)","John Stuart Mill (1806–1873)","Peter Singer (*1946)"]},{"label":"Hauptwerk","values":["Grundlegung zur Metaphysik der Sitten (1785)","Einführung in die Prinzipien der Moral und der Gesetzgebung (1789)","Der Utilitarismus (1863)","Praktische Ethik (1979)"]},{"label":"Merksatz","values":["Handle nur nach der Maxime, die du zugleich als allgemeines Gesetz wollen könntest.","Das größte Glück der größten Zahl ist der einzige Maßstab jeder Handlung.","Besser ein unzufriedener Sokrates als ein zufriedenes Schwein. Qualität zählt mehr als Quantität.","Die Interessen aller leidensfähigen Wesen – auch Tiere – sind gleich zu berücksichtigen."]},{"label":"Grundannahmen","values":["• Ohne Freiheit hat der Mensch keine Würde.\n• Freiheit ist nur durch die Unterwerfung unter ein selbst gegebenes Moralgesetz (Autonomie) möglich.\n• Es ist der praktische Zweck der Vernunft, guten Willen hervorzubringen.","• Lust bzw. das Freisein von Unlust sind die einzig wünschenswerten Zwecke des menschlichen Lebens.\n• Das Prinzip der Nützlichkeit (Glücksmaximierung / Leidminimierung) ist der einzige Maßstab für das Tun/Lassen.\n• Eine gute Handlung muss die Tendenz haben, das Wohl aller davon betroffenen Personen zu befördern.\n• Moralisch richtig sind Handlungen, deren Folgen (Konsequenz-Prinzip) für das Glück (Hedonistisches Prinzip) aller Betroffenen (Universalitätsprinzip) nützlich sind (Utilitätsprinzip).","• Lust bzw. das Freisein von Unlust sind die einzig wünschenswerten Zwecke des menschlichen Lebens.\n• Das Prinzip der Nützlichkeit (Glücksmaximierung / Leidminimierung) ist der einzige Maßstab für das Tun/Lassen.\n• Eine gute Handlung muss die Tendenz haben, das Wohl aller davon betroffenen Personen zu befördern.\n• Moralisch richtig sind Handlungen, deren Folgen (Konsequenz-Prinzip) für das Glück (Hedonistisches Prinzip) aller Betroffenen (Universalitätsprinzip) nützlich sind (Utilitätsprinzip).","• Lust bzw. das Freisein von Unlust sind die einzig wünschenswerten Zwecke des menschlichen Lebens.\n• Das Prinzip der Nützlichkeit (Glücksmaximierung / Leidminimierung) ist der einzige Maßstab für das Tun/Lassen.\n• Eine gute Handlung muss die Tendenz haben, das Wohl aller davon betroffenen Personen zu befördern.\n• Moralisch richtig sind Handlungen, deren Folgen (Konsequenz-Prinzip) für das Glück (Hedonistisches Prinzip) aller Betroffenen (Universalitätsprinzip) nützlich sind (Utilitätsprinzip)."]},{"label":"Argumente","values":["• Nur der gute Wille ist uneingeschränkt gut und Bedingung für das Gutsein aller Natur- und Glücksgaben.\n\n• Er darf nicht am Erfolg gemessen werden und zeigt sich in Handlungen, die rein aus Pflicht geschehen – auch zum Guten. Nur so gilt das Moralgesetz immer und überall.\n\n• Da alle Inhalte wegfallen, bleibt nur die reine Gesetzmäßigkeit: »Handle nur nach derjenigen Maxime, durch die du zugleich wollen kannst, dass sie ein allgemeines Gesetz werde!« = kategorischer Imperativ.\n\n• Zweite Formel: Behandle jeden Menschen immer auch als Zweck an sich, niemals nur als Mittel.\n\n• Selbstmordverbot und Lügenverbot sind vollkommene Pflichten. Ein Verstoß lässt sich nicht einmal widerspruchsfrei denken.","• Körperliche und geistige Freuden sind gleichwertig (nur Quantität zählt).\n\n• Das hedonistische Glückskalkül berechnet den Nutzen nach: Intensität, Dauer, Gewissheit, Nähe/Ferne, Folgenträchtigkeit, Reinheit des erwarteten Glücks.\n\n• Glück und Leid werden quantifiziert und miteinander verrechnet.\n→ = Quantitätsutilitarismus\n\n• »Jeder zählt für einen, keiner für mehr als einen.«","• Im Gegensatz zu Bentham sieht Mill einen qualitativen Unterschied zwischen körperlichen und geistigen Freuden.\n\n• Das «Schweineglück» (bloße Befriedigung sinnlicher Genüsse) ist unvereinbar mit der Würde des Menschen.\n\n• Zufriedenheit ist die höchste Form des Glücks. Darüber, welche Freude wünschenswerter ist, können nur Experten entscheiden.\n\n• Das Glück aller Betroffenen ist der Maßstab – nicht das Glück des Handelnden selbst.\n→ = Qualitätsutilitarismus","Interessen: Ein Wesen hat Interessen, wenn es Präferenzen hat – d. h. Zustände, die es anstrebt oder vermeidet. Präferenzen sind damit die konkrete Form, in der Interessen sichtbar werden.\n\n• Für Singer sind die Interessen der Betroffenen der entscheidende Maßstab – nicht bloß Lust und Leid, sondern was das Wesen tatsächlich will oder ablehnt.\n\n• Das Gleichheitsprinzip gilt auch für andere Gattungen/Spezies: Leidensfähige Wesen haben Interessen, die genauso zu berücksichtigen sind wie menschliche.\n\n• Speziesismus (Bevorzugung der eigenen Spezies) ist irrational und unmoralisch – so wie Rassismus."]},{"label":"Konsequenzen","values":["• Absolutes Lügenverbot: Selbst um jemandem zu helfen ist Lügen unzulässig – die Maxime des Lügens kann nicht verallgemeinert werden.\n\n• Menschenwürde als Grenze: Menschen dürfen nie nur als Mittel benutzt werden – auch nicht für gute Zwecke. Grundlage moderner Menschenrechte.\n\n• Universelle Moral: Das Moralgesetz gilt unabhängig von Kultur, Zeit und persönlichen Interessen – absolut und ohne Ausnahme.","• Moral wird berechenbar: Jede Handlung lässt sich in Glückseinheiten quantifizieren und vergleichen – Grundlage für politische Reformen und Sozialpolitik.\n\n• Gleichbehandlung aller Interessen: »Jeder zählt für einen, keiner für mehr als einen.« – kein Mensch wird bevorzugt.\n\n• Demokratisierung der Moral: Nicht Tradition oder Autorität entscheidet, sondern die nachvollziehbare Berechnung des Nutzens.","• Höhere Freuden als Maßstab: Geistige Freuden (Kunst, Bildung, Freundschaft) haben Vorrang vor körperlichen. Bildung wird zur moralischen Pflicht.\n\n• Freiheit endet beim Schaden: Individuelle Freiheit ist zentral, aber sie endet dort, wo sie anderen schadet (Schadensprinzip).\n\n• Gemeinwohl durch Bildung: Eine gebildete Gesellschaft trifft bessere moralische Entscheidungen – Bildungsinvestitionen sind ethisch geboten.","• Erweiterung des moralischen Kreises: Massentierhaltung, Tierversuche und Ernährungsgewohnheiten werden moralisch problematisch.\n\n• Pflicht zur globalen Hilfe: Wenn wir leicht und ohne großen Schaden helfen können, sind wir verpflichtet – unabhängig von Entfernung.\n\n• Effektiver Altruismus: Moralisches Handeln bedeutet: dort helfen, wo es am meisten bewirkt, nicht wo es sich am nächsten anfühlt."]},{"label":"Kritikpunkte","values":["• Obwohl Kant Pflichtethiker ist, muss er die Folgen einer Handlung beachten, wenn er den kategorischen Imperativ anwenden will.\n\n• Kann ein einzelner Mensch überhaupt entscheiden, ob seine Maxime allgemeines Gesetz werden soll?\n\n• Muss man wirklich rein (!) aus methodischen Gründen jede Form von Neigung ausklammern?","• Naturalistischer Fehlschluss: Wer vom Sein (Das macht mir Freude.) auf das Sollen (Deshalb ist es moralisch gut.) schließt, begeht nach David Hume einen naturalistischen Fehlschluss. Außerdem begründen die Utilitaristen das moralische Gute außermoralisch.\n\n• Induktionsproblem: Wir können keine sicheren Voraussagen über zukünftige Folgen machen. »We never really advance one step beyond ourselves.« (Hume)\n\n• Was ist das »größtmögliche Glück für die größtmögliche Zahl«? Dürfen im Extremfall 51 % auf Kosten von 49 % ihr Glück befördern?\n\n• Wie löst der Utilitarismus das Problem der Verteilungsgerechtigkeit von Glück?\n\n• Kann man mit dem Nützlichkeitsprinzip nicht auch Handlungen rechtfertigen, die wir als unmoralisch empfinden – z. B. Lüge oder Tötung von Personen?\n\n• Bentham: Wer definiert, welche Freude «höherwertiger» ist? Kein qualitativer Maßstab.\n\n• Mill: Elitäre Tendenz – wer entscheidet, was «höhere» Freude ist? Gebildete erhalten eine Sonderrolle → Paternalismus-Vorwurf.\n\n• Singer: Singers Definition von «Person» (Selbstbewusstsein, Zukunftsplanung) würde manche Menschen ausschließen und manche Tiere einschließen – moralisch kontraintuitiv.","• Naturalistischer Fehlschluss: Wer vom Sein (Das macht mir Freude.) auf das Sollen (Deshalb ist es moralisch gut.) schließt, begeht nach David Hume einen naturalistischen Fehlschluss. Außerdem begründen die Utilitaristen das moralische Gute außermoralisch.\n\n• Induktionsproblem: Wir können keine sicheren Voraussagen über zukünftige Folgen machen. »We never really advance one step beyond ourselves.« (Hume)\n\n• Was ist das »größtmögliche Glück für die größtmögliche Zahl«? Dürfen im Extremfall 51 % auf Kosten von 49 % ihr Glück befördern?\n\n• Wie löst der Utilitarismus das Problem der Verteilungsgerechtigkeit von Glück?\n\n• Kann man mit dem Nützlichkeitsprinzip nicht auch Handlungen rechtfertigen, die wir als unmoralisch empfinden – z. B. Lüge oder Tötung von Personen?\n\n• Bentham: Wer definiert, welche Freude «höherwertiger» ist? Kein qualitativer Maßstab.\n\n• Mill: Elitäre Tendenz – wer entscheidet, was «höhere» Freude ist? Gebildete erhalten eine Sonderrolle → Paternalismus-Vorwurf.\n\n• Singer: Singers Definition von «Person» (Selbstbewusstsein, Zukunftsplanung) würde manche Menschen ausschließen und manche Tiere einschließen – moralisch kontraintuitiv.","• Naturalistischer Fehlschluss: Wer vom Sein (Das macht mir Freude.) auf das Sollen (Deshalb ist es moralisch gut.) schließt, begeht nach David Hume einen naturalistischen Fehlschluss. Außerdem begründen die Utilitaristen das moralische Gute außermoralisch.\n\n• Induktionsproblem: Wir können keine sicheren Voraussagen über zukünftige Folgen machen. »We never really advance one step beyond ourselves.« (Hume)\n\n• Was ist das »größtmögliche Glück für die größtmögliche Zahl«? Dürfen im Extremfall 51 % auf Kosten von 49 % ihr Glück befördern?\n\n• Wie löst der Utilitarismus das Problem der Verteilungsgerechtigkeit von Glück?\n\n• Kann man mit dem Nützlichkeitsprinzip nicht auch Handlungen rechtfertigen, die wir als unmoralisch empfinden – z. B. Lüge oder Tötung von Personen?\n\n• Bentham: Wer definiert, welche Freude «höherwertiger» ist? Kein qualitativer Maßstab.\n\n• Mill: Elitäre Tendenz – wer entscheidet, was «höhere» Freude ist? Gebildete erhalten eine Sonderrolle → Paternalismus-Vorwurf.\n\n• Singer: Singers Definition von «Person» (Selbstbewusstsein, Zukunftsplanung) würde manche Menschen ausschließen und manche Tiere einschließen – moralisch kontraintuitiv."]}]},"verantwortung":{"sem":"Ethik","name":"Verantwortung in ethischen Kontexten","leitfrage":"Wer trägt Verantwortung — und wofür, wie weit und gegenüber wem?","conn":["utilitarismus","freiheit","technologie"],"positions":["Albert Schweitzer (1875–1965)","Hans Jonas (1903–1993)","Peter Singer (*1946)"],"rows":[{"label":"Hauptwerk","values":["Kultur und Ethik (1923)","Das Prinzip Verantwortung (1979)","Praktische Ethik (1979)"]},{"label":"Merksatz","values":["«Ich bin Leben, das leben will, inmitten von Leben, das leben will.» – Ehrfurcht vor jedem Lebewesen ist das Grundprinzip der Ethik.","«Handle so, dass die Wirkungen deiner Handlung verträglich sind mit der Permanenz echten menschlichen Lebens auf Erden.»","Gleiche Interessen – von Mensch oder Tier – müssen gleich berücksichtigt werden. Leidensfähigkeit, nicht Spezieszugehörigkeit, entscheidet über moralische Berücksichtigung."]},{"label":"Grundannahmen","values":["• Ehrfurcht vor dem Leben: Jedes Lebewesen hat einen Eigenwert – unabhängig davon, ob es dem Menschen nützt.\n\n• Moralisches Handeln bedeutet, Leben zu fördern und Schaden zu meiden.\n\n• Die Unterbrechung von Leben ist das größte moralische Übel.\n\n• Ethik gilt gegenüber allem Lebendigen – nicht nur gegenüber Menschen.","• Die bisherige Ethik war auf den Nahbereich beschränkt: Sie regelte das Zusammenleben von Menschen hier und jetzt. Die Natur des Menschen galt als festgelegt.\n\n• Als Voraussetzung für richtiges moralisches Handeln genügte der gute Wille des Einzelnen.\n\n• Problem der Moderne: Moderne Technologie (Atomkraft, Gentechnik, Klimawandel) ermöglicht Eingriffe, die weit über die Gegenwart hinauswirken – eine neue Ethik ist nötig.","• Das Gleichheitsprinzip verlangt, die Interessen aller von einer Handlung Betroffenen gleich zu berücksichtigen.\n\n• Die Fähigkeit zu leiden bzw. Glück zu empfinden ist die einzig maßgebliche Grundvoraussetzung für moralische Berücksichtigung – nicht Intelligenz, Autonomie oder Artenzugehörigkeit."]},{"label":"Argumente","values":["• Universelle Verantwortung: Der Mensch trägt Verantwortung gegenüber allem Leben – Tiere, Pflanzen und die Natur verdienen moralische Rücksicht.\n\n• «Ehrfurcht vor dem Leben» ist das einzige Grundprinzip, das eine wirklich universale Ethik tragen kann.\n\n• Konsequenz im Alltag: Schweitzer lebte seine Ethik praktisch: Als Arzt in Afrika setzte er sich für Menschen und Tiere gleichermaßen ein.","• Die moderne Hochtechnologie sprengt alle bisherigen moralischen Dimensionen: Atomkrieg, Gentechnik und Klimawandel können den Fortbestand der Menschheit gefährden.\n\n• Wissen wird zur moralischen Pflicht: Wer handelt, muss die möglichen Folgen kennen – Unwissenheit über unabsehbare Konsequenzen ist keine Entschuldigung, sondern selbst eine moralische Herausforderung.\n\n• Heuristik der Furcht: Im Zweifel soll man das schlimmste Szenario ernst nehmen und danach handeln – Vorsicht vor Optimismus bei irreversiblen Risiken.","• Wenn Leiden als Grundvoraussetzung gilt, müssen wir auch die Interessen von Tieren berücksichtigen.\n\n• Wer Tiere ignoriert, begeht Speziesismus: die irrationale Bevorzugung der eigenen Spezies – moralisch so unhaltbar wie Rassismus oder Sexismus.\n\n• Weder Selbstbewusstsein, noch Autonomie, noch emotionale Bindung dürfen allein über die faire Behandlung eines Wesens entscheiden."]},{"label":"Konsequenzen","values":["• Umweltethik: Die Natur hat einen Eigenwert – sie darf nicht nur als Ressource für den Menschen betrachtet werden.\n\n• Vegetarismus und Tierschutz: Wer Ehrfurcht vor allem Leben ernst nimmt, muss sein Verhalten gegenüber Tieren überdenken.\n\n→ Ethik wird zur ganzheitlichen Lebenshaltung, nicht nur zu einer Theorie.","• Neuer kategorischer Imperativ: »Handle so, dass die Wirkungen deiner Handlung verträglich sind mit der Permanenz menschlichen Lebens auf der Erde«.\n\n• Das Prinzip Verantwortung nimmt vor allem die öffentliche Politik in die Pflicht: Gesetze und Institutionen müssen das Leben zukünftiger Generationen schützen.\n\n• Vorsorgeprinzip: Wenn eine Handlung möglicherweise irreversible Schäden verursacht, ist Vorsicht geboten – auch ohne Gewissheit.","• Die Linderung des größeren Leidens hat Vorrang: Es muss gute Gründe geben, Angehörige der Spezies Mensch gegenüber anderen Spezies zu bevorzugen.\n\n• Es gibt keinen guten Grund, Tiere in Massen zu züchten und zu töten, um billiges Fleisch zu produzieren.\n\n• Effektiver Altruismus: Wir sind verpflichtet zu helfen, wenn wir ohne großen Schaden für uns Leid verringern können – unabhängig von Entfernung oder Artzugehörigkeit."]},{"label":"Kritikpunkte","values":["• Handlungslähmung: «Ehrfurcht vor allem Leben» führt zu Paradoxien: Darf man Bakterien töten? Pflanzen essen? Es fehlt eine Prioritätenordnung.\n\n• Keine Abstufung: Schweitzer gibt keine klare Rangfolge, welches Leben mehr Schutz verdient als anderes.\n\n• Sein Ansatz bleibt eher eine Lebenshaltung als eine handlungsleitende Ethiktheorie.","• Extremer Konservativismus: Die «Heuristik der Furcht» kann Innovation und technischen Fortschritt blockieren – auch wenn dieser nützlich wäre.\n\n• Unklare Zukunftspflichten: Wie genau sollen wir die Interessen zukünftiger Generationen ermitteln, die noch nicht existieren?\n\n• Jonas' Ansatz ist stark auf Technologierisiken fokussiert – andere moralische Probleme (z. B. Ungerechtigkeit, Armut) treten in den Hintergrund.","• Überforderung: Konsequent angewendet verlangt Singers Ethik vom Einzelnen sehr viel – z. B. den Großteil des Einkommens zu spenden.\n\n• Personenbegriff problematisch: Singers Definition von «Person» (Selbstbewusstsein, Zukunftsplanung) würde manche Menschen ausschließen und manche Tiere einschließen – moralisch kontraintuitiv.\n\n• Die Gleichsetzung von Speziesismus und Rassismus wird als unzulässige Analogie kritisiert."]}]},"freiheit":{"sem":"Ethik","name":"Freiheit: Determinismus – Indeterminismus – Kompatibilismus","leitfrage":"Ist der Wille absolut frei — oder sind alle Entscheidungen durch Ursachen bestimmt?","conn":["rationalismus","verantwortung","essentialismus"],"positions":["Determinismus","Indeterminismus (Libertarismus)","Kompatibilismus"],"rows":[{"label":"Definition","values":["Determinismus (lat. determinare: festlegen): Alle Ereignisse sind durch eine Kausalkette vorherbestimmt. Es existieren immer Bedingungen, die festlegen, was in der Zukunft passieren wird.\n\nLaplace prägte das Bild des Laplace'schen Dämons: Ein Wesen mit vollständigem Wissen über alle Naturgesetze und den aktuellen Weltzustand könnte jedes zukünftige Ereignis berechnen. Deterministen bezweifeln den freien Willen.","Der Indeterminismus ist das Gegenteil des Determinismus: Die Welt ist nicht kausal vorherbestimmt. Handlungen und Ereignisse sind nicht vollständig determiniert.\n\nIndeterministen werden oft auch Libertarier genannt. Für sie ist der Determinismus falsch und echter freier Wille möglich.","Der Kompatibilismus geht davon aus, dass Determinismus und freier Wille gleichzeitig wahr sein können.\n\nKompatibilisten sehen die Welt als determiniert an, gehen aber davon aus, dass freie Entscheidungen trotzdem möglich sind – nämlich dann, wenn sie aus den eigenen Wünschen und Gründen entspringen."]},{"label":"Merksatz","values":["Alles ist kausal bestimmt – auch deine nächste Entscheidung. Freier Wille ist eine Illusion.","Der Mensch erlebt sich als freies Wesen, das wirklich hätte anders handeln können. Diese Erfahrung ist real und kein Trugbild.","Freiheit bedeutet nicht Unverursachtheit, sondern aus eigenen Gründen handeln – ohne äußeren Zwang. Das ist mit Determinismus vereinbar."]},{"label":"Position kurzgefasst","values":["Alle Ereignisse, einschließlich menschlicher Handlungen, sind durch vorherige Ursachen vollständig bestimmt.","Nicht alle Ereignisse sind vollständig durch vorherige Ursachen bestimmt; einige Ereignisse geschehen zufällig oder aus freiem Willen. Freier Wille ist möglich.","Freiheit und Determinismus sind vereinbar. Freiheit liegt in der Fähigkeit, gemäß eigenen Wünschen und Motiven zu handeln – auch wenn diese selbst determiniert sind."]},{"label":"Hauptvertreter","values":["Pierre-Simon Laplace, Baruch Spinoza, Paul d'Holbach, Wolf Singer, Gerhard Roth","Roderick Chisholm, Robert Kane, Peter van Inwagen, Geert Keil; Immanuel Kant (Sonderstellung: akzeptiert Determinismus der Erscheinungen, bejaht aber transzendentale Freiheit)","David Hume, John Locke, Daniel Dennett, Peter Bieri, Harry Frankfurt"]},{"label":"Grundannahmen","values":["• Das Universum folgt strikten Kausalgesetzen.\n• Jede Handlung ist das Ergebnis einer Kette von Ursachen, die bis zu den Anfängen des Universums zurückverfolgt werden können.\n• Es gibt keine echten Alternativen – was geschieht, musste so geschehen.","• Nicht alle Ereignisse sind durch strikte Kausalgesetze bestimmt.\n• Zufälligkeit und Kontingenz spielen eine Rolle bei bestimmten Ereignissen, einschließlich menschlicher Handlungen.\n• Menschen können unter gleichen Bedingungen auch anders handeln (Prinzip alternativer Möglichkeiten).","• Freiheit ist die Fähigkeit, gemäß eigenen Wünschen und Überlegungen zu handeln.\n• Determinierte Handlungen können trotzdem frei sein, wenn sie dem Willen der Person entsprechen und ohne äußeren Zwang ausgeführt werden.\nBieri: Der Wille ist frei, wenn er sich unserem Urteil darüber fügt, was zu wollen richtig ist."]},{"label":"Argumente","values":["• Kausalität: Alles hat eine Ursache; daher sind auch Handlungen determiniert.\n\n• Naturwissenschaft: Wissenschaftliche Erklärungen beruhen auf kausalen Gesetzmäßigkeiten, die auch menschliches Verhalten umfassen.\n\n• Vorhersagbarkeit: Mit vollständiger Information könnte theoretisch jedes Ereignis vorhergesagt werden (Laplace'scher Dämon).\n\n• Hirnforschung: Neurowissenschaften zeigen, dass Hirnaktivität Entscheidungen vorausgeht – der bewusste Wille scheint nachzukommen.","• Erfahrung der Wahl: Menschen erleben sich selbst als wählende und entscheidende Wesen – diese Erfahrung ist real.\n\n• Quantenphysik: Auf mikroskopischer Ebene gibt es unvorhersehbare, zufällige Ereignisse, die deterministische Kausalität grundsätzlich in Frage stellen.\n\n• Kreativität: Innovation und kreatives Denken setzen die Möglichkeit freier, nicht vollständig determinierter Entscheidungen voraus.\n\n• Konsequenzargument (van Inwagen): Wenn Determinismus wahr ist, folgen unsere Handlungen aus Naturgesetzen und der fernen Vergangenheit – beides können wir nicht ändern. Also können wir auch unsere Handlungen nicht wirklich ändern.","• Äußerer vs. innerer Zwang: Freiheit bedeutet nicht Unverursachtheit, sondern Abwesenheit äußeren Zwangs. Auch determinierte Handlungen können frei sein.\n\n• Verantwortlichkeit: Selbst wenn Handlungen determiniert sind, bleibt man verantwortlich, weil sie dem eigenen Willen entsprechen.\n\n• Moralität: Für die moralische Beurteilung ist entscheidend, dass die Handlung aus der eigenen Person kommt – nicht, ob sie determiniert ist.\n\nFrankfurt: Wenn wir genau das tun, was wir tun wollen, handeln wir frei – Übereinstimmung von Wille und Handlung ist Freiheit."]},{"label":"Konsequenzen","values":["• Keine echte Freiheit: Alle Handlungen sind determiniert, also gibt es keine echten Wahlmöglichkeiten.\n\n• Moralproblematik: Verantwortung und Schuld werden problematisch, da Handlungen unausweichlich sind. Strafe kann nur noch zur Abschreckung dienen.\n\n• Fatalismus: Das Gefühl, dass die Zukunft festgelegt ist, kann zu Resignation führen.","• Wahre Freiheit: Entscheidungen können tatsächlich frei und nicht determiniert sein.\n\n• Verantwortung bleibt: Handlungen resultieren aus freien Entscheidungen, also ist Verantwortung möglich.\n\n• Problem des Zufalls: Zufälligkeit könnte Handlungen unvorhersehbar und damit teilweise irrational machen – Zufallsfreiheit ist keine echte Freiheit.","• Freiheit mit Determinismus vereinbar: Menschen können verantwortlich für ihre Handlungen sein, weil sie ihren eigenen Wünschen entsprechen.\n\n• Rechtssystem und Moral: Können aufrechterhalten werden, da Freiheit als Handeln nach eigenen Gründen definiert wird.\n\n• Autonomie erklärt: Erklärt, wie Autonomie und Verantwortlichkeit in einer determinierten Welt möglich sind."]},{"label":"Kritikpunkte","values":["• Selbstwiderspruch: Wenn alles determiniert ist, dann auch die Überzeugung, der Determinismus sei wahr – kann sie dann als rationale Einsicht gelten?\n\n• Verantwortung unmöglich: Ohne echte Alternativen wird Lob, Tadel und Strafe philosophisch fragwürdig.\n\n• Widerspricht dem Erleben: Der Determinismus widerspricht dem tiefen subjektiven Gefühl, wirklich wählen zu können.","• Zufall ≠ Freiheit: Quantenzufall erzeugt Zufälligkeit, keine Selbstbestimmung. Eine zufällige Entscheidung ist nicht freier als eine determinierte.\n\n• Naturalismus-Problem: Die Annahme, dass Personen als «erste Beweger» in den Weltverlauf eingreifen, widerspricht der kausalen Geschlossenheit der Natur.\n\n• Unvereinbar mit Naturwissenschaft: Libertarische Freiheit ist mit allen naturwissenschaftlichen Erkenntnissen über die physikalische Welt schwer vereinbar.","• Konsequenzargument (van Inwagen): Wenn die Vergangenheit und die Naturgesetze nicht in unserer Macht stehen, dann auch ihre Konsequenzen nicht – einschließlich unserer Handlungen.\n\n• Schwacher Freiheitsbegriff: Kompatibilisten definieren Freiheit so schwach (nur keine äußeren Hindernisse), dass sie kaum mehr bedeutsam erscheint.\n\n• Löst das Problem nicht: Kompatibilismus verschiebt das Problem nur: Auch wenn Freiheit mit Determinismus «vereinbar» ist, bleibt die Frage, ob wir wirklich Alternativen haben."]}]},"relativismus":{"sem":"Ethik","name":"Relativismus vs. Universalismus","leitfrage":"Gibt es universelle moralische Werte — oder ist Moral immer kulturell bedingt?","conn":["moralkritik","menschenrechte"],"positions":["Moralischer Relativismus","Universalismus","Kritische Intoleranz"],"rows":[{"label":"Hauptvertreter","values":["Paul Feyerabend (primär Wissenschaftstheoretiker, hier auf Moralrelativismus übertragen), Ruth Benedict, Gilbert Harman","Julian Nida-Rümelin, Immanuel Kant, Martha Nussbaum","Annemarie Pieper"]},{"label":"Merksatz","values":["Es gibt keine universelle Moral – was als «gut» gilt, hängt von der Kultur ab, in der man aufgewachsen ist.","Menschenrechte gelten für alle Menschen überall – unabhängig von Kultur, Tradition oder Geschichte.","Toleranz bedeutet nicht Schweigen. Wo fundamentale Rechte verletzt werden, ist kritischer Dialog Pflicht – aber ohne moralische Überlegenheit."]},{"label":"Grundannahme","values":["Es gibt keine allgemein gültigen moralischen Maßstäbe – jede Kultur hat ihre eigenen Normen.","Es existieren universelle moralische Rechte, die für alle Menschen gelten – unabhängig von der Kultur.","Auch wenn Kulturen verschieden sind, dürfen bestimmte Praktiken öffentlich kritisiert werden, wenn sie fundamentale Rechte verletzen."]},{"label":"Begründung","values":["• Moralische Überzeugungen sind kulturell bedingt; Bewertung erfolgt nur aus der Innenperspektive der jeweiligen Gemeinschaft.\n\n• Was in einer Kultur als «richtig» gilt, hat sich historisch entwickelt – es gibt keine kulturunabhängige Perspektive von außen.","• Menschenrechte wie Freiheit, Gleichheit und Unversehrtheit sind normativ und aus der Vernunft ableitbar.\n\nKant: Jeder Mensch hat Würde kraft seiner Vernunft – das gilt unabhängig von seiner kulturellen Herkunft.","• Toleranz endet, wenn fundamentale Werte (z. B. Leben, Freiheit, Würde) verletzt werden.\n\n• Kritik darf geübt werden, aber auf Basis offener Kommunikation und ohne Haltung moralischer Überlegenheit."]},{"label":"Bewertung kultureller Praktiken","values":["Ablehnung der Außenbewertung: Traditionen dürfen nicht von außen als «gut» oder «schlecht» beurteilt werden.","Kritik ist erlaubt und geboten, wenn Menschenrechte verletzt werden – selbst wenn diese Praxis kulturell tief verwurzelt ist.","Praktiken dürfen (und müssen) kritisiert werden, aber nicht mit der Haltung moralischer Überlegenheit, sondern auf Grundlage offener Kommunikation."]},{"label":"Beispiel: Kinderehe","values":["Verständnis entwickeln, nicht urteilen. Bewertung ist an eigene Kulturwerte gebunden – eine Außenbewertung ist nicht legitim.","Verstoß gegen universelle Rechte (z. B. Kindeswohl, körperliche Integrität) – darf nicht toleriert werden.","Öffentliche Kritik ist gerechtfertigt, da das Kindeswohl verletzt wird – aber mit der Bereitschaft zum respektvollen Diskurs mit der betroffenen Gemeinschaft."]},{"label":"Toleranz-verständnis","values":["Weitgehende Toleranz gegenüber anderen Kulturen – auch bei kontroversen Praktiken. Keine externe Bewertungsinstanz.","Toleranz endet dort, wo fundamentale Menschenrechte verletzt werden. Toleranz bedeutet nicht, alles hinzunehmen.","Toleranz bedeutet, Widerspruch zu ertragen, aber nicht Gleichgültigkeit. Wo kein Gespräch möglich ist, ist Protest Pflicht."]},{"label":"Kritik","values":["• Kann zu unkritischer Akzeptanz menschenrechtsverletzender Praktiken führen.\n\n• Selbstwiderspruch: Ist der Relativismus selbst absolut gültig? Wenn ja, widerspricht er sich.\n\n• Moralische Kritik an Unterdrückung (Sklaverei, Genozid) wird unmöglich.","• Gefahr des Kulturimperialismus: westliche Werte als allgemein gültig durchzusetzen.\n\n• Definitionsmacht: Wer bestimmt, was «universell» ist? Historisch oft die Mächtigsten.\n\n• Blinde Flecken gegenüber eigenen kulturellen Verzerrungen.","• Gefahr, den Maßstab des Dialogs zu verlieren oder unbewusst doch eigene Normen zu verabsolutieren.\n\n• Umsetzungsproblem: Wann genau ist ein Dialog «offen»? Die Grenze zwischen Dialog und Aufzwingen bleibt unscharf.\n\n• Piepers Position bleibt in der Praxis schwer operationalisierbar."]},{"label":"Ziel","values":["Kulturelles Verständnis und Pluralität wahren. Keine Kultur darf von außen bewertet oder ihre Normen aufgezwungen bekommen.","Universale Geltung von Würde und Rechten sichern – für jeden Menschen, unabhängig von Herkunft und Kultur.","Ethisch reflektierte Handlungsorientierung, die Kulturkritik zulässt, ohne dogmatisch zu urteilen. Kritik als dialogischer Prozess."]}]},"moralkritik":{"sem":"Ethik","name":"Moralkritik: Nietzsche – Marx – Foucault – Butler","leitfrage":"Ist Moral ein Instrument der Herrschaft — oder gibt es moralische Prinzipien jenseits von Machtverhältnissen?","conn":["relativismus","sozgerechtigkeit","machttheorie"],"positions":["Friedrich Nietzsche (1844–1900)","Karl Marx (1818–1883)","Michel Foucault (1926–1984)","Judith Butler (*1956)"],"rows":[{"label":"Merksatz","values":["Traditionelle Moral ist eine Erfindung der Schwachen, um die Starken zu bändigen. Es braucht eine neue, lebensbejahende Moral – die des Übermenschen.","Moral ist kein neutrales Regelwerk, sondern Ideologie: Sie verschleiert, dass die herrschende Klasse ihre Interessen als allgemeingültig darstellt.","Moral ist Macht. Sie entsteht nicht aus Vernunft, sondern aus historischen Diskursen, die festlegen, was als «normal» und «abweichend» gilt.","Normen entstehen nicht durch Dekrete, sondern durch ständige Wiederholung – wer sie versteht, kann sie auch verschieben und unterlaufen."]},{"label":"Zentrale These","values":["Die traditionelle Moral ist Ausdruck von Schwäche – eine «Sklavenmoral», die das Leben unterdrückt und außergewöhnliche Individuen nivelliert.","Moral ist Teil des ideologischen «Überbaus», der ungerechte Produktionsverhältnisse und soziale Klassengegensätze absichert und legitimiert.","Moral ist ein historisch gewachsenes Machtinstrument, das Subjekte diszipliniert, indem es Normen als natürlich oder vernünftig erscheinen lässt.","Performativität: Moralnormen wirken durch Sprache und Wiederholung – sie produzieren Identität und soziale Normen, statt diese nur zu beschreiben."]},{"label":"Kernbegriffe","values":["• Sklavenmoral: Moral der Schwachen, die Stärke als «böse» umdeutet.\n• Herrenmoral: Moral der Starken: lebensbejahend, schöpferisch.\n• Wille zur Macht: Triebkraft des Lebens; nicht Herrschaft, sondern Selbstentfaltung.\n• Übermensch: Nicht biologisches Ideal, sondern Mensch, der eigene Werte schafft.\n• Umwertung aller Werte: Radikale Neubewertung dessen, was als «gut» und «böse» gilt.","• Basis / Überbau: Ökonomische Verhältnisse (Basis) bestimmen Kultur, Recht, Moral (Überbau).\n• Entfremdung: Trennung des Arbeiters von seinem Produkt und seiner menschlichen Natur.\n• Klassenkampf: Historischer Motor zwischen Bourgeoisie und Proletariat.\n• Ideologie: Verschleierter Ausdruck von Klasseninteressen als allgemeine Wahrheit.","• Macht-Wissen-Ordnung: Wissen und Macht sind untrennbar; Wissen legitimiert Machtstrukturen.\n• Diskurs: System von Aussagen, das festlegt, was als wahr/normal gilt.\n• Disziplinierung: Macht wirkt durch Überwachung und Normierung von Körpern und Verhalten.\n• Selbstsorge: Alternative Ethik: kritische Gestaltung des eigenen Lebens.","• Performativität: Normen entstehen durch ständige Wiederholung von Handlungen und Sprechakten.\n• Subjektivierung: Das Subjekt entsteht erst durch soziale Zuschreibungen und Normen.\n• Resignifikation: Aneignung und Umdeutung von Begriffen und Normen als Widerstandsstrategie.\n• Queerness: Infragestellung binärer Kategorien (z. B. Mann/Frau) als Identitätszwang."]},{"label":"Ziel der Kritik","values":["«Umwertung aller Werte»: Abschied von Schuld, Askese und Mitleid – Hinwendung zu Selbstbestimmung, Stärke und Lebensbejahung.","Aufdeckung der Funktion von Moral in der kapitalistischen Gesellschaft als Klassenwerkzeug – Ziel ist Emanzipation durch Revolution.","Sichtbarmachung der Verflechtung von Wissen, Macht und Moral – Ermöglichung von Freiheit durch kritische Selbstreflexion und Gegendiskurse.","Sichtbarmachung und Infragestellung normativer Zwänge – Anerkennung pluraler Lebensformen jenseits binärer Kategorien."]},{"label":"Moral als Herrschafts-mittel?","values":["Ja – Moral ist eine Strategie der Schwachen, die Starken zu bändigen.","Ja – Moral ist ein Herrschaftsinstrument im Dienst der besitzenden Klasse.","Ja – Moral ist Teil einer Macht-Wissen-Ordnung, die Menschen formt und überwacht.","Ja – Moral wirkt performativ und grenzt abweichende Identitäten aus."]},{"label":"Menschenbild","values":["Der Mensch soll sich von moralischen Zwängen befreien und schöpferisch werden. Der «Übermensch» ist kein biologisches Ideal, sondern die Idee eines Menschen, der eigene Werte schafft statt tradierte Moral zu übernehmen.","Der Mensch ist ein gesellschaftlich bestimmtes Wesen – veränderbar durch Revolution und die Abschaffung entfremdender Produktionsverhältnisse.","Der Mensch ist ein Produkt historischer Diskurse – aber fähig zur kritischen Selbstveränderung durch «Selbstsorge» (care of the self).","Das Subjekt ist nicht frei gegeben, sondern entsteht durch soziale Zuschreibungen – doch es kann diese durch Wiederholung verschieben und unterlaufen."]},{"label":"Alternative zur traditionellen Moral","values":["Schaffung neuer, lebensbejahender Werte: Das, was bisher als «gut» galt, wird radikal neu bewertet. Selbstverwirklichung statt Askese und Schuld.","Abschaffung von Klassenherrschaft und Ideologie – solidarische, gerechte, klassenlose Gesellschaft als Ziel.","Ethik als Praxis der Selbstsorge («care of the self») – kritische Gestaltung des eigenen Lebens jenseits normativer Zwänge.","Ethik der Anerkennung, Offenheit und Verletzbarkeit – dekonstruktive Kritik an Identitätszwängen und Raum für plurale Lebensformen."]},{"label":"Aktuelle Relevanz","values":["Provokation gegenüber Mainstream-Moral; Inspiration für Kunst und Literatur; Kritik an Konformismus und politischer Korrektheit.","Zentral für soziale Bewegungen, Kapitalismuskritik, Gerechtigkeitsdebatten und Ungleichheitsforschung.","Wirksam in der Analyse von Machtstrukturen: z. B. Schule, Gefängnis, Medizin, Geschlecht und Psychiatrie.","Bedeutend in Gender-, Queer- und Diversitätsdebatten, Ethik der Fürsorge, Intersektionalität und Anerkennung."]},{"label":"Kritikpunkte","values":["• Politisch missbrauchbar: Nietzsche wurde vom Nationalsozialismus instrumentalisiert – seine Begriffe laden zu gefährlichen Fehldeutungen ein.\n\n• Elitär: Was ist mit Menschen, die nicht «stark» sein können? Keine Berücksichtigung von Verletzlichkeit.\n\n• Bietet keine konstruktive Handlungsanleitung – nur Kritik ohne klares Alternativmodell.","• Historische Umsetzungen: Kommunistische Regime führten oft zu Diktaturen und neuen Herrschaftsverhältnissen.\n\n• Reduktionismus: Nicht alle moralischen Fragen lassen sich auf Klassenkonflikte reduzieren.\n\n• Marx unterschätzt die Eigenständigkeit von Moral, Kultur und Recht gegenüber der Ökonomie.","• Normative Leerstelle: Foucault kritisiert Macht, bietet aber keine klare normative Grundlage für Alternativen.\n\n• Relativismus: Wenn alles Macht ist, warum sollte Foucaults Kritik selbst nicht auch Machtausübung sein?\n\n• Sehr abstrakt – schwer auf konkrete politische Situationen anwendbar.","• Handlungsfähigkeit unklar: Wenn das Subjekt durch Diskurse konstituiert wird, wie kann es sich wirklich dagegen wehren?\n\n• Voluntarismus-Vorwurf: Überschätzt Butler die Möglichkeit, durch Performanz allein gesellschaftliche Normen zu verändern?\n\n• Sprache und Theorie sind oft sehr abstrakt – kaum alltagstauglich für politische Praxis."]}]},"platon":{"sem":"Staatsphilosophie","name":"Antike Staatstheorien: Platon & Aristoteles","leitfrage":"Was ist der Zweck des Staates — und wer soll regieren?","conn":["vertragstheorie","machttheorie","demokratie"],"positions":["Platon\n428–348 v. Chr.","Aristoteles\n384–322 v. Chr."],"rows":[{"label":"Hauptwerk","values":["Politeia (um 375 v. Chr.)","Politik (ca. 334 v. Chr.)"]},{"label":"Merksatz","values":["Nur wer das Gute kennt, kann gerecht regieren. Der Staat ist Seele im Großen – gerecht ist er, wenn jeder das tut, wozu er befähigt ist.","Der Mensch ist von Natur ein Gemeinschaftswesen. Ein guter Staat schafft die Bedingungen, unter denen Bürger tugendhaft handeln und ein glückseliges Leben führen können."]},{"label":"Menschenbild","values":["Der Mensch besteht aus drei Seelenteilen: Vernunft, Mut und Begierde.\n\nGerechtigkeit entsteht, wenn jeder Teil seine richtige Aufgabe erfüllt und die Vernunft über die Triebe herrscht.\n\nDa der Mensch das Gute nicht von Natur aus erkennt, braucht er Bildung und Erziehung, um Einsicht zu gewinnen. Nur durch geistige Schulung kann der Mensch lernen, sich von Begierden zu befreien und das Wahre, Gute und Schöne zu erkennen.\n\nAnalogie: Der gerechte Staat spiegelt die gerechte Seele – Philosophen entsprechen der Vernunft, Wächter dem Mut, Bauern der Begierde.","Der Mensch ist von Natur aus ein Gemeinschaftswesen (zoon politikon). Er entfaltet seine Vernunft erst im Zusammenleben mit anderen.\n\nDas höchste Ziel menschlichen Lebens ist die Eudaimonia (Glückseligkeit) – ein Zustand sittlicher und geistiger Vollendung, der nur in der Polis, also im politischen Gemeinwesen, erreicht werden kann.\n\nErziehung und Zusammenleben dienen der Tugendbildung – Tugend entsteht durch Gewohnheit, nicht durch bloße Erkenntnis."]},{"label":"Ziel des Staates","values":["Der Staat soll Gerechtigkeit verwirklichen, indem jeder Mensch die Rolle erfüllt, die seiner Begabung entspricht. Nur wenn jeder «das Seine tut», entsteht eine harmonische Ordnung.\n\nDer Staat dient nicht dem individuellen Glück, sondern dem Ganzen.\n\nAndere Staatsformen wie Demokratie oder Tyrannei lehnt Platon ab, weil sie aus seiner Sicht auf Unwissenheit, Begierde und Machtstreben beruhen – nicht auf Einsicht in das Gute.","Der Staat soll die Rahmenbedingungen für ein tugendhaftes Leben schaffen. Er ist keine bloße Sicherheitsgemeinschaft, sondern eine moralische und soziale Gemeinschaft, die auf das Wohl aller Bürger zielt.\n\nDas Ziel ist nicht absolute Gleichheit, sondern die Förderung der Tugend in einer gerechten Ordnung. Ein Staat, der nur Sicherheit oder Reichtum sichert, verfehlt seinen eigentlichen Zweck."]},{"label":"Staatsmodell","values":["Platon entwirft eine dreigeteilte Gesellschaft:\n\nBauern und Handwerker sorgen für Versorgung, Wächter schützen den Staat, Philosophenkönige herrschen – sie sind die Weisesten und handeln nach Einsicht in das Gute.\n\nNur wer lange und streng ausgebildet wurde, darf herrschen. Demokratie lehnt Platon ab, weil sie aus seiner Sicht zur Herrschaft der Unwissenden führt: Wenn jeder mitreden darf, regieren nicht die Klügsten, sondern die Lautesten.\n\nDeshalb vertraut er auf die Vernunft einer gebildeten Elite, nicht auf Mehrheitsentscheidungen.","Er bevorzugt eine Politie – eine Mischform aus Demokratie und Oligarchie. Sie beruht auf dem Mittelstand, der Maß und Vernunft verkörpert. Reiche (Oligarchen) und Arme (Demagogen) neigen zu Extremen, daher sind sie ungeeignet, das Gemeinwohl zu sichern.\n\nDie Politie steht für Stabilität, Ausgleich und Maß. Alle freien männlichen Bürger sollen an politischen Entscheidungen teilhaben, da die Tugend des Menschen nur in der Gemeinschaft wachsen kann.\n\nAristoteles ordnet Verfassungen nach ihrem Ziel: Gute Formen (Monarchie, Aristokratie, Politie) dienen dem Gemeinwohl; entartete Formen (Tyrannei, Oligarchie, Demokratie) dienen nur den Herrschenden."]},{"label":"Rolle der Erziehung","values":["Erziehung ist das Herzstück seiner Staatsphilosophie.\n\nNur durch eine jahrzehntelange Ausbildung – mit Musik, Gymnasik, Mathematik, Dialektik und schließlich Philosophie – können die Besten zu wahren Erkenntnissen gelangen.\n\nErziehung soll den Charakter formen, nicht nur Wissen vermitteln.\n\nDer Staat kontrolliert daher Bildung und Erziehung streng, um die Bürger vor Verführung, Unwissenheit und moralischem Verfall zu schützen.\n\nPlaton glaubt, dass nur ein philosophisch gebildeter Geist gerecht regieren kann – Kunst und Dichtung, die Leidenschaften erregen, werden zensiert.","Auch für ihn ist Erziehung zentral, aber weniger autoritär. Gesetze und gemeinsames Lernen sollen Bürger dazu befähigen, tugendhaft zu handeln.\n\nTugend entsteht durch Übung und Gewohnheit – also durch Handeln im Alltag, nicht durch Kontrolle.\n\nErziehung ist Aufgabe des Staates, aber auch der Gemeinschaft, die durch gute Vorbilder wirkt.\n\nAristoteles betont: Man wird gerecht, indem man gerecht handelt – Charakter entsteht durch Wiederholung tugendhafter Handlungen, nicht durch theoretisches Wissen."]},{"label":"Freiheit & Teilhabe","values":["Freiheit ist für ihn kein Ziel, sondern Gefahr – sie führt zu Unordnung, wenn sie ohne Einsicht genutzt wird.\n\nDeshalb sind individuelle Freiheiten stark eingeschränkt: Die Wächter und Herrscher haben kein Eigentum und keine Familie, um nicht eigennützig zu handeln.\n\nDemokratie lehnt Platon ab, weil sie seiner Meinung nach in Anarchie und Tyrannei umschlägt.\n\nPlaton ist das erste große Argument für eine Expertenherrschaft (Epistokratie) – politische Entscheidungen gehören in die Hände der Sachkundigen.","Er erkennt Freiheit als Voraussetzung politischer Tugend an – aber nur für freie männliche Bürger. Frauen, Sklaven und Fremde sind ausgeschlossen.\n\nTrotzdem ist Teilhabe für ihn ein zentrales Element: Nur wer mitredet, kann seine Tugend entfalten und Verantwortung lernen.\n\nSeine Politie soll extreme Armut und Reichtum vermeiden, um soziale Stabilität zu sichern.\n\nAristoteles' Ansatz ist partizipatorischer als Platons, aber bleibt exklusiv: Die Polis ist ein Privileg, kein universelles Recht."]},{"label":"Kritikpunkte","values":["• Elitäres Modell ohne Volksmitbestimmung.\n• Gefahr der totalen Kontrolle (Erziehung, Zensur, Fortpflanzung).\n• Keine Gewaltenteilung – Philosophen herrschen absolut.\n• Idealistisch und kaum praktisch umsetzbar.\n• Geschlecht & Ausschluss: Frauen können laut Platon zwar Wächterinnen werden – Sklaven und Fremde werden aber vollständig ausgeschlossen.","• Ausschluss vieler Menschen von politischer Teilhabe (Frauen, Sklaven, Fremde).\n• Hierarchisches Menschenbild: Sklaverei und Geschlechterrollen als «natürlich» gerechtfertigt.\n• Demokratie wird nur eingeschränkt verstanden.\n• Trotz Maß und Ausgleich bleibt Ungleichheit erhalten.\n• Naturalisierung: Die Begründung sozialer Ungleichheit mit «natürlichen» Unterschieden ist philosophisch unhaltbar."]}]},"vertragstheorie":{"sem":"Staatsphilosophie","name":"Vertragstheorie","leitfrage":"Worauf gründet die Legitimität des Staates — und was darf das Volk verlangen?","conn":["platon","machttheorie","sozgerechtigkeit","naturrecht"],"positions":["Thomas Hobbes\n1588–1679","John Locke\n1632–1704","Jean-Jacques Rousseau\n1712–1778","John Rawls\n1921–2002\nNEU — Moderne Weiterentwicklung"],"rows":[{"label":"Hauptwerk","values":["Leviathan (1651)","Über die Regierung (1690)","Vom Gesellschaftsvertrag (1762)","Eine Theorie der Gerechtigkeit (1971)"]},{"label":"Merksatz","values":["Ohne starken Staat herrscht der Krieg aller gegen alle. Menschen geben alle Rechte ab – dafür erhalten sie Schutz und Frieden.","Der Staat schützt natürliche Rechte, die der Mensch im Naturzustand bereits besitzt. Missbraucht er sie, hat das Volk das Recht zum Widerstand.","Der Mensch ist gut – die Gesellschaft hat ihn verdorben. Nur ein Vertrag, der den Gemeinwillen verkörpert, kann wahre Freiheit sichern.","Hinter dem «Schleier des Nichtwissens» würden alle Menschen faire Grundregeln wählen. Ungleichheiten sind nur gerechtfertigt, wenn sie den Schwächsten zugutekommen."]},{"label":"Naturzustand","values":["Krieg aller gegen alle: Gleichheit der Fähigkeiten erzeugt Konkurrenz, Misstrauen und Ruhmsucht.\n\nFolgen: kein Eigentum, kein Recht, kein Fleiß, ständige Todesangst.","• Weitgehend friedlich, aber ungesichert.\n\n• Eigentum durch Arbeit erworben, aber kaum gesichert.\n\n• Natürliches Gesetz verpflichtet zur Selbsterhaltung.","Ursprünglich gut und harmonisch: kein Eigentum, keine Ungleichheit.\n\n• Egoismus und Habgier entstehen erst durch gesellschaftliche Entwicklungen.","• Kein Naturzustand: Rawls ersetzt ihn durch den «Urzustand» — ein Gedankenexperiment, kein historischer Zustand.\n\n• Schleier des Nichtwissens: Hinter diesem Schleier weiß niemand, welche Position, Klasse, Begabung oder Gesundheit er in der Gesellschaft einnehmen wird — und wählt daher faire Regeln.\n\n→ Rationaler Ursprung der Gerechtigkeit: nicht Furcht (Hobbes), Eigentumsschutz (Locke) oder Natur (Rousseau) — sondern Vernunft unter Unwissenheit."]},{"label":"Einschätzung des Ausgangs-zustands","values":["Negativ: Der Naturzustand ist chaotisch und gefährlich. Nur Macht schafft Ordnung.","Negativ: Der Naturzustand ist unsicher und unzureichend für Eigentumsschutz.","Positiv: Naturzustand war gut — Gesellschaft und Eigentum haben ihn zerstört.","Neutral / hypothetisch: Der Urzustand ist kein realer Zustand, sondern ein Denkmodell — er fragt, welche Regeln vernünftige Menschen wählen würden, wenn sie ihre eigene Position nicht kennen."]},{"label":"Menschenbild","values":["Egoistisch und machtgierig. Vernunft allein reicht nicht — äußerer Zwang ist notwendig.","Vernunftbegabt und grundsätzlich kooperativ. Schützt primär eigene Rechte.","Von Natur aus gut. Egoismus entsteht erst durch Gesellschaft und Ungleichheit.","Rational und fair: Menschen sind vernünftig und streben nach Vorteilen — aber hinter dem Schleier des Nichtwissens wählen sie faire statt egoistische Regeln.\n\n• Mut zum Risiko: Wer nicht weiß, ob er arm oder reich sein wird, wählt Regeln, die auch die Schwächsten schützen (Maximin-Prinzip)."]},{"label":"Gesellschafts-vertrag","values":["Vollständige Rechtsübertragung an den Leviathan. Unwiderruflich — kein Widerstandsrecht.\n\nAbsoluter Souverän: weder abwählbar noch bestrafbar.","Nur bestimmte Rechte übertragen — zum Schutz von Leben, Freiheit, Eigentum.\n\nWiderstandsrecht: Das Volk darf den Staat absetzen, wenn er seine Pflicht verletzt.","Gemeinwille (volonté générale): Vertrag verkörpert das kollektive Wohl — nicht bloße Summe der Einzelwillen.\n\nCitoyen vs. Bourgeois: Nur der Staatsbürger mit politischer Pflicht trägt den Gemeinwillen.","• Zwei Gerechtigkeitsprinzipien: Im Urzustand würden Menschen folgende Prinzipien wählen:\n– 1. Gleichheitsprinzip: Gleiche Grundfreiheiten für alle.\n– 2. Differenzprinzip: Ungleichheiten nur, wenn sie den Schwächsten nützen.\n\n• Vorrang der Freiheit: Das Gleichheitsprinzip hat Vorrang — Freiheit kann nicht für Wohlstand geopfert werden.\n\n• Übereinkunft ohne Wissen: Der Vertrag ist fair, weil niemand die eigenen Vorteile kennt und daher niemand manipulieren kann."]},{"label":"Staats-konzeption","values":["Leviathan als absolute Schutzmacht. Kein Korrektiv gegen Machtmissbrauch.\n\n• Preis: vollständige Unterwerfung. Gewinn: Ende des Kriegszustands.","Repräsentative Demokratie mit Gewaltenteilung.\n\nLocke gilt als philosophischer Vater des modernen Liberalismus.","Direkte Demokratie und Volkssouveränität. Ideal: kleine Gemeinschaft.\n\nAblehnung von Parteien: Sie verfälschen den Gemeinwillen.","• Gerechter Wohlfahrtsstaat: Progressive Besteuerung, Chancengleichheit durch Bildung, soziale Grundsicherung — alle gerechtfertigt durch das Differenzprinzip.\n\n• Prioritätsregel: Gleiche Grundfreiheiten vor Chancengleichheit vor Differenzprinzip — die Reihenfolge ist lexikalisch.\n\n→ → Verbindung zur Sozialen-Gerechtigkeit-Tabelle (Marx · Rawls · Nozick)"]},{"label":"Konflikte im Vertrag","values":["– Kein Korrektiv gegen Machtmissbrauch.\n– Individuelle Freiheiten vollständig aufgegeben.\n– Keine Gewaltenteilung.","– Widerstan
