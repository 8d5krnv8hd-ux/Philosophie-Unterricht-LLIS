iche Definitionen andere Kulturen ausgeschlossen.\n\n• Leere Universalität: Abstrakte Rechte ohne Institutionen schützen niemanden konkret.","• Wer erstellt die Liste?: Nussbaums Fähigkeitenliste wirkt liberal-westlich geprägt – wessen Vorstellung von «würdigem Leben»?\n\n• Prioritätenproblem: Wie entscheidet man bei Konflikten zwischen Fähigkeiten?\n\n• Staatliche Abhängigkeit: Wie werden Fähigkeiten ohne funktionierende Staaten durchgesetzt?","• Relativistisch: Wenn Menschenrechte kulturell bedingt sind, haben sie keinen universellen Anspruch.\n\n• Empathie kann versagen: Narrative können auch Feindbilder statt Solidarität erzeugen.\n\n• Kein Fundament in Krisen: Wenn Empathie schwindet, gibt es kein rationales Fundament mehr.","• Historisch missbraucht: Sozialdarwinismus und NS beriefen sich auf Nietzsche – auch wenn er das missverstanden hatte.\n\n• Elitär: Wer definiert «Stärke»? Keine Berücksichtigung von Verwundbarkeit.\n\n• Keine Alternative: Nietzsche zeigt, was er ablehnt – aber kein konkretes Gegenmodell."]},{"label":"Zusammen-fassung","values":["Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen.","Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen.","Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen.","Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen."]}]},"grenzen":{"sem":"Staatsphilosophie","name":"Grenzen staatlicher Macht","leitfrage":"Wie weit darf staatliche Macht gehen — und wann muss man ihr widerstehen?","conn":["liberalismus","vertragstheorie","machttheorie","demokratie"],"positions":["Anarchismus","Libertarismus","Republikanismus","Totalitarismus ⚠ Keine normative Position — analytische Gegenfolie"],"rows":[{"label":"Achse: Staatsmacht","values":["← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)","← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)","← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)","← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)"]},{"label":"Leitfrage","values":["Wie viel staatliche Macht ist legitim — und wann schlägt sie in Unterdrückung um?  Der Totalitarismus ist der philosophische Endpunkt der Achse: er beantwortet die Frage mit «unbegrenzt» — und zeigt, wohin das führt.","","",""]},{"label":"Vertreter","values":["Bakunin (1814–1876), Kropotkin (1842–1921), Emma Goldman (1869–1940)","Nozick (1938–2002), Hayek (1899–1992), Friedman (1912–2006)","Pettit (*1945), Skinner (*1940), Cicero (106–43 v. Chr.), Arendt (1906–1975)","⚠ Kein Philosoph vertritt diese Position normativ.\n\nAnalytiker, die den Totalitarismus untersuchen und kritisieren:\n\nHannah Arendt (1906–1975): Elemente und Ursprünge totaler Herrschaft (1951) — Standardwerk der Totalitarismusanalyse.\nKarl Popper (1902–1994): Die offene Gesellschaft und ihre Feinde (1945) — Platon und Hegel als geistige Vorläufer.\nFriedrich Hayek (1899–1992): Der Weg zur Knechtschaft (1944) — Warnung vor Planwirtschaft als Vorstufe.\nGeorge Orwell (1903–1950): 1984 (1949) — literarische Analyse, philosophisch bedeutsam."]},{"label":"Merksatz","values":["Jeder Staat ist Unterdrückung. Wahre Freiheit entsteht nur ohne Zwang und Herrschaft.","Der Staat hat kein Recht auf mehr Macht als nötig zum Schutz individueller Rechte.","Freiheit bedeutet: keiner willkürlichen Herrschaft ausgeliefert sein. Institutionen sichern das.","⚠ Kein Merksatz — keine zu verteidigende Position.\n\nStattdessen: Was Arendt über den Totalitarismus sagt:\n\n«Der Totalitarismus ist eine historisch neue Herrschaftsform — nicht Tyrannei, sondern die vollständige Auflösung des politischen Raums, in dem Menschen als Menschen handeln können.»\n\n— Hannah Arendt"]},{"label":"Definition von Freiheit","values":["• Radikal negativ: Abwesenheit jeder Herrschaft — auch demokratisch legitimierter.\n• Staat ist strukturell unterdrückend. Freiheit ohne Staat — nicht trotz Staat.","• Liberal-negativ: Abwesenheit äußerer Einschränkungen. Staat nur bei aktiver Rechtsverletzung.\n• Freiheit als Nicht-Einmischung: Möglichst wenig soll verboten sein.","• Nicht-Beherrschung: Freiheit als Abwesenheit von Dominanz — auch gutmeinender.\n• Strukturelle Sicherheit vor Willkür durch Institutionen.","⚠ Freiheit existiert hier nicht als eigenständiger Wert.\n\nArendt: Totalitarismus zerstört den «politischen Raum» — den Ort, wo Menschen als freie Wesen handeln können.\n\nPopper: Totalitäre Systeme fordern «Freiheit» von der Geschichte, dem Klassenfeind oder der Rasse — eine Pseudofreiheit, die echte Freiheit zerstört.\n\nHayek: Jede Planung tötet Freiheit schrittweise — «Der Weg zur Knechtschaft» ist gepflastert mit guten Absichten."]},{"label":"Verhältnis zur Demokratie","values":["Kritisch-ambivalent: Demokratische Mehrheiten können trotzdem unterdrücken.\n• Bevorzugt: direkte Demokratie in kleinen Gemeinschaften, Konsens statt Mehrheitsentscheid.\n→ «51 % können 49 % systematic entrechtigen.»","Instrumentell: Demokratie gut nur wenn sie Rechte schützt — Verfassung wichtiger als Wahlen.\n• Hayek: Warnung: Demokratie ohne konstitutionelle Grenzen kann in Tyrannei gleiten.\n→ Freiheit sichert man durch Verfassungen, nicht durch Wahlen.","Konstitutiv: Demokratie ist die beste Form — aber nur mit starken Institutionen und Anfechtbarkeit.\n• Pettit: Legitimität erfordert Contestability: echte Anfechtungsmöglichkeit für alle.\n→ Demokratie ist nicht Volksherrschaft — sondern institutionelle Sicherung gegen Dominanz.","⚠ Demokratie wird aktiv bekämpft oder als Mittel zum Machterwerb instrumentalisiert.\n\nMuster: Totalitäre Systeme beginnen oft mit demokratischen Wahlen — und schaffen dann die Demokratie ab.\n\nArendt: Totalitarismus entsteht, wo der öffentliche Raum zerstört wird — wo Menschen aufhören, politisch zu handeln, und zu Masse werden.\n\nPopper: Die offene Gesellschaft (Demokratie) muss bereit sein, sich gegen ihre Feinde zu verteidigen — auch gegen demokratisch gewählte Feinde der Demokratie.\n\n→ → «Paradox der Toleranz»: Eine Gesellschaft, die grenzenlos tolerant ist, wird ihre Toleranz verlieren. (Popper)"]},{"label":"Widerstands-recht","values":["Permanent: Jede staatliche Herrschaft ist prinzipiell widerstandswürdig.\n• Direkte Aktion, Verweigerung, ziviler Ungehorsam als Dauermittel.","Begrenzt: Widerstand legitim bei staatlichem Übergriff über Schutzauftrag hinaus.\n• Mittel: Markt, Wahlen, Gerichte, politischer Druck.","Ultima Ratio: Widerstand legitim wenn Institutionen selbst zur Quelle von Dominanz werden.\n• Cicero: Tyrannenmord als letztes Mittel — wenn Tyrann das Gemeinwohl zerstört.","⚠ Widerstand wird systematisch unmöglich gemacht — das ist das Ziel.\n\n• Terror, Propaganda und Überwachung zerstören die Voraussetzungen für organisierten Widerstand.\n\nArendt: Im Totalitarismus gibt es keine Privatsphäre, in der Widerstand entstehen könnte — der Mensch wird vollständig durchleuchtet und geformt.\n\nFolge für die Theorie: Alle drei anderen Positionen (Anarchismus, Libertarismus, Republikanismus) enthalten implizit ein Widerstandsrecht gegen totalitäre Ansprüche."]},{"label":"Reale Staaten & Beispiele","values":["Annäherungen an anarchistische Praxis:\n\n🏴 Pariser Commune (1871): 72 Tage selbstverwaltete Stadt — für Bakunin das erste anarchistische Experiment.\n🇪🇸 Katalonien (1936–39): Anarcho-syndikalistische Selbstverwaltung im Spanischen Bürgerkrieg.\n🏴 Rojava (ab 2012): Libertärer Kommunalismus der kurdischen Bevölkerung in Nordsyrien.\n🇲🇽 Zapatistas, Chiapas: Indigene Selbstverwaltung: «Mandar obedeciendo» — Regieren durch Gehorchen.\n\nEinordnung: Alle Experimente waren klein und kurzlebig — kein anarchistisches Modell hat sich dauerhaft in einer Großgesellschaft gehalten.","Annäherungen an libertäre Praxis:\n\n🇺🇸 USA (libertäre Tradition): Schwache Sozialversicherung, starker Eigentumsschutz, geringe Regulierung im Vergleich zu Europa.\n🇨🇭 Schweiz (Kantone): Maximale Subsidiarität, direkte Demokratie, geringe Zentralmacht.\n🇸🇬 Singapur: Freier Markt, starker Eigentumsschutz — aber autoritär regiert. Zeigt: Libertarismus ≠ Demokratie.\n🇨🇱 Chile (1973–90): Friedmans Schüler implementieren radikale Marktwirtschaft unter Pinochet — Marktfreiheit mit Diktatur kombiniert.\n\nEinordnung: Libertäre Praxis entsteht oft unter nicht-demokratischen Bedingungen oder erzeugt extreme soziale Ungleichheit.","Annäherungen an republikanische Praxis:\n\n🇩🇪 Bundesrepublik Deutschland: Grundgesetz, Verfassungsgericht, Föderalismus — klassisch republikanische Institutionen gegen Dominanz.\n🇱🇺 Luxemburg: Kleiner Rechtsstaat, EU-Einbettung, Mehrsprachigkeit, hoher Sozialschutz. Keine dominierende Mehrheit — Nicht-Beherrschung strukturell gesichert.\n🇮🇸 Island: Starke Bürgerbeteiligung, Verfassungsreform von unten (2010–11). Contestability in der Praxis.\n🇪🇺 Europäische Union: Supranationale Institutionen begrenzen staatliche Macht durch Recht.\n🇺🇸 USA (Gründungsväter): Checks and Balances, Bill of Rights — ursprünglich republikanische Konstruktion gegen Tyrannei.\n\nEinordnung: Republikanismus ist die realistischste der drei Positionen — die meisten stabilen Demokratien sind implizit republikanisch verfasst.","⚠ Keine Vorbilder — nur Warnbeispiele.\n\n🇩🇪 NS-Deutschland (1933–45): Beginn durch demokratische Wahlen. Vollständige Kontrolle aller Lebensbereiche, Vernichtung des politischen Raums, Holocaust.\n🇷🇺 Sowjetunion unter Stalin (1924–53): Einparteienstaat, Gulag, Kollektivierung, Schauprozesse. Ideologische Durchdringung aller Bereiche.\n🇨🇳 China unter Mao (1949–76): Kulturrevolution: Zerstörung von Tradition, Familie, Religion. Millionen Tote durch politischen Terror.\n🇰🇵 Nordkorea (bis heute): Einziges verbliebenes totalitäres System — vollständige Kontrolle von Information, Bewegung, Denken.\n🇨🇳 China heute: Sozialkredit-System, Überwachung, Einparteienstaat — autoritär mit totalitären Elementen.\n\nEinordnung (Arendt): Diese Systeme teilen ein Merkmal: Sie zerstören nicht nur die Freiheit — sie zerstören die Fähigkeit der Menschen, überhaupt noch politisch zu handeln."]},{"label":"Kritikpunkte an der Strömung","values":["• Utopie: Ist freiwillige Kooperation in komplexen Gesellschaften möglich?\n• Sicherheit: Ohne Gewaltmonopol: Wer schützt die Schwachen?\n• Historisch: Alle Projekte wurden bisher durch Staaten zerstört.","• Soziale Kälte: Ohne Wohlfahrtsstaat entstehen extreme Ungleichheiten.\n• Historisch: Viele Eigentumsrechte entstanden durch Gewalt.\n• Private Macht: Wer schützt vor Monopolen und Konzernen?","• Definitionsproblem: Wer bestimmt, was «Dominanz» ist?\n• Institutionenvertrauen: Was, wenn Institutionen korrumpiert sind?\n• Empirisch: Wenige historische Reinbeispiele.","⚠ Keine normative Kritik möglich — nur analytische Ablehnung.\n\nArendts Diagnose: Totalitarismus entsteht aus Einsamkeit und Massenwerdung — wenn Menschen den Sinn für Realität verlieren und sich totalen Ideologien hingeben.\n\nPoppers Warnung: Totale Wahrheitsansprüche (Klassengesetze, Rassengesetze) sind unwiderlegbar — und deshalb gefährlich. Eine offene Gesellschaft braucht Falsifizierbarkeit auch in der Politik.\n\nHayeks Warnung: Der Weg in den Totalitarismus beginnt mit guten Absichten — mit Planwirtschaft, die schrittweise alle Freiheit absorbiert."]},{"label":"Verbindungen","values":["• Vertragstheorie: Radikale Ablehnung von Hobbes.\n• Machttheorie: Bakunin vs. Weber: Macht ohne Herrschaft?\n• Moralkritik: Teilt mit Marx die Staatsideologiekritik.","• Soziale Gerechtigkeit: Nozick vs. Rawls — Entitlement vs. Differenzprinzip.\n• Vertragstheorie: Nachfolger Lockes.\n• Liberalismus: Radikale Zuspitzung des klass. Liberalismus.","• Vertragstheorie: Weiterentwicklung Rousseaus.\n• Demokratiekonzepte: Ergänzung zu Arendt und Alternative zu Schumpeter.\n• Menschenrechte: Nicht-Beherrschung als Grundlage.","• Machttheorie: Machiavelli ohne Moral + Weber ohne Legitimität = Totalitarismus.\n• Demokratiekonzepte: Totalitarismus als negativer Fixpunkt jeder Demokratietheorie.\n• Moralkritik: Foucault zeigt: Macht konstruiert Normalität — Totalitarismus macht das explizit.\n• Freiheit: Totalitarismus als Widerlegung: zeigt, was Freiheit bedeutet, wenn sie vollständig fehlt."]}]},"essentialismus":{"sem":"Anthropologie","name":"Essentialismus – Existentialismus – Konstruktivismus","leitfrage":"Hat der Mensch ein vorgegebenes Wesen — oder erschafft er sich selbst?","conn":["freiheit","sinn","moralkritik"],"positions":["Essentialismus","Existentialismus","Feministische Existenzphilosophie NEU — Simone de Beauvoir","(Konstruktivismus)"],"rows":[{"label":"Hauptvertreter","values":["Aristoteles, Thomas von Aquin, Immanuel Kant","Jean-Paul Sartre (1905–1980), Martin Heidegger (1889–1976)","Simone de Beauvoir (1908–1986)","Judith Butler (*1956), Michel Foucault (1926–1984)"]},{"label":"Hauptwerk","values":["Nikomachische Ethik (Aristoteles); Kritik der reinen Vernunft (Kant)","Das Sein und das Nichts (1943); Der Existenzialismus ist ein Humanismus (1946) – Sartre","Das andere Geschlecht (Le Deuxième Sexe, 1949)","Das Unbehagen der Geschlechter (1990) – Butler; Die gesellschaftliche Konstruktion der Wirklichkeit (1966) – Berger/Luckmann"]},{"label":"Merksatz","values":["Der Mensch hat ein vorgegebenes Wesen, das er entfalten soll – Vernunft, Sprache und Moral definieren ihn unabhängig von Zeit und Kultur.","«Die Existenz geht der Essenz voraus.» Der Mensch ist nicht, was er ist – er wird erst durch seine Entscheidungen, was er sein wird.","«Man wird nicht als Frau geboren, man wird es.» Weiblichkeit ist kein natürliches Schicksal, sondern ein aufgezwungenes Dasein – und das Ziel ist Befreiung durch Freiheit.","Was als «menschliches Wesen» gilt, ist historisch, sozial und kulturell produziert – es gibt kein natürliches Fundament jenseits der Diskurse."]},{"label":"Grundannahmen","values":["• Feste, unveränderliche Natur: Vernunft, Sprache, Moral definieren den Menschen unabhängig von Kultur und Geschichte.\n\n• Universalität: Wesensmerkmale gelten für alle Menschen.\n\n• Zweck der Existenz: Entfaltung dieses Wesens (Telos).","• Der Mensch hat kein vorgegebenes Wesen durch Gott oder Natur.\n\n• Er existiert zuerst – dann erschafft er sich selbst durch freie Entscheidungen.\n\n• Mauvaise foi: Selbsttäuschung: Wer so tut, als wäre er festgelegt, verleugnet seine Freiheit.\n\n• Der Mensch ist «zur Freiheit verurteilt» – Nicht-Entscheiden ist auch eine Entscheidung.","• De Beauvoir akzeptiert Sartres Grundsatz: Existenz geht der Essenz voraus. Doch Sartre ignoriert, dass Freiheit für Frauen historisch blockiert war.\n\n• Das Andere: Die Frau wird in der patriarchalen Gesellschaft als das «Andere» definiert – nicht als eigenständiges Subjekt, sondern als Negation des Mannes.\n\n• Situation: Freiheit ist immer situiert: Biologische Fakten (Mutterschaft, Körper) sind keine Bestimmung, werden aber gesellschaftlich als solche konstruiert.\n\n• Transzendenz vs. Immanenz: Männern wird Transzendenz (Weltgestaltung) zugeschrieben, Frauen Immanenz (häusliche Wiederholung). Das ist nicht natürlich, sondern aufgezwungen.","• Es gibt kein festes menschliches Wesen – Identität ist eine soziale Konstruktion.\n\n• Was als «normal», «natürlich» oder «menschlich» gilt, wird durch Sprache und Diskurse produziert.\n\n• Performativität (Butler): Geschlecht und Identität entstehen durch wiederholte Handlungen – nicht als Ausdruck eines inneren Kerns."]},{"label":"Kernbegriffe","values":["• Essenz: Das unveränderliche Wesen des Menschen.\n• Telos: Zweck/Ziel, auf das alles strebt.\n• Animal rationale: Der Mensch als vernunftbegabtes Lebewesen.\n• Universalität: Wesensmerkmale gelten für alle Menschen.","• Existenz: Das konkrete Dasein des Menschen.\n• Essenz: Entsteht erst durch Entscheidungen.\n• Mauvaise foi: Selbsttäuschung / Unaufrichtigkeit.\n• Engagement: Politisch-moralische Verantwortung.\n• Authentizität: Ehrlich zur eigenen Freiheit stehen.","• Das Andere: Die Frau als vom Mann definiertes Gegenteil – kein eigenständiges Subjekt.\n• Situation: Die konkrete Lebenslage, die Freiheit ermöglicht oder einschränkt.\n• Transzendenz: Fähigkeit, die eigene Existenz zu überschreiten und die Welt zu gestalten.\n• Immanenz: Auf die Wiederholung des Gegebenen beschränktes Dasein.\n• Complicit: Frauen, die ihre Unterordnung akzeptieren, machen sich mitschuldig (mauvaise foi).","• Diskurs: System von Aussagen, das «Wahrheit» produziert.\n• Performativität: Identität entsteht durch Wiederholung.\n• Subjektivierung: Das Subjekt entsteht durch soziale Zuschreibungen.\n• Dekonstruktion: Aufdeckung verborgener Machtstrukturen in Begriffen."]},{"label":"Freiheit","values":["Begrenzt: Der Mensch soll sein vorgegebenes Wesen entfalten. Freiheit bedeutet, vernünftig zu handeln – in Übereinstimmung mit der eigenen Natur.","Radikal: Es gibt keine vorgegebene Natur. Der Mensch ist vollständig frei und vollständig verantwortlich. Freiheit ist keine Möglichkeit, sondern Grundbedingung.","Situiert: Freiheit ist real, aber immer eingebettet in eine Situation. Frauen sind nicht weniger frei – aber ihre Situation wurde historisch systematisch so gestaltet, dass echte Freiheit blockiert wird. Befreiung erfordert veränderte Situation.","Relativ: Freiheit besteht im Widerstand gegen Diskurse und Normen – durch Resignifikation und subversive Wiederholung. Keine absolute Freiheit."]},{"label":"Konsequenzen","values":["• Universelle Moralvorstellungen: sind möglich und notwendig.\n• Erziehung: soll das Wesen des Menschen entfalten.\n• Menschenrechtsdiskurse: alle Menschen haben gleiche Würde kraft ihrer Natur.","• Jeder Mensch ist vollständig verantwortlich für sein Leben.\n• Politisches Engagement folgt aus der Verantwortung gegenüber anderen.\n• Authentisches Leben = ehrlicher Umgang mit der eigenen Freiheit.\n→ «Wir definieren den Menschen nur im Verhältnis zu einem Engagement.» – Sartre","• Die Unterordnung der Frau ist nicht biologisch, sondern historisch – und daher überwindbar.\n\n• Gleichberechtigung: Frauen müssen denselben Zugang zu Transzendenz erhalten – Beruf, Bildung, wirtschaftliche Unabhängigkeit sind Bedingungen echter Freiheit.\n\n• Solidarität: Frauen müssen ihre Situation kollektiv erkennen und verändern – nicht individuell akzeptieren (mauvaise foi).\n\n→ → De Beauvoir ist Vorläuferin des modernen Feminismus und der Gender Studies.","• Was als «natürlich» gilt, muss kritisch hinterfragt werden.\n• Normen können verändert werden – auch durch subversive Handlungen.\n• Grundlage für Gender Studies, Queer Theory, Intersektionalität."]},{"label":"Kritikpunkte","values":["• Wessen Wesen?: Historisch oft zur Rechtfertigung von Ausgrenzung genutzt.\n• Kulturelle Vielfalt: menschlicher Praxis widerspricht dem Anspruch auf Universalität.\n• Wandel: Lässt wenig Raum für Selbstveränderung.","• Radikale Freiheit überschätzt die tatsächliche Handlungsfreiheit des Einzelnen.\n• Soziale, psychologische und strukturelle Faktoren werden unterschätzt.\n• Keine klaren moralischen Maßstäbe: Wenn jeder selbst wählt, ist alles möglich?","• Eurozentrismus: De Beauvoirs Analyse basiert primär auf westlichen, bürgerlichen Frauen – Klasse, Rasse und andere Differenzen werden kaum berücksichtigt (Kritik von bell hooks und intersektionaler Theorie).\n\n• Körperlichkeit: De Beauvoir unterschätzt, wie stark der Körper selbst (nicht nur seine gesellschaftliche Deutung) Freiheit prägt.\n\n• Normativität: Ihr Ziel – Frauen sollen Transzendenz anstreben wie Männer – reproduziert männliche Werte als universales Ideal.","• Gefahr: Alles wird relativ – auch Kritik an Unterdrückung verliert Fundament.\n• Sehr abstrakt – schwer in politische Praxis zu übersetzen.\n• Wie kann das Subjekt Normen unterlaufen, wenn es durch sie erst entsteht?"]}]},"menschenmodelle":{"sem":"Anthropologie","name":"Menschenmodelle im Vergleich","leitfrage":"Was ist der Mensch seinem Wesen nach?","conn":["technologie","arbeit","essentialismus"],"positions":["Homo Faber","Homo Economicus","Mängelwesen (Gehlen)","Animal Symbolicum (Cassirer)"],"rows":[{"label":"Vertreter","values":["Marx, Arendt (1906–1975), Benjamin Franklin","Adam Smith (1723–1790), Hobbes; Wirtschaftstheorie (rational choice)","Arnold Gehlen (1904–1976)","Ernst Cassirer (1874–1945)"]},{"label":"Merksatz","values":["Der Mensch ist das Wesen, das Werkzeuge schafft und durch Arbeit und Technik die Welt gestaltet.","Der Mensch handelt rational und eigennützig – er maximiert seinen Nutzen, minimiert seine Kosten.","Der Mensch ist biologisch mangelhaft ausgestattet – gerade deshalb schafft er Kultur, Technik und Institutionen.","Der Mensch ist das einzige Lebewesen, das Symbole schafft und deutet – Sprache, Kunst und Mythos sind seine Welt."]},{"label":"Grundannahmen","values":["• Der Mensch definiert sich durch aktives Gestalten der Welt.\n• Arbeit und Technik sind Ausdruck menschlicher Kreativität und Vernunft.\n• Franklin: «Man is a tool-making animal.»","• Menschen handeln zweckrational: Nutzen maximieren, Kosten minimieren.\n• Präferenzen sind stabil und bekannt.\n• Entscheidungen erfolgen auf Basis vollständiger Information.","• Der Mensch hat keine festen Instinkte – er ist biologisch «nicht fertig».\n• Diese Mängel (schwache Instinkte, keine Naturwaffen, lange Kindheit) zwingen ihn zur Kulturschaffung.\n• Technik, Sprache und Institutionen sind Kompensation biologischer Schwäche.","• Der Mensch lebt nicht in einer natürlichen, sondern in einer symbolischen Wirklichkeit.\n• Sprache, Mythos, Religion, Wissenschaft und Kunst sind verschiedene «Symbolformen».\n• Erst durch Symbole kann der Mensch über das unmittelbar Gegebene hinausdenken."]},{"label":"Stärken","values":["• Erklärt technischen Fortschritt.\n• Verbindet Arbeit mit Würde und Sinn.\n• Konkret und empirisch prüfbar.","• Klares, formalierbares Modell.\n• Grundlage effizienter Markt- und Politiktheorien.\n• Entscheidungsverhalten gut prognostizierbar.","• Erklärt Ursprung von Kultur und Institutionen.\n• Verbindet Biologie und Geist.\n• Zeigt Notwendigkeit sozialer Stabilität.","• Erfasst die symbolische Dimension menschlicher Existenz.\n• Erklärt Kunst, Mythos und Wissenschaft einheitlich.\n• Offen für kulturelle Vielfalt."]},{"label":"Kritikpunkte","values":["• Reduziert den Menschen auf seine Funktion als «Macher».\n• Spiel, Muße, Kontemplation haben keinen Platz.\n• Überbetont Technik gegenüber sozialen Beziehungen.","• Empirisch widerlegt: Menschen handeln oft irrational (Kahneman).\n• Ignoriert Mitgefühl, Kooperation, Moral.\n• Rechtfertigt Egoismus als «natürlich».","• Konservativ: Institutionen erscheinen als notwendige Stabilisatoren.\n• Kritik an bestehenden Strukturen wird erschwert.\n• Biologisch-defizitäres Menschenbild problematisch.","• Vernachlässigt materielle und soziale Bedingungen.\n• Zu stark auf Kognition und Symbol fokussiert.\n• Körper und Triebe kommen kaum vor."]}]},"technologie":{"sem":"Anthropologie","name":"Technologie: Wesen oder Gefahr?","leitfrage":"Besteht in der Technik das Wesen des Menschen — oder entfremdet Technik den Menschen?","conn":["menschenmodelle","arbeit","verantwortung"],"positions":["Gehlen – Technik als Notwendigkeit","Jonas – Technik als Gefahr","Mittelstraß – Technik als Chance","Rousseau – Technik als Verfall"],"rows":[{"label":"Hauptwerk","values":["Anthropologische Forschung (1961)","Das Prinzip Verantwortung (1979)","Leonardo-Welt (1992)","Diskurs über die Wissenschaften und die Künste (1750)"]},{"label":"Merksatz","values":["Technik ist nicht Luxus, sondern Notwendigkeit: Der Mensch überlebt biologisch nur durch Kultur und Werkzeug.","Moderne Technik übersteigt unsere moralische Urteilskraft – wir brauchen eine neue Ethik der Verantwortung für die Zukunft.","Wir leben in einer «Leonardo-Welt» – Technik ist unverzichtbarer Ausdruck menschlicher Kreativität und Vernunft.","Technik und Zivilisation korrumpieren den natürlich guten Menschen – Fortschritt ist kein Gewinn, sondern Verlust."]},{"label":"Grundannahmen","values":["• Der Mensch ist biologisch ein «Mängelwesen» ohne feste Instinkte.\n• Technik kompensiert diese biologischen Lücken – sie ist konstitutiv für den Menschen.\n• Kultur und Institutionen entlasten den Menschen von ständiger Entscheidungslast.","• Moderne Hochtechnologie (Atom, Gentechnik, KI) kann irreversible globale Schäden verursachen.\n• Bisherige Ethik war auf den Nahbereich begrenzt – das reicht nicht mehr.\n• Heuristik der Furcht: Im Zweifel das schlechteste Szenario ernst nehmen.","• Technik ist kein bloßes Werkzeug, sondern Ausdruck des menschlichen Geistes.\n• Die «Leonardo-Welt» verbindet Kunst, Wissenschaft und Technik zu einer einheitlichen Schaffenskraft.\n• Technischer Fortschritt und Humanismus schließen sich nicht aus.","• Im Naturzustand war der Mensch gut, einfach und glücklich.\n• Wissenschaft, Technik und Kultur haben Ungleichheit, Eitelkeit und Abhängigkeit erzeugt.\n• Fortschritt ist Entfremdung von der ursprünglichen Natur des Menschen."]},{"label":"Argumente","values":["• Ohne Feuer, Werkzeug und Sprache hätte der Mensch nicht überlebt.\n• Institutionen (Recht, Staat, Schule) stabilisieren das Leben und ermöglichen Planung.\n→ Technik ist die «zweite Natur» des Menschen.","• Atomwaffen, Klimawandel und Gentechnik zeigen: Folgen menschlichen Handelns sind nicht mehr überschaubar.\n• Wissen um mögliche Katastrophen wird zur moralischen Pflicht.\n• Vorsorgeprinzip: Lieber auf Nutzen verzichten als irreversible Schäden riskieren.","• Leonardo da Vinci steht exemplarisch für die Einheit von Kunst, Wissenschaft und Technik.\n• Technik ist kein Selbstzweck – sie dient dem Verständnis und der Gestaltung der Welt.\n• Ethische Reflexion muss die Technik begleiten, sie aber nicht verhindern.","• Zivilisation schafft künstliche Bedürfnisse und Abhängigkeiten.\n• Technischer Fortschritt fördert soziale Ungleichheit statt Gleichheit.\n• Moral und Tugend schwinden mit wachsender Technisierung."]},{"label":"Konsequenzen","values":["• Technik und Institutionen sind unverzichtbar.\n• Kulturkritik muss die Notwendigkeit von Stabilität respektieren.","• Neuer kategorischer Imperativ: Handle so, dass die Wirkungen verträglich sind mit der Permanenz menschlichen Lebens.\n• Politik muss zukünftige Generationen schützen.","• Kreativität, Wissenschaft und Technik fördern statt bremsen.\n• Ethische Begleitung von Forschung – keine pauschale Ablehnung.","• Rückbesinnung auf Einfachheit und Natürlichkeit.\n• Kritik am Fortschrittsglauben als Ideologie."]},{"label":"Kritikpunkte","values":["• Konservativ: Bestehende Institutionen erscheinen als natürlich notwendig.\n• Lässt wenig Raum für revolutionären Wandel.","• «Heuristik der Furcht» kann Innovation blockieren.\n• Zu pessimistisch: Ignoriert positive Wirkungen von Technik.","• Optimistisch: Unterschätzt reale Risiken und Nebenwirkungen technischen Fortschritts.\n• Ethische Begleitung bleibt vage.","• Idealisiert den Naturzustand, der historisch nie existiert hat.\n• Keine praktische Alternative zur modernen Gesellschaft."]}]},"sinn":{"sem":"Anthropologie","name":"Identität und Sinn","leitfrage":"Gibt es einen Sinn des Lebens — oder muss der Mensch sich selbst einen geben?","conn":["hedonismus","essentialismus","arbeit"],"positions":["Sartre – Existentialismus","Camus – Absurdismus","Aristoteles – Teleologie","Frankl – Logotherapie"],"rows":[{"label":"Hauptwerk","values":["Das Sein und das Nichts (1943); Der Existenzialismus ist ein Humanismus (1946)","Der Mythos des Sisyphos (1942)","Nikomachische Ethik (ca. 350 v. Chr.)","... trotzdem Ja zum Leben sagen (1946); Der Mensch auf der Suche nach Sinn (1959)"]},{"label":"Merksatz","values":["Der Mensch ist das, wozu er sich macht. Freiheit ist keine Möglichkeit, sondern eine Bürde – man ist zur Freiheit verurteilt.","Das Leben ist sinnlos – aber der Mensch kann trotzdem in Würde und Revolte leben. Man muss sich Sisyphos als glücklichen Menschen vorstellen.","Der Mensch hat eine natürliche Bestimmung: Eudaimonia. Diese wird durch ein Leben der Tugend und Vernunft in der Gemeinschaft erreicht.","Sinn muss nicht gefunden werden – er muss gegeben werden. Selbst unter schlimmsten Bedingungen hat der Mensch die Freiheit seiner Haltung."]},{"label":"Grundannahmen","values":["• Kein vorgegebenes Wesen: Die Existenz geht der Essenz voraus.\n• Der Mensch schafft sich selbst durch seine Entscheidungen.\n• Volle Verantwortung für das eigene Leben – keine Ausreden möglich.\n• Mauvaise foi: Flucht aus der Verantwortung durch Selbsttäuschung.","• Das Universum ist gleichgültig gegenüber menschlichen Sinnfragen.\n• Das «Absurde» entsteht aus dem Widerspruch zwischen dem menschlichen Sinnverlangen und der sinnlosen Welt.\n• Drei mögliche Antworten: Selbstmord (falsch), philosophischer Selbstmord (Religion – falsch), Revolte (richtig).","• Alles in der Natur hat ein Telos (Ziel/Zweck).\n• Der Zweck des Menschen ist Eudaimonia – nicht Lust, sondern erfülltes, tugendhaftes Leben.\n• Vernunft und Tugend sind die Mittel, diesen Zweck zu erreichen.","• Das Streben nach Sinn ist die primäre Motivationskraft des Menschen (nicht Lust oder Macht).\n• Sinn ist immer individuell und situationsbezogen – er kann nicht verallgemeinert werden.\n• Noodynamik: Spannungszustand zwischen dem, was man ist, und dem, was man sein sollte."]},{"label":"Freiheit & Identität","values":["Radikal frei und vollständig selbst-konstituierend. Identität ist kein fixer Kern, sondern das laufende Ergebnis von Entscheidungen. Freiheit als Last und Chance.","Identität entsteht durch die Haltung gegenüber dem Absurden. Der Mensch ist frei, das Absurde anzunehmen – und trotzdem zu leben. Revolte als Ausdruck von Würde.","Die Identität folgt aus dem Wesen des Menschen und wird durch Tugend entfaltet. Freiheit bedeutet, vernünftig zu handeln und sein Wesen zu verwirklichen.","Freiheit ist die Freiheit der Haltung – auch dann, wenn äußere Freiheit fehlt. «Dem Menschen kann man alles nehmen – nur nicht die Freiheit, seine Haltung zu wählen.» – Frankl"]},{"label":"Sinn des Lebens","values":["Kein vorgegebener Sinn. Der Mensch muss sich selbst Sinn geben durch Engagement und Entscheidung.","Es gibt keinen objektiven Sinn – aber die Revolte gegen das Absurde schafft eine Form würdiger Existenz. Sisyphos als Modell.","Eudaimonia ist der Sinn – ein erfülltes Leben durch Tugend, Vernunft und Gemeinschaft. Sinn ist objektiv und gilt für alle Menschen.","Sinn entsteht durch: Werke schaffen, Liebe und Begegnung, Leiden annehmen. Sinn kann selbst unter unmöglichsten Bedingungen gefunden werden."]},{"label":"Kritikpunkte","values":["• Überforderung: Volle Verantwortung ist für viele Menschen unter realen Bedingungen unrealistisch.\n• Keine normativen Maßstäbe: Wenn jeder seinen Sinn selbst schafft, ist alles erlaubt?","• Ist das «Absurde» wirklich eine universelle menschliche Erfahrung?\n• Revolte als Lösung bleibt unkonkret – Was soll man konkret tun?","• Wessen Telos? Das Konzept des Telos ist kulturell geprägt.\n• Frauen, Sklaven, Fremde wurden ausgeschlossen – Universalität ist begrenzt.","• Zu individualistisch: Strukturelle Unrechtsursachen (Armut, Gewalt) werden vernachlässigt.\n• «Sinnsuche» als Antwort auf politisches Unrecht wirkt zynisch."]}]},"arbeit":{"sem":"Anthropologie","name":"Arbeit: Selbstverwirklichung oder Entfremdung?","leitfrage":"Besteht Selbstverwirklichung im Arbeiten — oder ist Arbeit primär Notwendigkeit und Entfremdung?","conn":["menschenmodelle","technologie","sozgerechtigkeit","sinn"],"positions":["Hegel – Arbeit als Selbsterschaffung","Marx – Arbeit und Entfremdung","Arendt – Drei Tätigkeitsformen","Hüther – Arbeit und Gehirn"],"rows":[{"label":"Hauptwerk","values":["Phänomenologie des Geistes (1807)","Pariser Manuskripte (1844)","Vita Activa (1958)","Was wir sind und was wir sein könnten (2011)"]},{"label":"Merksatz","values":["Der Mensch erschafft sich selbst durch Arbeit: Indem er die Welt formt, erkennt er sich in ihr und gewinnt Bewusstsein von sich.","Arbeit ist das Wesen des Menschen – im Kapitalismus wird sie zur Entfremdung: Der Mensch verliert sich in seiner eigenen Tätigkeit.","Arbeit, Herstellen und Handeln sind drei grundverschiedene Tätigkeitsformen – nur das Handeln konstituiert die politische Freiheit des Menschen.","Bedeutungsvolle Arbeit macht den Menschen gesünder, kreativer und glücklicher – Arbeit als Ausdruck von Verbundenheit und Autonomie."]},{"label":"Grundannahmen","values":["• Arbeit ist der Prozess, durch den der Geist sich in der Welt objektiviert und sich selbst erkennt.\n• Im Verhältnis von Herr und Knecht: Der Knecht, der arbeitet, entwickelt Bewusstsein – der Herr, der nur konsumiert, stagniert.\n• Arbeit ist Selbsterschaffung des Menschen als geistiges Wesen.","• Arbeit ist der Ausdruck des menschlichen Gattungswesens – durch sie schafft der Mensch sich und seine Welt.\n• Entfremdung im Kapitalismus: Der Arbeiter wird von seinem Produkt, seiner Tätigkeit, seinen Mitmenschen und seiner Gattung entfremdet.\n• Entfremdete Arbeit macht den Menschen zum Teil der Maschinerie.","• Arbeit: Biologischer Stoffwechselprozess mit der Natur – zyklisch, hinterlässt keine Spuren.\n• Herstellen (Werk): Schafft dauerhafte Gegenstände – bildet die künstliche Menschenwelt.\n• Handeln (Praxis): Politisches Miteinander in der Öffentlichkeit – Quelle echter Freiheit.","• Das Gehirn entwickelt sich optimal, wenn Menschen Aufgaben lösen, die sie selbst als bedeutsam empfinden.\n• Arbeit, die Autonomie und Verbundenheit stärkt, fördert Kreativität und Gesundheit.\n• Zwang und Kontrolle bei der Arbeit hemmen Entwicklung und Wohlbefinden."]},{"label":"Bedeutung der Arbeit für den Menschen","values":["Fundamental: Durch Arbeit erschafft sich der Mensch als bewusstes Wesen. Ohne Arbeit kein Selbstbewusstsein.","Potenziell: Im Idealzustand Ausdruck des Menschseins. Im Kapitalismus Entfremdung und Unterdrückung. Ziel: befreite, kreative Arbeit in einer klassenlosen Gesellschaft.","Differenziert: Arbeit im engeren Sinn ist nur Stoffwechsel. Echte Selbstverwirklichung findet im Handeln statt – in der politischen Gemeinschaft.","Zentral: Bedeutungsvolle Arbeit aktiviert das Belohnungssystem des Gehirns, stärkt soziale Bindungen und ermöglicht Selbstentfaltung."]},{"label":"Konsequenzen","values":["• Selbstbewusstsein entwickelt sich durch praktische Tätigkeit.\n• Muße und Nicht-Arbeit = Stillstand des Geistes.","• Kapitalismuskritik: Entfremdung überwinden.\n• Klassenkampf als Weg zur befreiten Arbeit.\n• «Jeder nach seinen Fähigkeiten, jedem nach seinen Bedürfnissen.»","• Politisches Handeln (nicht Arbeit) konstituiert Freiheit.\n• Warnung: Moderne Gesellschaften degradieren Bürger zu reinen «Arbeitstieren».\n• Erhalt des öffentlichen Raums als Bedingung der Freiheit.","• Arbeitswelt sollte Autonomie und Sinn fördern.\n• Intrinsische Motivation wichtiger als Kontrolle.\n• Psychische Gesundheit hängt von bedeutungsvoller Arbeit ab."]},{"label":"Kritikpunkte","values":["• Zu idealistisch: Arbeit ist nicht immer Selbstentfaltung.\n• Lohnarbeit wird nicht berücksichtigt.\n• Vernachlässigt Spielraum, Muße und Nicht-Produktives.","• Historische Umsetzung des Kommunismus: keine befreite Arbeit, sondern Zwangswirtschaft.\n• Reduktionismus: Entfremdung auf Ökonomie beschränkt.","• Strenge Dreiteilung der Tätigkeiten in der Realität nicht haltbar.\n• Handeln im modernen Sinne schwer zu definieren.\n• Exkludiert viele Tätigkeiten aus dem Begriff «Freiheit».","• Neurowissenschaftliche Basis vereinfacht komplexe soziale Verhältnisse.\n• Ignoriert strukturelle Zwänge auf dem Arbeitsmarkt."]}]}};
const BEGRIFFE=[{"term":"Erkenntnistheorie (Epistemologie)","definition":"Die Erkenntnistheorie fragt: Was können wir überhaupt wissen –\nund wie können wir es begründen?\nSie untersucht die Quellen, Grenzen und Bedingungen menschlichen\nWissens.\nBeispiel: Weißt du wirklich, dass du gerade diesen Text liest –\noder könntest du träumen?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Wissen","definition":"Wissen ist mehr als ein starkes Gefühl. Es setzt drei Dinge\nvoraus: Die Aussage muss wahr sein, du musst sie für wahr halten\nund du musst sie begründen können.\nStarker Glaube allein reicht nicht.\nBeispiel: Aristoteles glaubte, Männer hätten mehr Zähne als\nFrauen – er hat einfach nicht nachgezählt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Meinung (doxa)","definition":"Eine Meinung ist eine subjektive Überzeugung ohne gesicherte\nBegründung. Sie kann richtig sein – muss es aber nicht.\nFür eine Meinung kann man keinen allgemeinen Wahrheitsanspruch\nerheben.\nBeispiel: „Dieser Film ist der beste aller Zeiten.\" – Das ist\neine Meinung, keine Tatsache.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Glaube (belief / faith)","definition":"Glaube ist eine tiefere, langfristige Überzeugung – stärker als\nMeinung, aber noch kein Wissen.\nFür ihren Glauben waren Menschen bereit zu sterben. Auch der\nstärkste Glaube garantiert keine Wahrheit.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Wahrheit","definition":"Eine Aussage ist wahr, wenn sie mit der Wirklichkeit\nübereinstimmt. Wahrheit ist der Maßstab, an dem Erkenntnis\ngemessen wird.\nBeispiel: „Der Eiffelturm steht in Paris\" ist wahr, weil es\ntatsächlich so ist.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Zweifel","definition":"Zweifel bedeutet, Überzeugungen aktiv in Frage zu stellen. In\nder Philosophie ist Zweifel kein Zeichen von Schwäche, sondern\noft der Anfang echter Erkenntnis.\nBeispiel: Descartes zweifelt an allem – um herauszufinden, was\nwirklich sicher ist.","sem":"Erkenntnistheorie","fw_id":null},{"term":"A priori / A posteriori","definition":"A priori = vor aller Erfahrung gültig, unabhängig von\nBeobachtung.\nA posteriori = durch Erfahrung gewonnen, abhängig von\nBeobachtung.\nBeispiel a priori: 2+2=4 – gilt, ohne je überprüft worden zu\nsein.\nBeispiel a posteriori: „Es regnet draußen\" – weiß ich nur, wenn\nich nachgeschaut habe.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Induktion","definition":"Vom Einzelnen zum Allgemeinen schließen. Aus vielen\nBeobachtungen wird ein allgemeines Gesetz abgeleitet.\nProblem (Hume): Das ist nie vollständig sicher – die Zukunft\nkönnte immer anders sein als die Vergangenheit.\nBeispiel: „Alle Schwäne, die ich je gesehen habe, sind weiß –\nalso sind alle Schwäne weiß.\" Bis jemand Australien besucht.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Deduktion","definition":"Vom Allgemeinen zum Besonderen schließen. Aus einem Prinzip wird\nein konkreter Schluss gezogen.\nBeispiel: „Alle Menschen sind sterblich. Sokrates ist ein Mensch.\nAlso ist Sokrates sterblich.\"","sem":"Erkenntnistheorie","fw_id":null},{"term":"Skeptizismus","definition":"Der Skeptizismus bezweifelt grundsätzlich, ob sicheres Wissen\nmöglich ist. Statt Behauptungen aufzustellen, empfehlen\nSkeptiker, das Urteil zurückzuhalten.\nZiel ist nicht Resignation, sondern kritisches Denken.\nBeispiel: Ein Skeptiker fragt bei jeder Behauptung: Wie weißt du\ndas? Woher kommt diese Information?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Epoché (Urteilsenthaltung)","definition":"Die skeptische Empfehlung, kein endgültiges Urteil zu fällen,\nwenn man es nicht sicher wissen kann.\nBeispiel: „Ich weiß nicht genug, um das zu beurteilen\" – das ist\nEpoché, keine Feigheit.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ataraxie","definition":"Seelenruhe – der Zustand innerer Gelassenheit, den Skeptiker\nanstreben. Wer nicht ständig nach absoluter Gewissheit sucht,\nlebt ruhiger.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Traumargument","definition":"Du kannst nicht mit Sicherheit wissen, ob du gerade wach bist\noder träumst. Im Traum fühlt sich alles genauso real an wie im\nWachzustand.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Rationalismus","definition":"Wissen kommt aus der Vernunft, nicht aus den Sinnen. Die Sinne\ntäuschen uns – der Verstand kann zu sicheren, notwendigen\nWahrheiten gelangen.\nBeispiel: Mathematische Wahrheiten wie 2+2=4 gelten unabhängig\nvon sinnlicher Erfahrung.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Methodischer Zweifel","definition":"Descartes' Methode: Man zweifelt systematisch an allem, um eine\nunerschütterliche Wahrheit zu finden. Kein echter Zweifel,\nsondern ein Denkwerkzeug – Skepsis als Mittel, nicht als Ziel.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Böser Dämon (malin génie)","definition":"Was, wenn ein mächtiger Dämon uns in allem täuscht – sogar in\nMathematik und einfachsten Sinneswahrnehmungen?\nZweck: Herausfinden, ob es etwas gibt, das selbst ein Täuscher\nnicht erschüttern kann.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Cogito ergo sum","definition":"„Ich denke, also bin ich.\" – Descartes' berühmtester Satz.\nSelbst wenn alles andere unsicher ist: Das Denken selbst beweist,\ndass man existiert. Denn um getäuscht zu werden, muss man denken\n– und wer denkt, existiert.\nBeispiel: Du kannst daran zweifeln, ob dein Stuhl real ist. Aber\nnicht daran, dass du gerade zweifelst.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Angeborene Ideen","definition":"Ideen, die nicht aus der Erfahrung stammen, sondern von Geburt an\nim Geist vorhanden sind.\nDescartes: Ideen wie Gott oder Unendlichkeit müssen angeboren\nsein – wir könnten sie nie sinnlich erfahren.\nLocke widerspricht: Wären sie angeboren, müssten Kleinkinder sie\nschon kennen.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Dualismus","definition":"Zwei grundlegende, voneinander unabhängige Wirklichkeiten:\nres extensa (ausgedehnte, materielle Substanz – Körper) und\nres cogitans (denkende, immaterielle Substanz – Geist).\nProblem: Wie interagieren sie miteinander?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Solipsismus","definition":"Nur ich selbst existiere sicher. Alles andere – andere Menschen,\ndie Außenwelt – könnte nur eine Vorstellung in meinem Bewusstsein\nsein.\nProblem: Diese Position kann man nicht sinnvoll mit anderen\ndiskutieren – sie ist selbstwiderlegend.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Empirismus","definition":"Alles Wissen kommt aus der Erfahrung. Der Geist ist zu Beginn\nleer – erst durch Sinneseindrücke entsteht Wissen.\nVertreter: John Locke, David Hume.\nBeispiel: Ein Kind kennt keine Farben, Töne oder Formen – all\ndas wird durch Erfahrung gelernt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Tabula rasa","definition":"„Unbeschriebenes Blatt\" – Lockes Bild für den menschlichen Geist\nbei der Geburt. Kein Vorwissen, keine angeborenen Ideen. Alles\nschreiben Erfahrungen auf dieses Blatt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kausalität","definition":"Die Überzeugung, dass jedes Ereignis eine Ursache hat.\nHume: Wir beobachten nur, dass Dinge aufeinander folgen – nicht\ndass sie notwendig zusammenhängen. Der Glaube an Kausalität ist\neine Gewohnheit, kein bewiesenes Naturgesetz.\nBeispiel: Wir sehen immer: Feuer brennt, Wärme entsteht. Aber\nwir sehen die Notwendigkeit dieses Zusammenhangs nicht.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kritizismus (Kant)","definition":"Kant verbindet Empirismus und Rationalismus: Erkenntnis beginnt\nmit Erfahrung, aber entsteht nicht allein aus ihr. Der Verstand\nbringt eigene Strukturen mit, die Erfahrung erst ermöglichen.\nBeispiel: „Anschauungen ohne Begriffe sind blind, Begriffe ohne\nAnschauungen sind leer.\" (Kant)","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kategorien des Verstandes","definition":"Angeborene Denkstrukturen des Verstandes, z.B. Kausalität,\nSubstanz, Möglichkeit. Sie ordnen die rohen Sinneseindrücke zu\neiner erkennbaren Welt – ohne sie gäbe es keine Naturgesetze,\nkeine Wissenschaft.\nBeispiel: Kategorien sind wie das Betriebssystem des Geistes –\ndie Sinne liefern die Daten, der Verstand verarbeitet sie.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Erscheinung / Ding an sich","definition":"Wir erkennen die Welt immer so, wie sie uns erscheint – gefiltert\ndurch Sinne und Denkstrukturen.\nWie die Welt „an sich\" wirklich ist, können wir nie wissen.\nBeispiel: Wir sehen die Welt immer durch eine Brille, die wir nie\nabnehmen können.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Synthetische Urteile a priori","definition":"Aussagen, die gleichzeitig notwendig wahr (a priori) und\nerkenntniserweiternd (synthetisch) sind. Für Kant die Grundlage\naller Wissenschaft.\nBeispiel: „Alles, was geschieht, hat eine Ursache\" – gilt\nnotwendig, obwohl wir es nicht aus der Erfahrung ableiten können.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ideenlehre (Platon)","definition":"Hinter den sinnlichen Dingen existiert eine höhere Welt\nunveränderlicher Ideen. Nur diese sind wirklich real. Sinnliche\nDinge sind bloß unvollkommene Abbilder.\nBeispiel: Es gibt viele schöne Dinge – aber die Idee des Schönen\nselbst ist ewig und unveränderlich.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Doxa vs. Episteme","definition":"Doxa = bloße Meinung, basiert auf wechselnden Sinneswahrneh-\nmungen – unsicher und subjektiv.\nEpisteme = echtes Wissen, basiert auf der Erkenntnis der Ideen\ndurch Vernunft – sicher und allgemeingültig.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Anamnesis","definition":"Erkenntnis ist Wiedererinnerung. Die Seele hat vor der Geburt die\nIdeen gesehen – Lernen bedeutet, sich daran zu erinnern.\nSinneseindrücke sind nur Auslöser, nicht Quelle von Wissen.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Höhlengleichnis","definition":"Menschen in einer Höhle sehen nur Schatten an der Wand und\nhalten sie für die Wirklichkeit. Einer befreit sich, sieht das\nSonnenlicht (= die Ideen) und kehrt zurück – aber niemand glaubt\nihm.\nBotschaft: Die meisten leben in Illusionen. Wahre Erkenntnis ist\nanstrengend und wird oft abgelehnt.\nBeispiel: Algorithmen und soziale Medien könnten moderne Höhlen\nsein – wir sehen nur, was uns gezeigt wird.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Falsifikation","definition":"Eine Theorie ist nur dann wissenschaftlich, wenn man sich eine\nBeobachtung vorstellen kann, die sie widerlegt.\nNicht Bestätigung, sondern Widerlegbarkeit ist das entscheidende\nKriterium.\nBeispiel: „Alle Schwäne sind weiß.\" – Ein schwarzer Schwan würde\ndie Theorie widerlegen.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Bewährung","definition":"Theorien können viele Tests bestehen und sich bewähren, sind aber\nnie endgültig wahr.\nBewährung bedeutet vorläufige Geltung, keine absolute Sicherheit.\nBeispiel: Die Newtonsche Physik war lange bewährt – wurde aber\ndurch Einsteins Relativitätstheorie ergänzt und teilweise\nkorrigiert.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Theoriegetränktheit der Beobachtung","definition":"Beobachtungen sind nie neutral. Wir sehen die Welt immer im Licht\nvon Vorwissen, Erwartungen und Theorien. Fakten entstehen nicht\nohne Interpretation.\nBeispiel: Ein Arzt und ein Laie schauen auf dasselbe Röntgenbild\nund sehen völlig Verschiedenes.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kritischer Rationalismus (Popper)","definition":"Wissen entsteht durch Hypothesen, die kritisch geprüft und\nverworfen werden.\nFortschritt entsteht durch Fehlersuche, nicht durch Anhäufen von\nSicherheiten.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Paradigma (Kuhn)","definition":"Ein gemeinsamer Rahmen aus Grundannahmen, Methoden und Regeln,\nin dem eine wissenschaftliche Gemeinschaft arbeitet. Das Paradigma\nbestimmt, welche Fragen überhaupt sinnvoll sind.\nBeispiel: Das geozentrische Weltbild war jahrhundertelang das\ngültige Paradigma der Astronomie.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Normalwissenschaft (Kuhn)","definition":"Der Alltag der Wissenschaft: Forscher lösen Rätsel innerhalb des\nbestehenden Paradigmas. Das Paradigma selbst wird dabei nicht in\nFrage gestellt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Paradigmenwechsel / Wissenschaftliche Revolution (Kuhn)","definition":"Wenn sich Beobachtungen häufen, die nicht ins Paradigma passen\n(Anomalien), kommt es zur Krise und schließlich zur Revolution:\nDas alte Paradigma wird durch ein neues ersetzt.\nBeispiel: Von Ptolemäus (Erde im Mittelpunkt) zu Kopernikus\n(Sonne im Mittelpunkt) – eine wissenschaftliche Revolution.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Inkommensurabilität (Kuhn)","definition":"Alte und neue Paradigmen sind nicht direkt vergleichbar – sie\nsprechen verschiedene Sprachen und stellen andere Fragen. Ein\nrein logischer Vergleich ist kaum möglich.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Methodenpluralismus / „Anything goes\" (Feyerabend)","definition":"Es gibt keine einheitliche, allgemeingültige Methode für\nWissenschaft. Großer Fortschritt entstand oft durch Regelbrüche\nund unorthodoxes Denken.\n„Anything goes\" bedeutet: Keine Methode darf absolut gesetzt\nwerden.\nBeispiel: Galilei hielt sich nicht an die sauberen Regeln seiner\nZeit – und hatte trotzdem recht.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ethik","definition":"Ethik ist die philosophische Disziplin, die nach dem richtigen\nHandeln fragt. Sie untersucht, was gut und böse ist, welche Werte\nwir haben sollen und wie wir unser Leben führen sollen.\nZentrale Fragen: Was soll ich tun? Was ist moralisch richtig?","sem":"Ethik","fw_id":null},{"term":"Moral","definition":"Moral bezeichnet die tatsächlich in einer Gesellschaft geltenden\nNormen, Werte und Verhaltensregeln.\nEthik reflektiert Moral kritisch: Moral ist das, was gemacht wird;\nEthik fragt, was gemacht werden sollte.","sem":"Ethik","fw_id":null},{"term":"Autonomie","definition":"Selbstgesetzgebung – die Fähigkeit, sich selbst moralische Regeln\nzu geben, statt sie nur von außen zu empfangen.\nFür Kant ist Autonomie das Kennzeichen vernünftiger Wesen und\nGrundlage der Menschenwürde.\nBeispiel: Wer aus eigenem Nachdenken heraus hilft, handelt\nautonom. Wer nur hilft, weil die Lehrerin zuschaut, handelt\nheteronom.","sem":"Ethik","fw_id":null},{"term":"Menschenwürde","definition":"Jeder Mensch hat einen absoluten, unveräußerlichen Wert allein\ndadurch, dass er ein vernünftiges, freies Wesen ist.\nMenschenwürde darf niemals verletzt oder instrumentalisiert\nwerden.\nBeispiel: Folter ist auch dann verboten, wenn sie nützliche\nInformationen liefern könnte – die Würde des Menschen ist\nunantastbar.","sem":"Ethik","fw_id":null},{"term":"Verantwortung","definition":"Wer handelt, muss für die Folgen seines Handelns einstehen.\nVerantwortung setzt Freiheit voraus: Nur wer anders hätte handeln\nkönnen, kann verantwortlich gemacht werden.","sem":"Ethik","fw_id":null},{"term":"Gewissen","definition":"Das innere Urteilsvermögen, das sagt, ob eine Handlung richtig\noder falsch ist. Es ist die „innere Stimme\", die uns bei\nmoralischen Entscheidungen leitet – und nach einer schlechten Tat\nquält.","sem":"Ethik","fw_id":null},{"term":"Tugendethik","definition":"Nicht „Was soll ich tun?\", sondern „Was für ein Mensch soll ich\nsein?\" ist die zentrale Frage.\nTugenden sind Charaktereigenschaften wie Mut, Gerechtigkeit,\nKlugheit – sie entstehen durch Übung und Gewohnheit.","sem":"Ethik","fw_id":null},{"term":"Eudaimonia (Aristoteles)","definition":"Glück oder Gedeihen im Sinne eines gelingenden, erfüllten Lebens.\nNicht bloß Freude, sondern das Beste aus den eigenen Fähigkeiten\nherausholen.\nEudaimonia ist das höchste Ziel menschlichen Handelns.\nBeispiel: Eudaimonia ist kein Gefühl, sondern eine Lebensform:\naktiv, vernünftig, in Gemeinschaft – wie ein Sportler, der sein\nPotenzial voll ausschöpft.","sem":"Ethik","fw_id":null},{"term":"Mesotes / Goldene Mitte (Aristoteles)","definition":"Tugend liegt in der Mitte zwischen zwei Extremen (Lastern). Die\nrichtige Mitte ist nicht für alle gleich, sondern situations-\nabhängig.\nBeispiel: Mut liegt zwischen Feigheit (zu wenig) und Leichtsinn\n(zu viel Risikobereitschaft).","sem":"Ethik","fw_id":null},{"term":"Zoon politikon (Aristoteles)","definition":"Der Mensch ist von Natur aus ein soziales/politisches Wesen.\nEin gutes Leben ist nur innerhalb einer Gemeinschaft möglich.\nEin Mensch außerhalb der Gemeinschaft wäre entweder ein Gott\noder ein Tier.","sem":"Ethik","fw_id":null},{"term":"Hedonismus (Epikur)","definition":"Das höchste Gut ist die Lust (Hedone) und die Abwesenheit von\nSchmerz (Aponie) und Seelenunruhe (Ataraxie).\nEpikur meint damit aber nicht exzessive Freuden, sondern stille\nZufriedenheit, Freundschaft und Weisheit.\nBeispiel: „Wenn wir sagen, dass Lust das Ziel ist, meinen wir\nnicht die Lüste der Schwelger.\" (Epikur)","sem":"Ethik","fw_id":null},{"term":"Stoa / Stoizismus","definition":"Das gute Leben besteht nicht im Genuss, sondern in der Tugend\nund der Beherrschung der eigenen Reaktionen auf die Welt.\nZentrale Unterscheidung: Was liegt in unserer Macht (Urteile,\nReaktionen) vs. was nicht (Körper, Besitz, Ruf).\nWir können nicht immer bestimmen, was geschieht – aber immer,\nwie wir darauf reagieren.\nBeispiel: Du verlierst dein Handy – das liegt nicht in deiner\nMacht. Aber ob du dich davon ruinieren lässt, liegt in deiner\nMacht.","sem":"Ethik","fw_id":null},{"term":"Utilitarismus","definition":"Der moralische Wert einer Handlung hängt von ihren Folgen ab:\nEine Handlung ist gut, wenn sie das größte Glück für die größte\nZahl erzeugt.\nMoral ist keine Frage von Pflichten oder Absichten, sondern von\nErgebnissen.\nBeispiel: Soll man 1 Person töten, um 5 zu retten? Der\nUtilitarismus sagt: Ja – wenn die Gesamtbilanz besser ist.","sem":"Ethik","fw_id":null},{"term":"Konsequentialismus","definition":"Handlungen werden ausschließlich nach ihren Konsequenzen (Folgen)\nbeurteilt. Motive, Absichten oder Regeln spielen keine eigen-\nständige Rolle.","sem":"Ethik","fw_id":null},{"term":"Hedonistisches Prinzip / Hedone-Kalkül (Bentham)","definition":"Lust ist das einzige Gut, Schmerz das einzige Übel. Alle Lüste\nsind gleich wertvoll – nur Menge und Intensität zählen.\nBentham erfand das Hedone-Kalkül: Lüste können berechnet und\nverglichen werden.\nBeispiel: Eine Stunde Videospiele = eine Stunde Literatur, wenn\ndie Lustmenge gleich ist. Mill kritisierte das später als zu\nsimpel.","sem":"Ethik","fw_id":null},{"term":"Qualitativer Utilitarismus (Mill)","definition":"Nicht alle Lüste sind gleich – geistige Freuden sind wertvoller\nals körperliche. Qualität, nicht nur Quantität der Lust zählt.\nBeispiel: „Besser ein unzufriedener Sokrates als ein zufriedenes\nSchwein.\" (Mill)","sem":"Ethik","fw_id":null},{"term":"Präferenzutilitarismus (Singer)","definition":"Nicht Lust/Schmerz, sondern die Erfüllung von Interessen und\nPräferenzen bestimmt den moralischen Wert einer Handlung.\nAlle leidensfähigen Wesen – auch Tiere – müssen gleich\nberücksichtigt werden.","sem":"Ethik","fw_id":null},{"term":"Speziesismus (Singer)","definition":"Die ungerechtfertigte Bevorzugung der eigenen Spezies. Es gibt\nkeinen moralisch akzeptablen Grund, Tierleid weniger ernst zu\nnehmen als vergleichbares menschliches Leid.\nBeispiel: Massentierhaltung wäre Speziesismus – das Leid der\nTiere wird ignoriert, nur weil sie keine Menschen sind.","sem":"Ethik","fw_id":null},{"term":"Deontologie / Pflichtethik","definition":"Handlungen werden nicht nach ihren Folgen, sondern nach dem\nihnen zugrundeliegenden Prinzip beurteilt.\nEine Handlung ist gut, wenn sie aus Pflicht und nach einem\nmoralisch richtigen Grundsatz (Maxime) geschieht.","sem":"Ethik","fw_id":null},{"term":"Guter Wille (Kant)","definition":"Der gute Wille ist das einzige, was uneingeschränkt gut ist.\nAlles andere – Mut, Intelligenz, Reichtum – kann missbraucht\nwerden.\nEin Wille ist gut, wenn er aus Pflicht handelt, nicht aus\nNeigung oder Eigennutz.\nBeispiel: Wer hilft, weil er Mitleid hat, handelt aus Neigung.\nWer hilft, weil es seine Pflicht ist – auch ohne Lust dazu –\nhandelt aus Pflicht. Kant bevorzugt Letzteres.","sem":"Ethik","fw_id":null},{"term":"Kategorischer Imperativ","definition":"Das zentrale Moralprinzip Kants:\n„Handle nur nach derjenigen Maxime, durch die du zugleich wollen\nkannst, dass sie ein allgemeines Gesetz werde.\"\nTest: Kann ich wollen, dass alle so handeln? Wenn nein –\nunmoralisch.\nBeispiel: „Ich lüge, wenn es mir nützt.\" – Könntest du das als\nallgemeines Gesetz wollen? Nein – dann würde niemand mehr glauben,\nwas jemand sagt. Also ist Lügen unmoralisch.","sem":"Ethik","fw_id":null},{"term":"Maxime","definition":"Der persönliche Grundsatz, nach dem jemand handelt. Kant prüft\nMaximen durch den kategorischen Imperativ: Kann ich wollen, dass\nalle nach dieser Maxime handeln?\nBeispiel: Maxime: „Ich helfe anderen, wenn ich Zeit habe.\" –\nPrüfen: Könnte ich wollen, dass alle so handeln? Ja – das wäre\nuniversalisierbar.","sem":"Ethik","fw_id":null},{"term":"Mensch als Zweck (2. Formulierung des kategorischen Imperativs)","definition":"„Handle so, dass du die Menschheit, sowohl in deiner Person als\nauch in der Person jedes anderen, jederzeit als Zweck, niemals\nbloß als Mittel brauchst.\"\nMenschen dürfen niemals bloß instrumentalisiert werden.\nBeispiel: Jemanden anzulügen, um ihn zu manipulieren, behandelt\nihn als bloßes Mittel – nicht als Zweck an sich.","sem":"Ethik","fw_id":null},{"term":"Pflicht vs. Neigung (Kant)","definition":"Moralisch handeln heißt aus Pflicht handeln, nicht weil man Lust\ndazu hat oder sich dadurch etwas erhofft.\nNur das Handeln aus Pflicht hat moralischen Wert.","sem":"Ethik","fw_id":null},{"term":"Ethischer Relativismus","definition":"Moralische Werte sind relativ – abhängig von Kultur, Zeit oder\nPerson. Es gibt keine universellen moralischen Wahrheiten.\nProblem: Dann kann man keine kulturellen Praktiken wie Sklaverei\noder Folter grundsätzlich verurteilen.","sem":"Ethik","fw_id":null},{"term":"Ethischer Universalismus","definition":"Es gibt moralische Grundprinzipien, die für alle Menschen und\nKulturen gelten – unabhängig von Ort, Zeit und Tradition.\nBeispiel: Menschenrechte als universelle moralische Ansprüche.","sem":"Ethik","fw_id":null},{"term":"Verantwortungsethik (Hans Jonas)","definition":"In der technologischen Zivilisation brauchen wir eine neue Ethik:\n„Handle so, dass die Wirkungen deiner Handlungen mit der\nPermanenz menschlichen Lebens auf Erden vereinbar sind.\"\nVerantwortung gilt nicht nur für die Gegenwart, sondern auch für\nzukünftige Generationen.\nBeispiel: Klimaschutz – wir haben eine Verantwortung gegenüber\nMenschen, die noch nicht geboren sind.","sem":"Ethik","fw_id":null},{"term":"Staat","definition":"Eine politische Gemeinschaft mit einer anerkannten Regierung,\neinem Gebiet und einem Gewaltmonopol. Der Staat setzt Recht durch\nund sorgt für Frieden und Ordnung.\nZentrale Frage: Warum brauchen wir überhaupt einen Staat?","sem":"Staatsphilosophie","fw_id":null},{"term":"Legitimität","definition":"Die moralische Berechtigung einer Herrschaft oder Ordnung.\nLegitim ist, was als gerecht und rechtmäßig anerkannt wird –\nnicht nur, was legal (gesetzlich) ist.\nBeispiel: Ein Gesetz kann legal, aber nicht legitim sein – z.B.\nGesetze in Unrechtsstaaten.","sem":"Staatsphilosophie","fw_id":null},{"term":"Legalität","definition":"Die Übereinstimmung mit geltendem Recht. Etwas ist legal, wenn es\nden Gesetzen entspricht – unabhängig davon, ob es moralisch\nrichtig ist.\nBeispiel: Ein rassistisches Gesetz war legal, aber nicht legitim.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gewaltmonopol","definition":"Nur der Staat darf Gewalt rechtmäßig ausüben (z.B. Polizei,\nMilitär). Kein Einzelner oder keine Gruppe darf Gewalt anwenden –\naußer im Rahmen staatlicher Befugnis.","sem":"Staatsphilosophie","fw_id":null},{"term":"Demokratie","definition":"Herrschaft des Volkes: Entscheidungen werden von allen Bürgern\n(direkte Demokratie) oder durch gewählte Vertreter\n(repräsentative Demokratie) getroffen.\nGrundelemente: freie Wahlen, Gewaltenteilung, Grundrechte,\nRechtsstaatlichkeit.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gewaltenteilung","definition":"Die Macht des Staates wird auf drei Gewalten aufgeteilt:\nLegislative (Parlament – macht Gesetze)\nExekutive (Regierung – führt Gesetze aus)\nJudikative (Gerichte – prüft Gesetze)\nSie kontrollieren sich gegenseitig.","sem":"Staatsphilosophie","fw_id":null},{"term":"Naturzustand","definition":"Ein Gedankenexperiment: Wie wäre das menschliche Leben ohne\nStaat und Gesetze?\nHobbes: Krieg aller gegen alle – brutal, kurz, elend.\nLocke: Mehr oder weniger friedlich, aber ohne verlässliche\nEigentumsrechte.\nRousseau: Ursprünglich gut und harmonisch – erst die Gesellschaft\nhat den Menschen verdorben.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gesellschaftsvertrag","definition":"Menschen schließen einen (oft hypothetischen) Vertrag: Sie geben\neinen Teil ihrer Freiheit ab, dafür erhalten sie Schutz, Frieden\nund Recht. Dieser Vertrag begründet die Legitimität des Staates.\nBeispiel: Wenn du in einem Flugzeug landest, stimmst du still-\nschweigend den Sicherheitsregeln zu. Das ist eine Art sozialer\nVertrag.","sem":"Staatsphilosophie","fw_id":null},{"term":"Hobbes – Leviathan","definition":"Ohne starken Staat herrscht der „Krieg aller gegen alle\" – das\nLeben wäre einsam, arm, hässlich, brutal und kurz.\nMenschen geben alle Rechte an einen absoluten Souverän ab – nur\ndas Recht auf Selbsterhaltung bleibt.\nNur ein starker Staat kann dauerhaften Frieden garantieren.\nBeispiel: „Der Mensch ist dem Menschen ein Wolf.\"\n(homo homini lupus – Hobbes)","sem":"Staatsphilosophie","fw_id":null},{"term":"Locke – Liberaler Staat","definition":"Der Mensch hat von Natur aus Rechte auf Leben, Freiheit und\nEigentum.\nDer Staat dient dem Schutz dieser Rechte – missbraucht er sie,\nhat das Volk das Recht zum Widerstand.\nGewaltenteilung und Einwilligung der Regierten sind\nGrundbedingungen legitimer Herrschaft.\nBeispiel: Lockes Ideen inspirierten die amerikanische\nUnabhängigkeitserklärung: „Life, Liberty and the pursuit of\nHappiness.\"","sem":"Staatsphilosophie","fw_id":null},{"term":"Rousseau – Gemeinwille (volonté générale)","definition":"Der Mensch ist von Natur aus gut – die Gesellschaft und das\nEigentum haben ihn verdorben.\nDer Gesellschaftsvertrag soll echte Freiheit sichern. Der\nGemeinwille repräsentiert das Gemeinwohl – nicht nur die Summe\nder Einzelinteressen.\nBeispiel: „Der Mensch ist frei geboren, und überall liegt er in\nKetten.\" (Rousseau)","sem":"Staatsphilosophie","fw_id":null},{"term":"Rawls – Schleier des Nichtwissens","definition":"Gerechte Prinzipien wählt man im „Urzustand\" hinter einem\n„Schleier des Nichtwissens\": Man weiß nicht, welche Position man\nin der Gesellschaft einnehmen wird.\nDaher würde jeder faire Grundregeln wählen – und Ungleichheiten\nnur akzeptieren, wenn sie den Ärmsten nützen.\nBeispiel: Wenn du nicht weißt, ob du reich oder arm geboren\nwirst – welche Gesellschaftsregeln würdest du wählen?","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als Herrschaftsinstrument (Machiavelli)","definition":"Macht ist ein Mittel zur Herrschaft, das der Fürst nach Belieben\neinsetzen kann. Er soll weder grausam noch schwach sein – er soll\nden Schein der Tugend wahren, auch wenn er sie nicht hat.\nZiel: Machterhalt, nicht Moral.","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als kollektives Handeln (Hannah Arendt)","definition":"Macht ist kein Besitz eines Einzelnen, sondern entsteht im\ngemeinsamen Handeln von Menschen. Sie beruht auf Zustimmung und\nZusammenarbeit, nicht auf Gewalt.\nGewalt und Macht sind Gegensätze: Wo Gewalt herrscht, hat Macht\naufgehört.\nBeispiel: Diktaturen sind mächtiger Schein – sobald die Menschen\naufhören mitzumachen, bricht die Herrschaft zusammen (z.B. DDR\n1989).","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als Durchsetzungsfähigkeit (Max Weber)","definition":"Macht ist die Chance, den eigenen Willen auch gegen den\nWiderstand anderer durchzusetzen.\nWeber unterscheidet drei Typen legitimer Herrschaft: traditionale,\ncharismatische und legale/rationale Herrschaft.","sem":"Staatsphilosophie","fw_id":null},{"term":"Naturrecht","definition":"Es gibt Rechte und Pflichten, die dem Menschen von Natur aus\nzukommen – unabhängig von positiven Gesetzen. Diese Rechte sind\nunveräußerlich und gelten immer.\nBeispiel: Das Verbot der Sklaverei gilt auch dort, wo kein Gesetz\nsie verbietet – weil es dem natürlichen Recht widerspricht.","sem":"Staatsphilosophie","fw_id":null},{"term":"Positives Recht","definition":"Das von Menschen gesetzte, tatsächlich geltende Recht in einem\nStaat. Es gilt, weil es gesetzt wurde – unabhängig davon, ob es\nmoralisch gerecht ist.\nRechtspositivismus: Recht ist Recht, weil es Recht ist – nicht\nweil es gut ist.","sem":"Staatsphilosophie","fw_id":null},{"term":"Radbruchsche Formel","definition":"Wenn positives Recht so unerträglich ungerecht ist, dass es die\nMenschenwürde verletzt, verliert es seine Verbindlichkeit.\nBeispiel: Grundlage für die Nürnberger Prozesse – Nazi-Täter\nkonnten sich nicht auf „Ich habe nur Befehle befolgt\" berufen.","sem":"Staatsphilosophie","fw_id":null},{"term":"Menschenrechte","definition":"Unveräußerliche Rechte, die jedem Menschen allein aufgrund seines\nMenschseins zustehen – unabhängig von Nationalität, Herkunft oder\nGeschlecht. Sie sind universell, unteilbar und unübertragbar.\nBeispiel: Recht auf Leben, Freiheit, Sicherheit, Verbot von\nFolter – diese gelten für jeden Menschen auf der Welt.","sem":"Staatsphilosophie","fw_id":null},{"term":"Ziviler Ungehorsam","definition":"Die bewusste, öffentliche, gewaltfreie Verletzung von Gesetzen,\num auf eine als ungerecht empfundene Ordnung aufmerksam zu\nmachen.\nZiel: Veränderung der Politik, nicht Zerstörung des Staates.\nBeispiel: Mahatma Gandhi, Rosa Parks, Klimaaktivisten, die\nStraßen blockieren.","sem":"Staatsphilosophie","fw_id":null},{"term":"Widerstandsrecht","definition":"Das Recht der Bürger, sich gegen eine tyrannische Herrschaft zur\nWehr zu setzen – auch mit Gewalt, wenn alle anderen Mittel\nversagen.\nLocke: Wenn der Staat Naturrechte systematisch verletzt, verliert\ner seine Legitimität.","sem":"Staatsphilosophie","fw_id":null},{"term":"Soziale Gerechtigkeit","definition":"Wie sollen Güter, Chancen und Rechte in einer Gesellschaft\nverteilt werden?\nPositionen:\n- Egalitarismus: gleiche Verteilung für alle\n- Liberalismus (Nozick): der Markt entscheidet\n- Liberaler Egalitarismus (Rawls): Ungleichheiten nur erlaubt,\nwenn sie den Schwächsten nützen","sem":"Staatsphilosophie","fw_id":null},{"term":"Anthropologie (philosophisch)","definition":"Die philosophische Anthropologie fragt: Was ist der Mensch? Was\nunterscheidet ihn von Tieren und Maschinen? Hat er ein Wesen?\nSie untersucht Freiheit, Sprache, Vernunft, Sozialität und Sinn\ndes Lebens.","sem":"Anthropologie","fw_id":null},{"term":"Essentialismus","definition":"Der Mensch hat ein unveränderliches Wesen (essentia), das seine\nNatur bestimmt – unabhängig davon, was er tut oder wie er lebt.\nBeispiel: „Der Mensch ist von Natur aus vernünftig\" oder „Der\nMensch ist ein soziales Wesen\" – das sind essentialistische\nAussagen.","sem":"Anthropologie","fw_id":null},{"term":"Existentialismus (Sartre)","definition":"Die Existenz geht der Essenz voraus: Der Mensch hat kein\nvorgegebenes Wesen. Er wirft sich selbst in die Welt und erschafft\nsich durch seine Entscheidungen.\n„Der Mensch ist dazu verurteilt, frei zu sein.\" (Sartre)\nBeispiel: Ein Stuhl hat zuerst eine Idee (Zweck), dann existiert\ner. Beim Menschen ist es umgekehrt: Zuerst existiert er, dann\nerschafft er sich selbst.","sem":"Anthropologie","fw_id":null},{"term":"Sozialer Konstruktivismus","definition":"Was als „Menschennatur\" gilt, ist nicht naturgegeben, sondern\nsozial und kulturell konstruiert. Geschlecht, Identität – das\nsind soziale Konstruktionen, keine naturgegebenen Tatsachen.\nBeispiel: „Man kommt nicht als Frau zur Welt, man wird es.\"\n(Simone de Beauvoir)","sem":"Anthropologie","fw_id":null},{"term":"Freiheit","definition":"Die Fähigkeit, selbst zu entscheiden und zu handeln, ohne von\naußen bestimmt zu werden.\nFreiheit ist Voraussetzung für Moral, Verantwortung und\nmenschliche Würde.\nDrei Hauptpositionen: Determinismus, Libertarismus,\nKompatibilismus.","sem":"Anthropologie","fw_id":null},{"term":"Negative Freiheit","definition":"„Freiheit von...\" – die Abwesenheit von Hindernissen, Zwang und\nEinschränkungen.\nNiemand hindert mich daran, X zu tun.\nBeispiel: Pressefreiheit = keine staatliche Zensur.\nMeinungsfreiheit = man darf seine Meinung sagen, ohne Strafe zu\nfürchten.","sem":"Anthropologie","fw_id":null},{"term":"Positive Freiheit","definition":"„Freiheit zu...\" – die tatsächliche Fähigkeit, etwas zu tun, die\neigenen Ziele zu verfolgen und das Leben selbst zu gestalten.\nPositive Freiheit setzt Mittel voraus, nicht nur Abwesenheit von\nHindernissen.\nBeispiel: Ich bin frei, Geige zu lernen (kein Verbot) – aber\nohne Instrument, Lehrer und Zeit fehlt mir die positive Freiheit\ndazu.","sem":"Anthropologie","fw_id":null},{"term":"Willensfreiheit","definition":"Die innere Freiheit: die Fähigkeit, zwischen Alternativen zu\nwählen und den eigenen Willen zu bestimmen – ohne vollständig\ndurch externe Faktoren determiniert zu sein.","sem":"Anthropologie","fw_id":null},{"term":"Handlungsfreiheit","definition":"Die äußere Freiheit: die Fähigkeit, einen gefassten Willen auch\ntatsächlich in Handlungen umzusetzen, ohne äußere Hindernisse.","sem":"Anthropologie","fw_id":null},{"term":"Determinismus","definition":"Alle Ereignisse – auch menschliche Handlungen – sind durch\nNaturgesetze und Anfangsbedingungen vollständig vorherbestimmt.\nEs gibt keine echte Wahlmöglichkeit.\nFolge: Willensfreiheit ist eine Illusion. Moralische Verantwortung\nwird problematisch.\nBeispiel: Laplace'scher Dämon – ein Wesen, das alle Naturgesetze\nkennt, könnte jede zukünftige Handlung berechnen.","sem":"Anthropologie","fw_id":null},{"term":"Libertarismus (Freiheitsdebatte)","definition":"Der Mensch hat echten freien Willen: Unter gleichen Bedingungen\nhätte er auch anders handeln können.\nDer Determinismus ist falsch – menschliche Entscheidungen sind\nnicht vollständig kausal vorherbestimmt.","sem":"Anthropologie","fw_id":null},{"term":"Kompatibilismus","definition":"Freiheit und Determinismus schließen sich nicht aus: Frei handeln\nbedeutet, gemäß den eigenen Wünschen und Gründen zu handeln –\nohne äußeren Zwang.\nSelbst wenn alles kausal bestimmt ist, können Handlungen trotzdem\nfrei sein.\nBeispiel: Du wählst Schokoladeneis, weil du es magst – das ist\nfrei, auch wenn die Entscheidung kausal erklärbar ist.","sem":"Anthropologie","fw_id":null},{"term":"Sinn des Lebens","definition":"Vier Hauptantworten:\n1. Existentialismus (Sartre): Wir erschaffen unseren eigenen Sinn\ndurch Entscheidungen.\n2. Nihilismus (Nietzsche): Das Leben hat keinen objektiven Sinn.\n3. Eudämonismus (Aristoteles): Sinn liegt im Streben nach Glück\nund Entfaltung.\n4. Absurdismus (Camus): Das Leben ist sinnlos – aber wir müssen\nuns dennoch dagegen auflehnen (Revolte).","sem":"Anthropologie","fw_id":null},{"term":"Absurdismus (Albert Camus)","definition":"Das Leben ist sinnlos (absurd) – aber statt sich dem Nihilismus\noder der Religion zu ergeben, soll man sich dem Absurden\nwidersetzen und trotzdem leben.\nDie Spannung zwischen dem menschlichen Verlangen nach Sinn und\nder schweigenden Welt ist das Absurde.\nBeispiel: „Man muss sich Sisyphus als einen glücklichen Menschen\nvorstellen.\" (Camus) – er akzeptiert das Absurde und trotzt ihm.","sem":"Anthropologie","fw_id":null},{"term":"Nihilismus","definition":"Das Leben hat keinen objektiven, vorgegebenen Sinn. Es gibt keine\nunveränderlichen Werte oder Wahrheiten.\nNietzsche: „Gott ist tot\" – mit dem Verlust des religiösen\nWeltbildes verlieren traditionelle Werte ihre Grundlage.","sem":"Anthropologie","fw_id":null},{"term":"Entfremdung (Marx)","definition":"Im kapitalistischen Produktionssystem wird der Arbeiter vom\nErgebnis seiner Arbeit, vom Arbeitsprozess, von anderen Menschen\nund von sich selbst entfremdet.\nArbeit sollte Selbstverwirklichung sein – im Kapitalismus wird sie\nzu bloßer Ware.\nBeispiel: Der Fabrikarbeiter sieht das fertige Produkt nie,\nentscheidet nichts, wiederholt dieselben Griffe – er ist\nentfremdet von seiner eigenen Tätigkeit.","sem":"Anthropologie","fw_id":null},{"term":"Technologie und Menschlichkeit","definition":"Macht Technologie den Menschen mehr zu dem, was er ist\n(Werkzeugmacher, homo faber) – oder bedroht sie das Menschliche?\nTranshumanismus: Technologie soll den Menschen verbessern und\nseine Grenzen überwinden.\nKritik: Verlust von Autonomie, Würde und menschlicher\nVerbundenheit.\nBeispiel: KI, autonome Waffensysteme, genetische Manipulation –\nwo ist die Grenze des Menschlichen?\n================================================================\nEnde des Dokuments\n================================================================","sem":"Anthropologie","fw_id":null}];
const SEM={
  "Erkenntnistheorie":{"bg":"#c5d5e8","text":"#3d5a78","bar":"#9baec8"},
  "Ethik":            {"bg":"#dff0e8","text":"#2d5a47","bar":"#4a6b5a"},
  "Staatsphilosophie":{"bg":"#ede8d5","text":"#6b4e20","bar":"#b09060"},
  "Anthropologie":    {"bg":"#f0e4eb","text":"#6b3a4e","bar":"#b07890"}
};
const TERMS=BEGRIFFE.map(b=>b.term).sort((a,b)=>b.length-a.length);

function linkTerm(text, color){
  let result=text;
  for(const term of TERMS){
    const lo=result.toLowerCase();
    const idx=lo.indexOf(term.toLowerCase());
    if(idx>=0){
      const before=result.slice(0,idx);
      const matched=result.slice(idx,idx+term.length);
      const after=result.slice(idx+term.length);
      result=before+`<a href="begriffe.html?term=${encodeURIComponent(term)}" style="color:${color};font-weight:600;text-decoration:none;border-bottom:1px dotted ${color}60">${matched}</a>`+after;
    }
  }
  return result;
}

let fil="Alle", exp=new Set(), sq="";

function render(){
  const q=sq.toLowerCase();
  const vis=PHILS.filter(p=>{
    if(fil!=="Alle"&&p.sem!==fil)return false;
    if(!q)return true;
    return (p.name+p.stroemung+p.merksatz+p.kernidee+p.dates).toLowerCase().includes(q);
  });
  const g=document.getElementById("pg");
  if(!vis.length){g.innerHTML='<div class="no-r">Keine Philosophen gefunden.</div>';return;}
  g.innerHTML=vis.map(p=>{
    const s=SEM[p.sem]||{bg:"#eee",text:"#555",bar:"#888"};
    const k=p.name+"||"+p.sem+"||"+p.key;
    const isExp=exp.has(k);
    const tags=p.konzepte.slice(0,4).map(c=>{
      const label=c.split(':')[0].trim();
      return `<span class="ptag" style="color:${s.text};border-color:${s.bar}40;background:${s.bg}"
        onclick="event.stopPropagation();window.location.href='begriffe.html?term='+encodeURIComponent('${label.replace(/'/g,"\\'")}')">
        ${label}</span>`;
    }).join('');
    const qchips=(p.querverbindungen||[]).map(tid=>{
      const t=TOPICS[tid];if(!t)return'';
      return `<a class="qchip" href="vergleiche.html?id=${tid}" style="color:${s.text};border-color:${s.bar}50;background:${s.bg}">${t.name}</a>`;
    }).join('');
    return `<div class="pcard ${isExp?'exp':''}">
      <div class="pbar" style="background:${s.bar}"></div>
      <div class="phdr" onclick="tog('${k.replace(/'/g,"\\'")}')">
        <div class="pname">${p.name}</div>
        <div class="pstroem" style="color:${s.text}">${p.stroemung}</div>
        <div class="pdates">${p.dates}</div>
      </div>
      ${tags?`<div class="ptags">${tags}</div>`:''}
      ${isExp?`<div class="pexp">
        <div class="pkernidee-wrap">
          <div class="pkernidee-lbl">Kernidee</div>
          <div class="pkernidee">${linkTerm(p.kernidee,s.text)}</div>
        </div>
        <div class="pkonzepte-wrap">
          <div class="pkonzepte-lbl">Zentrale Konzepte</div>
          ${p.konzepte.map(c=>{
            const parts=c.split(':');
            const label=`<strong>${parts[0].trim()}</strong>`;
            const rest=parts.slice(1).join(':').trim();
            return `<div class="pkonzept"><span class="parr">→</span><span>${label}${rest?': '+linkTerm(rest,s.text):''}</span></div>`;
          }).join('')}
        </div>
        <div class="pmerksatz-wrap">
          <div class="pmerksatz-lbl">Merksatz</div>
          <div class="pmerksatz">${p.merksatz}</div>
        </div>
        ${qchips?`<div class="pquer-wrap">
          <div class="pquer-lbl">Querverbindungen</div>
          <div class="pquer-chips">${qchips}</div>
        </div>`:''}
      </div>`:''}
    </div>`;
  }).join('');
}

function tog(k){if(exp.has(k))exp.delete(k);else exp.add(k);render();}

function setFil(f){
  fil=f;
  document.querySelectorAll('.fbtn').forEach(b=>{
    const on=b.dataset.f===f;b.classList.toggle('on',on);
    const s=SEM[f];
    if(on&&s){b.style.background=s.bg;b.style.color=s.text;b.style.borderColor=s.bar;}
    else{b.style.background='';b.style.color='';b.style.borderColor='';}
  });render();
}
document.getElementById('psi').addEventListener('input',e=>{sq=e.target.value.trim();render();});
render();

</script>
