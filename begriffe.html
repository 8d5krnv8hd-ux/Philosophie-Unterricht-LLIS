<script>
const BG=[{"term":"Erkenntnistheorie (Epistemologie)","definition":"Die Erkenntnistheorie fragt: Was können wir überhaupt wissen – und wie können wir es begründen? Sie untersucht die Quellen, Grenzen und Bedingungen menschlichen Wissens. Beispiel: Weißt du wirklich, dass du gerade diesen Text liest – oder könntest du träumen?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Wissen","definition":"Wissen ist mehr als ein starkes Gefühl. Es setzt drei Dinge voraus: Die Aussage muss wahr sein, du musst sie für wahr halten und du musst sie begründen können. Starker Glaube allein reicht nicht. Beispiel: Aristoteles glaubte, Männer hätten mehr Zähne als Frauen – er hat einfach nicht nachgezählt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Meinung (doxa)","definition":"Eine Meinung ist eine subjektive Überzeugung ohne gesicherte Begründung. Sie kann richtig sein – muss es aber nicht. Für eine Meinung kann man keinen allgemeinen Wahrheitsanspruch erheben. Beispiel: „Dieser Film ist der beste aller Zeiten.\" – Das ist eine Meinung, keine Tatsache.","sem":"Erkenntnistheorie","fw_id":"platon_erk"},{"term":"Glaube (belief / faith)","definition":"Glaube ist eine tiefere, langfristige Überzeugung – stärker als Meinung, aber noch kein Wissen. Für ihren Glauben waren Menschen bereit zu sterben. Auch der stärkste Glaube garantiert keine Wahrheit.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Wahrheit","definition":"Eine Aussage ist wahr, wenn sie mit der Wirklichkeit übereinstimmt. Wahrheit ist der Maßstab, an dem Erkenntnis gemessen wird. Beispiel: „Der Eiffelturm steht in Paris\" ist wahr, weil es tatsächlich so ist.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Zweifel","definition":"Zweifel bedeutet, Überzeugungen aktiv in Frage zu stellen. In der Philosophie ist Zweifel kein Zeichen von Schwäche, sondern oft der Anfang echter Erkenntnis. Beispiel: Descartes zweifelt an allem – um herauszufinden, was wirklich sicher ist.","sem":"Erkenntnistheorie","fw_id":null},{"term":"A priori / A posteriori","definition":"A priori = vor aller Erfahrung gültig, unabhängig von Beobachtung. A posteriori = durch Erfahrung gewonnen, abhängig von Beobachtung. Beispiel a priori: 2+2=4 – gilt, ohne je überprüft worden zu sein. Beispiel a posteriori: „Es regnet draußen\" – weiß ich nur, wenn ich nachgeschaut habe.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Induktion","definition":"Vom Einzelnen zum Allgemeinen schließen. Aus vielen Beobachtungen wird ein allgemeines Gesetz abgeleitet. Problem (Hume): Das ist nie vollständig sicher – die Zukunft könnte immer anders sein als die Vergangenheit. Beispiel: „Alle Schwäne, die ich je gesehen habe, sind weiß – also sind alle Schwäne weiß.\" Bis jemand Australien besucht.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Deduktion","definition":"Vom Allgemeinen zum Besonderen schließen. Aus einem Prinzip wird ein konkreter Schluss gezogen. Beispiel: „Alle Menschen sind sterblich. Sokrates ist ein Mensch. Also ist Sokrates sterblich.\"","sem":"Erkenntnistheorie","fw_id":null},{"term":"Skeptizismus","definition":"Der Skeptizismus bezweifelt grundsätzlich, ob sicheres Wissen möglich ist. Statt Behauptungen aufzustellen, empfehlen Skeptiker, das Urteil zurückzuhalten. Ziel ist nicht Resignation, sondern kritisches Denken. Beispiel: Ein Skeptiker fragt bei jeder Behauptung: Wie weißt du das? Woher kommt diese Information?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Epoché (Urteilsenthaltung)","definition":"Die skeptische Empfehlung, kein endgültiges Urteil zu fällen, wenn man es nicht sicher wissen kann. Beispiel: „Ich weiß nicht genug, um das zu beurteilen\" – das ist Epoché, keine Feigheit.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ataraxie","definition":"Seelenruhe – der Zustand innerer Gelassenheit, den Skeptiker anstreben. Wer nicht ständig nach absoluter Gewissheit sucht, lebt ruhiger.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Traumargument","definition":"Du kannst nicht mit Sicherheit wissen, ob du gerade wach bist oder träumst. Im Traum fühlt sich alles genauso real an wie im Wachzustand.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Rationalismus","definition":"Wissen kommt aus der Vernunft, nicht aus den Sinnen. Die Sinne täuschen uns – der Verstand kann zu sicheren, notwendigen Wahrheiten gelangen. Beispiel: Mathematische Wahrheiten wie 2+2=4 gelten unabhängig von sinnlicher Erfahrung.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Methodischer Zweifel","definition":"Descartes' Methode: Man zweifelt systematisch an allem, um eine unerschütterliche Wahrheit zu finden. Kein echter Zweifel, sondern ein Denkwerkzeug – Skepsis als Mittel, nicht als Ziel.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Böser Dämon (malin génie)","definition":"Was, wenn ein mächtiger Dämon uns in allem täuscht – sogar in Mathematik und einfachsten Sinneswahrnehmungen? Zweck: Herausfinden, ob es etwas gibt, das selbst ein Täuscher nicht erschüttern kann.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Cogito ergo sum","definition":"„Ich denke, also bin ich.\" – Descartes' berühmtester Satz. Selbst wenn alles andere unsicher ist: Das Denken selbst beweist, dass man existiert. Denn um getäuscht zu werden, muss man denken – und wer denkt, existiert. Beispiel: Du kannst daran zweifeln, ob dein Stuhl real ist. Aber nicht daran, dass du gerade zweifelst.","sem":"Erkenntnistheorie","fw_id":"descartes"},{"term":"Angeborene Ideen","definition":"Ideen, die nicht aus der Erfahrung stammen, sondern von Geburt an im Geist vorhanden sind. Descartes: Ideen wie Gott oder Unendlichkeit müssen angeboren sein – wir könnten sie nie sinnlich erfahren. Locke widerspricht: Wären sie angeboren, müssten Kleinkinder sie schon kennen.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Dualismus","definition":"Zwei grundlegende, voneinander unabhängige Wirklichkeiten: res extensa (ausgedehnte, materielle Substanz – Körper) und res cogitans (denkende, immaterielle Substanz – Geist). Problem: Wie interagieren sie miteinander?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Solipsismus","definition":"Nur ich selbst existiere sicher. Alles andere – andere Menschen, die Außenwelt – könnte nur eine Vorstellung in meinem Bewusstsein sein. Problem: Diese Position kann man nicht sinnvoll mit anderen diskutieren – sie ist selbstwiderlegend.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Empirismus","definition":"Alles Wissen kommt aus der Erfahrung. Der Geist ist zu Beginn leer – erst durch Sinneseindrücke entsteht Wissen. Vertreter: John Locke, David Hume. Beispiel: Ein Kind kennt keine Farben, Töne oder Formen – all das wird durch Erfahrung gelernt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Tabula rasa","definition":"„Unbeschriebenes Blatt\" – Lockes Bild für den menschlichen Geist bei der Geburt. Kein Vorwissen, keine angeborenen Ideen. Alles schreiben Erfahrungen auf dieses Blatt.","sem":"Erkenntnistheorie","fw_id":"empirismus"},{"term":"Kausalität","definition":"Die Überzeugung, dass jedes Ereignis eine Ursache hat. Hume: Wir beobachten nur, dass Dinge aufeinander folgen – nicht dass sie notwendig zusammenhängen. Der Glaube an Kausalität ist eine Gewohnheit, kein bewiesenes Naturgesetz. Beispiel: Wir sehen immer: Feuer brennt, Wärme entsteht. Aber wir sehen die Notwendigkeit dieses Zusammenhangs nicht.","sem":"Erkenntnistheorie","fw_id":"empirismus"},{"term":"Kritizismus (Kant)","definition":"Kant verbindet Empirismus und Rationalismus: Erkenntnis beginnt mit Erfahrung, aber entsteht nicht allein aus ihr. Der Verstand bringt eigene Strukturen mit, die Erfahrung erst ermöglichen. Beispiel: „Anschauungen ohne Begriffe sind blind, Begriffe ohne Anschauungen sind leer.\" (Kant)","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kategorien des Verstandes","definition":"Angeborene Denkstrukturen des Verstandes, z.B. Kausalität, Substanz, Möglichkeit. Sie ordnen die rohen Sinneseindrücke zu einer erkennbaren Welt – ohne sie gäbe es keine Naturgesetze, keine Wissenschaft. Beispiel: Kategorien sind wie das Betriebssystem des Geistes – die Sinne liefern die Daten, der Verstand verarbeitet sie.","sem":"Erkenntnistheorie","fw_id":"kant_erk"},{"term":"Erscheinung / Ding an sich","definition":"Wir erkennen die Welt immer so, wie sie uns erscheint – gefiltert durch Sinne und Denkstrukturen. Wie die Welt „an sich\" wirklich ist, können wir nie wissen. Beispiel: Wir sehen die Welt immer durch eine Brille, die wir nie abnehmen können.","sem":"Erkenntnistheorie","fw_id":"kant_erk"},{"term":"Synthetische Urteile a priori","definition":"Aussagen, die gleichzeitig notwendig wahr (a priori) und erkenntniserweiternd (synthetisch) sind. Für Kant die Grundlage aller Wissenschaft. Beispiel: „Alles, was geschieht, hat eine Ursache\" – gilt notwendig, obwohl wir es nicht aus der Erfahrung ableiten können.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ideenlehre (Platon)","definition":"Hinter den sinnlichen Dingen existiert eine höhere Welt unveränderlicher Ideen. Nur diese sind wirklich real. Sinnliche Dinge sind bloß unvollkommene Abbilder. Beispiel: Es gibt viele schöne Dinge – aber die Idee des Schönen selbst ist ewig und unveränderlich.","sem":"Erkenntnistheorie","fw_id":"platon_erk"},{"term":"Doxa vs. Episteme","definition":"Doxa = bloße Meinung, basiert auf wechselnden Sinneswahrneh- mungen – unsicher und subjektiv. Episteme = echtes Wissen, basiert auf der Erkenntnis der Ideen durch Vernunft – sicher und allgemeingültig.","sem":"Erkenntnistheorie","fw_id":"platon_erk"},{"term":"Anamnesis","definition":"Erkenntnis ist Wiedererinnerung. Die Seele hat vor der Geburt die Ideen gesehen – Lernen bedeutet, sich daran zu erinnern. Sinneseindrücke sind nur Auslöser, nicht Quelle von Wissen.","sem":"Erkenntnistheorie","fw_id":"platon_erk"},{"term":"Höhlengleichnis","definition":"Menschen in einer Höhle sehen nur Schatten an der Wand und halten sie für die Wirklichkeit. Einer befreit sich, sieht das Sonnenlicht (= die Ideen) und kehrt zurück – aber niemand glaubt ihm. Botschaft: Die meisten leben in Illusionen. Wahre Erkenntnis ist anstrengend und wird oft abgelehnt. Beispiel: Algorithmen und soziale Medien könnten moderne Höhlen sein – wir sehen nur, was uns gezeigt wird.","sem":"Erkenntnistheorie","fw_id":"platon_erk"},{"term":"Falsifikation","definition":"Eine Theorie ist nur dann wissenschaftlich, wenn man sich eine Beobachtung vorstellen kann, die sie widerlegt. Nicht Bestätigung, sondern Widerlegbarkeit ist das entscheidende Kriterium. Beispiel: „Alle Schwäne sind weiß.\" – Ein schwarzer Schwan würde die Theorie widerlegen.","sem":"Erkenntnistheorie","fw_id":"popper"},{"term":"Bewährung","definition":"Theorien können viele Tests bestehen und sich bewähren, sind aber nie endgültig wahr. Bewährung bedeutet vorläufige Geltung, keine absolute Sicherheit. Beispiel: Die Newtonsche Physik war lange bewährt – wurde aber durch Einsteins Relativitätstheorie ergänzt und teilweise korrigiert.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Theoriegetränktheit der Beobachtung","definition":"Beobachtungen sind nie neutral. Wir sehen die Welt immer im Licht von Vorwissen, Erwartungen und Theorien. Fakten entstehen nicht ohne Interpretation. Beispiel: Ein Arzt und ein Laie schauen auf dasselbe Röntgenbild und sehen völlig Verschiedenes.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kritischer Rationalismus (Popper)","definition":"Wissen entsteht durch Hypothesen, die kritisch geprüft und verworfen werden. Fortschritt entsteht durch Fehlersuche, nicht durch Anhäufen von Sicherheiten.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Paradigma (Kuhn)","definition":"Ein gemeinsamer Rahmen aus Grundannahmen, Methoden und Regeln, in dem eine wissenschaftliche Gemeinschaft arbeitet. Das Paradigma bestimmt, welche Fragen überhaupt sinnvoll sind. Beispiel: Das geozentrische Weltbild war jahrhundertelang das gültige Paradigma der Astronomie.","sem":"Erkenntnistheorie","fw_id":"kuhn"},{"term":"Normalwissenschaft (Kuhn)","definition":"Der Alltag der Wissenschaft: Forscher lösen Rätsel innerhalb des bestehenden Paradigmas. Das Paradigma selbst wird dabei nicht in Frage gestellt.","sem":"Erkenntnistheorie","fw_id":"kuhn"},{"term":"Paradigmenwechsel / Wissenschaftliche Revolution (Kuhn)","definition":"Wenn sich Beobachtungen häufen, die nicht ins Paradigma passen (Anomalien), kommt es zur Krise und schließlich zur Revolution: Das alte Paradigma wird durch ein neues ersetzt. Beispiel: Von Ptolemäus (Erde im Mittelpunkt) zu Kopernikus (Sonne im Mittelpunkt) – eine wissenschaftliche Revolution.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Inkommensurabilität (Kuhn)","definition":"Alte und neue Paradigmen sind nicht direkt vergleichbar – sie sprechen verschiedene Sprachen und stellen andere Fragen. Ein rein logischer Vergleich ist kaum möglich.","sem":"Erkenntnistheorie","fw_id":"kuhn"},{"term":"Methodenpluralismus / „Anything goes\" (Feyerabend)","definition":"Es gibt keine einheitliche, allgemeingültige Methode für Wissenschaft. Großer Fortschritt entstand oft durch Regelbrüche und unorthodoxes Denken. „Anything goes\" bedeutet: Keine Methode darf absolut gesetzt werden. Beispiel: Galilei hielt sich nicht an die sauberen Regeln seiner Zeit – und hatte trotzdem recht.","sem":"Erkenntnistheorie","fw_id":"feyerabend"},{"term":"Ethik","definition":"Ethik ist die philosophische Disziplin, die nach dem richtigen Handeln fragt. Sie untersucht, was gut und böse ist, welche Werte wir haben sollen und wie wir unser Leben führen sollen. Zentrale Fragen: Was soll ich tun? Was ist moralisch richtig?","sem":"Ethik","fw_id":null},{"term":"Moral","definition":"Moral bezeichnet die tatsächlich in einer Gesellschaft geltenden Normen, Werte und Verhaltensregeln. Ethik reflektiert Moral kritisch: Moral ist das, was gemacht wird; Ethik fragt, was gemacht werden sollte.","sem":"Ethik","fw_id":null},{"term":"Autonomie","definition":"Selbstgesetzgebung – die Fähigkeit, sich selbst moralische Regeln zu geben, statt sie nur von außen zu empfangen. Für Kant ist Autonomie das Kennzeichen vernünftiger Wesen und Grundlage der Menschenwürde. Beispiel: Wer aus eigenem Nachdenken heraus hilft, handelt autonom. Wer nur hilft, weil die Lehrerin zuschaut, handelt heteronom.","sem":"Ethik","fw_id":"kant_eth"},{"term":"Menschenwürde","definition":"Jeder Mensch hat einen absoluten, unveräußerlichen Wert allein dadurch, dass er ein vernünftiges, freies Wesen ist. Menschenwürde darf niemals verletzt oder instrumentalisiert werden. Beispiel: Folter ist auch dann verboten, wenn sie nützliche Informationen liefern könnte – die Würde des Menschen ist unantastbar.","sem":"Ethik","fw_id":"kant_eth"},{"term":"Verantwortung","definition":"Wer handelt, muss für die Folgen seines Handelns einstehen. Verantwortung setzt Freiheit voraus: Nur wer anders hätte handeln können, kann verantwortlich gemacht werden.","sem":"Ethik","fw_id":null},{"term":"Gewissen","definition":"Das innere Urteilsvermögen, das sagt, ob eine Handlung richtig oder falsch ist. Es ist die „innere Stimme\", die uns bei moralischen Entscheidungen leitet – und nach einer schlechten Tat quält.","sem":"Ethik","fw_id":null},{"term":"Tugendethik","definition":"Nicht „Was soll ich tun?\", sondern „Was für ein Mensch soll ich sein?\" ist die zentrale Frage. Tugenden sind Charaktereigenschaften wie Mut, Gerechtigkeit, Klugheit – sie entstehen durch Übung und Gewohnheit.","sem":"Ethik","fw_id":"aristoteles_eth"},{"term":"Eudaimonia (Aristoteles)","definition":"Glück oder Gedeihen im Sinne eines gelingenden, erfüllten Lebens. Nicht bloß Freude, sondern das Beste aus den eigenen Fähigkeiten herausholen. Eudaimonia ist das höchste Ziel menschlichen Handelns. Beispiel: Eudaimonia ist kein Gefühl, sondern eine Lebensform: aktiv, vernünftig, in Gemeinschaft – wie ein Sportler, der sein Potenzial voll ausschöpft.","sem":"Ethik","fw_id":"aristoteles_eth"},{"term":"Mesotes / Goldene Mitte (Aristoteles)","definition":"Tugend liegt in der Mitte zwischen zwei Extremen (Lastern). Die richtige Mitte ist nicht für alle gleich, sondern situations- abhängig. Beispiel: Mut liegt zwischen Feigheit (zu wenig) und Leichtsinn (zu viel Risikobereitschaft).","sem":"Ethik","fw_id":"aristoteles_eth"},{"term":"Zoon politikon (Aristoteles)","definition":"Der Mensch ist von Natur aus ein soziales/politisches Wesen. Ein gutes Leben ist nur innerhalb einer Gemeinschaft möglich. Ein Mensch außerhalb der Gemeinschaft wäre entweder ein Gott oder ein Tier.","sem":"Ethik","fw_id":null},{"term":"Hedonismus (Epikur)","definition":"Das höchste Gut ist die Lust (Hedone) und die Abwesenheit von Schmerz (Aponie) und Seelenunruhe (Ataraxie). Epikur meint damit aber nicht exzessive Freuden, sondern stille Zufriedenheit, Freundschaft und Weisheit. Beispiel: „Wenn wir sagen, dass Lust das Ziel ist, meinen wir nicht die Lüste der Schwelger.\" (Epikur)","sem":"Ethik","fw_id":null},{"term":"Stoa / Stoizismus","definition":"Das gute Leben besteht nicht im Genuss, sondern in der Tugend und der Beherrschung der eigenen Reaktionen auf die Welt. Zentrale Unterscheidung: Was liegt in unserer Macht (Urteile, Reaktionen) vs. was nicht (Körper, Besitz, Ruf). Wir können nicht immer bestimmen, was geschieht – aber immer, wie wir darauf reagieren. Beispiel: Du verlierst dein Handy – das liegt nicht in deiner Macht. Aber ob du dich davon ruinieren lässt, liegt in deiner Macht.","sem":"Ethik","fw_id":null},{"term":"Utilitarismus","definition":"Der moralische Wert einer Handlung hängt von ihren Folgen ab: Eine Handlung ist gut, wenn sie das größte Glück für die größte Zahl erzeugt. Moral ist keine Frage von Pflichten oder Absichten, sondern von Ergebnissen. Beispiel: Soll man 1 Person töten, um 5 zu retten? Der Utilitarismus sagt: Ja – wenn die Gesamtbilanz besser ist.","sem":"Ethik","fw_id":null},{"term":"Konsequentialismus","definition":"Handlungen werden ausschließlich nach ihren Konsequenzen (Folgen) beurteilt. Motive, Absichten oder Regeln spielen keine eigen- ständige Rolle.","sem":"Ethik","fw_id":null},{"term":"Hedonistisches Prinzip / Hedone-Kalkül (Bentham)","definition":"Lust ist das einzige Gut, Schmerz das einzige Übel. Alle Lüste sind gleich wertvoll – nur Menge und Intensität zählen. Bentham erfand das Hedone-Kalkül: Lüste können berechnet und verglichen werden. Beispiel: Eine Stunde Videospiele = eine Stunde Literatur, wenn die Lustmenge gleich ist. Mill kritisierte das später als zu simpel.","sem":"Ethik","fw_id":null},{"term":"Qualitativer Utilitarismus (Mill)","definition":"Nicht alle Lüste sind gleich – geistige Freuden sind wertvoller als körperliche. Qualität, nicht nur Quantität der Lust zählt. Beispiel: „Besser ein unzufriedener Sokrates als ein zufriedenes Schwein.\" (Mill)","sem":"Ethik","fw_id":null},{"term":"Präferenzutilitarismus (Singer)","definition":"Nicht Lust/Schmerz, sondern die Erfüllung von Interessen und Präferenzen bestimmt den moralischen Wert einer Handlung. Alle leidensfähigen Wesen – auch Tiere – müssen gleich berücksichtigt werden.","sem":"Ethik","fw_id":null},{"term":"Speziesismus (Singer)","definition":"Die ungerechtfertigte Bevorzugung der eigenen Spezies. Es gibt keinen moralisch akzeptablen Grund, Tierleid weniger ernst zu nehmen als vergleichbares menschliches Leid. Beispiel: Massentierhaltung wäre Speziesismus – das Leid der Tiere wird ignoriert, nur weil sie keine Menschen sind.","sem":"Ethik","fw_id":"utilitarismus_fw"},{"term":"Deontologie / Pflichtethik","definition":"Handlungen werden nicht nach ihren Folgen, sondern nach dem ihnen zugrundeliegenden Prinzip beurteilt. Eine Handlung ist gut, wenn sie aus Pflicht und nach einem moralisch richtigen Grundsatz (Maxime) geschieht.","sem":"Ethik","fw_id":"kant_eth"},{"term":"Guter Wille (Kant)","definition":"Der gute Wille ist das einzige, was uneingeschränkt gut ist. Alles andere – Mut, Intelligenz, Reichtum – kann missbraucht werden. Ein Wille ist gut, wenn er aus Pflicht handelt, nicht aus Neigung oder Eigennutz. Beispiel: Wer hilft, weil er Mitleid hat, handelt aus Neigung. Wer hilft, weil es seine Pflicht ist – auch ohne Lust dazu – handelt aus Pflicht. Kant bevorzugt Letzteres.","sem":"Ethik","fw_id":"kant_eth"},{"term":"Kategorischer Imperativ","definition":"Das zentrale Moralprinzip Kants: „Handle nur nach derjenigen Maxime, durch die du zugleich wollen kannst, dass sie ein allgemeines Gesetz werde.\" Test: Kann ich wollen, dass alle so handeln? Wenn nein – unmoralisch. Beispiel: „Ich lüge, wenn es mir nützt.\" – Könntest du das als allgemeines Gesetz wollen? Nein – dann würde niemand mehr glauben, was jemand sagt. Also ist Lügen unmoralisch.","sem":"Ethik","fw_id":"kant_eth"},{"term":"Maxime","definition":"Der persönliche Grundsatz, nach dem jemand handelt. Kant prüft Maximen durch den kategorischen Imperativ: Kann ich wollen, dass alle nach dieser Maxime handeln? Beispiel: Maxime: „Ich helfe anderen, wenn ich Zeit habe.\" – Prüfen: Könnte ich wollen, dass alle so handeln? Ja – das wäre universalisierbar.","sem":"Ethik","fw_id":null},{"term":"Pflicht vs. Neigung (Kant)","definition":"Moralisch handeln heißt aus Pflicht handeln, nicht weil man Lust dazu hat oder sich dadurch etwas erhofft. Nur das Handeln aus Pflicht hat moralischen Wert.","sem":"Ethik","fw_id":"kant_eth"},{"term":"Ethischer Relativismus","definition":"Moralische Werte sind relativ – abhängig von Kultur, Zeit oder Person. Es gibt keine universellen moralischen Wahrheiten. Problem: Dann kann man keine kulturellen Praktiken wie Sklaverei oder Folter grundsätzlich verurteilen.","sem":"Ethik","fw_id":null},{"term":"Ethischer Universalismus","definition":"Es gibt moralische Grundprinzipien, die für alle Menschen und Kulturen gelten – unabhängig von Ort, Zeit und Tradition. Beispiel: Menschenrechte als universelle moralische Ansprüche.","sem":"Ethik","fw_id":null},{"term":"Verantwortungsethik (Hans Jonas)","definition":"In der technologischen Zivilisation brauchen wir eine neue Ethik: „Handle so, dass die Wirkungen deiner Handlungen mit der Permanenz menschlichen Lebens auf Erden vereinbar sind.\" Verantwortung gilt nicht nur für die Gegenwart, sondern auch für zukünftige Generationen. Beispiel: Klimaschutz – wir haben eine Verantwortung gegenüber Menschen, die noch nicht geboren sind.","sem":"Ethik","fw_id":null},{"term":"Staat","definition":"Eine politische Gemeinschaft mit einer anerkannten Regierung, einem Gebiet und einem Gewaltmonopol. Der Staat setzt Recht durch und sorgt für Frieden und Ordnung. Zentrale Frage: Warum brauchen wir überhaupt einen Staat?","sem":"Staatsphilosophie","fw_id":null},{"term":"Legitimität","definition":"Die moralische Berechtigung einer Herrschaft oder Ordnung. Legitim ist, was als gerecht und rechtmäßig anerkannt wird – nicht nur, was legal (gesetzlich) ist. Beispiel: Ein Gesetz kann legal, aber nicht legitim sein – z.B. Gesetze in Unrechtsstaaten.","sem":"Staatsphilosophie","fw_id":null},{"term":"Legalität","definition":"Die Übereinstimmung mit geltendem Recht. Etwas ist legal, wenn es den Gesetzen entspricht – unabhängig davon, ob es moralisch richtig ist. Beispiel: Ein rassistisches Gesetz war legal, aber nicht legitim.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gewaltmonopol","definition":"Nur der Staat darf Gewalt rechtmäßig ausüben (z.B. Polizei, Militär). Kein Einzelner oder keine Gruppe darf Gewalt anwenden – außer im Rahmen staatlicher Befugnis.","sem":"Staatsphilosophie","fw_id":null},{"term":"Demokratie","definition":"Herrschaft des Volkes: Entscheidungen werden von allen Bürgern (direkte Demokratie) oder durch gewählte Vertreter (repräsentative Demokratie) getroffen. Grundelemente: freie Wahlen, Gewaltenteilung, Grundrechte, Rechtsstaatlichkeit.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gewaltenteilung","definition":"Die Macht des Staates wird auf drei Gewalten aufgeteilt: Legislative (Parlament – macht Gesetze) Exekutive (Regierung – führt Gesetze aus) Judikative (Gerichte – prüft Gesetze) Sie kontrollieren sich gegenseitig.","sem":"Staatsphilosophie","fw_id":null},{"term":"Naturzustand","definition":"Ein Gedankenexperiment: Wie wäre das menschliche Leben ohne Staat und Gesetze? Hobbes: Krieg aller gegen alle – brutal, kurz, elend. Locke: Mehr oder weniger friedlich, aber ohne verlässliche Eigentumsrechte. Rousseau: Ursprünglich gut und harmonisch – erst die Gesellschaft hat den Menschen verdorben.","sem":"Staatsphilosophie","fw_id":"hobbes"},{"term":"Gesellschaftsvertrag","definition":"Menschen schließen einen (oft hypothetischen) Vertrag: Sie geben einen Teil ihrer Freiheit ab, dafür erhalten sie Schutz, Frieden und Recht. Dieser Vertrag begründet die Legitimität des Staates. Beispiel: Wenn du in einem Flugzeug landest, stimmst du still- schweigend den Sicherheitsregeln zu. Das ist eine Art sozialer Vertrag.","sem":"Staatsphilosophie","fw_id":null},{"term":"Hobbes – Leviathan","definition":"Ohne starken Staat herrscht der „Krieg aller gegen alle\" – das Leben wäre einsam, arm, hässlich, brutal und kurz. Menschen geben alle Rechte an einen absoluten Souverän ab – nur das Recht auf Selbsterhaltung bleibt. Nur ein starker Staat kann dauerhaften Frieden garantieren. Beispiel: „Der Mensch ist dem Menschen ein Wolf.\" (homo homini lupus – Hobbes)","sem":"Staatsphilosophie","fw_id":"hobbes"},{"term":"Locke – Liberaler Staat","definition":"Der Mensch hat von Natur aus Rechte auf Leben, Freiheit und Eigentum. Der Staat dient dem Schutz dieser Rechte – missbraucht er sie, hat das Volk das Recht zum Widerstand. Gewaltenteilung und Einwilligung der Regierten sind Grundbedingungen legitimer Herrschaft. Beispiel: Lockes Ideen inspirierten die amerikanische Unabhängigkeitserklärung: „Life, Liberty and the pursuit of Happiness.\"","sem":"Staatsphilosophie","fw_id":null},{"term":"Rousseau – Gemeinwille (volonté générale)","definition":"Der Mensch ist von Natur aus gut – die Gesellschaft und das Eigentum haben ihn verdorben. Der Gesellschaftsvertrag soll echte Freiheit sichern. Der Gemeinwille repräsentiert das Gemeinwohl – nicht nur die Summe der Einzelinteressen. Beispiel: „Der Mensch ist frei geboren, und überall liegt er in Ketten.\" (Rousseau)","sem":"Staatsphilosophie","fw_id":"rousseau"},{"term":"Rawls – Schleier des Nichtwissens","definition":"Gerechte Prinzipien wählt man im „Urzustand\" hinter einem „Schleier des Nichtwissens\": Man weiß nicht, welche Position man in der Gesellschaft einnehmen wird. Daher würde jeder faire Grundregeln wählen – und Ungleichheiten nur akzeptieren, wenn sie den Ärmsten nützen. Beispiel: Wenn du nicht weißt, ob du reich oder arm geboren wirst – welche Gesellschaftsregeln würdest du wählen?","sem":"Staatsphilosophie","fw_id":"sozgerech_fw"},{"term":"Macht als Herrschaftsinstrument (Machiavelli)","definition":"Macht ist ein Mittel zur Herrschaft, das der Fürst nach Belieben einsetzen kann. Er soll weder grausam noch schwach sein – er soll den Schein der Tugend wahren, auch wenn er sie nicht hat. Ziel: Machterhalt, nicht Moral.","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als kollektives Handeln (Hannah Arendt)","definition":"Macht ist kein Besitz eines Einzelnen, sondern entsteht im gemeinsamen Handeln von Menschen. Sie beruht auf Zustimmung und Zusammenarbeit, nicht auf Gewalt. Gewalt und Macht sind Gegensätze: Wo Gewalt herrscht, hat Macht aufgehört. Beispiel: Diktaturen sind mächtiger Schein – sobald die Menschen aufhören mitzumachen, bricht die Herrschaft zusammen (z.B. DDR 1989).","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als Durchsetzungsfähigkeit (Max Weber)","definition":"Macht ist die Chance, den eigenen Willen auch gegen den Widerstand anderer durchzusetzen. Weber unterscheidet drei Typen legitimer Herrschaft: traditionale, charismatische und legale/rationale Herrschaft.","sem":"Staatsphilosophie","fw_id":null},{"term":"Naturrecht","definition":"Es gibt Rechte und Pflichten, die dem Menschen von Natur aus zukommen – unabhängig von positiven Gesetzen. Diese Rechte sind unveräußerlich und gelten immer. Beispiel: Das Verbot der Sklaverei gilt auch dort, wo kein Gesetz sie verbietet – weil es dem natürlichen Recht widerspricht.","sem":"Staatsphilosophie","fw_id":null},{"term":"Positives Recht","definition":"Das von Menschen gesetzte, tatsächlich geltende Recht in einem Staat. Es gilt, weil es gesetzt wurde – unabhängig davon, ob es moralisch gerecht ist. Rechtspositivismus: Recht ist Recht, weil es Recht ist – nicht weil es gut ist.","sem":"Staatsphilosophie","fw_id":null},{"term":"Radbruchsche Formel","definition":"Wenn positives Recht so unerträglich ungerecht ist, dass es die Menschenwürde verletzt, verliert es seine Verbindlichkeit. Beispiel: Grundlage für die Nürnberger Prozesse – Nazi-Täter konnten sich nicht auf „Ich habe nur Befehle befolgt\" berufen.","sem":"Staatsphilosophie","fw_id":"naturrecht_fw"},{"term":"Menschenrechte","definition":"Unveräußerliche Rechte, die jedem Menschen allein aufgrund seines Menschseins zustehen – unabhängig von Nationalität, Herkunft oder Geschlecht. Sie sind universell, unteilbar und unübertragbar. Beispiel: Recht auf Leben, Freiheit, Sicherheit, Verbot von Folter – diese gelten für jeden Menschen auf der Welt.","sem":"Staatsphilosophie","fw_id":null},{"term":"Ziviler Ungehorsam","definition":"Die bewusste, öffentliche, gewaltfreie Verletzung von Gesetzen, um auf eine als ungerecht empfundene Ordnung aufmerksam zu machen. Ziel: Veränderung der Politik, nicht Zerstörung des Staates. Beispiel: Mahatma Gandhi, Rosa Parks, Klimaaktivisten, die Straßen blockieren.","sem":"Staatsphilosophie","fw_id":null},{"term":"Widerstandsrecht","definition":"Das Recht der Bürger, sich gegen eine tyrannische Herrschaft zur Wehr zu setzen – auch mit Gewalt, wenn alle anderen Mittel versagen. Locke: Wenn der Staat Naturrechte systematisch verletzt, verliert er seine Legitimität.","sem":"Staatsphilosophie","fw_id":null},{"term":"Soziale Gerechtigkeit","definition":"Wie sollen Güter, Chancen und Rechte in einer Gesellschaft verteilt werden? Positionen: - Egalitarismus: gleiche Verteilung für alle - Liberalismus (Nozick): der Markt entscheidet - Liberaler Egalitarismus (Rawls): Ungleichheiten nur erlaubt, wenn sie den Schwächsten nützen","sem":"Staatsphilosophie","fw_id":null},{"term":"Anthropologie (philosophisch)","definition":"Die philosophische Anthropologie fragt: Was ist der Mensch? Was unterscheidet ihn von Tieren und Maschinen? Hat er ein Wesen? Sie untersucht Freiheit, Sprache, Vernunft, Sozialität und Sinn des Lebens.","sem":"Anthropologie","fw_id":null},{"term":"Essentialismus","definition":"Der Mensch hat ein unveränderliches Wesen (essentia), das seine Natur bestimmt – unabhängig davon, was er tut oder wie er lebt. Beispiel: „Der Mensch ist von Natur aus vernünftig\" oder „Der Mensch ist ein soziales Wesen\" – das sind essentialistische Aussagen.","sem":"Anthropologie","fw_id":null},{"term":"Existentialismus (Sartre)","definition":"Die Existenz geht der Essenz voraus: Der Mensch hat kein vorgegebenes Wesen. Er wirft sich selbst in die Welt und erschafft sich durch seine Entscheidungen. „Der Mensch ist dazu verurteilt, frei zu sein.\" (Sartre) Beispiel: Ein Stuhl hat zuerst eine Idee (Zweck), dann existiert er. Beim Menschen ist es umgekehrt: Zuerst existiert er, dann erschafft er sich selbst.","sem":"Anthropologie","fw_id":null},{"term":"Sozialer Konstruktivismus","definition":"Was als „Menschennatur\" gilt, ist nicht naturgegeben, sondern sozial und kulturell konstruiert. Geschlecht, Identität – das sind soziale Konstruktionen, keine naturgegebenen Tatsachen. Beispiel: „Man kommt nicht als Frau zur Welt, man wird es.\" (Simone de Beauvoir)","sem":"Anthropologie","fw_id":null},{"term":"Freiheit","definition":"Die Fähigkeit, selbst zu entscheiden und zu handeln, ohne von außen bestimmt zu werden. Freiheit ist Voraussetzung für Moral, Verantwortung und menschliche Würde. Drei Hauptpositionen: Determinismus, Libertarismus, Kompatibilismus.","sem":"Anthropologie","fw_id":null},{"term":"Negative Freiheit","definition":"„Freiheit von...\" – die Abwesenheit von Hindernissen, Zwang und Einschränkungen. Niemand hindert mich daran, X zu tun. Beispiel: Pressefreiheit = keine staatliche Zensur. Meinungsfreiheit = man darf seine Meinung sagen, ohne Strafe zu fürchten.","sem":"Anthropologie","fw_id":null},{"term":"Positive Freiheit","definition":"„Freiheit zu...\" – die tatsächliche Fähigkeit, etwas zu tun, die eigenen Ziele zu verfolgen und das Leben selbst zu gestalten. Positive Freiheit setzt Mittel voraus, nicht nur Abwesenheit von Hindernissen. Beispiel: Ich bin frei, Geige zu lernen (kein Verbot) – aber ohne Instrument, Lehrer und Zeit fehlt mir die positive Freiheit dazu.","sem":"Anthropologie","fw_id":null},{"term":"Willensfreiheit","definition":"Die innere Freiheit: die Fähigkeit, zwischen Alternativen zu wählen und den eigenen Willen zu bestimmen – ohne vollständig durch externe Faktoren determiniert zu sein.","sem":"Anthropologie","fw_id":null},{"term":"Handlungsfreiheit","definition":"Die äußere Freiheit: die Fähigkeit, einen gefassten Willen auch tatsächlich in Handlungen umzusetzen, ohne äußere Hindernisse.","sem":"Anthropologie","fw_id":null},{"term":"Determinismus","definition":"Alle Ereignisse – auch menschliche Handlungen – sind durch Naturgesetze und Anfangsbedingungen vollständig vorherbestimmt. Es gibt keine echte Wahlmöglichkeit. Folge: Willensfreiheit ist eine Illusion. Moralische Verantwortung wird problematisch. Beispiel: Laplace'scher Dämon – ein Wesen, das alle Naturgesetze kennt, könnte jede zukünftige Handlung berechnen.","sem":"Anthropologie","fw_id":null},{"term":"Libertarismus (Freiheitsdebatte)","definition":"Der Mensch hat echten freien Willen: Unter gleichen Bedingungen hätte er auch anders handeln können. Der Determinismus ist falsch – menschliche Entscheidungen sind nicht vollständig kausal vorherbestimmt.","sem":"Anthropologie","fw_id":null},{"term":"Kompatibilismus","definition":"Freiheit und Determinismus schließen sich nicht aus: Frei handeln bedeutet, gemäß den eigenen Wünschen und Gründen zu handeln – ohne äußeren Zwang. Selbst wenn alles kausal bestimmt ist, können Handlungen trotzdem frei sein. Beispiel: Du wählst Schokoladeneis, weil du es magst – das ist frei, auch wenn die Entscheidung kausal erklärbar ist.","sem":"Anthropologie","fw_id":null},{"term":"Sinn des Lebens","definition":"Vier Hauptantworten: 1. Existentialismus (Sartre): Wir erschaffen unseren eigenen Sinn durch Entscheidungen. 2. Nihilismus (Nietzsche): Das Leben hat keinen objektiven Sinn. 3. Eudämonismus (Aristoteles): Sinn liegt im Streben nach Glück und Entfaltung. 4. Absurdismus (Camus): Das Leben ist sinnlos – aber wir müssen uns dennoch dagegen auflehnen (Revolte).","sem":"Anthropologie","fw_id":null},{"term":"Absurdismus (Albert Camus)","definition":"Das Leben ist sinnlos (absurd) – aber statt sich dem Nihilismus oder der Religion zu ergeben, soll man sich dem Absurden widersetzen und trotzdem leben. Die Spannung zwischen dem menschlichen Verlangen nach Sinn und der schweigenden Welt ist das Absurde. Beispiel: „Man muss sich Sisyphus als einen glücklichen Menschen vorstellen.\" (Camus) – er akzeptiert das Absurde und trotzt ihm.","sem":"Anthropologie","fw_id":null},{"term":"Nihilismus","definition":"Das Leben hat keinen objektiven, vorgegebenen Sinn. Es gibt keine unveränderlichen Werte oder Wahrheiten. Nietzsche: „Gott ist tot\" – mit dem Verlust des religiösen Weltbildes verlieren traditionelle Werte ihre Grundlage.","sem":"Anthropologie","fw_id":null},{"term":"Entfremdung (Marx)","definition":"Im kapitalistischen Produktionssystem wird der Arbeiter vom Ergebnis seiner Arbeit, vom Arbeitsprozess, von anderen Menschen und von sich selbst entfremdet. Arbeit sollte Selbstverwirklichung sein – im Kapitalismus wird sie zu bloßer Ware. Beispiel: Der Fabrikarbeiter sieht das fertige Produkt nie, entscheidet nichts, wiederholt dieselben Griffe – er ist entfremdet von seiner eigenen Tätigkeit.","sem":"Anthropologie","fw_id":"sozgerech_fw"},{"term":"Technologie und Menschlichkeit","definition":"Macht Technologie den Menschen mehr zu dem, was er ist (Werkzeugmacher, homo faber) – oder bedroht sie das Menschliche? Transhumanismus: Technologie soll den Menschen verbessern und seine Grenzen überwinden. Kritik: Verlust von Autonomie, Würde und menschlicher Verbundenheit. Beispiel: KI, autonome Waffensysteme, genetische Manipulation – wo ist die Grenze des Menschlichen? Ende des Dokuments","sem":"Anthropologie","fw_id":null}];

};
let sq="",fil="Alle";

function tcard(b){
  const s=SC[b.sem]||{bg:"#eee",text:"#555"};
  return `<div class="tc" id="t_${b.term.replace(/[^a-zA-ZäöüÄÖÜß]/g,'_')}">
    <div class="tsem" style="color:${s.text}">${b.sem}</div>
    <div class="tname">${b.term}</div>
    <div class="tdef">${b.definition}</div>
  </div>`;
}

function render(){
  const q=sq.toLowerCase();
  let vis=BG.filter(b=>{
    if(fil!=="Alle"&&b.sem!==fil)return false;
    if(!q)return true;
    return (b.term+b.definition).toLowerCase().includes(q);
  });
  const el=document.getElementById('bg-list');
  if(!vis.length){el.innerHTML='<div class="no-r">Keine Begriffe gefunden.</div>';return;}
  if(q||fil!=="Alle"){
    // Flat list when filtering
    el.innerHTML=vis.map(b=>tcard(b)).join('');
    return;
  }
  // Alphabetical grouping
  const ltrs={};
  vis.forEach(b=>{const l=b.term[0].toUpperCase();if(!ltrs[l])ltrs[l]=[];ltrs[l].push(b);});
  const all='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const an=all.map(l=>`<div class="ab ${ltrs[l]?'has':''}" onclick="${ltrs[l]?`scr('${l}')`:''}">${l}</div>`).join('');
  let h=`<div class="alpha-nav">${an}</div>`;
  Object.keys(ltrs).sort().forEach(l=>{
    h+=`<div class="alpha-sec" id="l_${l}"><div class="alpha-ltr">${l}</div>${ltrs[l].map(b=>tcard(b)).join('')}</div>`;
  });
  el.innerHTML=h;
  const urlT=decodeURIComponent(new URLSearchParams(window.location.search).get('term')||'');
  if(urlT){const e=document.getElementById('t_'+urlT.replace(/[^a-zA-ZäöüÄÖÜß]/g,'_'));
