<script>
const BG=[{"term":"Erkenntnistheorie (Epistemologie)","definition":"Die Erkenntnistheorie fragt: Was können wir überhaupt wissen –\nund wie können wir es begründen?\nSie untersucht die Quellen, Grenzen und Bedingungen menschlichen\nWissens.\nBeispiel: Weißt du wirklich, dass du gerade diesen Text liest –\noder könntest du träumen?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Wissen","definition":"Wissen ist mehr als ein starkes Gefühl. Es setzt drei Dinge\nvoraus: Die Aussage muss wahr sein, du musst sie für wahr halten\nund du musst sie begründen können.\nStarker Glaube allein reicht nicht.\nBeispiel: Aristoteles glaubte, Männer hätten mehr Zähne als\nFrauen – er hat einfach nicht nachgezählt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Meinung (doxa)","definition":"Eine Meinung ist eine subjektive Überzeugung ohne gesicherte\nBegründung. Sie kann richtig sein – muss es aber nicht.\nFür eine Meinung kann man keinen allgemeinen Wahrheitsanspruch\nerheben.\nBeispiel: „Dieser Film ist der beste aller Zeiten.\" – Das ist\neine Meinung, keine Tatsache.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Glaube (belief / faith)","definition":"Glaube ist eine tiefere, langfristige Überzeugung – stärker als\nMeinung, aber noch kein Wissen.\nFür ihren Glauben waren Menschen bereit zu sterben. Auch der\nstärkste Glaube garantiert keine Wahrheit.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Wahrheit","definition":"Eine Aussage ist wahr, wenn sie mit der Wirklichkeit\nübereinstimmt. Wahrheit ist der Maßstab, an dem Erkenntnis\ngemessen wird.\nBeispiel: „Der Eiffelturm steht in Paris\" ist wahr, weil es\ntatsächlich so ist.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Zweifel","definition":"Zweifel bedeutet, Überzeugungen aktiv in Frage zu stellen. In\nder Philosophie ist Zweifel kein Zeichen von Schwäche, sondern\noft der Anfang echter Erkenntnis.\nBeispiel: Descartes zweifelt an allem – um herauszufinden, was\nwirklich sicher ist.","sem":"Erkenntnistheorie","fw_id":null},{"term":"A priori / A posteriori","definition":"A priori = vor aller Erfahrung gültig, unabhängig von\nBeobachtung.\nA posteriori = durch Erfahrung gewonnen, abhängig von\nBeobachtung.\nBeispiel a priori: 2+2=4 – gilt, ohne je überprüft worden zu\nsein.\nBeispiel a posteriori: „Es regnet draußen\" – weiß ich nur, wenn\nich nachgeschaut habe.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Induktion","definition":"Vom Einzelnen zum Allgemeinen schließen. Aus vielen\nBeobachtungen wird ein allgemeines Gesetz abgeleitet.\nProblem (Hume): Das ist nie vollständig sicher – die Zukunft\nkönnte immer anders sein als die Vergangenheit.\nBeispiel: „Alle Schwäne, die ich je gesehen habe, sind weiß –\nalso sind alle Schwäne weiß.\" Bis jemand Australien besucht.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Deduktion","definition":"Vom Allgemeinen zum Besonderen schließen. Aus einem Prinzip wird\nein konkreter Schluss gezogen.\nBeispiel: „Alle Menschen sind sterblich. Sokrates ist ein Mensch.\nAlso ist Sokrates sterblich.\"","sem":"Erkenntnistheorie","fw_id":null},{"term":"Skeptizismus","definition":"Der Skeptizismus bezweifelt grundsätzlich, ob sicheres Wissen\nmöglich ist. Statt Behauptungen aufzustellen, empfehlen\nSkeptiker, das Urteil zurückzuhalten.\nZiel ist nicht Resignation, sondern kritisches Denken.\nBeispiel: Ein Skeptiker fragt bei jeder Behauptung: Wie weißt du\ndas? Woher kommt diese Information?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Epoché (Urteilsenthaltung)","definition":"Die skeptische Empfehlung, kein endgültiges Urteil zu fällen,\nwenn man es nicht sicher wissen kann.\nBeispiel: „Ich weiß nicht genug, um das zu beurteilen\" – das ist\nEpoché, keine Feigheit.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ataraxie","definition":"Seelenruhe – der Zustand innerer Gelassenheit, den Skeptiker\nanstreben. Wer nicht ständig nach absoluter Gewissheit sucht,\nlebt ruhiger.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Traumargument","definition":"Du kannst nicht mit Sicherheit wissen, ob du gerade wach bist\noder träumst. Im Traum fühlt sich alles genauso real an wie im\nWachzustand.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Rationalismus","definition":"Wissen kommt aus der Vernunft, nicht aus den Sinnen. Die Sinne\ntäuschen uns – der Verstand kann zu sicheren, notwendigen\nWahrheiten gelangen.\nBeispiel: Mathematische Wahrheiten wie 2+2=4 gelten unabhängig\nvon sinnlicher Erfahrung.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Methodischer Zweifel","definition":"Descartes' Methode: Man zweifelt systematisch an allem, um eine\nunerschütterliche Wahrheit zu finden. Kein echter Zweifel,\nsondern ein Denkwerkzeug – Skepsis als Mittel, nicht als Ziel.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Böser Dämon (malin génie)","definition":"Was, wenn ein mächtiger Dämon uns in allem täuscht – sogar in\nMathematik und einfachsten Sinneswahrnehmungen?\nZweck: Herausfinden, ob es etwas gibt, das selbst ein Täuscher\nnicht erschüttern kann.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Cogito ergo sum","definition":"„Ich denke, also bin ich.\" – Descartes' berühmtester Satz.\nSelbst wenn alles andere unsicher ist: Das Denken selbst beweist,\ndass man existiert. Denn um getäuscht zu werden, muss man denken\n– und wer denkt, existiert.\nBeispiel: Du kannst daran zweifeln, ob dein Stuhl real ist. Aber\nnicht daran, dass du gerade zweifelst.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Angeborene Ideen","definition":"Ideen, die nicht aus der Erfahrung stammen, sondern von Geburt an\nim Geist vorhanden sind.\nDescartes: Ideen wie Gott oder Unendlichkeit müssen angeboren\nsein – wir könnten sie nie sinnlich erfahren.\nLocke widerspricht: Wären sie angeboren, müssten Kleinkinder sie\nschon kennen.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Dualismus","definition":"Zwei grundlegende, voneinander unabhängige Wirklichkeiten:\nres extensa (ausgedehnte, materielle Substanz – Körper) und\nres cogitans (denkende, immaterielle Substanz – Geist).\nProblem: Wie interagieren sie miteinander?","sem":"Erkenntnistheorie","fw_id":null},{"term":"Solipsismus","definition":"Nur ich selbst existiere sicher. Alles andere – andere Menschen,\ndie Außenwelt – könnte nur eine Vorstellung in meinem Bewusstsein\nsein.\nProblem: Diese Position kann man nicht sinnvoll mit anderen\ndiskutieren – sie ist selbstwiderlegend.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Empirismus","definition":"Alles Wissen kommt aus der Erfahrung. Der Geist ist zu Beginn\nleer – erst durch Sinneseindrücke entsteht Wissen.\nVertreter: John Locke, David Hume.\nBeispiel: Ein Kind kennt keine Farben, Töne oder Formen – all\ndas wird durch Erfahrung gelernt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Tabula rasa","definition":"„Unbeschriebenes Blatt\" – Lockes Bild für den menschlichen Geist\nbei der Geburt. Kein Vorwissen, keine angeborenen Ideen. Alles\nschreiben Erfahrungen auf dieses Blatt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kausalität","definition":"Die Überzeugung, dass jedes Ereignis eine Ursache hat.\nHume: Wir beobachten nur, dass Dinge aufeinander folgen – nicht\ndass sie notwendig zusammenhängen. Der Glaube an Kausalität ist\neine Gewohnheit, kein bewiesenes Naturgesetz.\nBeispiel: Wir sehen immer: Feuer brennt, Wärme entsteht. Aber\nwir sehen die Notwendigkeit dieses Zusammenhangs nicht.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kritizismus (Kant)","definition":"Kant verbindet Empirismus und Rationalismus: Erkenntnis beginnt\nmit Erfahrung, aber entsteht nicht allein aus ihr. Der Verstand\nbringt eigene Strukturen mit, die Erfahrung erst ermöglichen.\nBeispiel: „Anschauungen ohne Begriffe sind blind, Begriffe ohne\nAnschauungen sind leer.\" (Kant)","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kategorien des Verstandes","definition":"Angeborene Denkstrukturen des Verstandes, z.B. Kausalität,\nSubstanz, Möglichkeit. Sie ordnen die rohen Sinneseindrücke zu\neiner erkennbaren Welt – ohne sie gäbe es keine Naturgesetze,\nkeine Wissenschaft.\nBeispiel: Kategorien sind wie das Betriebssystem des Geistes –\ndie Sinne liefern die Daten, der Verstand verarbeitet sie.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Erscheinung / Ding an sich","definition":"Wir erkennen die Welt immer so, wie sie uns erscheint – gefiltert\ndurch Sinne und Denkstrukturen.\nWie die Welt „an sich\" wirklich ist, können wir nie wissen.\nBeispiel: Wir sehen die Welt immer durch eine Brille, die wir nie\nabnehmen können.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Synthetische Urteile a priori","definition":"Aussagen, die gleichzeitig notwendig wahr (a priori) und\nerkenntniserweiternd (synthetisch) sind. Für Kant die Grundlage\naller Wissenschaft.\nBeispiel: „Alles, was geschieht, hat eine Ursache\" – gilt\nnotwendig, obwohl wir es nicht aus der Erfahrung ableiten können.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ideenlehre (Platon)","definition":"Hinter den sinnlichen Dingen existiert eine höhere Welt\nunveränderlicher Ideen. Nur diese sind wirklich real. Sinnliche\nDinge sind bloß unvollkommene Abbilder.\nBeispiel: Es gibt viele schöne Dinge – aber die Idee des Schönen\nselbst ist ewig und unveränderlich.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Doxa vs. Episteme","definition":"Doxa = bloße Meinung, basiert auf wechselnden Sinneswahrneh-\nmungen – unsicher und subjektiv.\nEpisteme = echtes Wissen, basiert auf der Erkenntnis der Ideen\ndurch Vernunft – sicher und allgemeingültig.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Anamnesis","definition":"Erkenntnis ist Wiedererinnerung. Die Seele hat vor der Geburt die\nIdeen gesehen – Lernen bedeutet, sich daran zu erinnern.\nSinneseindrücke sind nur Auslöser, nicht Quelle von Wissen.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Höhlengleichnis","definition":"Menschen in einer Höhle sehen nur Schatten an der Wand und\nhalten sie für die Wirklichkeit. Einer befreit sich, sieht das\nSonnenlicht (= die Ideen) und kehrt zurück – aber niemand glaubt\nihm.\nBotschaft: Die meisten leben in Illusionen. Wahre Erkenntnis ist\nanstrengend und wird oft abgelehnt.\nBeispiel: Algorithmen und soziale Medien könnten moderne Höhlen\nsein – wir sehen nur, was uns gezeigt wird.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Falsifikation","definition":"Eine Theorie ist nur dann wissenschaftlich, wenn man sich eine\nBeobachtung vorstellen kann, die sie widerlegt.\nNicht Bestätigung, sondern Widerlegbarkeit ist das entscheidende\nKriterium.\nBeispiel: „Alle Schwäne sind weiß.\" – Ein schwarzer Schwan würde\ndie Theorie widerlegen.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Bewährung","definition":"Theorien können viele Tests bestehen und sich bewähren, sind aber\nnie endgültig wahr.\nBewährung bedeutet vorläufige Geltung, keine absolute Sicherheit.\nBeispiel: Die Newtonsche Physik war lange bewährt – wurde aber\ndurch Einsteins Relativitätstheorie ergänzt und teilweise\nkorrigiert.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Theoriegetränktheit der Beobachtung","definition":"Beobachtungen sind nie neutral. Wir sehen die Welt immer im Licht\nvon Vorwissen, Erwartungen und Theorien. Fakten entstehen nicht\nohne Interpretation.\nBeispiel: Ein Arzt und ein Laie schauen auf dasselbe Röntgenbild\nund sehen völlig Verschiedenes.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Kritischer Rationalismus (Popper)","definition":"Wissen entsteht durch Hypothesen, die kritisch geprüft und\nverworfen werden.\nFortschritt entsteht durch Fehlersuche, nicht durch Anhäufen von\nSicherheiten.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Paradigma (Kuhn)","definition":"Ein gemeinsamer Rahmen aus Grundannahmen, Methoden und Regeln,\nin dem eine wissenschaftliche Gemeinschaft arbeitet. Das Paradigma\nbestimmt, welche Fragen überhaupt sinnvoll sind.\nBeispiel: Das geozentrische Weltbild war jahrhundertelang das\ngültige Paradigma der Astronomie.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Normalwissenschaft (Kuhn)","definition":"Der Alltag der Wissenschaft: Forscher lösen Rätsel innerhalb des\nbestehenden Paradigmas. Das Paradigma selbst wird dabei nicht in\nFrage gestellt.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Paradigmenwechsel / Wissenschaftliche Revolution (Kuhn)","definition":"Wenn sich Beobachtungen häufen, die nicht ins Paradigma passen\n(Anomalien), kommt es zur Krise und schließlich zur Revolution:\nDas alte Paradigma wird durch ein neues ersetzt.\nBeispiel: Von Ptolemäus (Erde im Mittelpunkt) zu Kopernikus\n(Sonne im Mittelpunkt) – eine wissenschaftliche Revolution.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Inkommensurabilität (Kuhn)","definition":"Alte und neue Paradigmen sind nicht direkt vergleichbar – sie\nsprechen verschiedene Sprachen und stellen andere Fragen. Ein\nrein logischer Vergleich ist kaum möglich.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Methodenpluralismus / „Anything goes\" (Feyerabend)","definition":"Es gibt keine einheitliche, allgemeingültige Methode für\nWissenschaft. Großer Fortschritt entstand oft durch Regelbrüche\nund unorthodoxes Denken.\n„Anything goes\" bedeutet: Keine Methode darf absolut gesetzt\nwerden.\nBeispiel: Galilei hielt sich nicht an die sauberen Regeln seiner\nZeit – und hatte trotzdem recht.","sem":"Erkenntnistheorie","fw_id":null},{"term":"Ethik","definition":"Ethik ist die philosophische Disziplin, die nach dem richtigen\nHandeln fragt. Sie untersucht, was gut und böse ist, welche Werte\nwir haben sollen und wie wir unser Leben führen sollen.\nZentrale Fragen: Was soll ich tun? Was ist moralisch richtig?","sem":"Ethik","fw_id":null},{"term":"Moral","definition":"Moral bezeichnet die tatsächlich in einer Gesellschaft geltenden\nNormen, Werte und Verhaltensregeln.\nEthik reflektiert Moral kritisch: Moral ist das, was gemacht wird;\nEthik fragt, was gemacht werden sollte.","sem":"Ethik","fw_id":null},{"term":"Autonomie","definition":"Selbstgesetzgebung – die Fähigkeit, sich selbst moralische Regeln\nzu geben, statt sie nur von außen zu empfangen.\nFür Kant ist Autonomie das Kennzeichen vernünftiger Wesen und\nGrundlage der Menschenwürde.\nBeispiel: Wer aus eigenem Nachdenken heraus hilft, handelt\nautonom. Wer nur hilft, weil die Lehrerin zuschaut, handelt\nheteronom.","sem":"Ethik","fw_id":null},{"term":"Menschenwürde","definition":"Jeder Mensch hat einen absoluten, unveräußerlichen Wert allein\ndadurch, dass er ein vernünftiges, freies Wesen ist.\nMenschenwürde darf niemals verletzt oder instrumentalisiert\nwerden.\nBeispiel: Folter ist auch dann verboten, wenn sie nützliche\nInformationen liefern könnte – die Würde des Menschen ist\nunantastbar.","sem":"Ethik","fw_id":null},{"term":"Verantwortung","definition":"Wer handelt, muss für die Folgen seines Handelns einstehen.\nVerantwortung setzt Freiheit voraus: Nur wer anders hätte handeln\nkönnen, kann verantwortlich gemacht werden.","sem":"Ethik","fw_id":null},{"term":"Gewissen","definition":"Das innere Urteilsvermögen, das sagt, ob eine Handlung richtig\noder falsch ist. Es ist die „innere Stimme\", die uns bei\nmoralischen Entscheidungen leitet – und nach einer schlechten Tat\nquält.","sem":"Ethik","fw_id":null},{"term":"Tugendethik","definition":"Nicht „Was soll ich tun?\", sondern „Was für ein Mensch soll ich\nsein?\" ist die zentrale Frage.\nTugenden sind Charaktereigenschaften wie Mut, Gerechtigkeit,\nKlugheit – sie entstehen durch Übung und Gewohnheit.","sem":"Ethik","fw_id":null},{"term":"Eudaimonia (Aristoteles)","definition":"Glück oder Gedeihen im Sinne eines gelingenden, erfüllten Lebens.\nNicht bloß Freude, sondern das Beste aus den eigenen Fähigkeiten\nherausholen.\nEudaimonia ist das höchste Ziel menschlichen Handelns.\nBeispiel: Eudaimonia ist kein Gefühl, sondern eine Lebensform:\naktiv, vernünftig, in Gemeinschaft – wie ein Sportler, der sein\nPotenzial voll ausschöpft.","sem":"Ethik","fw_id":null},{"term":"Mesotes / Goldene Mitte (Aristoteles)","definition":"Tugend liegt in der Mitte zwischen zwei Extremen (Lastern). Die\nrichtige Mitte ist nicht für alle gleich, sondern situations-\nabhängig.\nBeispiel: Mut liegt zwischen Feigheit (zu wenig) und Leichtsinn\n(zu viel Risikobereitschaft).","sem":"Ethik","fw_id":null},{"term":"Zoon politikon (Aristoteles)","definition":"Der Mensch ist von Natur aus ein soziales/politisches Wesen.\nEin gutes Leben ist nur innerhalb einer Gemeinschaft möglich.\nEin Mensch außerhalb der Gemeinschaft wäre entweder ein Gott\noder ein Tier.","sem":"Ethik","fw_id":null},{"term":"Hedonismus (Epikur)","definition":"Das höchste Gut ist die Lust (Hedone) und die Abwesenheit von\nSchmerz (Aponie) und Seelenunruhe (Ataraxie).\nEpikur meint damit aber nicht exzessive Freuden, sondern stille\nZufriedenheit, Freundschaft und Weisheit.\nBeispiel: „Wenn wir sagen, dass Lust das Ziel ist, meinen wir\nnicht die Lüste der Schwelger.\" (Epikur)","sem":"Ethik","fw_id":null},{"term":"Stoa / Stoizismus","definition":"Das gute Leben besteht nicht im Genuss, sondern in der Tugend\nund der Beherrschung der eigenen Reaktionen auf die Welt.\nZentrale Unterscheidung: Was liegt in unserer Macht (Urteile,\nReaktionen) vs. was nicht (Körper, Besitz, Ruf).\nWir können nicht immer bestimmen, was geschieht – aber immer,\nwie wir darauf reagieren.\nBeispiel: Du verlierst dein Handy – das liegt nicht in deiner\nMacht. Aber ob du dich davon ruinieren lässt, liegt in deiner\nMacht.","sem":"Ethik","fw_id":null},{"term":"Utilitarismus","definition":"Der moralische Wert einer Handlung hängt von ihren Folgen ab:\nEine Handlung ist gut, wenn sie das größte Glück für die größte\nZahl erzeugt.\nMoral ist keine Frage von Pflichten oder Absichten, sondern von\nErgebnissen.\nBeispiel: Soll man 1 Person töten, um 5 zu retten? Der\nUtilitarismus sagt: Ja – wenn die Gesamtbilanz besser ist.","sem":"Ethik","fw_id":null},{"term":"Konsequentialismus","definition":"Handlungen werden ausschließlich nach ihren Konsequenzen (Folgen)\nbeurteilt. Motive, Absichten oder Regeln spielen keine eigen-\nständige Rolle.","sem":"Ethik","fw_id":null},{"term":"Hedonistisches Prinzip / Hedone-Kalkül (Bentham)","definition":"Lust ist das einzige Gut, Schmerz das einzige Übel. Alle Lüste\nsind gleich wertvoll – nur Menge und Intensität zählen.\nBentham erfand das Hedone-Kalkül: Lüste können berechnet und\nverglichen werden.\nBeispiel: Eine Stunde Videospiele = eine Stunde Literatur, wenn\ndie Lustmenge gleich ist. Mill kritisierte das später als zu\nsimpel.","sem":"Ethik","fw_id":null},{"term":"Qualitativer Utilitarismus (Mill)","definition":"Nicht alle Lüste sind gleich – geistige Freuden sind wertvoller\nals körperliche. Qualität, nicht nur Quantität der Lust zählt.\nBeispiel: „Besser ein unzufriedener Sokrates als ein zufriedenes\nSchwein.\" (Mill)","sem":"Ethik","fw_id":null},{"term":"Präferenzutilitarismus (Singer)","definition":"Nicht Lust/Schmerz, sondern die Erfüllung von Interessen und\nPräferenzen bestimmt den moralischen Wert einer Handlung.\nAlle leidensfähigen Wesen – auch Tiere – müssen gleich\nberücksichtigt werden.","sem":"Ethik","fw_id":null},{"term":"Speziesismus (Singer)","definition":"Die ungerechtfertigte Bevorzugung der eigenen Spezies. Es gibt\nkeinen moralisch akzeptablen Grund, Tierleid weniger ernst zu\nnehmen als vergleichbares menschliches Leid.\nBeispiel: Massentierhaltung wäre Speziesismus – das Leid der\nTiere wird ignoriert, nur weil sie keine Menschen sind.","sem":"Ethik","fw_id":null},{"term":"Deontologie / Pflichtethik","definition":"Handlungen werden nicht nach ihren Folgen, sondern nach dem\nihnen zugrundeliegenden Prinzip beurteilt.\nEine Handlung ist gut, wenn sie aus Pflicht und nach einem\nmoralisch richtigen Grundsatz (Maxime) geschieht.","sem":"Ethik","fw_id":null},{"term":"Guter Wille (Kant)","definition":"Der gute Wille ist das einzige, was uneingeschränkt gut ist.\nAlles andere – Mut, Intelligenz, Reichtum – kann missbraucht\nwerden.\nEin Wille ist gut, wenn er aus Pflicht handelt, nicht aus\nNeigung oder Eigennutz.\nBeispiel: Wer hilft, weil er Mitleid hat, handelt aus Neigung.\nWer hilft, weil es seine Pflicht ist – auch ohne Lust dazu –\nhandelt aus Pflicht. Kant bevorzugt Letzteres.","sem":"Ethik","fw_id":null},{"term":"Kategorischer Imperativ","definition":"Das zentrale Moralprinzip Kants:\n„Handle nur nach derjenigen Maxime, durch die du zugleich wollen\nkannst, dass sie ein allgemeines Gesetz werde.\"\nTest: Kann ich wollen, dass alle so handeln? Wenn nein –\nunmoralisch.\nBeispiel: „Ich lüge, wenn es mir nützt.\" – Könntest du das als\nallgemeines Gesetz wollen? Nein – dann würde niemand mehr glauben,\nwas jemand sagt. Also ist Lügen unmoralisch.","sem":"Ethik","fw_id":null},{"term":"Maxime","definition":"Der persönliche Grundsatz, nach dem jemand handelt. Kant prüft\nMaximen durch den kategorischen Imperativ: Kann ich wollen, dass\nalle nach dieser Maxime handeln?\nBeispiel: Maxime: „Ich helfe anderen, wenn ich Zeit habe.\" –\nPrüfen: Könnte ich wollen, dass alle so handeln? Ja – das wäre\nuniversalisierbar.","sem":"Ethik","fw_id":null},{"term":"Mensch als Zweck (2. Formulierung des kategorischen Imperativs)","definition":"„Handle so, dass du die Menschheit, sowohl in deiner Person als\nauch in der Person jedes anderen, jederzeit als Zweck, niemals\nbloß als Mittel brauchst.\"\nMenschen dürfen niemals bloß instrumentalisiert werden.\nBeispiel: Jemanden anzulügen, um ihn zu manipulieren, behandelt\nihn als bloßes Mittel – nicht als Zweck an sich.","sem":"Ethik","fw_id":null},{"term":"Pflicht vs. Neigung (Kant)","definition":"Moralisch handeln heißt aus Pflicht handeln, nicht weil man Lust\ndazu hat oder sich dadurch etwas erhofft.\nNur das Handeln aus Pflicht hat moralischen Wert.","sem":"Ethik","fw_id":null},{"term":"Ethischer Relativismus","definition":"Moralische Werte sind relativ – abhängig von Kultur, Zeit oder\nPerson. Es gibt keine universellen moralischen Wahrheiten.\nProblem: Dann kann man keine kulturellen Praktiken wie Sklaverei\noder Folter grundsätzlich verurteilen.","sem":"Ethik","fw_id":null},{"term":"Ethischer Universalismus","definition":"Es gibt moralische Grundprinzipien, die für alle Menschen und\nKulturen gelten – unabhängig von Ort, Zeit und Tradition.\nBeispiel: Menschenrechte als universelle moralische Ansprüche.","sem":"Ethik","fw_id":null},{"term":"Verantwortungsethik (Hans Jonas)","definition":"In der technologischen Zivilisation brauchen wir eine neue Ethik:\n„Handle so, dass die Wirkungen deiner Handlungen mit der\nPermanenz menschlichen Lebens auf Erden vereinbar sind.\"\nVerantwortung gilt nicht nur für die Gegenwart, sondern auch für\nzukünftige Generationen.\nBeispiel: Klimaschutz – wir haben eine Verantwortung gegenüber\nMenschen, die noch nicht geboren sind.","sem":"Ethik","fw_id":null},{"term":"Staat","definition":"Eine politische Gemeinschaft mit einer anerkannten Regierung,\neinem Gebiet und einem Gewaltmonopol. Der Staat setzt Recht durch\nund sorgt für Frieden und Ordnung.\nZentrale Frage: Warum brauchen wir überhaupt einen Staat?","sem":"Staatsphilosophie","fw_id":null},{"term":"Legitimität","definition":"Die moralische Berechtigung einer Herrschaft oder Ordnung.\nLegitim ist, was als gerecht und rechtmäßig anerkannt wird –\nnicht nur, was legal (gesetzlich) ist.\nBeispiel: Ein Gesetz kann legal, aber nicht legitim sein – z.B.\nGesetze in Unrechtsstaaten.","sem":"Staatsphilosophie","fw_id":null},{"term":"Legalität","definition":"Die Übereinstimmung mit geltendem Recht. Etwas ist legal, wenn es\nden Gesetzen entspricht – unabhängig davon, ob es moralisch\nrichtig ist.\nBeispiel: Ein rassistisches Gesetz war legal, aber nicht legitim.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gewaltmonopol","definition":"Nur der Staat darf Gewalt rechtmäßig ausüben (z.B. Polizei,\nMilitär). Kein Einzelner oder keine Gruppe darf Gewalt anwenden –\naußer im Rahmen staatlicher Befugnis.","sem":"Staatsphilosophie","fw_id":null},{"term":"Demokratie","definition":"Herrschaft des Volkes: Entscheidungen werden von allen Bürgern\n(direkte Demokratie) oder durch gewählte Vertreter\n(repräsentative Demokratie) getroffen.\nGrundelemente: freie Wahlen, Gewaltenteilung, Grundrechte,\nRechtsstaatlichkeit.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gewaltenteilung","definition":"Die Macht des Staates wird auf drei Gewalten aufgeteilt:\nLegislative (Parlament – macht Gesetze)\nExekutive (Regierung – führt Gesetze aus)\nJudikative (Gerichte – prüft Gesetze)\nSie kontrollieren sich gegenseitig.","sem":"Staatsphilosophie","fw_id":null},{"term":"Naturzustand","definition":"Ein Gedankenexperiment: Wie wäre das menschliche Leben ohne\nStaat und Gesetze?\nHobbes: Krieg aller gegen alle – brutal, kurz, elend.\nLocke: Mehr oder weniger friedlich, aber ohne verlässliche\nEigentumsrechte.\nRousseau: Ursprünglich gut und harmonisch – erst die Gesellschaft\nhat den Menschen verdorben.","sem":"Staatsphilosophie","fw_id":null},{"term":"Gesellschaftsvertrag","definition":"Menschen schließen einen (oft hypothetischen) Vertrag: Sie geben\neinen Teil ihrer Freiheit ab, dafür erhalten sie Schutz, Frieden\nund Recht. Dieser Vertrag begründet die Legitimität des Staates.\nBeispiel: Wenn du in einem Flugzeug landest, stimmst du still-\nschweigend den Sicherheitsregeln zu. Das ist eine Art sozialer\nVertrag.","sem":"Staatsphilosophie","fw_id":null},{"term":"Hobbes – Leviathan","definition":"Ohne starken Staat herrscht der „Krieg aller gegen alle\" – das\nLeben wäre einsam, arm, hässlich, brutal und kurz.\nMenschen geben alle Rechte an einen absoluten Souverän ab – nur\ndas Recht auf Selbsterhaltung bleibt.\nNur ein starker Staat kann dauerhaften Frieden garantieren.\nBeispiel: „Der Mensch ist dem Menschen ein Wolf.\"\n(homo homini lupus – Hobbes)","sem":"Staatsphilosophie","fw_id":null},{"term":"Locke – Liberaler Staat","definition":"Der Mensch hat von Natur aus Rechte auf Leben, Freiheit und\nEigentum.\nDer Staat dient dem Schutz dieser Rechte – missbraucht er sie,\nhat das Volk das Recht zum Widerstand.\nGewaltenteilung und Einwilligung der Regierten sind\nGrundbedingungen legitimer Herrschaft.\nBeispiel: Lockes Ideen inspirierten die amerikanische\nUnabhängigkeitserklärung: „Life, Liberty and the pursuit of\nHappiness.\"","sem":"Staatsphilosophie","fw_id":null},{"term":"Rousseau – Gemeinwille (volonté générale)","definition":"Der Mensch ist von Natur aus gut – die Gesellschaft und das\nEigentum haben ihn verdorben.\nDer Gesellschaftsvertrag soll echte Freiheit sichern. Der\nGemeinwille repräsentiert das Gemeinwohl – nicht nur die Summe\nder Einzelinteressen.\nBeispiel: „Der Mensch ist frei geboren, und überall liegt er in\nKetten.\" (Rousseau)","sem":"Staatsphilosophie","fw_id":null},{"term":"Rawls – Schleier des Nichtwissens","definition":"Gerechte Prinzipien wählt man im „Urzustand\" hinter einem\n„Schleier des Nichtwissens\": Man weiß nicht, welche Position man\nin der Gesellschaft einnehmen wird.\nDaher würde jeder faire Grundregeln wählen – und Ungleichheiten\nnur akzeptieren, wenn sie den Ärmsten nützen.\nBeispiel: Wenn du nicht weißt, ob du reich oder arm geboren\nwirst – welche Gesellschaftsregeln würdest du wählen?","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als Herrschaftsinstrument (Machiavelli)","definition":"Macht ist ein Mittel zur Herrschaft, das der Fürst nach Belieben\neinsetzen kann. Er soll weder grausam noch schwach sein – er soll\nden Schein der Tugend wahren, auch wenn er sie nicht hat.\nZiel: Machterhalt, nicht Moral.","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als kollektives Handeln (Hannah Arendt)","definition":"Macht ist kein Besitz eines Einzelnen, sondern entsteht im\ngemeinsamen Handeln von Menschen. Sie beruht auf Zustimmung und\nZusammenarbeit, nicht auf Gewalt.\nGewalt und Macht sind Gegensätze: Wo Gewalt herrscht, hat Macht\naufgehört.\nBeispiel: Diktaturen sind mächtiger Schein – sobald die Menschen\naufhören mitzumachen, bricht die Herrschaft zusammen (z.B. DDR\n1989).","sem":"Staatsphilosophie","fw_id":null},{"term":"Macht als Durchsetzungsfähigkeit (Max Weber)","definition":"Macht ist die Chance, den eigenen Willen auch gegen den\nWiderstand anderer durchzusetzen.\nWeber unterscheidet drei Typen legitimer Herrschaft: traditionale,\ncharismatische und legale/rationale Herrschaft.","sem":"Staatsphilosophie","fw_id":null},{"term":"Naturrecht","definition":"Es gibt Rechte und Pflichten, die dem Menschen von Natur aus\nzukommen – unabhängig von positiven Gesetzen. Diese Rechte sind\nunveräußerlich und gelten immer.\nBeispiel: Das Verbot der Sklaverei gilt auch dort, wo kein Gesetz\nsie verbietet – weil es dem natürlichen Recht widerspricht.","sem":"Staatsphilosophie","fw_id":null},{"term":"Positives Recht","definition":"Das von Menschen gesetzte, tatsächlich geltende Recht in einem\nStaat. Es gilt, weil es gesetzt wurde – unabhängig davon, ob es\nmoralisch gerecht ist.\nRechtspositivismus: Recht ist Recht, weil es Recht ist – nicht\nweil es gut ist.","sem":"Staatsphilosophie","fw_id":null},{"term":"Radbruchsche Formel","definition":"Wenn positives Recht so unerträglich ungerecht ist, dass es die\nMenschenwürde verletzt, verliert es seine Verbindlichkeit.\nBeispiel: Grundlage für die Nürnberger Prozesse – Nazi-Täter\nkonnten sich nicht auf „Ich habe nur Befehle befolgt\" berufen.","sem":"Staatsphilosophie","fw_id":null},{"term":"Menschenrechte","definition":"Unveräußerliche Rechte, die jedem Menschen allein aufgrund seines\nMenschseins zustehen – unabhängig von Nationalität, Herkunft oder\nGeschlecht. Sie sind universell, unteilbar und unübertragbar.\nBeispiel: Recht auf Leben, Freiheit, Sicherheit, Verbot von\nFolter – diese gelten für jeden Menschen auf der Welt.","sem":"Staatsphilosophie","fw_id":null},{"term":"Ziviler Ungehorsam","definition":"Die bewusste, öffentliche, gewaltfreie Verletzung von Gesetzen,\num auf eine als ungerecht empfundene Ordnung aufmerksam zu\nmachen.\nZiel: Veränderung der Politik, nicht Zerstörung des Staates.\nBeispiel: Mahatma Gandhi, Rosa Parks, Klimaaktivisten, die\nStraßen blockieren.","sem":"Staatsphilosophie","fw_id":null},{"term":"Widerstandsrecht","definition":"Das Recht der Bürger, sich gegen eine tyrannische Herrschaft zur\nWehr zu setzen – auch mit Gewalt, wenn alle anderen Mittel\nversagen.\nLocke: Wenn der Staat Naturrechte systematisch verletzt, verliert\ner seine Legitimität.","sem":"Staatsphilosophie","fw_id":null},{"term":"Soziale Gerechtigkeit","definition":"Wie sollen Güter, Chancen und Rechte in einer Gesellschaft\nverteilt werden?\nPositionen:\n- Egalitarismus: gleiche Verteilung für alle\n- Liberalismus (Nozick): der Markt entscheidet\n- Liberaler Egalitarismus (Rawls): Ungleichheiten nur erlaubt,\nwenn sie den Schwächsten nützen","sem":"Staatsphilosophie","fw_id":null},{"term":"Anthropologie (philosophisch)","definition":"Die philosophische Anthropologie fragt: Was ist der Mensch? Was\nunterscheidet ihn von Tieren und Maschinen? Hat er ein Wesen?\nSie untersucht Freiheit, Sprache, Vernunft, Sozialität und Sinn\ndes Lebens.","sem":"Anthropologie","fw_id":null},{"term":"Essentialismus","definition":"Der Mensch hat ein unveränderliches Wesen (essentia), das seine\nNatur bestimmt – unabhängig davon, was er tut oder wie er lebt.\nBeispiel: „Der Mensch ist von Natur aus vernünftig\" oder „Der\nMensch ist ein soziales Wesen\" – das sind essentialistische\nAussagen.","sem":"Anthropologie","fw_id":null},{"term":"Existentialismus (Sartre)","definition":"Die Existenz geht der Essenz voraus: Der Mensch hat kein\nvorgegebenes Wesen. Er wirft sich selbst in die Welt und erschafft\nsich durch seine Entscheidungen.\n„Der Mensch ist dazu verurteilt, frei zu sein.\" (Sartre)\nBeispiel: Ein Stuhl hat zuerst eine Idee (Zweck), dann existiert\ner. Beim Menschen ist es umgekehrt: Zuerst existiert er, dann\nerschafft er sich selbst.","sem":"Anthropologie","fw_id":null},{"term":"Sozialer Konstruktivismus","definition":"Was als „Menschennatur\" gilt, ist nicht naturgegeben, sondern\nsozial und kulturell konstruiert. Geschlecht, Identität – das\nsind soziale Konstruktionen, keine naturgegebenen Tatsachen.\nBeispiel: „Man kommt nicht als Frau zur Welt, man wird es.\"\n(Simone de Beauvoir)","sem":"Anthropologie","fw_id":null},{"term":"Freiheit","definition":"Die Fähigkeit, selbst zu entscheiden und zu handeln, ohne von\naußen bestimmt zu werden.\nFreiheit ist Voraussetzung für Moral, Verantwortung und\nmenschliche Würde.\nDrei Hauptpositionen: Determinismus, Libertarismus,\nKompatibilismus.","sem":"Anthropologie","fw_id":null},{"term":"Negative Freiheit","definition":"„Freiheit von...\" – die Abwesenheit von Hindernissen, Zwang und\nEinschränkungen.\nNiemand hindert mich daran, X zu tun.\nBeispiel: Pressefreiheit = keine staatliche Zensur.\nMeinungsfreiheit = man darf seine Meinung sagen, ohne Strafe zu\nfürchten.","sem":"Anthropologie","fw_id":null},{"term":"Positive Freiheit","definition":"„Freiheit zu...\" – die tatsächliche Fähigkeit, etwas zu tun, die\neigenen Ziele zu verfolgen und das Leben selbst zu gestalten.\nPositive Freiheit setzt Mittel voraus, nicht nur Abwesenheit von\nHindernissen.\nBeispiel: Ich bin frei, Geige zu lernen (kein Verbot) – aber\nohne Instrument, Lehrer und Zeit fehlt mir die positive Freiheit\ndazu.","sem":"Anthropologie","fw_id":null},{"term":"Willensfreiheit","definition":"Die innere Freiheit: die Fähigkeit, zwischen Alternativen zu\nwählen und den eigenen Willen zu bestimmen – ohne vollständig\ndurch externe Faktoren determiniert zu sein.","sem":"Anthropologie","fw_id":null},{"term":"Handlungsfreiheit","definition":"Die äußere Freiheit: die Fähigkeit, einen gefassten Willen auch\ntatsächlich in Handlungen umzusetzen, ohne äußere Hindernisse.","sem":"Anthropologie","fw_id":null},{"term":"Determinismus","definition":"Alle Ereignisse – auch menschliche Handlungen – sind durch\nNaturgesetze und Anfangsbedingungen vollständig vorherbestimmt.\nEs gibt keine echte Wahlmöglichkeit.\nFolge: Willensfreiheit ist eine Illusion. Moralische Verantwortung\nwird problematisch.\nBeispiel: Laplace'scher Dämon – ein Wesen, das alle Naturgesetze\nkennt, könnte jede zukünftige Handlung berechnen.","sem":"Anthropologie","fw_id":null},{"term":"Libertarismus (Freiheitsdebatte)","definition":"Der Mensch hat echten freien Willen: Unter gleichen Bedingungen\nhätte er auch anders handeln können.\nDer Determinismus ist falsch – menschliche Entscheidungen sind\nnicht vollständig kausal vorherbestimmt.","sem":"Anthropologie","fw_id":null},{"term":"Kompatibilismus","definition":"Freiheit und Determinismus schließen sich nicht aus: Frei handeln\nbedeutet, gemäß den eigenen Wünschen und Gründen zu handeln –\nohne äußeren Zwang.\nSelbst wenn alles kausal bestimmt ist, können Handlungen trotzdem\nfrei sein.\nBeispiel: Du wählst Schokoladeneis, weil du es magst – das ist\nfrei, auch wenn die Entscheidung kausal erklärbar ist.","sem":"Anthropologie","fw_id":null},{"term":"Sinn des Lebens","definition":"Vier Hauptantworten:\n1. Existentialismus (Sartre): Wir erschaffen unseren eigenen Sinn\ndurch Entscheidungen.\n2. Nihilismus (Nietzsche): Das Leben hat keinen objektiven Sinn.\n3. Eudämonismus (Aristoteles): Sinn liegt im Streben nach Glück\nund Entfaltung.\n4. Absurdismus (Camus): Das Leben ist sinnlos – aber wir müssen\nuns dennoch dagegen auflehnen (Revolte).","sem":"Anthropologie","fw_id":null},{"term":"Absurdismus (Albert Camus)","definition":"Das Leben ist sinnlos (absurd) – aber statt sich dem Nihilismus\noder der Religion zu ergeben, soll man sich dem Absurden\nwidersetzen und trotzdem leben.\nDie Spannung zwischen dem menschlichen Verlangen nach Sinn und\nder schweigenden Welt ist das Absurde.\nBeispiel: „Man muss sich Sisyphus als einen glücklichen Menschen\nvorstellen.\" (Camus) – er akzeptiert das Absurde und trotzt ihm.","sem":"Anthropologie","fw_id":null},{"term":"Nihilismus","definition":"Das Leben hat keinen objektiven, vorgegebenen Sinn. Es gibt keine\nunveränderlichen Werte oder Wahrheiten.\nNietzsche: „Gott ist tot\" – mit dem Verlust des religiösen\nWeltbildes verlieren traditionelle Werte ihre Grundlage.","sem":"Anthropologie","fw_id":null},{"term":"Entfremdung (Marx)","definition":"Im kapitalistischen Produktionssystem wird der Arbeiter vom\nErgebnis seiner Arbeit, vom Arbeitsprozess, von anderen Menschen\nund von sich selbst entfremdet.\nArbeit sollte Selbstverwirklichung sein – im Kapitalismus wird sie\nzu bloßer Ware.\nBeispiel: Der Fabrikarbeiter sieht das fertige Produkt nie,\nentscheidet nichts, wiederholt dieselben Griffe – er ist\nentfremdet von seiner eigenen Tätigkeit.","sem":"Anthropologie","fw_id":null},{"term":"Technologie und Menschlichkeit","definition":"Macht Technologie den Menschen mehr zu dem, was er ist\n(Werkzeugmacher, homo faber) – oder bedroht sie das Menschliche?\nTranshumanismus: Technologie soll den Menschen verbessern und\nseine Grenzen überwinden.\nKritik: Verlust von Autonomie, Würde und menschlicher\nVerbundenheit.\nBeispiel: KI, autonome Waffensysteme, genetische Manipulation –\nwo ist die Grenze des Menschlichen?\n================================================================\nEnde des Dokuments\n================================================================","sem":"Anthropologie","fw_id":null}];
const SC={
  "Erkenntnistheorie":{"bg":"#D6E4F0","text":"#185FA5","bar":"#2E75B6"},
  "Ethik":            {"bg":"#E1F5EE","text":"#0F6E56","bar":"#1D9E75"},
  "Staatsphilosophie":{"bg":"#FAEEDA","text":"#854F0B","bar":"#BA7517"},
  "Anthropologie":    {"bg":"#FBEAF0","text":"#993556","bar":"#D4537E"},
};
let sq="", fil="Alle";

function tcard(b){
  const s=SC[b.sem]||{bg:"#eee",text:"#555"};
  const id='t_'+b.term.replace(/[^a-zA-ZäöüÄÖÜß]/g,'_');
  return `<div class="tc" id="${id}">
    <div class="tsem" style="color:${s.text}">${b.sem}</div>
    <div class="tname">${b.term}</div>
    <div class="tdef">${b.definition}</div>
  </div>`;
}

function render(){
  const q=sq.toLowerCase();
  const vis=BG.filter(b=>{
    if(fil!=="Alle"&&b.sem!==fil)return false;
    if(!q)return true;
    return (b.term+b.definition).toLowerCase().includes(q);
  });
  const el=document.getElementById('bg-list');
  if(!vis.length){el.innerHTML='<div class="no-r">Keine Begriffe gefunden.</div>';return;}

  // Flat list when filtering/searching
  if(q||fil!=="Alle"){
    el.innerHTML=vis.map(b=>tcard(b)).join('');
    highlight();
    return;
  }

  // Alphabetical grouping
  const ltrs={};
  vis.forEach(b=>{
    const l=b.term[0].toUpperCase();
    if(!ltrs[l])ltrs[l]=[];
    ltrs[l].push(b);
  });
  const all='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const an=all.map(l=>
    `<div class="ab ${ltrs[l]?'has':''}" ${ltrs[l]?`onclick="scr('${l}')"`:''}>${l}</div>`
  ).join('');
  let h=`<div class="alpha-nav">${an}</div>`;
  Object.keys(ltrs).sort().forEach(l=>{
    h+=`<div class="alpha-sec" id="l_${l}">
      <div class="alpha-ltr">${l}</div>
      ${ltrs[l].map(b=>tcard(b)).join('')}
    </div>`;
  });
  el.innerHTML=h;
  highlight();
}

function highlight(){
  // Jump to term from URL
  const urlT=decodeURIComponent(new URLSearchParams(window.location.search).get('term')||'');
  if(urlT){
    const id='t_'+urlT.replace(/[^a-zA-ZäöüÄÖÜß]/g,'_');
    const e=document.getElementById(id);
    if(e){e.classList.add('hl');setTimeout(()=>e.scrollIntoView({behavior:'smooth',block:'center'}),100);}
  }
}

function scr(l){
  const e=document.getElementById('l_'+l);
  if(e)e.scrollIntoView({behavior:'smooth'});
}

function setFil(f){
  fil=f;
  document.querySelectorAll('.bg-toolbar .fbtn').forEach(b=>{
    const on=b.dataset.f===f; b.classList.toggle('on',on);
    const s=SC[f];
    if(on&&s){b.style.background=s.bg;b.style.color=s.text;b.style.borderColor=s.bar;}
    else{b.style.background='';b.style.color='';b.style.borderColor='';}
  });
  render();
}

document.getElementById('bg-si').addEventListener('input',e=>{sq=e.target.value.trim();render();});
render();
</script>
