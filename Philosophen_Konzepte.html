abend selbst hätte wohl geantwortet: Jede Theorie darf geäußert\n\nwerden - aber sie muss sich öffentlicher Kritik stellen. Wissenschaft zeichnet sich dadurch aus, dass\nihre Theorien prüfbar und widerlegbar sind.\nVerschwörungstheorien dagegen immunisieren sich meist: Sie erklären jede Widerlegung durch\nneue Behauptungen („Das ist nur Teil der Verschwörung“). Hier zeigt sich für Feyerabend die\nGrenze: Vielfalt ja, aber nur, wenn die Ansätze bereit sind, Kritik auszuhalten. Wahrheit entsteht\nnicht durch „alles gelten lassen“, sondern durch den ständigen Streit zwischen Positionen.\nDiskussionsidee: Wie sollte man in der Schule mit Verschwörungstheorien umgehen? Verbieten\n- oder offen diskutieren, damit sie sich am Kriterium der Kritik messen lassen müssen?\nExkurs: Feyerabend und der Verlust der Wahrheit\nKritiker werfen Feyerabend vor, mit seinem Relativismus die Idee von Wahrheit preiszugeben.\nWenn „alles geht“, gibt es dann überhaupt noch „wahr“ und „falsch“? Feyerabend entgegnet: Er will\nWahrheit nicht zerstören, sondern den Dogmatismus aufbrechen, der behauptet, nur eine Methode\n(z. B. Naturwissenschaft) führe zu ihr.\nFür ihn ist Wahrheit kein statisches Endziel, sondern ein offener Prozess: Sie entsteht im Austausch\nzwischen Theorien, Kulturen und Methoden. Wissenschaft trägt dazu bei - aber sie ist nicht der\neinzige Weg. Feyerabend fordert, dass man Wahrheit als etwas Vielfältiges und Dynamisches\nversteht, nicht als fertiges Paket.\nDiskussionsidee: Kann es mehrere Wahrheiten geben - oder gibt es letztlich nur eine, auf die\nwir uns zubewegen? Was bedeutet das für unser Vertrauen in die Wissenschaft?\n\nSiehe dir jetzt den Positionenvergleich an:\n➡ Wissenschaftstheorie ⬅\n\nEthik -\nSemester 2\n\nLehrplan\nProgramm S6 Philo 4: Themenfeld: Ethik\nPositionen Begriffe\nUnterbegriffe\nFakultative Fragestellungen\nHedonismus,\nUtilitarismus,\nDeontologie\nFreiheit\nDeterminismus\nWille\nFreier Wille\nGlück\nGenuss\nPflicht\nBedürfnis\nLeidenschaft\nLeiden\nMoralität\nVerantwortung\nAutonomie\nBegründung\nGewissen\nGut und Böse\nWerte\nRelativismus\nUniversalität\nGerechtigkeit\nMoralprinzipien\nFreiheit\n• Bestimmen die Anforderungen an das Leben unsere\nExistenz?\n• Ist der Wille absolut frei?\n• Ist ein freier Wille mit dem Determinismus vereinbar?\n• Sind wir verantwortlich für unsere Entscheidungen?\n• Sind wir immer frei in unseren Entscheidungen?\nGlück\n• Ist das Streben nach Genuss die Quelle unseres\nGlücks?\n• Haben wir die Pflicht glücklich zu sein?\n• Sollten wir frei von Bedürfnissen sein?\n• Ist es ein Fehler leidenschaftlich zu sein?\n• Geht mit Glück stets Unglück einher?\n• Ist Pflichtbewusstsein das Gegenteil von Freiheit?\nWerte\n• Können wir auf eine allgemein gültige Begründung von\nMoral verzichten?\n• Sind das Böse und das Gute relativ?\n• Jedem seine eigene moralische Wahrheit?\n• Wie kann man eine einheitliche Moral in einer\nglobalisierten Welt etablieren?\n• Wie können wir entscheiden, ob eine Handlung\ngerecht ist?\n• Sind moralische Überzeugungen den Gesetzen einer\nGesellschaft übergeordnet?"},{"id":"aristoteles_eth","name":"Aristoteles – Tugendethik & Eudaimonia","sem":"Ethik","content":"Übersicht: Aristoteles und das gute Leben\nMini-Biographie\nAristoteles (384-322 v. Chr.) war ein griechischer Philosoph und\nSchüler von Platon. Er gilt als einer der bedeutendsten Denker der\nwestlichen Philosophie und Wissenschaft. Aristoteles entwickelte\numfassende Theorien in Bereichen wie Metaphysik, Ethik, Politik,\nLogik und Naturwissenschaften. In seiner Nikomachischen Ethik\nführte er die Idee des Eudaimonia ein, das höchste Ziel des\nmenschlichen Lebens, welches durch tugendhaftes Handeln erreicht\nwird. Seine Logik-Lehre prägte das Denken für Jahrhunderte, und\nseine Ideen über die Kausalität und das Sein beeinflussten die\nMetaphysik nachhaltig.\n1. Einführung\nAristoteles (384–322 v. Chr.) entwickelt eine Tugendethik, die sich am Ziel eines gelungenen Lebens\norientiert. Im Gegensatz zu Platon denkt er weniger idealistisch, sondern beobachtet die reale\nWelt. Für ihn ist Ethik eng mit der Natur des Menschen verbunden: Der Mensch hat ein Ziel, das er\ndurch vernünftiges Handeln verwirklichen soll.\n2. Zentrale Begriffe\n• Eudaimonia: Glückseligkeit; das höchste Ziel des menschlichen Lebens, verstanden als ein\ngelungenes, erfülltes Leben.\n• Areté (Tugend): Tüchtigkeit oder Vortrefflichkeit; Haltung, die gutes Handeln ermöglicht.\n• Mesotes (Mitte): Tugend liegt zwischen zwei Extremen (Mangel und Übermaß).\n• Logos: Vernunft; zentrale Fähigkeit des Menschen.\n• Ergon: Spezifische Funktion eines Wesens; beim Menschen das vernünftige Handeln.\n• Entelechie: Verwirklichung der eigenen Anlage; Entwicklung hin zur Vollendung.\n• Teleologie: Lehre von der Zielgerichtetheit allen Seins.\n3. Zentrale Ideen - Argumentation kurzgefasst\n1. Teleologisches Weltbild\n• Alles in der Natur ist auf ein Ziel (telos) ausgerichtet.\n• Auch der Mensch strebt danach, seine Anlagen zu verwirklichen.\n2. Ziel des Menschen: Eudaimonia\n• Das höchste Ziel ist die Glückseligkeit (Eudaimonia).\n• Diese ist kein kurzfristiges Gefühl, sondern ein dauerhaft gelungenes Leben.\n\n3. Das Ergon des Menschen\n• Der Mensch ist ein vernunftbegabtes Wesen (zoon logon echon).\n• Sein spezifisches Ziel ist daher ein Leben gemäß der Vernunft.\n4. Tugend als Voraussetzung des guten Lebens\n• Ein gutes Leben gelingt nur durch Tugenden (areté).\n• Tugenden entstehen durch Übung und Gewöhnung, nicht nur durch Wissen.\n5. Lehre der Mitte (Mesotes)\n• Tugend liegt zwischen zwei Extremen.\n• Beispiel: Mut = Mitte zwischen Feigheit und Tollkühnheit.\n6. Der Mensch als soziales Wesen\n• Der Mensch ist ein zoon politikon (politisches Lebewesen).\n• Ein gelungenes Leben ist nur in der Gemeinschaft möglich.\n\nVertiefung: Die Position im Detail\n1. Weltbild: Teleologie\nAristoteles geht davon aus, dass alles Lebendige auf ein Ziel (telos) ausgerichtet ist. Jedes\nLebewesen trägt dieses Ziel bereits in sich und strebt danach, es zu verwirklichen.\nDieser Prozess der inneren Entfaltung wird Entelechie genannt. Entwicklung ist für Aristoteles\ndaher kein Zufall, sondern zielgerichtet.\nJedes Lebewesen besitzt zudem ein spezifisches Ergon (Funktion).\nBeispiel: Eine Pflanze entfaltet sich vom Samen zur Blüte und Frucht – ihre Vollendung ist bereits\nim Keim angelegt.\n2. Menschenbild\nAristoteles fragt: Was unterscheidet den Menschen von allen anderen Lebewesen?\n• Ernährung und Wachstum → auch Pflanzen\n• Sinneswahrnehmung → auch Tiere\n→ Übrig bleibt der Logos (Vernunft und Sprache)\nDer Mensch ist ein zoon logon echon: ein Lebewesen, das denken, sprechen und argumentieren\nkann.\nAristoteles unterscheidet:\n• Logos = Sprache/Vernunft (nur Mensch)\n• Phoné = bloße Stimme (auch Tiere)\nNur durch den Logos kann der Mensch:\n• abstrakte Begriffe bilden (gut/schlecht, gerecht/ungerecht)\n• Wissen strukturieren\n• Wissenschaft betreiben\n• gemeinsam Regeln und Gesetze entwickeln\nDer Mensch als zoon politikon\nDer Mensch ist zugleich ein zoon politikon: ein soziales, staatenbildendes Wesen.\n\nAristoteles‘ Ansicht nach braucht der Mensch die Gemeinschaft, um seine Bedürfnisse,\nseine in ihm wohnenden Ziele, zu verwirklichen. Essentielle, also grundlegende Bedürfnisse, z.B.\nnach Nahrung, Fortpflanzung usw. kann er in kleineren Gemeinschaften, wie der Familie oder dem\nDorf verwirklichen. Für die Befriedigung höherer Bedürfnisse benötigt er den Staat.\n3. Glück (eudaimonia) als höchstes Lebensziel\nAusgehend von seinem teleologischen, seinem zielgerichteten, Welt- und Menschenbild will\nAristoteles herausfinden, was das höchste Gut aller Menschen ist. Aristoteles definiert das Gute als\n„das, worauf alles strebt“.\nAlle menschlichen Handlungen sind auf ein Ziel ausgerichtet, das wiederum Mittel für ein weiteres\nZiel ist:\nA → B → C → D → E → F → G → H\nDu gehst zum Beispiel in die Schule, um etwas zu lernen. Du lernst, um gute Noten zu bekommen.\nDu willst gute Noten bekommen, um ein gutes Abitur zu machen. Du machst ein gutes Abitur, um\neinen guten Beruf zu ergreifen. Und warum möchtest du einen guten Beruf haben? Vielleicht um\nviel Geld zu verdienen, vielleicht um Spaß zu haben, vielleicht wegen der Anerkennung, die du dabei\nbekommst, vielleicht auch weil du in diesem Beruf dein Können unter Beweis stellen kannst oder\nweil du - z.B. als Wissenschaftlerin - Dinge ergründen und Wissen erlangen möchtest. Und warum\nmöchtest du Geld, Spaß, Anerkennung, deine Talente entfalten oder die Welt ergründen?\n→ Aristoteles’ Antwort lautet: Um glücklich zu sein.\nIn der Kette menschlicher Ziele muss es laut Aristoteles ein Endziel geben, da menschliches\nHandeln ansonsten ein Schreiten ins Unendliche und somit sinnlos wäre. Das Endziel allen\nmenschlichen Handelns ist das Glück. Alles, was Menschen tun, tun sie, um glücklich zu\nwerden. Es gibt kein höheres Lebensziel als das Glück.\nA → B → C → D → E → F → G → EUDAIMONIA\n4. Die Definition von Glück\nUnter Glück versteht Aristoteles kein zufälliges Glück, das einem unverdient zukommt. Er meint\nmit Glück die eudaimonia, also das Glück im Sinne eines glücklichen, eines guten und\ngelungenen Lebens. Deshalb nennt man Aristoteles’ Ethik auch eudämonistische Ethik.\nWichtig:\n• kein Zufallsglück\n• sondern ein dauerhaft gutes Leben\n\n• wird um ihrer selbst willen angestrebt\n→ Aristoteles’ Ethik ist eine eudämonistische Ethik\n5. Die 3 Lebensformen\nAristoteles unterscheidet drei Arten zu leben:\n1. Hedonistisches Leben (Lust)\n• Orientierung an Genuss und Bedürfnissen\n• „sklavenartig“, da abhängig von Trieben\n• nicht spezifisch menschlich\n2. Politisches Leben\n• Leben in der Gemeinschaft\n• Ziel: Tugend, Anerkennung, Ehre\n• Problem: Ehre ist abhängig von anderen und vergänglich\n3. Theoretisches Leben (beste Lebensform)\n• Ausrichtung auf Erkenntnis und Denken\n• entspricht der Vernunft als höchster Fähigkeit\n• unabhängig (autark) und dauerhaft ausübbar\n→ Für Aristoteles ist das theoretische Leben die höchste Form der Existenz.\nLaut Aristoteles kann der Mensch die eudaimonia, also ein gutes, glückliches Leben, nur\nverwirklichen, indem er sein Wesen, sein ergon, vollendet. Zu diesem Wesen gehört die\nGemeinschaft mit anderen, aber vor allem die Vernunft.\nMit Hilfe der Vernunft kann der Mensch die seelischen Güter, die Tugenden, entwickeln. Diese\nsind nicht zufällig, sondern können nur von wirklich guten Menschen erlangt werden. Um glücklich\nzu werden, muss der Mensch seine Tugenden ausüben, und zwar entweder im politischen\n\nLeben oder - besser noch - im theoretischen, betrachtenden Leben. Ein glückliches\nLeben kann laut Aristoteles nur durch tugendhaftes Verhalten erreicht werden.\n6. Die 3 Seelenvermögen/ Seelenteile\nAristoteles unterteilt die menschliche Seele in 3 Bereiche:\nAristoteles unterscheidet drei Seelenbereiche:\n1. Vegetatives Vermögen\n• Ernährung, Wachstum\n• auch bei Pflanzen\n• ist völlig irrational, hat also keinerlei Beziehung zur Vernunft.\n2. Sinnlich-begehrendes Vermögen\n• Wahrnehmung, Affekte\n• auch bei Tieren\n• Beim Menschen liegt das sinnlich-begehrende Vermögen oder Strebevermögen in einer\nbesonderen Form vor. Es ist zwar selbst vernunftlos, aber anderes als das vegetative\nSeelenvermögen in der Lage, auf die Vernunft zu hören bzw. sich nach der Vernunft zu richten.\nSo kann beim Menschen die Vernunft Einfluss auf die Affekte nehmen.\n3. Vernünftiges Vermögen\n• Dieses ist verantwortlich für die Vernunft, den Verstand, die Erkenntnis.\n• nur beim Menschen\n→ Moral entsteht aus dem Zusammenspiel von Vernunft und Affekten.\n\n7. Tugenden\nDie 3 Seelenvermögen wirken beim Menschen zusammen. Dabei entstehen die Tugenden.\nDas vegetative Seelenvermögen hat keinen Bezug zur Vernunft und gehört daher nicht zu den\nspezifisch menschlichen Aspekten der Seele.\nDas vernünftige Seelenvermögen ist das eigentlich Menschliche. Hier entstehen durch\nDenken und Lehre die dianoetischen Tugenden (z. B. Wissenschaft, Einsicht, Weisheit, Kunst,\nKlugheit). Die Klugheit (phronesis) spielt eine zentrale Rolle: Sie ermöglicht es, dass die\nVernunft auf die Affekte des sinnlich-begehrenden Seelenteils einwirkt. Anders als beim Tier kann\ndieses Strebevermögen beim Menschen auf die Vernunft hören. So können Affekte kontrolliert und\nrichtiges Handeln eingeübt werden. Durch diese Gewöhnung entstehen schließlich die\nethischen Tugenden.\nDie menschliche Vernunft ist an der Ausbildung beider Arten von Tugenden (dianoetische und\nethische) beteiligt. Sie ist verantwortlich für die Ausbildung der Verstandestugenden, der\ndianoetischen Tugenden, aber auch für die Ausbildung der ethischen Tugenden oder\nCharaktertugenden.\n8. Dianoetische Tugenden\nDie dianoetischen Tugenden sind Verstandestugenden und werden durch Lehre und Unterricht\nerworben. Man unterscheidet zwei Bereiche:\n1. Theorie (Unveränderliches erkennen)\n• Wissenschaft (episteme): Wissen über allgemeine Gesetzmäßigkeiten\n• Einsicht (nous): Verständnis grundlegender Prinzipien\n• Weisheit (sophia): höchste Form der Erkenntnis\n\n2. Praxis (Handeln und Herstellen)\n• Kunst (techne): praktisches Können (z. B. Handwerk, Technik)\n• Klugheit (phronesis): richtiges moralisches Handeln\nDie Klugheit ist zentral, da sie das Handeln steuert und die Affekte beeinflusst.\nDurch wiederholtes richtiges Handeln entstehen so die ethischen Tugenden.Die dianoetischen\nTugenden sind rein verstandesmäßige Tugenden und werden durch Lehre - durch\nUnterricht - erworben.\n9. Ethische Tugenden/ Charaktertugenden\nDie ethischen Tugenden (Charaktertugenden) entstehen durch Erziehung, Einübung und\nGewöhnung. Die Klugheit (phronesis) spielt dabei eine zentrale Rolle: Sie steuert das Handeln\nund ermöglicht es, die Affekte zu kontrollieren. So kann das sinnlich-begehrende Vermögen auf die\nVernunft hören.\nTugenden sind dauerhafte Haltungen. Man handelt richtig nicht aus Zufall, sondern weil\nes Teil des eigenen Charakters geworden ist. Sie werden nicht durch Theorie, sondern durch Praxis\nerworben:\n→ Durch gutes Handeln wird man tugendhaft (eupraxia).\nEin tugendhafter Mensch handelt schließlich gewohnheitsmäßig richtig, ohne ständig nachdenken zu\nmüssen.\n10. Ethische Tugenden = Mitte zwischen Übermaß und Mangel\nTugend ist die Mitte zwischen zwei Extremen:\n• Übermaß\n• Mangel\nDiese Mitte ist keine feste Regel, sondern eine „Mitte für uns“, abhängig von Person und Situation.\n\nDie richtige Mitte zu finden ist schwierig und erfordert Klugheit (phronesis).\nWer sie verfehlt, entwickelt statt Tugend ein Laster.\nBei der Bestimmung der richtigen Mitte hilft uns die Tugend der Klugheit, die phronesis.\nHat sich der Mensch an das tugendhafte Handeln gewöhnt, dann ist die Klugheit nicht mehr nötig.\nDie dianoetische Tugend der Klugheit verwandelt sich nämlich durch Einübung und Gewöhnung in\ndie verschiedenen ethischen Tugenden. Wenn die Klugheit jedoch die rechte Mitte verfehlt und\nimmer eines der Extreme trifft, dann entwickelt der Mensch keine Tugend, sondern ein Laster.\nEin tugendhafter Mensch ist laut Aristoteles ein Mensch, der seine Vernunft gebraucht. Benutzt\ner die reine Vernunft, so entwickelt er die dianoetischen Tugenden, die Verstandestugenden. Eine\ndieser dianoetischen Tugenden, die Phronesis - die Klugheit, die sittliche Einsicht - ist zuständig\nfür das richtige Handeln. Dieses richtige Handeln hat bei Aristoteles immer den Charakter einer\nMitte zwischen 2 falschen Extremen.\nHat sich der Mensch an das richtige Handeln gewöhnt, also eine richtige Haltung - eine ethische\nTugend - entwickelt, dann ist die Klugheit für das richtige Handeln nicht mehr nötig. Der Mensch\nhandelt dann automatisch richtig oder tugendhaft. Die dianoetische Tugend der Klugheit kann sich\nalso durch Einübung und Gewöhnung in verschiedene ethische Tugenden verwandeln.\n\nBewertung\nStärken\n1. Lebensnahe Ethik\nAristoteles beschreibt Moral nicht über abstrakte Regeln, sondern über menschliches Verhalten\nund Charakterbildung.\nTugenden entstehen durch Übung und spiegeln reale Lebenspraxis wider.\n→ Ethik wird als Teil des alltäglichen Lebens verständlich.\n2. Fokus auf Charakter statt Einzelhandlungen\nIm Zentrum steht nicht die einzelne Handlung, sondern die Haltung des Menschen.\nMoral bedeutet, ein bestimmter Mensch zu werden, nicht nur richtig zu handeln.\n→ Nachhaltige Persönlichkeitsentwicklung rückt in den Vordergrund.\n3. Verbindung von Vernunft und Emotionen\nAristoteles integriert Affekte in seine Ethik, statt sie auszuschließen.\nDie Vernunft steuert die Gefühle, anstatt sie zu unterdrücken.\n→ Menschliches Handeln wird realistisch und differenziert erfasst.\n4. Situationssensibilität (Mesoteslehre)\nEs gibt keine starren Regeln, sondern eine „Mitte für uns“, die von Situation und Person abhängt.\n→ Moralisches Handeln bleibt flexibel und kontextbezogen.\n5. Bedeutung von Gemeinschaft\nDer Mensch wird als soziales Wesen verstanden (zoon politikon).\nEin gutes Leben ist nur innerhalb einer Gemeinschaft möglich.\n→ Ethik wird mit gesellschaftlichem Leben verknüpft.\nSchwächen\n1. Unklare Bestimmung der „Mitte“\nDie richtige Mitte ist situationsabhängig und schwer eindeutig festzulegen.\nEs fehlt ein klarer Maßstab für richtiges Handeln.\n→ Moralische Urteile bleiben teilweise unscharf.\n2. Gefahr von Subjektivität\nDa die Mitte relativ ist, können unterschiedliche Einschätzungen entstehen.\nEs ist oft unklar, welche Handlung tatsächlich die richtige ist.\n→ Verbindlichkeit moralischer Urteile wird geschwächt.\n3. Abhängigkeit von äußeren Bedingungen\n\nEin gelungenes Leben setzt auch äußere Güter wie Gesundheit, Wohlstand oder soziale\nAnerkennung voraus.\n→ Nicht alle Menschen haben gleiche Chancen auf Glück (Eudaimonia).\n4. Begrenzte Hilfe bei moralischen Dilemmata\nAristoteles bietet keine festen Regeln für schwierige Entscheidungssituationen.\n→ In Konfliktfällen fehlt eine klare Orientierung.\n5. Elitäre Tendenzen\nDas theoretische, philosophische Leben gilt als höchste Lebensform, ist aber nur für wenige\nerreichbar.\n→ Der Anspruch wirkt teilweise lebensfern.\n\nExkurse\nExkurs 1: Aristoteles vs. Immanuel Kant – Tugendethik vs.\nPflichtethik\nAristoteles und Kant vertreten zwei grundlegend unterschiedliche Ansätze der Ethik.\n• Aristoteles fragt: Was macht ein gutes Leben aus?\n→ Fokus auf Charakter, Tugenden und Gewohnheit\n• Kant fragt: Was ist moralisch richtig?\n→ Fokus auf Pflicht und moralisches Gesetz\nFür Aristoteles ist eine Handlung gut, wenn sie aus einer tugendhaften Haltung entsteht.\nFür Kant ist eine Handlung gut, wenn sie aus Pflicht geschieht – unabhängig von Gefühlen oder\nGewohnheiten.\n→ Während Aristoteles den Menschen als sich entwickelndes Wesen sieht, das\nTugenden einübt, versteht Kant Moral als strenge Orientierung an universellen\nRegeln.\nExkurs 2: Aristoteles vs. Utilitarismus – Zwei Arten von „Glück“\nSowohl Aristoteles als auch der Utilitarismus sehen Glück als zentrales Ziel – verstehen darunter\naber etwas Unterschiedliches.\n• Aristoteles:\n→ Glück (Eudaimonia) = gelungenes Leben durch Tugend und Vernunft"},{"id":"epikur","name":"Epikur – Hedonismus","sem":"Ethik","content":"Übersicht\n1. Einführung\nNach Aristoteles verschiebt sich der Fokus der Ethik: Statt politischem Engagement tritt ein\nRückzug ins Private in den Vordergrund.\nEpikur entwickelt eine Philosophie, die nicht mehr den Staat, sondern das individuelle Glück in den\nMittelpunkt stellt. Seine Ethik ist eine Form des Hedonismus, allerdings nicht im Sinne von\nmaßlosem Genuss, sondern als Suche nach innerem Frieden und Ausgeglichenheit.\nPhilosophie hat für Epikur eine praktische Aufgabe: Sie soll dem Menschen helfen, ein glückliches\nund angstfreies Leben zu führen.\n2. Zentrale Begriffe\n• Hedonismus: Lehre, nach der Lust das Ziel des Lebens ist\n• Ataraxia: Seelenruhe, innerer Friede\n• Aponie: Freiheit von körperlichem Schmerz\n• Kinetische Lust: kurzfristige Lust (Genuss, Befriedigung)\n• Katastematische Lust: dauerhafte Zustandslust (Ruhe, Ausgeglichenheit)\n• Bedürfnislehre: Unterscheidung zwischen natürlichen und nichtigen Bedürfnissen\n3. Zentrale Ideen\n\n1. Materialistisches Weltbild\n• Die Welt besteht aus Atomen (Anknüpfung an Demokrit)\n• Keine unsterbliche Seele, kein göttlicher Plan\n→ Der Mensch ist frei, sein Leben selbst zu gestalten\n2. Ziel des Lebens: Lust und Vermeidung von Unlust\n• Alles Handeln zielt auf Lustgewinn und Schmerzvermeidung\n• Philosophie hilft, dieses Ziel vernünftig zu erreichen\n→ Glück ist ein rational gesteuerter Zustand\n3. Kritik an falschen Ängsten\n• Hauptquellen der Unlust:\n- Angst vor Schmerzen\n- Angst vor dem Tod\n- Angst vor den Göttern\n• Diese Ängste sind irrational und können durch Vernunft überwunden werden\n→ Befreiung von Angst = Voraussetzung für Glück\n4. Zwei Formen der Lust\n• Kinetische Lust: kurzfristiger Genuss → wird kritisch gesehen\n• Katastematische Lust: dauerhafte Ruhe und Zufriedenheit → eigentliches Ziel\n→ Nicht Genuss, sondern Stabilität steht im Mittelpunkt\n5. Bedürfnislehre\n• Unterscheidung:\n- natürliche und notwendige Bedürfnisse (z. B. Nahrung)\n- natürliche, aber nicht notwendige Bedürfnisse (z.B. sexuelle Lust)\n- nichtige Bedürfnisse (z. B. Ruhm, Luxus)\n→ Ziel: Reduktion auf das Wesentliche\n6. Ataraxia als höchstes Ziel\n• Glück = Zustand innerer Ruhe (Ataraxia); erreicht durch:\n- Verzicht auf übermäßige Begierden\n- Kontrolle der Bedürfnisse\n→ Weniger wollen = mehr innere Ruhe\n7. Lebensweise: Rückzug ins Private\n• Glück wird nicht im Staat, sondern im kleinen Kreis gefunden\n• Ideal: Freundschaft und einfaches Leben\n\n• Epikur lebt dies in seiner „Gartenphilosophie“ vor\n→ Gemeinschaft ja, aber ohne politischen Anspruch\n4. Zitate\n„Wenn wir sagen, dass die Lust das höchste Gut ist, meinen wir nicht die Lust der Genusssüchtigen, sondern\ndie Freiheit von Schmerz im Körper und von Unruhe in der Seele.“\n„Wer gescheit ist, treibt keine Politik.“\n\nEpikur: Position im Detail\n1. Weltbild: Atomismus und Freiheit\nEpikur knüpft an die Atomlehre von Demokrit an.\n• Die Welt besteht aus unendlich vielen Atomen, die sich ständig neu kombinieren.\n• Eine unsterbliche Seele existiert nicht.\n• Es gibt keinen göttlichen Plan oder vorgegebene Bestimmung.\n→ Der Mensch ist nicht an ein Schicksal gebunden, sondern kann sein Leben\nselbst gestalten und auf Glück ausrichten.\n2. Philosophie als Lebenshilfe\nFür Epikur hat Philosophie eine praktische Funktion:\nSie soll dem Menschen helfen, ein glückliches Leben zu führen.\nDas Ziel allen Handelns ist:\n→ Lustgewinn und Vermeidung von Unlust\nDabei spielt die Vernunft eine zentrale Rolle:\n→ Nur durch Einsicht kann der Mensch erkennen, was ihm wirklich nützt und\nwas ihm schadet.\n3. Ängste als Ursache von Unlust\nEpikur sieht drei zentrale Quellen menschlicher Unruhe:\n• Angst vor Schmerz\n• Angst vor dem Tod\n• Angst vor den Göttern\nDiese Ängste sind irrational und können durch Vernunft überwunden werden.\n→ Wer diese Ängste überwindet, erreicht innere Freiheit und Gelassenheit.\nAngst vor Schmerzen Angst vor dem Tod Angst vor den Göttern\n• Kurze Schmerzen sind erträglich,\nsolange man am Leben ist.\n• Ein Höchstmaß an Schmerzen ist\nnur kurz zu erleiden, da man sonst\nstirbt.\nDer Tod ist kein Problem, mit dem\nman sich beschäftigen sollte: „Solange\nwir da sind, ist er nicht da, und wenn\ner da ist, sind wir nicht mehr.\"\n(Epikur: Brief an Menoikus)\nGötter leben in Zwischenwelten\n(Intermundien) - sie beeinflussen das\nLeben der Menschen nicht.\n\n4. Epikurs Lustbegriff\nEpikur unterscheidet zwei Formen der Lust:\n• Kinetische Lust\n→ kurzfristiger Genuss und unmittelbare Bedürfnisbefriedigung\n→ wird kritisch gesehen\n• Katastematische Lust\n→ dauerhafte Zustandslust (Ruhe, Zufriedenheit)\n→ eigentliches Ziel des Lebens\n→ Epikur geht es nicht um Genuss, sondern um Stabilität und\nAusgeglichenheit.\n5. Ataraxia: Seelenruhe als Ziel\nDas höchste Ziel ist die Ataraxia (Seelenruhe).\nSie entsteht durch:\n• Freiheit von Schmerz\n• Freiheit von innerer Unruhe\n• Verzicht auf übermäßige Begierden\nKurz gesagt:\n→ Glück bedeutet nicht „mehr haben“, sondern „weniger brauchen“.\n6. Bedürfnislehre\nEpikur unterscheidet zwischen:\n• natürlichen und notwendigen Bedürfnissen (z. B. Nahrung)\n• natürlichen, aber nicht notwendigen Bedürfnissen\n• nichtigen Bedürfnissen (z. B. Ruhm, Luxus)\nZiel ist es, sich auf die notwendigen Bedürfnisse zu beschränken.\n→ Bedürfnisreduktion führt zu Selbstgenügsamkeit und Unabhängigkeit.\nNatürliche Bedürfnisse Nichtige Bedürfnisse\nNotwendig Nicht Notwendig Luxus\nEssen, Trinken Sexuelle Lust\n\nDurch die Vernunft könne der Mensch die natürlichen notwendigen Bedürfnisse als die\neigentlich wichtigen Bedürfnisse erkennen. Das Ziel ist also Bedürfnisreduktion und dadurch\nSelbstgenügsamkeit.\n7. Lebensweise: Rückzug und Freundschaft\nEpikur empfiehlt ein einfaches Leben:\n• Rückzug aus politischem Leben\n• Konzentration auf Freundschaft\n• Genuss einfacher Dinge\nSeine Schule im Garten bei Athen zeigt dieses Ideal:\n→ Glück entsteht im kleinen Kreis, nicht im öffentlichen Ruhm.\n8. Fazit\nEin glückliches Leben besteht für Epikur darin,\n• Ängste zu überwinden,\n• Bedürfnisse zu reduzieren\n• und innere Ruhe zu erreichen.\n\n→ Wahres Glück ist kein intensiver Genuss, sondern ein stabiler Zustand der\nGelassenheit.\nWahres Glück\nRichtige Einsicht (Vernunft!)\nFalsches Glück, Falsche Einsicht\n→ Optimum an Lust → Maxiumum an Lust\n• Abwesenheit von Angst, Schmerzen (negativer\nHedonismus)\n• Verzicht, Reduktion der Ansprüche\n• Verschiebung der Realisierung auf später (Investition in\nspätere Befriedigung)\n• Freundschaft, Selbstgenügsamkeit, Selbstzucht →\nTugend nicht um ihrer selbst willen, sondern wegen der\ndamit verbundenen Lust\n• Übermaß an Essen, Trinken, Liebe, Ehre\n• = Hedonismus\nAbhängigkeit, Ruhelosigkeit\n→ Ataraxia (Seelenruhe) → Hetze, Stress\n\nStärken von Epikurs Ansatz\n1. Lebenspraktische Philosophie\nEpikur versteht Philosophie als konkrete Hilfe für das Leben. Im Mittelpunkt steht nicht abstrakte\nTheorie, sondern die Frage, wie man glücklich und angstfrei leben kann.\n→ Philosophie wird unmittelbar alltagsrelevant.\n2. Befreiung von irrationalen Ängsten\nEpikur zeigt, dass viele menschliche Ängste (z. B. vor dem Tod oder den Göttern) unbegründet sind.\nDurch Vernunft kann der Mensch diese Ängste überwinden.\n→ Innere Freiheit wird als Voraussetzung für Glück verständlich.\n3. Differenzierter Lustbegriff\nEpikur unterscheidet zwischen kurzfristigem Genuss und dauerhafter Zufriedenheit.\nEr kritisiert oberflächlichen Hedonismus und setzt stattdessen auf stabile Seelenruhe.\n→ Glück wird als nachhaltiger Zustand gedacht.\n4. Kritik an übermäßigen Bedürfnissen\nDurch die Unterscheidung von notwendigen und nichtigen Bedürfnissen zeigt Epikur, dass viele\nWünsche unnötig sind.\n→ Bedürfnisreduktion führt zu Unabhängigkeit und Zufriedenheit.\n5. Betonung von Freundschaft und Einfachheit\nEpikur hebt die Bedeutung von Freundschaft und einem einfachen Leben hervor.\n→ Glück wird nicht an Besitz oder Status gebunden, sondern an zwischenmenschliche\nBeziehungen.\nSchwächen von Epikurs Ansatz\n1. Rückzug aus der Gesellschaft\nEpikur empfiehlt, sich aus dem politischen Leben zurückzuziehen.\n→ Gesellschaftliche Verantwortung und Engagement werden vernachlässigt.\n2. Reduktion von Glück auf Lustvermeidung\nObwohl Epikur Lust differenziert versteht, bleibt Glück stark auf Schmerzvermeidung ausgerichtet.\n→ Aktive Lebensgestaltung und Selbstverwirklichung treten in den Hintergrund.\n3. Begrenztes Menschenbild\nDer Mensch erscheint vor allem als Wesen, das Leid vermeiden will.\n\n→ Andere Aspekte wie Kreativität, Leistung oder Sinnsuche werden wenig berücksichtigt.\n4. Gefahr von Passivität\nDie Orientierung an Ruhe und Bedürfnisreduktion kann zu einem eher passiven Lebensstil führen.\n→ Dynamik, Veränderung und gesellschaftlicher Fortschritt geraten aus dem Blick.\n5. Fragwürdige Umsetzbarkeit\nEin stark reduziertes Leben ist nicht für alle Menschen realistisch oder erstrebenswert.\n→ Epikurs Ideal kann als lebensfern oder zu anspruchslos erscheinen.\n\nExkurse\nExkurs 1: Epikur vs. Aristoteles – Zwei Wege zum Glück\nEpikur und Aristoteles vertreten zwei unterschiedliche Vorstellungen eines gelungenen Lebens.\n• Aristoteles:\n→ Glück durch Tugend und aktives Leben in der Gemeinschaft\n→ Mensch als zoon politikon\n• Epikur:\n→ Glück durch innere Ruhe und Rückzug ins Private\n→ Vermeidung von Unruhe statt aktive Verwirklichung\n→ Unterschied:\nAktives, politisches Leben vs. ruhiges, zurückgezogenes Leben\nExkurs 2: Epikur und moderner Hedonismus\nIm Alltag wird „Hedonismus“ oft mit Konsum, Genuss und Spaß gleichgesetzt.\nEpikur versteht darunter jedoch etwas ganz anderes:\n• kein exzessiver Genuss\n• sondern Vermeidung von Schmerz und innerer Unruhe\n→ Paradox:\nWeniger Lust suchen führt zu mehr Glück\n→ Vergleich mit heutiger Konsumgesellschaft:\n• ständige Bedürfnissteigerung vs. Bedürfnisreduktion\nExkurs 3: Epikur und die Angst vor dem Tod\nEpikur argumentiert:\n→ „Der Tod geht uns nichts an.“\nBegründung:\n• Solange wir leben, ist der Tod nicht da\n• Wenn der Tod da ist, sind wir nicht mehr da\n→ Konsequenz:\nDie Angst vor dem Tod ist irrational und belastet unnötig\n\nDiskussionsfragen\n1. Ist ein Leben ohne Angst und Schmerz bereits ein gutes Leben, oder braucht es mehr als bloße\nSeelenruhe?\n2. Sollte man sich aus der Politik und Gesellschaft zurückziehen, um glücklich zu werden, oder\ngehört Engagement zum guten Leben dazu?\n3. Ist Epikurs Verständnis von Lust überzeugend, oder unterschätzt er die Bedeutung von\nintensiven Erfahrungen und Genuss?\n4. Kann Bedürfnisreduktion wirklich zu mehr Freiheit führen, oder bedeutet sie eher Verzicht?\n5. Ist die Angst vor dem Tod tatsächlich irrational, oder erfüllt sie eine wichtige Funktion im\nmenschlichen Leben?\n6. Welche Rolle spielt Freundschaft für ein gelungenes Leben – ist sie wichtiger als Erfolg oder\nSelbstverwirklichung?\n\nDie Stoa\nÜberblick\n1. Einführung\nDie Stoa ist eine philosophische Schule der Antike, die im 3. Jahrhundert v. Chr. in Athen gegründet\nwurde. Ihr Name geht auf die „Stoa Poikile“ zurück, eine bemalte Säulenhalle, in der die\nPhilosophen lehrten.\nIm Zentrum der stoischen Philosophie steht die Frage:\nWie kann der Mensch ein gutes und gelassenes Leben führen?\nDie Stoiker geben darauf eine überraschend nüchterne Antwort: Ein gutes Leben besteht nicht\ndarin, möglichst viel Lust zu erleben, sondern darin, im Einklang mit der Vernunft und der Natur zu\nleben.\nWichtige Vertreter sind:\n• Zenon von Kition\n• Seneca\n• Epiktet\n• Mark Aurel\n2. Zentrale Begriffe\nVernunft (logos)\nDie Welt ist nach den Stoikern rational geordnet. Der Mensch soll sein Leben an dieser Ordnung\nausrichten.\nNaturgemäßes Leben\nGut leben heißt, im Einklang mit der eigenen Natur als vernünftiges Wesen zu leben.\nApathie (apatheia)\nNicht Gefühllosigkeit, sondern Freiheit von zerstörerischen Leidenschaften wie Angst, Gier oder\nWut.\nSelbstbeherrschung\nDer Mensch soll lernen, seine Reaktionen zu kontrollieren und sich nicht von äußeren Umständen\nabhängig zu machen.\n\nInnere Freiheit\nWahre Freiheit besteht darin, unabhängig von äußeren Dingen zu sein.\n3. Zentrale Thesen / Hauptargumentation\n1. Der Mensch ist ein vernünftiges Wesen\nDie Stoiker gehen davon aus: Der Mensch besitzt Vernunft (logos)"},{"id":"utilitarismus_fw","name":"Utilitarismus","sem":"Ethik","content":"Überblick Utilitarismus\n1. Einführung\nDer Utilitarismus ist eine ethische Theorie, die Handlungen danach beurteilt, welche Folgen sie\nhaben. Im Zentrum steht dabei nicht die Absicht des Handelnden oder eine moralische Regel,\nsondern die Frage, ob eine Handlung insgesamt zu mehr Glück und weniger Leid führt.\nEine Handlung gilt als moralisch richtig, wenn sie das Wohlergehen aller Betroffenen\nmaximiert.\nDer Begriff „Utilitarismus“ leitet sich vom lateinischen utilitas ab und bedeutet „Nutzen“. Diese\nHerkunft verweist bereits auf den Kern der Theorie: Moralisches Handeln soll sich am\nNutzen orientieren. Dieser Nutzen wird im klassischen Utilitarismus vor allem als Lust,\nFreude oder Glück verstanden, während Leid als negativ gilt. In neueren Varianten, insbesondere bei\nPeter Singer, wird der Begriff des Nutzens erweitert und stärker als Erfüllung von Interessen oder\nPräferenzen interpretiert.\nDer Utilitarismus entsteht im 18. und 19. Jahrhundert im Kontext von Aufklärung, gesellschaftlichen\nUmbrüchen und politischen Reformbewegungen. Er verfolgt das Ziel, Moral rational zu\nbegründen und für gesellschaftliche Entscheidungen nutzbar zu machen. Bis heute spielt er eine\nwichtige Rolle, etwa in der politischen Ethik, der Medizinethik, der Tierethik oder der globalen\nGerechtigkeitsdebatte.\nWichtige Vertreter des Utilitarismus sind der englische Philosoph Jeremy Bentham\n(1748-1832), der englische Philosoph, Politiker und Ökonom John Stuart Mill (1806-1873) und\nder australische Philosoph Peter Singer (*1946).\n2. Zentrale Begriffe\nDer Utilitarismus lässt sich nur verstehen, wenn einige zentrale Begriffe geklärt werden.\nFragestellungen Lehrplan:\nIst das Streben nach Genuss die Quelle unseres Glücks?\nIst es ein Fehler leidenschaftlich zu sein?\nKönnen wir auf eine allgemeingültige Begründung von Moral verzichten?\nWie kann man eine einheitliche Moral in einer globalisierten Welt etablieren?\n\nUnter Utilitarismus versteht man eine Ethik, die den moralischen Wert einer Handlung anhand\nihres Nutzens bestimmt. Dieser Nutzen besteht darin, dass eine Handlung möglichst viel Glück\nhervorbringt und möglichst viel Leid vermeidet.\nAls Nutzenethik oder Nützlichkeitsethik bezeichnet man deshalb allgemein ethische\nAnsätze, die Handlungen nach ihrem Beitrag zum Wohl der Betroffenen bewerten. Moral ist hier\nkeine Frage von Prinzipien oder Pflichten, sondern von Ergebnissen.\nDer Utilitarismus gehört zur konsequentialistischen Ethik. Das bedeutet, dass ausschließlich\ndie Konsequenzen einer Handlung entscheidend sind. Motive, Absichten oder Regeln spielen keine\neigenständige Rolle, sofern sie sich nicht in den Folgen niederschlagen.\nZugleich handelt es sich um eine teleologische Ethik. Handlungen werden von ihrem Ziel her\nbeurteilt. Dieses Ziel besteht im Utilitarismus darin, das größtmögliche Glück beziehungsweise das\ngrößtmögliche Wohlergehen zu erreichen.\nDer klassische Utilitarismus ist außerdem hedonistisch, weil er davon ausgeht, dass Glück in\nLust und Leidvermeidung besteht. Spätere Varianten lösen sich teilweise von diesem engen\nLustbegriff.\nEin weiteres zentrales Merkmal ist der Egalitarismus. Alle Betroffenen einer Handlung müssen\ngleich berücksichtigt werden. Jeder zählt als eine Person und niemand zählt mehr als eine.\nMoralische Entscheidungen dürfen also nicht nur die eigenen Interessen oder die Interessen einer\nbestimmten Gruppe berücksichtigen.\nIm modernen Utilitarismus spielt der Begriff der Präferenz eine wichtige Rolle. Präferenzen sind\nWünsche, Interessen oder Bedürfnisse eines Wesens. Moralisch richtig ist dann eine Handlung,\nwenn sie die Präferenzen aller Betroffenen möglichst gut erfüllt.\n3. Zentrale Positionen und Grundideen\na. Der utilitaristische Imperativ und die 4 Grundprinzipien des Utilitarismus\nHandle so, dass die Folgen (1) deiner Handlung das Wohlergehen/Glück (2) aller\n(3) Betroffenen maximieren (4).\nVier Prinzipien\nI. Konsequenzenprinzip\n→ Moral hängt nur von den Folgen einer Handlung ab, nicht von Motiven oder Absichten.\n\n2. Lustprinzip (hedonistisch)\n→ Gute Handlungen vermehren Glück und verringern Leid\n(bei modernen Ansätzen: Interessen statt nur Lust).\n3. Universalistisches Prinzip\n→ Alle Betroffenen zählen gleich\n(keine Sonderrolle für dich, tut mir leid).\n4. Utilitätsprinzip\n→ Wähle die Handlung, die insgesamt den größten Nutzen bringt\n(= mehr Glück als Leid für alle zusammen).\nKernlogik in einem Satz\nEine Handlung ist moralisch richtig, wenn ihre Folgen für alle zusammen das bestmögliche Ergebnis\nerzeugen.\nb) Jeremy Bentham: der quantitative Utilitarismus\n• Menschen streben nach Lust und vermeiden Leid.\n→ Ziel der Moral: möglichst viel Lust und möglichst wenig Leid erzeugen.\n• Entscheidender Schritt:\nJede Lust zählt gleich, egal bei wem sie entsteht.\n• → Es gibt keinen rationalen Grund, die eigene Lust höher zu gewichten als die anderer.\n• → Folgerung:\nMoral muss alle Betroffenen berücksichtigen.\n• → Prinzip:\n• „Das größte Glück der größten Zahl“\n→ Weil nur die Menge zählt, wird Moral quantitativ berechenbar (hedonistisches Kalkül).\nBenthams große Hoffnung ist also, Moral berechenbar zu machen. Gerade darin liegt die Stärke\nseines Ansatzes, aber auch eines seiner größten Probleme.\nc) John Stuart Mill: der qualitative Utilitarismus\nJohn Stuart Mill übernimmt den Utilitarismus, entwickelt ihn aber weiter. Er reagiert damit auf den\nVorwurf, der Utilitarismus sei eine reine „Schweinephilosophie“, die den Menschen auf körperliche\nLust reduziert.\n• Übernahme von Bentham: Glück maximieren bleibt das Ziel.\n• Problem bei Bentham:\nNicht jede Lust ist gleich wertvoll.\n\n• → Neue Annahme: Es gibt höhere (geistige) und niedere (körperliche)\nFreuden.\n• → Folgerung: Moralisch richtig ist, was das qualitativ bessere Glück fördert.\n• → Maßstab: kompetente Beurteiler, die beide Arten kennen.\n• → Ergebnis: Moral berücksichtigt nicht nur wie viel, sondern auch welche Art von Glück.\nDer Utilitarismus wird bei ihm differenzierter und anspruchsvoller als bei Bentham.\nd) Peter Singer: der Präferenzutilitarismus\nPeter Singer entwickelt im 20. und 21. Jahrhundert eine moderne Form des Utilitarismus weiter:\nden Präferenzutilitarismus.\n• Übernahme: Moral richtet sich nach den Folgen für Betroffene.\n• Problem: Fokus auf Lust ist zu eng.\n• → Neue Annahme: Entscheidend sind Interessen/Präferenzen und Leidensfähigkeit.\n• → Folgerung: Moralisch richtig ist, was die Interessen aller gleich berücksichtigt.\n• → Erweiterung: Auch Tiere haben Interessen → müssen einbezogen werden.\n• → Ergebnis: Moral wird konsequent universal (gegen Speziesismus).\nSinger ist deshalb für viele so interessant wie unbequem. Er nimmt den Gedanken ernst, dass\nmoralische Gleichheit nicht an der Grenze der eigenen Familie, Nation oder sogar Art enden darf.\nSehr unerquicklich für den menschlichen Hang zur bequemen Doppelmoral, aber philosophisch\nziemlich konsequent.\n4. Beispiel / Zitat\nBentham:\n„Die Natur hat die Menschheit unter die Herrschaft zweier souveräner Gebieter gestellt: Leid und Freude.“\nMill:\n„Es ist besser, ein unzufriedener Mensch zu sein als ein zufriedenes Schwein; besser ein unzufriedener\nSokrates als ein zufriedener Narr.“\n\nVertiefung: Der Utilitarismus im Detail\n1. Ausgangsfrage\nDer Utilitarismus entsteht aus einer sehr praktischen Frage:\nWie lässt sich Moral vernünftig begründen, ohne sich auf Tradition, Religion\noder bloße Gefühle zu verlassen?\nDie utilitaristische Antwort lautet:\nMan beurteilt Handlungen nach ihren Folgen und fragt, ob sie das\nWohlergehen aller Betroffenen fördern.\nDiese Grundidee macht den Utilitarismus zu einer Ethik, die besonders gut zu modernen,\npluralistischen Gesellschaften passt. Wo Menschen unterschiedliche Religionen, Weltanschauungen\nund Lebensziele haben, scheint es sinnvoll, sich auf ein gemeinsames Kriterium zu einigen:\nLeid verringern, Wohlergehen fördern.\n2. Kernprinzip des Utilitarismus\nZusammenfassen kann man das Kernprinzip des Utilitarismus mit dem sogenannten utilitaristischen\nImperativ:\n„Handle so, dass die Folgen deiner Handlung für das Wohlergehen/Glück aller Betroffenen\noptimal sind.“\nIn diesem Imperativ sind die 4 Prinzipien des Utilitarismus enthalten:\n• das Konsequenzenprinzip /Folgenprinzip\n• das hedonistische Prinzip/ Lustprinzip\n• das universalistische Prinzip/ Verallgemeinerungsprinzip\n• das Utilitätsprinzip/ Nützlichkeitsprinzip.\nDas Konsequenzenprinzip/ Folgenprinzip\nDas Konsequenzenprinzip oder Folgenprinzip besagt, dass Handlungen nach ihren\nFolgen beurteilt werden.\nMan betrachtet also ausschließlich die Folgen einer Handlung. Die Handlung selbst\nund das Motiv, die Beweggründe hinter der Handlung sind völlig unerheblich.\nDas hedonistische Prinzip/ Lustprinzip\nDas hedonistische Prinzip oder Lustprinzip meint, dass die Handlungsfolgen nach\nder Maximierung von Lust bzw. Minimierung von Unlust beurteilt werden. Ob eine\nHandlung moralisch richtig ist, hängt davon ab, ob sie Lust vermehrt bzw. Unlust\n\nverringert. Lust definieren die unterschiedlichen utilitaristischen Philosophen\nteilweise unterschiedlich. Werden bei Bentham alle möglichen Lüste gleich\nberücksichtigt, wertet Mill geistige Lüste stärker als körperliche. Und Singer spricht\nschon nicht mehr nur von Lust, sondern auch von Präferenzen. Daher gilt das\nhedonistische Prinzip streng genommen auch nur im klassischen Utilitarismus,\nwelcher Glück als Freude und Abwesenheit von Leid definiert. Im\nPräferenzutilitarismus, wo es um die Präferenzen oder Interessen aller an einer\nHandlung Betroffenen geht, ist dieses Prinzip nicht immer passend.\nDas universalistische Prinzip oder Verallgemeinerungsprinzip\nDas universalistische Prinzip oder Verallgemeinerungsprinzip bedeutet, dass es um\ndas Wohlergehen aller von der Handlung Betroffenen geht.\nDabei werden alle Personen gleich berücksichtigt. Keiner zählt aus irgendeinem\nGrund mehr als der andere.\nDa der Utilitarismus Handlungen danach beurteilt, ob sie Lust befördern bzw.\nUnlust vermindern, sind hier häufig auch Tiere moralische Objekte, das heißt auch\nTiere werden bei der Berechnung der Lust-/ Unlust-Bilanz berücksichtigt.\nDas Utilitätsprinzip/ Nützlichkeitsprinzip\nDas vierte Prinzip ist das Utilitätsprinzip oder Nützlichkeitsprinzip. Hiernach\nwerden Handlungen werden auf Grund ihres Nutzens für den Einzelnen und die\nGemeinschaft - also die von der Handlung Betroffenen - bewertet. Es handelt sich\num eine ethische Kosten-Nutzen-Rechnung. Die Kosten sind dabei das Leid, der\nNutzen die Freude. Man muss ausrechnen, ob insgesamt durch die geplante\nHandlung bei den Betroffenen mehr Freude oder mehr Leid entstehen wird.\nEntsteht mehr Freude, ist die Handlung moralisch gut, entsteht mehr Leid, ist sie\nmoralisch schlecht.\nJeremy Bentham (1748-1832): Der quantitative\nUtilitarismus\nGrundideen\nBentham schreibt:\n„Die Natur hat die Menschheit unter die Herrschaft zweier souveräner Gebieter - Leid (pain) und Freude\n(pleasure) - gestellt [...] Die Menschen suchen die Lust und vermeiden den Schmerz.“\nBentham spricht im Original von pleasure für Lust oder Freude und pain für Schmerz oder Leid. Er\ngeht davon aus, dass Menschen danach streben, möglichst viel Lust/ Freude und möglichst wenig\n\nUnlust/ Leid zu erleben. Ausgehend von diesem Menschenbild formuliert Bentham das Prinzip des\nUtilitarismus als „The greatest happiness for the greatest number“. Ziel aller Handlungen soll das\ngrößte Glück für die größte Anzahl sein. Glück ist dabei definiert als Freude und\nAbwesenheit von Leid.\nIm Unterschied zu Kant sieht der Utilitarismus den Maßstab einer moralisch guten Handlung also\nnicht in dem ihr zugrunde liegenden guten Willen, sondern allein in ihrer Utilität, ihrem Nutzen.\nDieser Nutzen wird gemessen an den Handlungsfolgen. Sind die Handlungsfolgen positiv,\nentsteht also durch die Handlung möglichst viel Freude und möglichst wenig Leid, dann ist die\nHandlung moralisch gut. Alle an der Handlung Beteiligten müssen dabei gleichberechtigt\nberücksichtigt werden.\nBentham vertritt einen quantitativen Utilitarismus: Alle Freuden (körperliche und geistige) sind\nseiner Ansicht nach gleichwertig. Es gibt keine qualitativen Unterschiede.\nZudem müssen alle an einer Handlung Beteiligten gleichberechtigt bei der Berechnung der\nFreude-Leid-Bilanz berücksichtigt werden.\nDiese Berechnung kann mit dem sogenannten hedonistischen Kalkül vorgenommen werden.\nDas hedonistische Kalkül\nMit dem hedonistischen Kalkül lässt sich die Lust-Unlust-Bilanz von Handlungen berechnen. Dabei\nmüssen 7 Kriterien berücksichtigt werden.\n1. Intensität: Wie intensiv ist die Freude bzw. das Leid?\n2. Dauer: Wie lange dauert die Freude oder das Leid an?\n3. Gewissheit/ Ungewissheit: Wie wahrscheinlich werden die Freude oder das Leid\neintreten?\n4. Nähe/ Ferne: Wann wird die Freude bzw. das Leid eintreten? Sofort oder erst später?\n5. Folgenträchtigkeit: Wird die Handlung weitere Folgen oder Nebenwirkungen nach sich\nziehen? Sind diese positiv oder negativ?\n6. Reinheit: Ist die Freude rein oder ist ihr Leid beigemischt?\n\n7. Sind mehrere Menschen von der Handlung betroffen, muss zudem noch das\nAusmaß berücksichtigt werden. Man fragt sich also, wie viele Menschen von der\nHandlung betroffen sind, und berücksichtigt dann alle gleichwertig bei der Berechnung.\nBentham wollte diese Art moralischer Kalkulation auch in der Gesetzgebung anwenden und\nBerechnungsmethoden für den allgemeinen Nutzen finden, die zu einheitlichen Ergebnissen führen.\nProblem: Die Idee ist beeindruckend, aber in der Praxis extrem schwierig:\n• Gefühle sind nicht exakt messbar.\n• Zukunftsfolgen sind unsicher.\n• Die Perspektive anderer ist nur begrenzt zugänglich.\n• Es bleibt unklar, ob wirklich jede Lust gleich viel wert ist.\nGenau deshalb setzt Mill später an.\nJohn Stuart Mill (1806-1873): Der qualitative\nUtilitarismus\nMill sieht, dass Bentham zwar nützlich denkt, aber den Menschen zu flach versteht. Menschen\nwollen nicht nur angenehme Reize, sondern auch:\n• Bildung\n• Selbstentfaltung\n• Freiheit\n• geistige Entwicklung\n• Würde\nDeshalb genügt es nicht, Freuden nur zu zählen. Man muss sie auch bewerten.\nKritik an Bentham und qualitativer Utilitarismus\nDer schottische Schriftsteller Thomas Carlyle kritisierte den Utilitarismus von Jeremy Bentham als\neine „Schweine-Philosophie“. Seine Idee war:\nWenn Menschen nur nach Lust streben und das Ziel des Lebens einfach nur möglichst viel Freude\nist, dann unterscheidet sich der Mensch nicht mehr vom Tier.\nJohn Stuart Mill nimmt diese Kritik ernst, widerspricht ihr aber.\nMill sagt:\n\nDer Utilitarismus ist nur dann eine „Schweine-Philosophie“, wenn man annimmt, dass alle\nFreuden gleich sind. Genau das lehnt er ab.\nEr argumentiert:\n→ Es gibt unterschiedliche Arten von Freude, und einige sind wertvoller als\nandere.\nHöhere und niedere Freuden\nMill unterscheidet zwei Arten von Freuden:\n• Niedere Freuden\n→ körperlich, kurzfristig (z. B. Essen, Komfort)\n• Höhere Freuden\n→ geistig, intellektuell, moralisch (z. B. Denken, Lernen, Kunst, Engagement)\nSeine zentrale These:\n→ Höhere Freuden sind wertvoller als niedere, auch wenn sie anstrengender\nsind oder nicht immer glücklich machen.\nDas bringt er in seinem berühmten Zitat auf den Punkt:\n„Es ist besser, ein unzufriedener Mensch zu sein als ein zufriedenes Schwein; besser ein unzufriedener\nSokrates als ein zufriedener Narr.“\nDie Idee dahinter:\nEin Mensch kann tiefere Formen von Glück erleben, weil er denken, reflektieren und sich\nweiterentwickeln kann. Ein Tier oder ein „Narr“ hat diese Möglichkeiten nicht.\nWarum Menschen höhere Freuden bevorzugen\nMill argumentiert:\nKein Mensch würde ernsthaft sein Leben gegen das eines Tieres tauschen, selbst wenn das Tier\nmehr unmittelbare Lust erlebt.\nWarum?\n• Menschen haben Bewusstsein für sich selbst\nQuantitativer Utilitarismus (Bentham) Qualitativer Utilitarismus (Mill)\nLust wird nur in quantitativer Hinsicht betrachtet Lust wird auch in qualtitativer Hinsicht betrachtet:\ngeistige und körperliche Lüste werden unterschieden\nAlle Lüste (körperliche und geistige) haben den gleichen\nWert\nDie geistige Lust steht höher, da nur Menschen diese\nempfinden können.\n\n• sie können sich entwickeln\n• sie besitzen Würde und Selbstachtung\n• sie können entscheiden, welchen Freuden sie nachgehen\nDeshalb ist menschliches Glück mehr als bloße Zufriedenheit.\nEs geht um ein dauerhaftes, sinnvolles Glück, nicht nur um kurzfristige Lust.\n„Competent judges“ (kompetente Beurteiler)\nAber wer entscheidet, welche Freuden „höher“ sind?\nMill sagt:"},{"id":"kant_eth","name":"Immanuel Kant – Pflichtethik","sem":"Ethik","content":"Überblick Kants Pflichtethik\nEinführung\nKants Ethik beginnt mit einem ziemlich radikalen Gedanken: Moral hat nichts mit Gefühlen, Glück\noder guten Absichten zu tun. Entscheidend ist allein, ob wir aus Vernunft handeln.\nEr stellt sich gegen die Idee, dass wir moralisch handeln, weil wir Mitgefühl haben oder gute Folgen\nerreichen wollen. Für ihn ist das alles zu unsicher. Heute fühlst du dich großzügig, morgen nicht.\nMoral würde so zu einer Laune werden.\nStattdessen fordert Kant etwas Unbequemes: Wir sollen so handeln, dass unsere Entscheidungen\nfür alle Menschen gelten könnten. Und wir sollen jeden Menschen immer als Zweck behandeln,\nniemals nur als Mittel.\nDamit macht er Moral streng, aber auch konsequent. Sie gilt unabhängig davon, ob es uns passt\noder nicht. Kant zwingt uns im Grunde, uns selbst ernst zu nehmen als vernünftige Wesen, die\nVerantwortung für ihr Handeln tragen.\nArgumentation kurzgefasst\n1. Ausgangsproblem: Was ist moralisch richtig?\nKant sagt:\nMoral darf nicht abhängen von:\n• Gefühlen\n• Konsequenzen\n• persönlichen Interessen\n→ Sonst wäre Moral zufällig und relativ.\n→ Also braucht es ein universelles, notwendiges Prinzip.\n2. Das einzig unbedingt Gute: der gute Wille\n\nAlles andere kann missbraucht werden.\nNur der gute Wille ist immer gut.\n→ Problem: Was ist ein „guter Wille“ genau?\n3. Lösung: Handeln aus Pflicht\nEin Wille ist gut, wenn er:\n→ aus Pflicht handelt\n→ nicht aus Neigung oder Vorteil\n→ aus Pflicht handelt man, wenn man einem Gesetz folgt\n→ Moral = Achtung vor dem Gesetz\n4. Woher kommt dieses Gesetz?\nNicht von außen (Religion, Gesellschaft etc.)\n→ Sondern aus der Vernunft selbst\n→ Der Mensch gibt sich das moralische Gesetz selbst (Freiheit und Autonomie\ndes Menschen)\n5. Das Prüfprinzip: der kategorische Imperativ\nHandle nur nach derjenigen Maxime, durch die du zugleich wollen kannst, dass sie ein allgemeines\nGesetz werde.\nTest:\n* Kann ich wollen, dass alle so handeln?\n* Wenn nein → unmoralisch\n6. Zweite wichtige Formulierung\nDer Mensch als Zweck an sich:\n→ Behandle jeden Menschen immer auch als Zweck, niemals nur als Mittel\n→ keine Ausnutzung, keine Instrumentalisierung\n7. Konsequenz: Autonomie und Freiheit\nMoral funktioniert nur, wenn der Mensch:\n* frei ist\n* vernünftig ist\nFreiheit = sich selbst dem moralischen Gesetz unterwerfen\n(ja, Kant nennt das ernsthaft Freiheit)\n\nGesamtlogik in 6 Schritten\n1. Moral muss allgemein gültig sein\n2. → Gefühle/Konsequenzen fallen raus\n3. → nur Vernunft bleibt\n4. → daraus entsteht das moralische Gesetz\n5. → guter Wille = Handeln aus Pflicht = Handeln nach einem Gesetz\n6. → Gesetz = kategorischer Imperativ prüft Handlungen\nWesentliche Begriffe\nGuter Wille\nDas einzige, was ohne Einschränkung gut ist. Sein Wert hängt nicht von Erfolg oder Folgen ab.\nPflicht\nHandeln, weil es moralisch geboten ist, nicht aus Neigung oder Eigeninteresse.\nMaxime\nSubjektive Handlungsregel. Sie beschreibt, nach welchem Prinzip jemand handelt.\nKategorischer Imperativ\nZentrales moralisches Prüfprinzip. Eine Handlung ist nur dann moralisch, wenn ihre Maxime als\nallgemeines Gesetz gelten kann.\nHypothetischer Imperativ\nBedingte Handlungsanweisung. Gilt nur, wenn man ein bestimmtes Ziel verfolgt, und hat keinen\nmoralischen Wert.\nAutonomie\nSelbstgesetzgebung der Vernunft. Der Mensch gibt sich das moralische Gesetz selbst.\nHeteronomie\nFremdbestimmung durch äußere Einflüsse wie Gefühle, Interessen oder gesellschaftlichen Druck.\nZweck an sich\nJeder Mensch besitzt Würde und darf niemals nur als Mittel benutzt werden.\nFreiheit\nNicht Beliebigkeit, sondern die Fähigkeit, nach dem moralischen Gesetz der Vernunft zu handeln.\n\nAchtung vor dem Gesetz\nDas Motiv moralischen Handelns. Eine rationale Haltung, aus der heraus man aus Pflicht handelt.\n\nVertiefung: Kants Pflichtethik\nImmanuel Kant und die Aufklärung\nImmanuel Kant lebte zwischen 1724 und 1804, d.h. im Zeitalter der Aufklärung. Charakteristisch\nfür die Aufklärung ist, dass die Vernunft im Mittelpunkt steht. Vorurteile und althergebrachte\nMeinungen werden kritisch hinterfragt, die Naturwissenschaften erstarken. Man spricht von einer\nkopernikanischen Wende in der Philosophie: Nicht mehr die Dinge in der Welt bzw. die Erfahrung,\nsondern der Verstand ist nun das Maß der Erkenntnis.\nÜber die Aufklärung hat Kant auch einen sehr berühmten Essay geschrieben: Beantwortung der\nFrage: Was ist Aufklärung? (1784).\nDarin definiert er Aufklärung wie folgt: „Aufklärung ist der Ausgang des Menschen aus seiner\nselbstverschuldeten Unmündigkeit.“ Unmündigkeit bedeutet für ihn, dass der Mensch nicht fähig ist,\nseinen eigenen Verstand zu benutzen. Selbstverschuldet ist diese Unmündigkeit, weil er zwar\ngrundsätzlich dazu in der Lage wäre, aber zu faul oder zu feige dafür ist. Der Wahlspruch der\nAufklärung lautet daher nach Kant: „Sapere aude! Habe Mut, dich deines eigenen Verstandes zu\nbedienen!“\nBegriffliche Einordnung von Kants Ethik\nNormative/ präskriptive Ethik: Kants Ethik will dem Menschen vorschreiben, wie er\nhandeln soll.\nVernunftethik: Handlungen werden mit Hilfe der Vernunft bewertet, Gefühle spielen bei der\nBewertung von Handlungen keine Rolle.\nDeontologische Ethik/ Pflichtethik: (von griechisch déon - das Erforderliche, das Gesollte,\ndie Pflicht) Handlungen werden danach beurteilt, ob sie einer verpflichtenden Regel (➔\nKategorischer Imperativ) entsprechen.\nGesinnungsethik/ Motivethik: Wichtig für Kant ist die Handlungsabsicht, die Gesinnung, das\nMotiv der Handlung. Die richtige ethische Gesinnung bezeichnet Kant als „guten Willen“.\nMenschenbild\nImmanuel Kants berühmte Grundfragen der Philosophie lauten: Was kann ich wissen? (➔\nErkenntnistheorie)\nWas soll ich tun? (➔ Ethik)\nWas darf ich hoffen? (➔ Metaphysik)\nUnd schließlich: Was ist der Mensch? (➔ Anthropologie)\n\nDie letzte Frage: „Was ist der Mensch?“ ist dabei eine übergeordnete, eine zusammenfassende\nFrage. Die drei ersten Fragen beziehen sich auf die letzte.\nUm Kants Erkenntnistheorie, seine Ethik und seine Metaphysik zu verstehen, muss man seine\nAnthropologie, sein Menschenbild kennen.\nMensch als Bürger zweier Welten\nKant beschreibt den Menschen als „Bürger zweier Welten“:\n• Sinnenwelt: geprägt von Bedürfnissen, Trieben und Gefühlen\n• Vernunftwelt: geprägt von Freiheit und rationalem Denken.\nDementsprechend hat er ganz unterschiedliche Eigenschaften und Fähigkeiten.\nDer Mensch ist also kein reines Instinktwesen. Er kann sich gegen seine Neigungen entscheiden.\nGenau diese Fähigkeit macht ihn frei. Im Gegensatz zu Tieren ist der Mensch nämlich nicht nur von\nseinen Instinkten getrieben, sondern kann sich - auch entgegen seiner Instinkte - entscheiden: Er\nkann beispielsweise auf Essen verzichten, obwohl er hungrig ist, weil er abnehmen möchte. Oder er\nkann wach bleiben, obwohl er müde ist, weil er aufs Abi lernt.\nEr kann sich also selbst Befehle (Imperative) geben, die er auch befolgen kann. Der menschliche\nWille kann sich nur deshalb vom kategorischen Imperativ als einem rein vernünftigen und formalen\nPrinzip bestimmen lassen, weil er nicht nur der sinnlichen Welt, sondern auch der Vernunftwelt\nangehört und dadurch frei ist.\nMenschenwürde\nWeil der Mensch ein Vernunftwesen ist, kann er sich selbst Gesetze geben. Diese Fähigkeit nennt\nKant Autonomie.\nDaraus folgt:\nVernunftwelt / intelligible Welt Sinnenwelt\nVernunftwesen („homo noumenon“) Sinnenwesen („homo phaenomenon“)\nGeistiges Geschöpf: Der Mensch kann unabhängig\nvon seinen Sinnen und Trieben, also autonom und frei\nhandeln. Nur so ist moralisches Handeln möglich. Der\nMensch kann sich nämlich mit Hilfe seiner Vernunft über\nseine Neigungen (Gefühle, Instinkte, Bedürfnisse)\nhinwegsetzen.\nTier unter Tieren:DerMensch ist abhängig von seinen\nSinnen und Trieben und dadurch determiniert, unfrei; er\nunterliegt den Gesetzen der Kausalität (Ursache ➔\nWirkung)\nBedeutend: Kann über seine Vernunftdie Beziehungen\nund Verbindungen und die Unendlichkeit des Universums\nerkennen und hat damit Anteil an dieser Unendlichkeit.\nUnbedeutend:WinzigerTeil des Universums\nUnsterblich: Mehr als bloße Materie Sterblich: Bloße Materie,die nach demTod zerfällt\n\n→ Der Mensch besitzt Würde.\nWürde bedeutet:\n• Menschen haben einen absoluten Wert\n• sie dürfen nicht mit Dingen verglichen oder verrechnet werden\n• sie dürfen niemals nur als Mittel benutzt werden\nDinge haben einen Preis, Menschen haben Würde.\nDer gute Wille\nKant will ein eindeutiges und universal - also immer, überall und für jeden - gültiges Kriterium zur\nBewertung menschlicher Handlungen finden.\nEr stellt sich dazu die Frage: Was ist ohne Einschränkung gut?\nSeine Antwort lautet: Nur der gute Wille.\nDas, was Menschen gewöhnlich für gut halten, nämlich die sogenannten Naturgaben - also die\nEigenschaften, die der Mensch von Natur aus hat, und die Glücksgaben, die der Mensch glücklichen\nUmständen/ dem Schicksal verdankt, sind für Kant nicht uneingeschränkt gut.\nDenn:\nGut ist der Wille, wenn er ausschließlich von der praktischen Vernunft bestimmt wird und sich nach\ndem moralischen Gesetz (= kategorischer Imperativ) richtet. Neigungen und erwartete/\ntatsächliche Konsequenzen spielen keine Rolle.\nMaxime\nDer Begriff der Maxime ist zentral für Kants Ethik, da der kategorische Imperativ sich auf Maximen\nbezieht.\nMaximen sind subjektive Handlungsregeln, nach denen ein Mensch handelt oder handeln möchte.\nNaturgaben Glücksgaben\n„Talente des Geistes“/\nGeistige Fähigkeiten\n„Eigenschaften des\nTemperaments“/\nCharaktereigenschaften\nz.B. Verstand,\nEinfallsreichtum\nz.B. Mut, Beharrlichkeit z.B. Macht, Reichtum\nKönnen böse und schädlich werden, wenn die\nGesinnung, das Motiv des Handelns - Kant spricht vom\nWillen - schlecht ist.\nKönnen zu Übermut und Missbrauch führen.\n\nSie drücken aus, woran jemand sein Verhalten grundsätzlich orientiert, und gelten immer nur für\ndas einzelne Individuum, nicht allgemein.\nDer moralische Wert einer Handlung hängt davon ab, ob ihre Maxime mit dem kategorischen\nImperativ übereinstimmt. Nur solche Maximen sind moralisch gut, die auch als allgemeines Gesetz\ngelten könnten.\nImperativ\nEin Imperativ ist eine Handlungsanweisung oder ein Gebot, das angibt, wie man handeln soll.\nBei Kant ist ein Imperativ ein vernünftiges Prinzip, das den menschlichen Willen bestimmt. Da der\nMensch nicht rein vernünftig ist, sondern auch von Neigungen und Interessen beeinflusst wird,\nwirken Imperative als eine Art Nötigung: Sie fordern uns auf, entgegen unseren spontanen Impulsen\nzu handeln.\nImperative richten sich also an den Menschen als vernünftiges, aber zugleich sinnliches Wesen und\nsollen sein Handeln an rationalen Maßstäben ausrichten.\nHypothetische Imperative\n„Hypothetisch“ bedeutet: auf einer Bedingung beruhend.\nHypothetische Imperative haben die Form von Wenn-dann-Sätzen und beschreiben eine Mittel\u0002Zweck-Beziehung:\n% „Wenn du X willst, dann tue Y.“\nSie sind nicht allgemein gültig, sondern hängen vom jeweiligen Ziel ab. Man handelt also nicht aus\nmoralischer Pflicht, sondern um ein bestimmtes Ziel zu erreichen.\nKant unterscheidet zwei Arten:\n1. Technische Imperative (Regeln der Geschicklichkeit)\nSie geben praktische Anweisungen, um ein bestimmtes Ziel zu erreichen.\nBeispiel: „Wenn dich die Sonne blendet, trage eine Sonnenbrille.“\nSie gelten nur, wenn man das Ziel tatsächlich verfolgt.\n2. Pragmatische Imperative (Ratschläge der Klugheit)\nSie beziehen sich auf das Ziel, ein glückliches Leben zu führen.\n\nProblem: Glück ist für jeden Menschen unterschiedlich, deshalb sind diese Imperative nicht\nallgemein gültig.\nBeispiel: „Heirate und gründe eine Familie.“\n→ Fazit:\nHypothetische Imperative sind immer zweckgebunden. Sie können sinnvoll sein, sind aber nicht\nmoralisch im eigentlichen Sinn, weil sie nicht aus Pflicht entstehen.\nKategorischer Imperativ\nIm Gegensatz dazu steht der kategorische Imperativ. Er gilt unbedingt, unabhängig von jedem\nZweck oder persönlichen Interesse.\nKant ist der Ansicht, dass ein moralisches Gesetz:\n• allgemein gültig\n• notwendig\n• und unabhängig von Erfahrung (a priori) sein muss\nDer kategorische Imperativ ist daher ein rein vernünftiges Gesetz, das sich der Mensch selbst gibt.\nEine solche Moral nennt Kant autonom (selbstbestimmt), im Gegensatz zu fremdbestimmten\nRegeln (heteronom).\nDer kategorische Imperativ lautet:\n→ „Handle nur nach derjenigen Maxime, durch die du zugleich wollen kannst,\ndass sie allgemeines Gesetz werde.“\nEr dient als Prüfverfahren:\nMan überprüft, ob die eigene Handlungsregel (Maxime) von allen Menschen jederzeit befolgt\nwerden könnte.\n→ Nur wenn das möglich ist, ist die Handlung moralisch.\nDer kategorische Imperativ ist damit das einzige Grundgesetz der Moral. Während es viele\nunterschiedliche persönliche Maximen gibt, gibt es nur dieses eine allgemeine Prinzip.\nEine Handlung ist nur dann moralisch, wenn sie:\n• aus Pflicht geschieht\n• und allein vom moralischen Gesetz bestimmt wird\nNeigungen oder erwartete Folgen spielen dabei keine Rolle.\n\nKant formuliert den kategorischen Imperativ in verschiedenen Varianten. Die wichtigsten sind:\n• die Universalisierungsformel (Verallgemeinerbarkeit)\n• die Zweck-an-sich-Formel (Achtung der Menschenwürde)\nDie Universalisierungsformel des kategorischen Imperativs\n„Handle nur nach derjenigen Maxime, durch die du zugleich wollen kannst, dass sie allgemeines Gesetz\nwerde.“\nMit dieser Formel prüft man, ob die eigene Handlungsregel (Maxime) für alle Menschen gelten\nkönnte. Nur wenn das möglich ist, ist die Handlung moralisch.\n→ Es geht also um die Verallgemeinerbarkeit von Maximen.\nBeispiel: Darf ich lügen, um mich aus einer unangenehmen Situation zu befreien?\n(1) Formulierung der Maxime:\n„Lüge, wenn du dich dadurch aus einer unangenehmen Situation befreien kannst.“\n(2) Formulierung der Handlungsmaxime als allgemeines Gesetz:\n„Immer wenn sich jemand in einer unangenehmen Situation befindet, soll er lügen.“\n(3): Frage: Kann man ein solches allgemeines Gesetz wollen?\n➔ NEIN. Dann könnte nämlich niemand mehr dem anderen vertrauen.\nDamit würde sich die Maxime selbst zerstören. Lügen hätte mit einem solchen Gesetz keinen Sinn\nmehr, da Lügen nur dann funktioniert, wenn der andere die Lüge glaubt. Wenn ich weiß, dass es ein\nallgemeines Gesetz gibt, das vorschreibt zu lügen, um sich aus einer unangenehmen Situation zu\nbefreien, muss ich jederzeit annehmen, dass der andere mich anlügt. Es gäbe kein Vertrauen mehr\nund ohne Vertrauen könnte auch keiner mehr sinnvoll lügen.\nDie Zweck-an-sich-Formel/ Selbstzweckformel des kategorischen\nImperativs\n„Handle so, dass du die Menschheit, sowohl in deiner Person, als in der Person eines jeden anderen,\njederzeit zugleich als Zweck, niemals bloß als Mittel brauchest.“\n\nDiese Formel besagt, dass Menschen niemals nur als Mittel für fremde Zwecke benutzt werden\ndürfen. Der Grund dafür ist ihre Menschenwürde."},{"id":"jonas","name":"Hans Jonas – Verantwortungsethik","sem":"Ethik","content":"mehr fassen kann [...] und uns eine neue, nie zuvor erträumte Dimension der Verantwortung\naufzwingt\" Verantwortung ist also ein ethischer Schlüsselbegriff der modernen technologischen\nZivilisation. Er benennt in moderner Sprache das, was früher Pflichtbewusstsein hieß. Aber\ner legt, da der Begriff „Antwort\" in ihm steckt, das Gewicht stärker auf die sprachliche,\n\nrationale Begründbarkeit des Handelns gegenüber anderen. Verantwortung\nübernehmen heißt: Vernünftig antworten können auf die Frage nach dem\nHandlungsgrund. Der Begriff ist mehrstellig.\nZu fragen ist\n•nach der Zeitdimension: Wann wird Verantwortung übernommen;\n•nach den Akteuren: Wer übernimmt Verantwortung;\n•nach den zu verantwortenden Handlungen: Was wird verantwortet;\n•nach den Folgen: Wofür muss Verantwortung übernommen werden;\n•nach der Instanz: Wovor wird Verantwortung übernommen und grundsätzlich\n•nach der Begründung und dem Motiv dafür, Verantwortung zu übernehmen: Warum?\nFRAGEN ZU DEN DIMENSIONEN DER VERANTWORTUNG\nWann?\nPassiv, retrospektiv: im Sinne von „verantwortlich gemacht werden für“ „zur Verantwortung\ngezogen werden für etwas“ (entspricht dem traditionellen, juristischen Verständnis von\nVerantwortung\n→ Wo sind die Grenzen der Rechtfertigung, wann ist unverantwortliches Handeln strafwürdig?\nAktiv, prospektiv: im Sinne von sich verantwortlich fühlen für etwas, Sorge tragen für etwas\"\nEntspricht dem modernen Verständnis der Verantwortung, vgl. Max Weber, Hans Jonas)\n→ Wo sind die Grenzen der Zuständigkeit? Welche Gestaltungs- oder Verhinderungskompetenz\nhabe ich? Wie weit in die Zukunft reicht meine berechtigte Sorge?\n\nWer?\nWo sind Grenzen der Mündigkeit, Zurechnungsfähigkeit, der Freiheit der Entscheidung?\nGibt es nur individuelle oder auch kollektive Verantwortung?\nIst der Täter stets der Schuldige? Wie weit reicht Mitverantwortung?\nWas?\nWelche Handlungen müssen, können wir überhaupt verantworten?\nWandelt sich die Verantwortung mit dem technischen und wissenschaftlichen Fortschritt?\nErhöht sich die Verantwortung mit der Handlungsmacht des Menschen?\nWofür?\nFür welche Folgen trage ich Verantwortung? Sind Absicht und Absehbarkeit Bedingungen, um\nverantwortlich zu sein?\nDarf ich überhaupt handeln, wenn die Folgen unabsehbar sind? Wie können Handlungsfolgen besser\nabschätzbar gemacht werden? (Technikfolgenabschätzung)\nWandelt sich die Verantwortung angesichts der Explosion menschlicher Handlungsfolgen?\nWovor?\nWas ist die entscheidende Verantwortungsinstanz: Gott, das Ich, ein Gericht, die Gesellschaft, die\nMenschheit, die Natur?\nGibt es, außer der rechtlichen Verantwortung vor Gericht, überhaupt eine echte Instanz außer dem\neigenen Gewissen? Fordert die Natur wirklich Verantwortung?\n\nEthischer\nRelativismus und\nUniversalismus\nWerte und Normen\n→ Siehe Anfang dieses Dokumentes / des Unterrichts\nWie hängen Kultur und Ethik zusammen?\nDer Begriff „Ethik“ bezeichnet die philosophische Theorie der Moral. Moral wiederum umfasst das\nvielschichtige System moralischer Normen, Regeln und Gebote einer Gesellschaft. Der\nZusammenhang zwischen Kultur und Ethik kann also nur auf dem Umweg über den Begriff der\nMoral hergestellt werden. Denn die Moral beruht auf den einer bestimmten Kultur zugrunde\nliegenden Werten und Normen. Werte als ideale Orientierungsmuster stellen die Grundlage für\nNormen, also Handlungsvorschriften, dar. So gibt es zu jeder Norm einen Wert, der verwirklicht\nwerden soll. Umgekehrt kann jedem Wert eine bestimmte Norm als Handlungsregel zugeordnet\nwerden. Die Moral setzt sich sowohl aus Handlungsnormen als moralische Pflichten als auch\nWerten als moralischen Rechten zusammen. Die Ethik bildet das Reflexionsinstrument. Sie geht\nder Frage nach dem richtigen bzw. rechten Handeln nach. So erscheint es zunächst logisch, dass\njede Kultur auf der Basis ihrer eigenen Werte und Normen auch eigene moralische Vorstellungen\nentwickelt und befolgt.\nRelativismus und Universalismus - Zwei Positionen\nim Vergleich\nBetrachtet man die philosophische Sicht auf die Werte und Normen einer Kultur und die sich\ndaraus ergebenden moralischen Vorstellungen, finden sich zwei grundlegende Varianten, mit diesen\numzugehen.\nDer ethische Relativismus geht davon aus, dass für unterschiedliche Kulturen auch unterschiedliche\nmoralische Werte gelten (sollten). Die entgegengesetzte Position des Universalismus vertritt die\nÜberzeugung, dass für alle Kulturen dieselben moralischen Werte gelten (sollten). Die erstgenannte\nPosition geht aus von der Prämisse, dass menschliche Moralvorstellungen auf äußere Faktoren, wie\nbeispielsweise die Kultur, zurückzuführen sind. Folglich besitzen alle vertretenen Positionen die\ngleiche Gültigkeit. Deshalb kann es keine für alle Menschen gleichermaßen gültige Moral geben. Die\njeweiligen Normen und Werte gelten nur innerhalb einer bestimmten Kultur. Sie sind relativ und\n\nnicht allgemein gültig. Der ethische Universalismus hingegen vertritt die Position, dass es für alle\nMenschen unabhängig von Ort und Zeit geltende allgemein gültige Normen gibt, beispielsweise\nunverletzbare Menschenrechte.\nPaul Feyerabend argumentiert, dass die viel gepriesene Freiheit in Wirklichkeit nicht bedeutet,\nsich innerhalb der eigenen Kultur gleichberechtigt entfalten zu können. Stattdessen wird diese\nFreiheit oft als die Notwendigkeit interpretiert, die Lebensweise des „weißen Mannes“ zu\nübernehmen. Diese Auffassung verurteilt Feyerabend ausdrücklich, da sie die Vielfalt der Kulturen\nund Traditionen nicht anerkennt und respektiert.\nInfolgedessen stellt Feyerabend zwei zentrale Thesen auf. Erstens betont er, dass Traditionen nicht\nbewertet werden können; sie existieren einfach und sind ein integraler Bestandteil der jeweiligen\nKultur. Es ist daher unzulässig, Traditionen aus der Perspektive einer anderen Kultur zu beurteilen.\nJede Kultur hat ihre eigenen Wertvorstellungen und Praktiken, die nicht anhand fremder Maßstäbe\ngemessen werden dürfen.\nZweitens hebt Feyerabend hervor, dass Relativismus eine vernünftige, zivilisierte und kluge Haltung\nist. Relativismus verzichtet darauf, seine eigenen Maßstäbe als absolut zu setzen, und erkennt\nstattdessen die Legitimität und Gültigkeit verschiedener kultureller Perspektiven an. Durch diese\nOffenheit und Akzeptanz fördert der Relativismus ein besseres Verständnis und einen respektvollen\nUmgang zwischen unterschiedlichen Kulturen.\nGanz anders Julian Nida-Rümelin. Er behauptet, dass es Rechte gibt, die unabhängig von der\nKultur und der politischen Ordnung gelten. Diese universellen Rechte umfassen grundlegende\nFreiheiten und Schutzmaßnahmen, die für alle Menschen weltweit von Bedeutung sind. Dazu gehört\nauch das Recht auf Religionsfreiheit und kulturelle Selbstbestimmung. Allerdings sind diese Rechte\nnicht uneingeschränkt; sie stoßen an Grenzen, wenn sie in Konflikt mit anderen fundamentalen\nRechten und Freiheiten geraten.\n\nUm Menschenrechtsverletzungen als solche zu erkennen und zu verhindern, ist es entscheidend,\ndass innerhalb der jeweiligen Kulturen selbst ein Bewusstsein dafür wächst, dass Grundrechte\nverletzt werden. Dieser Prozess der Selbsterkenntnis und des innerkulturellen Dialogs ist\nunerlässlich, um eine nachhaltige Achtung der Menschenrechte zu gewährleisten.\nTrotz kultureller Unterschiede und vielfältiger Traditionen bleibt die Gültigkeit elementarer\nGrundrechte unbestritten. Diese Grundrechte sind universell und müssen überall respektiert und\ngeschützt werden. Sie bilden die Basis für eine gerechte und humane Gesellschaft, in der die Würde\njedes Einzelnen anerkannt wird.\n\nFreiheit\nFreiheitsbegriffe\nDer Begriff Freiheit wird in unterschiedlichen Zusammenhängen verwendet, beispielsweise in der\nEthik, der Handlungstheorie, in der Politik, im Recht, in den Humanwissenschaften usw. Je nachdem,\nin welchem Zusammenhang man den Begriff der Freiheit verwendet, hat er unterschiedliche\nBedeutungen.\nFreiheit bezieht sich sowohl auf Individuen - man spricht dann von individueller Freiheit - als auch\nauf soziale Gebilde und Institutionen - dann spricht man von kollektiver, sozialer, politischer oder\nnationaler Freiheit.\nDas ursprüngliche Subjekt der Freiheit ist immer das zu Handlungen fähige menschliche Individuum.\nBeim Menschen geht man nämlich - im Gegensatz zu Sachen und nicht- menschlichen Lebewesen -\ndavon aus, dass sein Wille von der Vernunft bestimmt werden kann. Freiheit ist der Grund dafür,\ndass der Mensch sein Leben und seine sozialen Beziehungen gestalten kann und muss.\nFreiheit hat zudem eine moralisch-sittliche Bedeutung. Sie ist Voraussetzung für Moralität,\nVerantwortung und Zurechnung.\n\nOb es Freiheit überhaupt gibt, wird jedoch teilweise bestritten. Die philosophische Position, welche\ndie menschliche Freiheit bestreitet, heißt Determinismus. Der Determinismus erhebt den Einwand,\nmenschliches Wollen und Handeln sei festgelegt, determiniert, und somit unvermeidbar und\nalternativlos.\nNegative vs. positive Freiheit\nRein formal unterscheidet man zwischen negativer (/ passiver) und positiver (/ aktiver) Freiheit.\nNegative Freiheit bedeutet „Freiheit von ...“, also die Unabhängigkeit bzw. Abwesenheit von\nEinschränkungen, Hemmnissen und Zwängen.\nPositive Freiheit meint „Freiheit zu ...“, also die Fähigkeit, mit seinem Wollen und Handeln\ntatsächlich in ein Verhältnis treten, in letzter Instanz entscheiden, Ziele und Mittel wählen, dem\neigenen Wollen und Handeln dadurch eine Richtung und ein Objekt geben und Ordnungen nicht\nnur hinnehmen, sondern auch selbst setzen zu können.\nErst beide Aspekte zusammen machen den Vollsinn der Rede von Freiheit aus.\nNegative Freiheit meint nämlich lediglich die Möglichkeit, nicht aber schon den tatsächlichen\naktiven Gebrauch der Freiheit.\n\nInnere vs. Äußere Freiheit\nAnwendungsfeld der negativen und positiven\nFreiheit.\nBei der Unterscheidung zwischen innerer und äußerer Freiheit geht es um das\nAnwendungsfeld der negativen und positiven Freiheit.\nInnere Freiheit meint die Willens- und Entscheidungsfreiheit, das „Wollen-können“.\n„Willensfreiheit“ wird in der Philosophie weitgehend gleichbedeutend mit „Entscheidungsfreiheit“\nund „Wahlfreiheit“ gebraucht.\nÄußere Freiheit meint die Handlungsfreiheit, das „Handeln-können“. Im Gegensatz zur inneren\nFreiheit geht es bei der äußeren Freiheit darum, eine schon gefallene Entscheidung bzw. die\nRealisierung eines bestimmten konkreten Willensentschlusses auszuführen. Es geht um den\nHandlungsspielraum des Wollens.\nDimensionen der Freiheit\nWenn wir diese einzelnen Begriffe von Freiheit kombinieren, lassen sich 4 Freiheitsdimensionen\nunterscheiden.\nDie negative innere Freiheit besteht in der Abwesenheit von psychischen und\nphysiologischen Hindernissen und Hemmnissen, in der Unabhängigkeit von innerer\nNaturbestimmung oder psychophysischen Mechanismen (z. B. körperlichen Bedürfnissen, Trieben,\nNeigungen, psychischen Krankheiten usw.), die uns daran hindern würden, Subjekt unseres Wollens\nund unserer Handlungen zu sein.\n\nGegenbegriffe zur negativen inneren Freiheit sind beispielsweise Triebhaftigkeit oder\nInstinktsteuerung.\nDie positive innere Freiheit meint die Willens- und Entscheidungsfreiheit im engeren Sinne.\nSie ist dann gegeben, wenn alle internen (psychophysischen) Handlungsfaktoren und\nMöglichkeitsbedingungen für ein freies Wollen und Entscheiden vorhanden sind. Wir können uns\nalso trotz und entgegen natürlicher Vorgaben und Einflussfaktoren allein von der Vernunft\nbestimmen lassen, uns eigene Ziele setzen und Mittel zur Erreichung dieser Ziele bzw. zur\nVerfolgung unserer Interessen wählen und überhaupt Wertorientierungen ausbilden und\nOrdnungen setzen, für die wir die Verantwortung zu tragen haben. Positive innere Freiheit in\ndiesem Sinne meint, dass der Mensch selbst Ursprung seines So- und-nicht-anders-Wollens ist. Die\nRede ist von innerer Autonomie.\nWichtige Vertreter eines solchen Freiheitsbegriffs sind Descartes, Kant, Hegel und Sartre.\nGegenbegriffe zur positiven inneren Freiheit sind beispielsweise Pflichtvergessenheit oder\nUnvernunft.\nDie negative äußere Freiheit besteht in der Unabhängigkeit von äußeren Einschränkungen,\nZwängen und Hemmnissen, die uns daran hindern, das zu tun, was wir wollen.\nSie besteht zum einen in physischer Freiheit, also der Unabhängigkeit von Einschränkungen, die der\nRealisierung unseres Wollens entgegenstehen. Gemeint ist aber auch die Unabhängigkeit von\nSchicksal, Vorhersehung und Zufall, durch die unser Handlungsspielraum nicht nur eingeschränkt,\nsondern völlig aufgehoben würde.\nWichtige Vertreter dieser Auffassung von Freiheit sind Aristoteles, Hobbes, Locke, Voltaire und\nd’Holbach.\nZum anderen meint die negative äußere Freiheit auch politische und gesellschaftliche Freiheit.\nGemeint ist die Unabhängigkeit sowohl von politischer Gewalt (Diktatur) als auch von den\nZwängen des gesellschaftlichen Daseins. Überindividuelle, soziale und kulturelle Strukturen,\nInstitutionen, Normen und Konventionen können menschliches Handeln nämlich ebenfalls\nhemmen.\nNegative äußere Freiheit ist auch dann gegeben, wenn dem eigenen Tun-Wollen kein rechtliches\noder sittliches Verbot entgegensteht. Die Handlung ist also rechtlich erlaubt, legal, bzw. dem Ethos\nkonform, legitim. Das Streben nach Unabhängigkeit von sozialem Zwang zeigt sich in der Neuzeit\nim Gedanken der Befreiung aus weltanschaulichen, politischen, gesellschaftlichen, ökonomischen,\npädagogischen etc. Zwängen ebenso wie aus Tradition, Aberglaube und Religion. Gefordert wird\neine solche Befreiung von Emanzipations- und Aufklärungsbewegungen.\nGegenbegriffe zur negativen äußeren Freiheit sind beispielsweise Unterdrückung oder Zwang.\n\nDie positive äußere Freiheit meint Handlungsfreiheit im engeren Sinne.\nDiese Freiheit besteht darin, das, was man der Möglichkeit nach tun kann, in der Realität auch\ntatsächlich zu tun. Man kann das Gesollte und Gewollte also auch umsetzen, selbst gesetzte\nZwecke verwirklichen bzw. eigene Bedürfnisse befriedigen und sich Wünsche erfüllen. Man kann die\neigene Lebenswelt, d.h. die natürliche Umwelt und die soziale Mitwelt, durch eingreifende\nHandlungen individuell oder kollektiv gestalten.\nWichtige Vertreter dieser Auffassung von Freiheit sind Spinoza, Hume und Moore. Gegenbegriffe\nzur positiven äußeren Freiheit sind beispielsweise Beliebigkeit oder Unentschlossenheit.\nWillensfreiheit\nFür den Begriff der Willensfreiheit gibt es keine allgemein anerkannte Definition.\nIm engsten Sinne bedeutet Willensfreiheit, wollen zu können, was man will. Ein solcher Begriff der\nWillensfreiheit ist von vielen Philosophen (z.B. Tugendhat, Leibniz) kritisiert worden.\nIn der Philosophie wird der Begriff der Willensfreiheit oft synonym zu Wahlfreiheit oder\nEntscheidungsfreiheit (freedom of choice) benutzt. Man kann also wählen, was man will, bzw. frei\nentscheiden. Nach dieser Definition geht es bei der Freiheit des Willens nicht mehr um das\nZustandekommen erster Neigungen oder Wünsche, sondern um eine spätere Phase.\nEntscheidungen stehen am Ende eines Willensbildungsprozesses, nicht am Anfang.\nPrinzipien der Willensfreiheit\nDamit Entscheidungen frei sind, müssen folgende 3 Voraussetzungen erfüllt sein.\n1.) Das Prinzip alternativer Möglichkeiten\nDie Person hätte also auch eine andere Entscheidung treffen können.\nEs gab im Augenblick der Entscheidung Handlungsalternativen, die dem Handelnden zur Verfügung\nstanden.\n2.) Autonomieprinzip\nAutonom können Handlungen nur sein, wenn sie nicht vollständig von äußeren Einflussfaktoren\nabhängen, sondern auf selbstbestimmten Grundsätzen beruhen. Die Entscheidung\nunterliegt also der Kontrolle der Person und wurde beispielsweise nicht erzwungen.\n3.) Das Prinzip der Urheberschaft\nDie Entscheidung wurde von der entscheidenden Person selbst getroffen.\nSie hat die Wahl zwischen alternativen Handlungen, wägt die Gründe für die einzelnen Alternativen\nab und fällt dann selbst eine Entscheidung.\nEinschränkungen der Willensfreiheit\nInnere Zwänge, Automatismen, Süchte, starke Affekte, Erpressung und Folter können die\nWillensfreiheit einschränken. Wenn es unter solchen Bedingungen zu einer Straftat gekommen ist,\n\nist der Täters möglicherweise schuldunfähig.\nAuch Willensschwäche oder Steuerungsunfähigkeit können die Willensfreiheit beeinträchtigen.\nHandlungsfreiheit\nWas sind Handlungen?\nHandlungen unterscheiden sich grundlegend von anderen Ereignissen. Bloße Körperbewegungen\noder körperliche Empfindungen, Reflexe oder Vorgänge wie Frieren, Niesen oder Verdauen sind\nkeine Handlungen.\nWenn jemand handelt, dann tut er etwas absichtlich, also willentlich, wissentlich, bewusst,\nvorsätzlich. Handlungen sind immer mit Absichten verknüpft. Auch
