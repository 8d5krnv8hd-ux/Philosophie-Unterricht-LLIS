iche Definitionen andere Kulturen ausgeschlossen.\n\n• Leere Universalität: Abstrakte Rechte ohne Institutionen schützen niemanden konkret.","• Wer erstellt die Liste?: Nussbaums Fähigkeitenliste wirkt liberal-westlich geprägt – wessen Vorstellung von «würdigem Leben»?\n\n• Prioritätenproblem: Wie entscheidet man bei Konflikten zwischen Fähigkeiten?\n\n• Staatliche Abhängigkeit: Wie werden Fähigkeiten ohne funktionierende Staaten durchgesetzt?","• Relativistisch: Wenn Menschenrechte kulturell bedingt sind, haben sie keinen universellen Anspruch.\n\n• Empathie kann versagen: Narrative können auch Feindbilder statt Solidarität erzeugen.\n\n• Kein Fundament in Krisen: Wenn Empathie schwindet, gibt es kein rationales Fundament mehr.","• Historisch missbraucht: Sozialdarwinismus und NS beriefen sich auf Nietzsche – auch wenn er das missverstanden hatte.\n\n• Elitär: Wer definiert «Stärke»? Keine Berücksichtigung von Verwundbarkeit.\n\n• Keine Alternative: Nietzsche zeigt, was er ablehnt – aber kein konkretes Gegenmodell."]},{"label":"Zusammen-fassung","values":["Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen.","Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen.","Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen.","Kant: Menschenrechte beruhen auf Vernunft und Autonomie – sie sind universell, unveräußerlich und gelten unabhängig von Kultur und Geschichte. Grundlage des modernen Verfassungsrechts.\nNussbaum: Formale Rechte reichen nicht. Entscheidend ist, ob Menschen konkrete Fähigkeiten entfalten können – Gesundheit, Bildung, politische Teilhabe, Würde im Alltag. Kulturell sensibel, aber universal.\nRorty: Menschenrechte sind historische Errungenschaften, die durch Empathie wachsen. Sentimentale Erziehung – Literatur, Medien, Bildung – ist wirksamer als philosophische Begründung.\nNietzsche: Menschenrechte sind «Sklavenmoral» – sie unterdrücken individuelle Stärke. Als radikale Gegenposition unverzichtbar für die kritische Reflexion, woher Menschenrechte wirklich kommen."]}]},"grenzen":{"sem":"Staatsphilosophie","name":"Grenzen staatlicher Macht","leitfrage":"Wie weit darf staatliche Macht gehen — und wann muss man ihr widerstehen?","conn":["liberalismus","vertragstheorie","machttheorie","demokratie"],"positions":["Anarchismus","Libertarismus","Republikanismus","Totalitarismus ⚠ Keine normative Position — analytische Gegenfolie"],"rows":[{"label":"Achse: Staatsmacht","values":["← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)","← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)","← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)","← weniger Staatsmacht ─────────────────────────────────────────────────────────────────────────── mehr Staatsmacht →\nKein Staat          Minimal-Staat              Kontrollierter Staat              Totaler Staat (alle Bereiche)"]},{"label":"Leitfrage","values":["Wie viel staatliche Macht ist legitim — und wann schlägt sie in Unterdrückung um?  Der Totalitarismus ist der philosophische Endpunkt der Achse: er beantwortet die Frage mit «unbegrenzt» — und zeigt, wohin das führt.","","",""]},{"label":"Vertreter","values":["Bakunin (1814–1876), Kropotkin (1842–1921), Emma Goldman (1869–1940)","Nozick (1938–2002), Hayek (1899–1992), Friedman (1912–2006)","Pettit (*1945), Skinner (*1940), Cicero (106–43 v. Chr.), Arendt (1906–1975)","⚠ Kein Philosoph vertritt diese Position normativ.\n\nAnalytiker, die den Totalitarismus untersuchen und kritisieren:\n\nHannah Arendt (1906–1975): Elemente und Ursprünge totaler Herrschaft (1951) — Standardwerk der Totalitarismusanalyse.\nKarl Popper (1902–1994): Die offene Gesellschaft und ihre Feinde (1945) — Platon und Hegel als geistige Vorläufer.\nFriedrich Hayek (1899–1992): Der Weg zur Knechtschaft (1944) — Warnung vor Planwirtschaft als Vorstufe.\nGeorge Orwell (1903–1950): 1984 (1949) — literarische Analyse, philosophisch bedeutsam."]},{"label":"Merksatz","values":["Jeder Staat ist Unterdrückung. Wahre Freiheit entsteht nur ohne Zwang und Herrschaft.","Der Staat hat kein Recht auf mehr Macht als nötig zum Schutz individueller Rechte.","Freiheit bedeutet: keiner willkürlichen Herrschaft ausgeliefert sein. Institutionen sichern das.","⚠ Kein Merksatz — keine zu verteidigende Position.\n\nStattdessen: Was Arendt über den Totalitarismus sagt:\n\n«Der Totalitarismus ist eine historisch neue Herrschaftsform — nicht Tyrannei, sondern die vollständige Auflösung des politischen Raums, in dem Menschen als Menschen handeln können.»\n\n— Hannah Arendt"]},{"label":"Definition von Freiheit","values":["• Radikal negativ: Abwesenheit jeder Herrschaft — auch demokratisch legitimierter.\n• Staat ist strukturell unterdrückend. Freiheit ohne Staat — nicht trotz Staat.","• Liberal-negativ: Abwesenheit äußerer Einschränkungen. Staat nur bei aktiver Rechtsverletzung.\n• Freiheit als Nicht-Einmischung: Möglichst wenig soll verboten sein.","• Nicht-Beherrschung: Freiheit als Abwesenheit von Dominanz — auch gutmeinender.\n• Strukturelle Sicherheit vor Willkür durch Institutionen.","⚠ Freiheit existiert hier nicht als eigenständiger Wert.\n\nArendt: Totalitarismus zerstört den «politischen Raum» — den Ort, wo Menschen als freie Wesen handeln können.\n\nPopper: Totalitäre Systeme fordern «Freiheit» von der Geschichte, dem Klassenfeind oder der Rasse — eine Pseudofreiheit, die echte Freiheit zerstört.\n\nHayek: Jede Planung tötet Freiheit schrittweise — «Der Weg zur Knechtschaft» ist gepflastert mit guten Absichten."]},{"label":"Verhältnis zur Demokratie","values":["Kritisch-ambivalent: Demokratische Mehrheiten können trotzdem unterdrücken.\n• Bevorzugt: direkte Demokratie in kleinen Gemeinschaften, Konsens statt Mehrheitsentscheid.\n→ «51 % können 49 % systematic entrechtigen.»","Instrumentell: Demokratie gut nur wenn sie Rechte schützt — Verfassung wichtiger als Wahlen.\n• Hayek: Warnung: Demokratie ohne konstitutionelle Grenzen kann in Tyrannei gleiten.\n→ Freiheit sichert man durch Verfassungen, nicht durch Wahlen.","Konstitutiv: Demokratie ist die beste Form — aber nur mit starken Institutionen und Anfechtbarkeit.\n• Pettit: Legitimität erfordert Contestability: echte Anfechtungsmöglichkeit für alle.\n→ Demokratie ist nicht Volksherrschaft — sondern institutionelle Sicherung gegen Dominanz.","⚠ Demokratie wird aktiv bekämpft oder als Mittel zum Machterwerb instrumentalisiert.\n\nMuster: Totalitäre Systeme beginnen oft mit demokratischen Wahlen — und schaffen dann die Demokratie ab.\n\nArendt: Totalitarismus entsteht, wo der öffentliche Raum zerstört wird — wo Menschen aufhören, politisch zu handeln, und zu Masse werden.\n\nPopper: Die offene Gesellschaft (Demokratie) muss bereit sein, sich gegen ihre Feinde zu verteidigen — auch gegen demokratisch gewählte Feinde der Demokratie.\n\n→ → «Paradox der Toleranz»: Eine Gesellschaft, die grenzenlos tolerant ist, wird ihre Toleranz verlieren. (Popper)"]},{"label":"Widerstands-recht","values":["Permanent: Jede staatliche Herrschaft ist prinzipiell widerstandswürdig.\n• Direkte Aktion, Verweigerung, ziviler Ungehorsam als Dauermittel.","Begrenzt: Widerstand legitim bei staatlichem Übergriff über Schutzauftrag hinaus.\n• Mittel: Markt, Wahlen, Gerichte, politischer Druck.","Ultima Ratio: Widerstand legitim wenn Institutionen selbst zur Quelle von Dominanz werden.\n• Cicero: Tyrannenmord als letztes Mittel — wenn Tyrann das Gemeinwohl zerstört.","⚠ Widerstand wird systematisch unmöglich gemacht — das ist das Ziel.\n\n• Terror, Propaganda und Überwachung zerstören die Voraussetzungen für organisierten Widerstand.\n\nArendt: Im Totalitarismus gibt es keine Privatsphäre, in der Widerstand entstehen könnte — der Mensch wird vollständig durchleuchtet und geformt.\n\nFolge für die Theorie: Alle drei anderen Positionen (Anarchismus, Libertarismus, Republikanismus) enthalten implizit ein Widerstandsrecht gegen totalitäre Ansprüche."]},{"label":"Reale Staaten & Beispiele","values":["Annäherungen an anarchistische Praxis:\n\n🏴 Pariser Commune (1871): 72 Tage selbstverwaltete Stadt — für Bakunin das erste anarchistische Experiment.\n🇪🇸 Katalonien (1936–39): Anarcho-syndikalistische Selbstverwaltung im Spanischen Bürgerkrieg.\n🏴 Rojava (ab 2012): Libertärer Kommunalismus der kurdischen Bevölkerung in Nordsyrien.\n🇲🇽 Zapatistas, Chiapas: Indigene Selbstverwaltung: «Mandar obedeciendo» — Regieren durch Gehorchen.\n\nEinordnung: Alle Experimente waren klein und kurzlebig — kein anarchistisches Modell hat sich dauerhaft in einer Großgesellschaft gehalten.","Annäherungen an libertäre Praxis:\n\n🇺🇸 USA (libertäre Tradition): Schwache Sozialversicherung, starker Eigentumsschutz, geringe Regulierung im Vergleich zu Europa.\n🇨🇭 Schweiz (Kantone): Maximale Subsidiarität, direkte Demokratie, geringe Zentralmacht.\n🇸🇬 Singapur: Freier Markt, starker Eigentumsschutz — aber autoritär regiert. Zeigt: Libertarismus ≠ Demokratie.\n🇨🇱 Chile (1973–90): Friedmans Schüler implementieren radikale Marktwirtschaft unter Pinochet — Marktfreiheit mit Diktatur kombiniert.\n\nEinordnung: Libertäre Praxis entsteht oft unter nicht-demokratischen Bedingungen oder erzeugt extreme soziale Ungleichheit.","Annäherungen an republikanische Praxis:\n\n🇩🇪 Bundesrepublik Deutschland: Grundgesetz, Verfassungsgericht, Föderalismus — klassisch republikanische Institutionen gegen Dominanz.\n🇱🇺 Luxemburg: Kleiner Rechtsstaat, EU-Einbettung, Mehrsprachigkeit, hoher Sozialschutz. Keine dominierende Mehrheit — Nicht-Beherrschung strukturell gesichert.\n🇮🇸 Island: Starke Bürgerbeteiligung, Verfassungsreform von unten (2010–11). Contestability in der Praxis.\n🇪🇺 Europäische Union: Supranationale Institutionen begrenzen staatliche Macht durch Recht.\n🇺🇸 USA (Gründungsväter): Checks and Balances, Bill of Rights — ursprünglich republikanische Konstruktion gegen Tyrannei.\n\nEinordnung: Republikanismus ist die realistischste der drei Positionen — die meisten stabilen Demokratien sind implizit republikanisch verfasst.","⚠ Keine Vorbilder — nur Warnbeispiele.\n\n🇩🇪 NS-Deutschland (1933–45): Beginn durch demokratische Wahlen. Vollständige Kontrolle aller Lebensbereiche, Vernichtung des politischen Raums, Holocaust.\n🇷🇺 Sowjetunion unter Stalin (1924–53): Einparteienstaat, Gulag, Kollektivierung, Schauprozesse. Ideologische Durchdringung aller Bereiche.\n🇨🇳 China unter Mao (1949–76): Kulturrevolution: Zerstörung von Tradition, Familie, Religion. Millionen Tote durch politischen Terror.\n🇰🇵 Nordkorea (bis heute): Einziges verbliebenes totalitäres System — vollständige Kontrolle von Information, Bewegung, Denken.\n🇨🇳 China heute: Sozialkredit-System, Überwachung, Einparteienstaat — autoritär mit totalitären Elementen.\n\nEinordnung (Arendt): Diese Systeme teilen ein Merkmal: Sie zerstören nicht nur die Freiheit — sie zerstören die Fähigkeit der Menschen, überhaupt noch politisch zu handeln."]},{"label":"Kritikpunkte an der Strömung","values":["• Utopie: Ist freiwillige Kooperation in komplexen Gesellschaften möglich?\n• Sicherheit: Ohne Gewaltmonopol: Wer schützt die Schwachen?\n• Historisch: Alle Projekte wurden bisher durch Staaten zerstört.","• Soziale Kälte: Ohne Wohlfahrtsstaat entstehen extreme Ungleichheiten.\n• Historisch: Viele Eigentumsrechte entstanden durch Gewalt.\n• Private Macht: Wer schützt vor Monopolen und Konzernen?","• Definitionsproblem: Wer bestimmt, was «Dominanz» ist?\n• Institutionenvertrauen: Was, wenn Institutionen korrumpiert sind?\n• Empirisch: Wenige historische Reinbeispiele.","⚠ Keine normative Kritik möglich — nur analytische Ablehnung.\n\nArendts Diagnose: Totalitarismus entsteht aus Einsamkeit und Massenwerdung — wenn Menschen den Sinn für Realität verlieren und sich totalen Ideologien hingeben.\n\nPoppers Warnung: Totale Wahrheitsansprüche (Klassengesetze, Rassengesetze) sind unwiderlegbar — und deshalb gefährlich. Eine offene Gesellschaft braucht Falsifizierbarkeit auch in der Politik.\n\nHayeks Warnung: Der Weg in den Totalitarismus beginnt mit guten Absichten — mit Planwirtschaft, die schrittweise alle Freiheit absorbiert."]},{"label":"Verbindungen","values":["• Vertragstheorie: Radikale Ablehnung von Hobbes.\n• Machttheorie: Bakunin vs. Weber: Macht ohne Herrschaft?\n• Moralkritik: Teilt mit Marx die Staatsideologiekritik.","• Soziale Gerechtigkeit: Nozick vs. Rawls — Entitlement vs. Differenzprinzip.\n• Vertragstheorie: Nachfolger Lockes.\n• Liberalismus: Radikale Zuspitzung des klass. Liberalismus.","• Vertragstheorie: Weiterentwicklung Rousseaus.\n• Demokratiekonzepte: Ergänzung zu Arendt und Alternative zu Schumpeter.\n• Menschenrechte: Nicht-Beherrschung als Grundlage.","• Machttheorie: Machiavelli ohne Moral + Weber ohne Legitimität = Totalitarismus.\n• Demokratiekonzepte: Totalitarismus als negativer Fixpunkt jeder Demokratietheorie.\n• Moralkritik: Foucault zeigt: Macht konstruiert Normalität — Totalitarismus macht das explizit.\n• Freiheit: Totalitarismus als Widerlegung: zeigt, was Freiheit bedeutet, wenn sie vollständig fehlt."]}]},"essentialismus":{"sem":"Anthropologie","name":"Essentialismus – Existentialismus – Konstruktivismus","leitfrage":"Hat der Mensch ein vorgegebenes Wesen — oder erschafft er sich selbst?","conn":["freiheit","sinn","moralkritik"],"positions":["Essentialismus","Existentialismus","Feministische Existenzphilosophie NEU — Simone de Beauvoir","(Konstruktivismus)"],"rows":[{"label":"Hauptvertreter","values":["Aristoteles, Thomas von Aquin, Immanuel Kant","Jean-Paul Sartre (1905–1980), Martin Heidegger (1889–1976)","Simone de Beauvoir (1908–1986)","Judith Butler (*1956), Michel Foucault (1926–1984)"]},{"label":"Hauptwerk","values":["Nikomachische Ethik (Aristoteles); Kritik der reinen Vernunft (Kant)","Das Sein und das Nichts (1943); Der Existenzialismus ist ein Humanismus (1946) – Sartre","Das andere Geschlecht (Le Deuxième Sexe, 1949)","Das Unbehagen der Geschlechter (1990) – Butler; Die gesellschaftliche Konstruktion der Wirklichkeit (1966) – Berger/Luckmann"]},{"label":"Merksatz","values":["Der Mensch hat ein vorgegebenes Wesen, das er entfalten soll – Vernunft, Sprache und Moral definieren ihn unabhängig von Zeit und Kultur.","«Die Existenz geht der Essenz voraus.» Der Mensch ist nicht, was er ist – er wird erst durch seine Entscheidungen, was er sein wird.","«Man wird nicht als Frau geboren, man wird es.» Weiblichkeit ist kein natürliches Schicksal, sondern ein aufgezwungenes Dasein – und das Ziel ist Befreiung durch Freiheit.","Was als «menschliches Wesen» gilt, ist historisch, sozial und kulturell produziert – es gibt kein natürliches Fundament jenseits der Diskurse."]},{"label":"Grundannahmen","values":["• Feste, unveränderliche Natur: Vernunft, Sprache, Moral definieren den Menschen unabhängig von Kultur und Geschichte.\n\n• Universalität: Wesensmerkmale gelten für alle Menschen.\n\n• Zweck der Existenz: Entfaltung dieses Wesens (Telos).","• Der Mensch hat kein vorgegebenes Wesen durch Gott oder Natur.\n\n• Er existiert zuerst – dann erschafft er sich selbst durch freie Entscheidungen.\n\n• Mauvaise foi: Selbsttäuschung: Wer so tut, als wäre er festgelegt, verleugnet seine Freiheit.\n\n• Der Mensch ist «zur Freiheit verurteilt» – Nicht-Entscheiden ist auch eine Entscheidung.","• De Beauvoir akzeptiert Sartres Grundsatz: Existenz geht der Essenz voraus. Doch Sartre ignoriert, dass Freiheit für Frauen historisch blockiert war.\n\n• Das Andere: Die Frau wird in der patriarchalen Gesellschaft als das «Andere» definiert – nicht als eigenständiges Subjekt, sondern als Negation des Mannes.\n\n• Situation: Freiheit ist immer situiert: Biologische Fakten (Mutterschaft, Körper) sind keine Bestimmung, werden aber gesellschaftlich als solche konstruiert.\n\n• Transzendenz vs. Immanenz: Männern wird Transzendenz (Weltgestaltung) zugeschrieben, Frauen Immanenz (häusliche Wiederholung). Das ist nicht natürlich, sondern aufgezwungen.","• Es gibt kein festes menschliches Wesen – Identität ist eine soziale Konstruktion.\n\n• Was als «normal», «natürlich» oder «menschlich» gilt, wird durch Sprache und Diskurse produziert.\n\n• Performativität (Butler): Geschlecht und Identität entstehen durch wiederholte Handlungen – nicht als Ausdruck eines inneren Kerns."]},{"label":"Kernbegriffe","values":["• Essenz: Das unveränderliche Wesen des Menschen.\n• Telos: Zweck/Ziel, auf das alles strebt.\n• Animal rationale: Der Mensch als vernunftbegabtes Lebewesen.\n• Universalität: Wesensmerkmale gelten für alle Menschen.","• Existenz: Das konkrete Dasein des Menschen.\n• Essenz: Entsteht erst durch Entscheidungen.\n• Mauvaise foi: Selbsttäuschung / Unaufrichtigkeit.\n• Engagement: Politisch-moralische Verantwortung.\n• Authentizität: Ehrlich zur eigenen Freiheit stehen.","• Das Andere: Die Frau als vom Mann definiertes Gegenteil – kein eigenständiges Subjekt.\n• Situation: Die konkrete Lebenslage, die Freiheit ermöglicht oder einschränkt.\n• Transzendenz: Fähigkeit, die eigene Existenz zu überschreiten und die Welt zu gestalten.\n• Immanenz: Auf die Wiederholung des Gegebenen beschränktes Dasein.\n• Complicit: Frauen, die ihre Unterordnung akzeptieren, machen sich mitschuldig (mauvaise foi).","• Diskurs: System von Aussagen, das «Wahrheit» produziert.\n• Performativität: Identität entsteht durch Wiederholung.\n• Subjektivierung: Das Subjekt entsteht durch soziale Zuschreibungen.\n• Dekonstruktion: Aufdeckung verborgener Machtstrukturen in Begriffen."]},{"label":"Freiheit","values":["Begrenzt: Der Mensch soll sein vorgegebenes Wesen entfalten. Freiheit bedeutet, vernünftig zu handeln – in Übereinstimmung mit der eigenen Natur.","Radikal: Es gibt keine vorgegebene Natur. Der Mensch ist vollständig frei und vollständig verantwortlich. Freiheit ist keine Möglichkeit, sondern Grundbedingung.","Situiert: Freiheit ist real, aber immer eingebettet in eine Situation. Frauen sind nicht weniger frei – aber ihre Situation wurde historisch systematisch so gestaltet, dass echte Freiheit blockiert wird. Befreiung erfordert veränderte Situation.","Relativ: Freiheit besteht im Widerstand gegen Diskurse und Normen – durch Resignifikation und subversive Wiederholung. Keine absolute Freiheit."]},{"label":"Konsequenzen","values":["• Universelle Moralvorstellungen: sind möglich und notwendig.\n• Erziehung: soll das Wesen des Menschen entfalten.\n• Menschenrechtsdiskurse: alle Menschen haben gleiche Würde kraft ihrer Natur.","• Jeder Mensch ist vollständig verantwortlich für sein Leben.\n• Politisches Engagement folgt aus der Verantwortung gegenüber anderen.\n• Authentisches Leben = ehrlicher Umgang mit der eigenen Freiheit.\n→ «Wir definieren den Menschen nur im Verhältnis zu einem Engagement.» – Sartre","• Die Unterordnung der Frau ist nicht biologisch, sondern historisch – und daher überwindbar.\n\n• Gleichberechtigung: Frauen müssen denselben Zugang zu Transzendenz erhalten – Beruf, Bildung, wirtschaftliche Unabhängigkeit sind Bedingungen echter Freiheit.\n\n• Solidarität: Frauen müssen ihre Situation kollektiv erkennen und verändern – nicht individuell akzeptieren (mauvaise foi).\n\n→ → De Beauvoir ist Vorläuferin des modernen Feminismus und der Gender Studies.","• Was als «natürlich» gilt, muss kritisch hinterfragt werden.\n• Normen können verändert werden – auch durch subversive Handlungen.\n• Grundlage für Gender Studies, Queer Theory, Intersektionalität."]},{"label":"Kritikpunkte","values":["• Wessen Wesen?: Historisch oft zur Rechtfertigung von Ausgrenzung genutzt.\n• Kulturelle Vielfalt: menschlicher Praxis widerspricht dem Anspruch auf Universalität.\n• Wandel: Lässt wenig Raum für Selbstveränderung.","• Radikale Freiheit überschätzt die tatsächliche Handlungsfreiheit des Einzelnen.\n• Soziale, psychologische und strukturelle Faktoren werden unterschätzt.\n• Keine klaren moralischen Maßstäbe: Wenn jeder selbst wählt, ist alles möglich?","• Eurozentrismus: De Beauvoirs Analyse basiert primär auf westlichen, bürgerlichen Frauen – Klasse, Rasse und andere Differenzen werden kaum berücksichtigt (Kritik von bell hooks und intersektionaler Theorie).\n\n• Körperlichkeit: De Beauvoir unterschätzt, wie stark der Körper selbst (nicht nur seine gesellschaftliche Deutung) Freiheit prägt.\n\n• Normativität: Ihr Ziel – Frauen sollen Transzendenz anstreben wie Männer – reproduziert männliche Werte als universales Ideal.","• Gefahr: Alles wird relativ – auch Kritik an Unterdrückung verliert Fundament.\n• Sehr abstrakt – schwer in politische Praxis zu übersetzen.\n• Wie kann das Subjekt Normen unterlaufen, wenn es durch sie erst entsteht?"]}]},"menschenmodelle":{"sem":"Anthropologie","name":"Menschenmodelle im Vergleich","leitfrage":"Was ist der Mensch seinem Wesen nach?","conn":["technologie","arbeit","essentialismus"],"positions":["Homo Faber","Homo Economicus","Mängelwesen (Gehlen)","Animal Symbolicum (Cassirer)"],"rows":[{"label":"Vertreter","values":["Marx, Arendt (1906–1975), Benjamin Franklin","Adam Smith (1723–1790), Hobbes; Wirtschaftstheorie (rational choice)","Arnold Gehlen (1904–1976)","Ernst Cassirer (1874–1945)"]},{"label":"Merksatz","values":["Der Mensch ist das Wesen, das Werkzeuge schafft und durch Arbeit und Technik die Welt gestaltet.","Der Mensch handelt rational und eigennützig – er maximiert seinen Nutzen, minimiert seine Kosten.","Der Mensch ist biologisch mangelhaft ausgestattet – gerade deshalb schafft er Kultur, Technik und Institutionen.","Der Mensch ist das einzige Lebewesen, das Symbole schafft und deutet – Sprache, Kunst und Mythos sind seine Welt."]},{"label":"Grundannahmen","values":["• Der Mensch definiert sich durch aktives Gestalten der Welt.\n• Arbeit und Technik sind Ausdruck menschlicher Kreativität und Vernunft.\n• Franklin: «Man is a tool-making animal.»","• Menschen handeln zweckrational: Nutzen maximieren, Kosten minimieren.\n• Präferenzen sind stabil und bekannt.\n• Entscheidungen erfolgen auf Basis vollständiger Information.","• Der Mensch hat keine festen Instinkte – er ist biologisch «nicht fertig».\n• Diese Mängel (schwache Instinkte, keine Naturwaffen, lange Kindheit) zwingen ihn zur Kulturschaffung.\n• Technik, Sprache und Institutionen sind Kompensation biologischer Schwäche.","• Der Mensch lebt nicht in einer natürlichen, sondern in einer symbolischen Wirklichkeit.\n• Sprache, Mythos, Religion, Wissenschaft und Kunst sind verschiedene «Symbolformen».\n• Erst durch Symbole kann der Mensch über das unmittelbar Gegebene hinausdenken."]},{"label":"Stärken","values":["• Erklärt technischen Fortschritt.\n• Verbindet Arbeit mit Würde und Sinn.\n• Konkret und empirisch prüfbar.","• Klares, formalierbares Modell.\n• Grundlage effizienter Markt- und Politiktheorien.\n• Entscheidungsverhalten gut prognostizierbar.","• Erklärt Ursprung von Kultur und Institutionen.\n• Verbindet Biologie und Geist.\n• Zeigt Notwendigkeit sozialer Stabilität.","• Erfasst die symbolische Dimension menschlicher Existenz.\n• Erklärt Kunst, Mythos und Wissenschaft einheitlich.\n• Offen für kulturelle Vielfalt."]},{"label":"Kritikpunkte","values":["• Reduziert den Menschen auf seine Funktion als «Macher».\n• Spiel, Muße, Kontemplation haben keinen Platz.\n• Überbetont Technik gegenüber sozialen Beziehungen.","• Empirisch widerlegt: Menschen handeln oft irrational (Kahneman).\n• Ignoriert Mitgefühl, Kooperation, Moral.\n• Rechtfertigt Egoismus als «natürlich».","• Konservativ: Institutionen erscheinen als notwendige Stabilisatoren.\n• Kritik an bestehenden Strukturen wird erschwert.\n• Biologisch-defizitäres Menschenbild problematisch.","• Vernachlässigt materielle und soziale Bedingungen.\n• Zu stark auf Kognition und Symbol fokussiert.\n• Körper und Triebe kommen kaum vor."]}]},"technologie":{"sem":"Anthropologie","name":"Technologie: Wesen oder Gefahr?","leitfrage":"Besteht in der Technik das Wesen des Menschen — oder entfremdet Technik den Menschen?","conn":["menschenmodelle","arbeit","verantwortung"],"positions":["Gehlen – Technik als Notwendigkeit","Jonas – Technik als Gefahr","Mittelstraß – Technik als Chance","Rousseau – Technik als Verfall"],"rows":[{"label":"Hauptwerk","values":["Anthropologische Forschung (1961)","Das Prinzip Verantwortung (1979)","Leonardo-Welt (1992)","Diskurs über die Wissenschaften und die Künste (1750)"]},{"label":"Merksatz","values":["Technik ist nicht Luxus, sondern Notwendigkeit: Der Mensch überlebt biologisch nur durch Kultur und Werkzeug.","Moderne Technik übersteigt unsere moralische Urteilskraft – wir brauchen eine neue Ethik der Verantwortung für die Zukunft.","Wir leben in einer «Leonardo-Welt» – Technik ist unverzichtbarer Ausdruck menschlicher Kreativität und Vernunft.","Technik und Zivilisation korrumpieren den natürlich guten Menschen – Fortschritt ist kein Gewinn, sondern Verlust."]},{"label":"Grundannahmen","values":["• Der Mensch ist biologisch ein «Mängelwesen» ohne feste Instinkte.\n• Technik kompensiert diese biologischen Lücken – sie ist konstitutiv für den Menschen.\n• Kultur und Institutionen entlasten den Menschen von ständiger Entscheidungslast.","• Moderne Hochtechnologie (Atom, Gentechnik, KI) kann irreversible globale Schäden verursachen.\n• Bisherige Ethik war auf den Nahbereich begrenzt – das reicht nicht mehr.\n• Heuristik der Furcht: Im Zweifel das schlechteste Szenario ernst nehmen.","• Technik ist kein bloßes Werkzeug, sondern Ausdruck des menschlichen Geistes.\n• Die «Leonardo-Welt» verbindet Kunst, Wissenschaft und Technik zu einer einheitlichen Schaffenskraft.\n• Technischer Fortschritt und Humanismus schließen sich nicht aus.","• Im Naturzustand war der Mensch gut, einfach und glücklich.\n• Wissenschaft, Technik und Kultur haben Ungleichheit, Eitelkeit und Abhängigkeit erzeugt.\n• Fortschritt ist Entfremdung von der ursprünglichen Natur des Menschen."]},{"label":"Argumente","values":["• Ohne Feuer, Werkzeug und Sprache hätte der Mensch nicht überlebt.\n• Institutionen (Recht, Staat, Schule) stabilisieren das Leben und ermöglichen Planung.\n→ Technik ist die «zweite Natur» des Menschen.","• Atomwaffen, Klimawandel und Gentechnik zeigen: Folgen menschlichen Handelns sind nicht mehr überschaubar.\n• Wissen um mögliche Katastrophen wird zur moralischen Pflicht.\n• Vorsorgeprinzip: Lieber auf Nutzen verzichten als irreversible Schäden riskieren.","• Leonardo da Vinci steht exemplarisch für die Einheit von Kunst, Wissenschaft und Technik.\n• Technik ist kein Selbstzweck – sie dient dem Verständnis und der Gestaltung der Welt.\n• Ethische Reflexion muss die Technik begleiten, sie aber nicht verhindern.","• Zivilisation schafft künstliche Bedürfnisse und Abhängigkeiten.\n• Technischer Fortschritt fördert soziale Ungleichheit statt Gleichheit.\n• Moral und Tugend schwinden mit wachsender Technisierung."]},{"label":"Konsequenzen","values":["• Technik und Institutionen sind unverzichtbar.\n• Kulturkritik muss die Notwendigkeit von Stabilität respektieren.","• Neuer kategorischer Imperativ: Handle so, dass die Wirkungen verträglich sind mit der Permanenz menschlichen Lebens.\n• Politik muss zukünftige Generationen schützen.","• Kreativität, Wissenschaft und Technik fördern statt bremsen.\n• Ethische Begleitung von Forschung – keine pauschale Ablehnung.","• Rückbesinnung auf Einfachheit und Natürlichkeit.\n• Kritik am Fortschrittsglauben als Ideologie."]},{"label":"Kritikpunkte","values":["• Konservativ: Bestehende Institutionen erscheinen als natürlich notwendig.\n• Lässt wenig Raum für revolutionären Wandel.","• «Heuristik der Furcht» kann Innovation blockieren.\n• Zu pessimistisch: Ignoriert positive Wirkungen von Technik.","• Optimistisch: Unterschätzt reale Risiken und Nebenwirkungen technischen Fortschritts.\n• Ethische Begleitung bleibt vage.","• Idealisiert den Naturzustand, der historisch nie existiert hat.\n• Keine praktische Alternative zur modernen Gesellschaft."]}]},"sinn":{"sem":"Anthropologie","name":"Identität und Sinn","leitfrage":"Gibt es einen Sinn des Lebens — oder muss der Mensch sich selbst einen geben?","conn":["hedonismus","essentialismus","arbeit"],"positions":["Sartre – Existentialismus","Camus – Absurdismus","Aristoteles – Teleologie","Frankl – Logotherapie"],"rows":[{"label":"Hauptwerk","values":["Das Sein und das Nichts (1943); Der Existenzialismus ist ein Humanismus (1946)","Der Mythos des Sisyphos (1942)","Nikomachische Ethik (ca. 350 v. Chr.)","... trotzdem Ja zum Leben sagen (1946); Der Mensch auf der Suche nach Sinn (1959)"]},{"label":"Merksatz","values":["Der Mensch ist das, wozu er sich macht. Freiheit ist keine Möglichkeit, sondern eine Bürde – man ist zur Freiheit verurteilt.","Das Leben ist sinnlos – aber der Mensch kann trotzdem in Würde und Revolte leben. Man muss sich Sisyphos als glücklichen Menschen vorstellen.","Der Mensch hat eine natürliche Bestimmung: Eudaimonia. Diese wird durch ein Leben der Tugend und Vernunft in der Gemeinschaft erreicht.","Sinn muss nicht gefunden werden – er muss gegeben werden. Selbst unter schlimmsten Bedingungen hat der Mensch die Freiheit seiner Haltung."]},{"label":"Grundannahmen","values":["• Kein vorgegebenes Wesen: Die Existenz geht der Essenz voraus.\n• Der Mensch schafft sich selbst durch seine Entscheidungen.\n• Volle Verantwortung für das eigene Leben – keine Ausreden möglich.\n• Mauvaise foi: Flucht aus der Verantwortung durch Selbsttäuschung.","• Das Universum ist gleichgültig gegenüber menschlichen Sinnfragen.\n• Das «Absurde» entsteht aus dem Widerspruch zwischen dem menschlichen Sinnverlangen und der sinnlosen Welt.\n• Drei mögliche Antworten: Selbstmord (falsch), philosophischer Selbstmord (Religion – falsch), Revolte (richtig).","• Alles in der Natur hat ein Telos (Ziel/Zweck).\n• Der Zweck des Menschen ist Eudaimonia – nicht Lust, sondern erfülltes, tugendhaftes Leben.\n• Vernunft und Tugend sind die Mittel, diesen Zweck zu erreichen.","• Das Streben nach Sinn ist die primäre Motivationskraft des Menschen (nicht Lust oder Macht).\n• Sinn ist immer individuell und situationsbezogen – er kann nicht verallgemeinert werden.\n• Noodynamik: Spannungszustand zwischen dem, was man ist, und dem, was man sein sollte."]},{"label":"Freiheit & Identität","values":["Radikal frei und vollständig selbst-konstituierend. Identität ist kein fixer Kern, sondern das laufende Ergebnis von Entscheidungen. Freiheit als Last und Chance.","Identität entsteht durch die Haltung gegenüber dem Absurden. Der Mensch ist frei, das Absurde anzunehmen – und trotzdem zu leben. Revolte als Ausdruck von Würde.","Die Identität folgt aus dem Wesen des Menschen und wird durch Tugend entfaltet. Freiheit bedeutet, vernünftig zu handeln und sein Wesen zu verwirklichen.","Freiheit ist die Freiheit der Haltung – auch dann, wenn äußere Freiheit fehlt. «Dem Menschen kann man alles nehmen – nur nicht die Freiheit, seine Haltung zu wählen.» – Frankl"]},{"label":"Sinn des Lebens","values":["Kein vorgegebener Sinn. Der Mensch muss sich selbst Sinn geben durch Engagement und Entscheidung.","Es gibt keinen objektiven Sinn – aber die Revolte gegen das Absurde schafft eine Form würdiger Existenz. Sisyphos als Modell.","Eudaimonia ist der Sinn – ein erfülltes Leben durch Tugend, Vernunft und Gemeinschaft. Sinn ist objektiv und gilt für alle Menschen.","Sinn entsteht durch: Werke schaffen, Liebe und Begegnung, Leiden annehmen. Sinn kann selbst unter unmöglichsten Bedingungen gefunden werden."]},{"label":"Kritikpunkte","values":["• Überforderung: Volle Verantwortung ist für viele Menschen unter realen Bedingungen unrealistisch.\n• Keine normativen Maßstäbe: Wenn jeder seinen Sinn selbst schafft, ist alles erlaubt?","• Ist das «Absurde» wirklich eine universelle menschliche Erfahrung?\n• Revolte als Lösung bleibt unkonkret – Was soll man konkret tun?","• Wessen Telos? Das Konzept des Telos ist kulturell geprägt.\n• Frauen, Sklaven, Fremde wurden ausgeschlossen – Universalität ist begrenzt.","• Zu individualistisch: Strukturelle Unrechtsursachen (Armut, Gewalt) werden vernachlässigt.\n• «Sinnsuche» als Antwort auf politisches Unrecht wirkt zynisch."]}]},"arbeit":{"sem":"Anthropologie","name":"Arbeit: Selbstverwirklichung oder Entfremdung?","leitfrage":"Besteht Selbstverwirklichung im Arbeiten — oder ist Arbeit primär Notwendigkeit und Entfremdung?","conn":["menschenmodelle","technologie","sozgerechtigkeit","sinn"],"positions":["Hegel – Arbeit als Selbsterschaffung","Marx – Arbeit und Entfremdung","Arendt – Drei Tätigkeitsformen","Hüther – Arbeit und Gehirn"],"rows":[{"label":"Hauptwerk","values":["Phänomenologie des Geistes (1807)","Pariser Manuskripte (1844)","Vita Activa (1958)","Was wir sind und was wir sein könnten (2011)"]},{"label":"Merksatz","values":["Der Mensch erschafft sich selbst durch Arbeit: Indem er die Welt formt, erkennt er sich in ihr und gewinnt Bewusstsein von sich.","Arbeit ist das Wesen des Menschen – im Kapitalismus wird sie zur Entfremdung: Der Mensch verliert sich in seiner eigenen Tätigkeit.","Arbeit, Herstellen und Handeln sind drei grundverschiedene Tätigkeitsformen – nur das Handeln konstituiert die politische Freiheit des Menschen.","Bedeutungsvolle Arbeit macht den Menschen gesünder, kreativer und glücklicher – Arbeit als Ausdruck von Verbundenheit und Autonomie."]},{"label":"Grundannahmen","values":["• Arbeit ist der Prozess, durch den der Geist sich in der Welt objektiviert und sich selbst erkennt.\n• Im Verhältnis von Herr und Knecht: Der Knecht, der arbeitet, entwickelt Bewusstsein – der Herr, der nur konsumiert, stagniert.\n• Arbeit ist Selbsterschaffung des Menschen als geistiges Wesen.","• Arbeit ist der Ausdruck des menschlichen Gattungswesens – durch sie schafft der Mensch sich und seine Welt.\n• Entfremdung im Kapitalismus: Der Arbeiter wird von seinem Produkt, seiner Tätigkeit, seinen Mitmenschen und seiner Gattung entfremdet.\n• Entfremdete Arbeit macht den Menschen zum Teil der Maschinerie.","• Arbeit: Biologischer Stoffwechselprozess mit der Natur – zyklisch, hinterlässt keine Spuren.\n• Herstellen (Werk): Schafft dauerhafte Gegenstände – bildet die künstliche Menschenwelt.\n• Handeln (Praxis): Politisches Miteinander in der Öffentlichkeit – Quelle echter Freiheit.","• Das Gehirn entwickelt sich optimal, wenn Menschen Aufgaben lösen, die sie selbst als bedeutsam empfinden.\n• Arbeit, die Autonomie und Verbundenheit stärkt, fördert Kreativität und Gesundheit.\n• Zwang und Kontrolle bei der Arbeit hemmen Entwicklung und Wohlbefinden."]},{"label":"Bedeutung der Arbeit für den Menschen","values":["Fundamental: Durch Arbeit erschafft sich der Mensch als bewusstes Wesen. Ohne Arbeit kein Selbstbewusstsein.","Potenziell: Im Idealzustand Ausdruck des Menschseins. Im Kapitalismus Entfremdung und Unterdrückung. Ziel: befreite, kreative Arbeit in einer klassenlosen Gesellschaft.","Differenziert: Arbeit im engeren Sinn ist nur Stoffwechsel. Echte Selbstverwirklichung findet im Handeln statt – in der politischen Gemeinschaft.","Zentral: Bedeutungsvolle Arbeit aktiviert das Belohnungssystem des Gehirns, stärkt soziale Bindungen und ermöglicht Selbstentfaltung."]},{"label":"Konsequenzen","values":["• Selbstbewusstsein entwickelt sich durch praktische Tätigkeit.\n• Muße und Nicht-Arbeit = Stillstand des Geistes.","• Kapitalismuskritik: Entfremdung überwinden.\n• Klassenkampf als Weg zur befreiten Arbeit.\n• «Jeder nach seinen Fähigkeiten, jedem nach seinen Bedürfnissen.»","• Politisches Handeln (nicht Arbeit) konstituiert Freiheit.\n• Warnung: Moderne Gesellschaften degradieren Bürger zu reinen «Arbeitstieren».\n• Erhalt des öffentlichen Raums als Bedingung der Freiheit.","• Arbeitswelt sollte Autonomie und Sinn fördern.\n• Intrinsische Motivation wichtiger als Kontrolle.\n• Psychische Gesundheit hängt von bedeutungsvoller Arbeit ab."]},{"label":"Kritikpunkte","values":["• Zu idealistisch: Arbeit ist nicht immer Selbstentfaltung.\n• Lohnarbeit wird nicht berücksichtigt.\n• Vernachlässigt Spielraum, Muße und Nicht-Produktives.","• Historische Umsetzung des Kommunismus: keine befreite Arbeit, sondern Zwangswirtschaft.\n• Reduktionismus: Entfremdung auf Ökonomie beschränkt.","• Strenge Dreiteilung der Tätigkeiten in der Realität nicht haltbar.\n• Handeln im modernen Sinne schwer zu definieren.\n• Exkludiert viele Tätigkeiten aus dem Begriff «Freiheit».","• Neurowissenschaftliche Basis vereinfacht komplexe soziale Verhältnisse.\n• Ignoriert strukturelle Zwänge auf dem Arbeitsmarkt."]}]}};
const SEM={
  "Erkenntnistheorie":{"bg":"#D6E4F0","text":"#185FA5","bar":"#2E75B6"},
  "Ethik":            {"bg":"#E1F5EE","text":"#0F6E56","bar":"#1D9E75"},
  "Staatsphilosophie":{"bg":"#FAEEDA","text":"#854F0B","bar":"#BA7517"},
  "Anthropologie":    {"bg":"#FBEAF0","text":"#993556","bar":"#D4537E"},
};
let filter="Alle", expanded=new Set(), sq="";

function render(){
  const q=sq.toLowerCase();
  let visible=CARDS.filter(c=>{
    if(filter!=="Alle"&&c.sem!==filter)return false;
    if(!q)return true;
    return (c.position+c.vertreter+c.werk+c.merksatz+c.topic_name).toLowerCase().includes(q);
  });
  const grid=document.getElementById("grid");
  if(!visible.length){grid.innerHTML='<div class="no-results">Keine Karten gefunden.</div>';return;}
  grid.innerHTML=visible.map(c=>{
    const s=SEM[c.sem]||{bg:"#eee",text:"#555",bar:"#888"};
    const exp=expanded.has(c.id);
    const t=TOPICS[c.topic_id];
    // Get topic rows for this position index
    const pi=t.positions.indexOf(c.position);
    const rows=t?t.rows:[];
    // Tags from Kernbegriffe row
    const kr=rows.find(r=>r.label&&(r.label.toLowerCase().includes('kernbegriff')||r.label.toLowerCase().includes('kernbegriff')));
    const tags=kr&&pi>=0?kr.values[pi].split(/[,\n•]+/).map(x=>x.trim()).filter(x=>x.length>1&&x.length<40).slice(0,5):[];
    // FW link
    const fwEntry=c.fw_id?FW.find(f=>f.id===c.fw_id):null;
    
    return `<div class="card ${exp?'expanded':''}" id="c${c.id}">
      <div class="card-bar" style="background:${s.bar}"></div>
      <div class="card-hdr" onclick="toggleCard('${c.id}')">
        <div class="card-pos" style="color:${s.text}">${c.sem}</div>
        <div class="card-rep">${c.position}</div>
        <div class="card-dates">${c.vertreter}</div>
        <div class="card-topic">${c.topic_name}</div>
      </div>
      ${tags.length?`<div class="card-tags">${tags.map(t=>`<span class="ctag" style="background:${s.bg};color:${s.text};border-color:${s.bar}40">${t}</span>`).join('')}</div>`:''}
      ${c.merksatz?`<div class="card-merksatz" onclick="toggleCard('${c.id}')">${c.merksatz}</div>`:''}
      ${exp?`
      <div class="card-details">
        ${rows.filter(r=>r.label&&!r.label.toLowerCase().includes('merksatz')&&!r.label.toLowerCase().includes('kernbegriff')&&r.label.trim()!=='').map(r=>{
          const v=pi>=0?r.values[pi]:'';
          if(!v||!v.trim())return '';
          return `<div class="card-dl">${r.label}</div><div class="card-dt">${v.replace(/\n/g,'<br>')}</div>`;
        }).join('')}
      </div>
      <div class="card-links">
        <a class="card-link" style="background:${s.bg};color:${s.text};border-color:${s.bar}60"
           href="vergleiche.html#${c.topic_id}" onclick="return navTo('vergleiche.html','${c.topic_id}')">
          📊 Vergleich
        </a>
        ${fwEntry?`<a class="card-link" style="background:#FFF8DC;color:#7B5800;border-color:#C49A0060"
           href="fachwissen.html#${c.fw_id}" onclick="return navTo('fachwissen.html','${c.fw_id}')">
          📖 Fachwissen
        </a>`:''}
      </div>`:''
      }
    </div>`;
  }).join('');
}

function navTo(page, anchor){
  window.location.href=page+'?id='+anchor;
  return false;
}

function toggleCard(id){
  if(expanded.has(id))expanded.delete(id);
  else expanded.add(id);
  render();
  if(expanded.has(id)){
    const el=document.getElementById('c'+id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function setFilter(f){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('on',b.dataset.f===f);
    const s=SEM[f];
    if(b.dataset.f===f&&s){b.style.background=s.bg;b.style.color=s.text;b.style.borderColor=s.bar;}
    else{b.style.background='';b.style.color='';b.style.borderColor='';}
  });
  render();
}

document.getElementById('si').addEventListener('input',e=>{sq=e.target.value.trim();render();});
render();

</script>
</body>
