freiwillige und absichtliche\nUnterlassungen zählen als Handlungen. Eine Handlung ist etwas, was das handelnde Subjekt\nprinzipiell auch hätte unterlassen und an dessen Stelle es auch etwas anderes hätte tun können.\nHandlungsfreiheit\nHandlungsfreiheit oder äußere Freiheit bedeutet, das tun und lassen zu können, was man will. Ein\nhandlungsfreier Mensch handelt bewusst und freiwillig, er kann seine Absichten ungehindert\nvon äußerem oder innerem Zwang in die Tat umsetzen. Innerhalb der Handlungsfreiheit lässt sich\nzwischen negativer und positiver Freiheit unterscheiden. Negative Freiheit meint die Freiheit\nvon etwas, positive Freiheit die Freiheit zu etwas.\nDabei geht es um dieselbe Handlung, jedoch mit einer unterschiedlichen Perspektive. Pressefreiheit\nbeispielsweise ist die negative Freiheit von Zensur und die positive Freiheit zu veröffentlichen, was\nman möchte. Bei der negativen Freiheit betont man die abwesende Hinderung an der Handlung, bei\nder positiven Freiheit ihr positives Ziel.\nIn gesellschaftlich-politischer Hinsicht bedeutet Handlungsfreiheit, dass man das Recht\nund die Möglichkeit hat, ohne äußeren Zwang nach eigenem Wollen und eigener Überzeugung zu\nhandeln. Politische oder bürgerliche Freiheiten wie Pressefreiheit oder Redefreiheit sind also\nUnterarten der Handlungsfreiheit. Wenn wir von Freiheit reden oder Freiheit einfordern, meinen\nwir normalerweise solche politischen und bürgerlichen Freiheiten.\nEinschränkungen der Handlungsfreiheit\nÄußere und innere Umstände können unsere Handlungsfreiheit einschränken, uns also daran\nhindern, die gewollten Handlungen auch durchzuführen.\nÄußere Einschränkungen können rechtlicher, politischer, ökonomischer oder physischer\nNatur sein. Beispiele für äußere Einschränkungen der Handlungsfreiheit wären bestimmte Gesetze,\nphysische Gewalt, eine Gefängnisstrafe, Hausarrest, Geldmangel. Auch, wenn jemand fürchten muss,\nfür sein Handeln bestraft zu werden, ist er nicht mehr vollständig frei, das Gewollte zu tun. Er kann\nes zwar tun, muss dafür aber mit Sanktionen rechnen.\n\nInnere Einschränkungen der Handlungsfreiheit können körperlicher, geistiger oder\npsychischer Natur sein, z.B. körperliche oder geistige Behinderungen, Unwissen, Süchte, psychische\nErkrankungen wie Phobien und Neurosen oder andere Zwangshandlungen.\nDeterminismus\nDer Begriff „Determinismus“ kommt von dem lateinischen Verb determinare = abgrenzen,\nbestimmen, festlegen.\nDem universalen Determinismus zufolge ist unser Universum vollständig, ein für alle Mal und"},{"id":"relativismus_fw","name":"Relativismus & Universalismus","sem":"Ethik","content":"alternativlos festgelegt. Naturgesetze und Anfangsbedingungen bestimmen alle weiteren\nWeltzustände, sodass es zu jedem Zeitpunkt genau eine mögliche Zukunft gibt.\nDer universale Determinismus enthält 2 Hauptaussagen:\n1.) Jedes Ereignis hat eine Ursache. Das Kausalprinzip gilt also uneingeschränkt und es gibt keine\nkausale Unbestimmtheit bzw. keine kausalen Lücken im Weltgeschehen.\n2.) Die Ursache-Wirkungs-Relationen verlaufen nach strikten Gesetzmäßigkeiten. Alle\nNaturprozesse zeigen strenge Regelmäßigkeiten und unterliegen keinen zufälligen Schwankungen.\nMan kann sich den Weltverlauf als eine Abfolge von einzelnen Weltzuständen\nvorstellen. Diese sind einerseits durch die Lage ihrer kleinsten Teile bestimmt und andererseits\ndurch die Naturgesetze kausal miteinander verknüpft. Daraus folgt, dass der Weltverlauf für jeden\neinzelnen Zeitpunkt und in allen Einzelheiten festgelegt ist.\n→ & → & → & → & → & → & → & → & → & → & → & → & → & →\nAuf den Menschen bezogen bedeutet dies, dass auch menschliches Handeln im persönlichen,\nsozialen und politischen Bereich festgelegt ist.\nIn der Moderne wird der Determinismus mit Bezug auf die Naturgesetze, aber auch mit Hilfe der\nHumanwissenschaften, v.a. der Sozialwissenschaften, der Psychologie und der Neurowissenschaften,\nformuliert.\nWas determiniert die Welt?\nIn der Philosophiegeschichte lassen sich mindestens drei unterschiedliche Quellen für den\nDeterminismus finden: Gott, das Schicksal und die Naturgesetze.\n\n1.) Gott\nDie Prädestinationslehre oder der theologische Determinismus behauptet, dass Gottes Wille den\nWeltlauf determiniert. Gott greift steuernd in den Weltverlauf ein bzw. bestimmt ihn vollständig.\n2.) Das Fatum (= Schicksal)\nDie zweite Quelle des Determinismus ist das Fatum, also das Schicksal. Bereits die Stoiker hatten\ndie Vorstellung, dass das Fatum - das Schicksal - das Weltgeschehen vorherbestimmt und der\nMensch sich dieser Vorherbestimmung fügen muss.\n3.) Die Naturgesetze\nDie dritte Quelle des Determinismus sind die Naturgesetze.\nNach dieser Auffassung werden alle physikalischen Systeme und damit auch der Weltlauf von\ndeterministischen Gesetzen „regiert“. Das Stattfinden eines Ereignisses kann also mit Hilfe von\nNaturgesetzen und Anfangsbedingungen erklärt werden, aus welchen sich dieses Ereignis ableiten\nlässt. Der Weltlauf ist dann deterministisch, wenn aus den Naturgesetzen und der Beschreibung\neines vollständigen Weltzustands Beschreibungen aller weiteren Weltzustände folgen. Ein\nLaplace’scher Dämon oder Supercomputer könnte demnach mit ausreichendem Wissen und 1\nRechenkapazität alle vergangenen und zukünftigen Weltzustände berechnen.\nDeterminanten des Menschen\n1 Der französische Astronom und Mathematiker Pierre Simon de Laplace formulierte im frühen 19. Jahrhundert mit seinem Laplace’schen Dämon\neine berühmte Fiktion, um den universalen Determinismus zu illustrieren. Dieser allwissende Dämon könnte mit umfassendem Wissen und\nausreichender Rechenleistung das gesamte Weltgeschehen berechnen.\n\nAuch der Mensch unterliegt wie jeder Körper den Gesetzen der Physik und Chemie, als\nLebewesen unterliegt er den Gesetzen der Biologie und Physiologie, als kognitives Wesen den\nGesetzen der Neuro- und Kognitionswissenschaften und als emotionales und soziales Wesen den\nGesetzen der (Sozial-)Psychologie.\n\nLibertarismus\nDer Begriff Libertarismus oder Libertarianismus leitet sich ab von dem lateinischen Wort libertas -\nFreiheit. Es handelt sich um eine philosophische Position, die den freien Willen bejaht und den\nDeterminismus ablehnt, da dieser inkompatibel zur Willensfreiheit ist.\nAls ein berühmter Libertarier wird teilweise Immanuel Kant (1724-1804) genannt. Dieser nimmt\njedoch eine Sonderposition innerhalb des Libertarismus ein, da er den Determinismus - zumindest\nfür den Bereich der Erscheinungen - nicht ablehnt. Willensfreiheit gibt es seiner Ansicht nach nur in\nder „Vernunftwelt“, nicht in der „Sinnenwelt“.\nWichtige zeitgenössische Vertreter des Libertarismus sind die US-amerikanischen Philosophen\nRoderick Chisholm (1916-1999), Robert Kane (*1938) und Peter van Inwagen (*1942) sowie der\ndeutsche Philosoph Geert Keil (*1963).\nLibertarier gehen davon aus, dass beim Menschen alle drei Prinzipien der Willensfreiheit\nerfüllt sind.\n1.) Das Prinzip alternativer Möglichkeiten (Anderskönnen)\nLibertarier nehmen an, dass es Handlungsalternativen gibt. Es steht laut Libertarismus zu\nkeinem Zeitpunkt vor dem tatsächlichen Handlungsbeginn fest, ob die Handlung stattfinden wird\noder nicht.\nAnders ausgedrückt: Vor Handlungsbeginn gibt es keine kausal hinreichenden Bedingungen für das\nStattfinden der Handlung. Die Person kann die Handlung stets noch unterlassen, weiterüberlegen\nund sich umentscheiden.\nDiese Auffassung ist unvereinbar mit dem Determinismus, der ja behauptet, dass der gesamte\nWeltlauf von Ewigkeit her durch Anfangsbedingungen und Naturgesetze festgelegt ist.\n\n2.) Das Autonomieprinzip\nGeert Keil definiert Willensfreiheit als „Vermögen der hindernisüberwindenden\nWillensbildung“. Dieses Vermögen hat der Mensch auch dann noch, wenn gewisse Hindernisse\nvorhanden sind.\nMenschen können ihren Willen auch unter erschwerten Bedingungen kontrollieren. Sie können\nbestehende Wünsche vernünftig prüfen und dann entscheiden, ob sie diese in die Tat umsetzen.\nMenschen können Gründe erwägen, gute Gründe erkennen und sich von ihnen leiten lassen. Im\nRecht wird dieses Vermögen „Einsichts- und Steuerungsfähigkeit“ genannt.\nMenschen setzen also ihre Wünsche, Neigungen und Affekte nicht automatisch in Handlungen um,\nsondern können innehalten und dann erst entscheiden.\n3.) Das Prinzip der Urheberschaft: Akteurskausalität\nEine Handlung ist nur dann frei, wenn sie weder naturgesetzlich determiniert ist (➔ Ereignis\u0002kausalität) noch rein zufällig stattfindet, sondern durch den Handelnden selbst hervorgerufen\nwird (➔ Akteurskausalität).\nFreie Entscheidungen sehen für einen Libertarier so aus:\nWenn ich mich frage, ob ich A oder B tun soll, habe ich normalerweise für beide Alternativen\nGründe - also sowohl Gründe für A als auch Gründe für B. Aber weder diese Gründe noch andere\nUmstände determinieren meine Entscheidung. Sondern ich selbst bin es, der sich angesichts der\nGründe für A oder für B entscheidet. Nichts im vorherigen Weltlauf determiniert also, wie ich\nmich entscheide. Wenn ich mich für A entscheide, könnte ich mich unter genau denselben\nBedingungen auch für B entscheiden.\nIch bin der Urheber meiner Entscheidung und diese Entscheidung ist nicht durch\nvorhergehende Ereignisse kausal determiniert.\nNeben der „normalen“ Ereigniskausalität gibt es für Libertarier also noch eine andere Art von\nKausalität, die sogenannte Akteurskausalität. Hierbei wird ein Ereignis nicht durch andere\nEreignisse, sondern durch eine handelnde Person direkt verursacht.\nKritik am Libertarismus\nDer wichtigste Einwand gegen den Libertarismus ist der Zufallseinwand. Eine indeterminierte\nWahl - so die Kritik - kann auch nicht vom Handelnden oder durch Vernunftgründe bestimmt sein.\n\nMan kann eine solche Wahl nicht von einem Zufallsereignis unterscheiden.\nEine bloß zufällige Handlung ist aber kein Ausdruck von Freiheit, sondern von Irrationalität.\nEin weiterer Einwand ist, dass libertarische Freiheit Freiheit von allen Bedingungen sei. Ein\nfreier Wille ist somit ein durch nichts bedingter Wille, der auch unabhängig von den Einstellungen\nund dem Charakter der wollenden Person ist.\nDiesen Einwand erhebt auch der Philosoph Peter Bieri und kritisiert, dass ein unbedingt freier\nWille nicht nur völlig unrealistisch sei, sondern auch nicht wünschenswert, da er den\nMenschen überfallen würde wie eine „fremde Macht“.\nZudem wird dem Libertarismus vorgeworfen zu leugnen, dass Personen und ihre\nEntscheidungen Teil der natürlichen Welt sind.\nWenn nicht andere Umstände festlegen, wie ich mich entscheide, sondern ich selbst diese\nEntscheidung verursache, muss ich selbst außerhalb des normalen Weltverlaufs stehen und in der\nLage sein, von außen in diesen Weltverlauf einzugreifen. Die libertarische Auffassung, dass handelnde\nund entscheidende Personen nicht Teil der natürlichen Welt sind, sondern von außen in diese Welt\neingreifen, ist mit allen naturwissenschaftlichen Erkenntnissen über die Welt unvereinbar.\nDer letzte wichtige Kritikpunkt am Libertarismus ist, dass nach dieser Auffassung Personen\nWunder bewirken können oder erste Beweger sind, die Kausalketten in Kraft\nsetzen. Eine solche Annahme widerspricht der kausalen Geschlossenheit der Körperwelt bzw. der\nGeltung physikalischer Erhaltungssätze.\n\n(In)Kompatibilismus\nIn der Debatte um die Willensfreiheit unterscheidet man zwischen der Position des\nKompatibilismus und des Inkompatibilismus. Kompatibilisten halten den Determinismus mit\nWillensfreiheit für vereinbar - kompatibel - , Inkompatibilisten nicht. Dieses Problem nennt man\nVereinbarkeitsproblem.\nDer Libertarismus bejaht die Willensfreiheit und lehnt daher den Gedanken ab, dass unsere\nWelt vollständig determiniert ist.\nDer Determinismus vertritt die Ansicht, dass unsere Welt vollständig determiniert ist.\nDementsprechend kann es laut dieser Position keine Willensfreiheit geben.\nBeide Positionen behaupten also, dass Willensfreiheit unvereinbar - inkompatibel - mit dem\nDeterminismus ist und vertreten damit die These des Inkompatibilismus\n(Unvereinbarkeitslehre).\nInkompatibilisten, die der Meinung sind, dass es in unserer Welt freie Entscheidungen gibt und\ndaher der Determinismus falsch sein muss, nennt man Libertarier.\nBerühmte Libertarier sind beispielsweise Roderick Chisholm (1916-1999), Robert Kane (*1938),\nPeter van Inwagen (*1942) und Geert Keil (*1963).\nLibertarier (/ Indeterministen) vertreten einen starken Begriff von Willensfreiheit. Für sie bedeutet\nFreiheit, dass man unter gegebenen Bedingungen auch anders hätte entscheiden können. Auch\nVerantwortung und Schuldfähigkeit sind ihrer Ansicht nach nur möglich, wenn es Willensfreiheit\ngibt. Ohne Willensfreiheit könnten Menschen für ihr Handeln nicht zur Verantwortung gezogen,\ngelobt oder getadelt werden.\nInkompatibilisten, die der Meinung sind, dass der Determinismus wahr ist und es daher in\nunserer Welt keine freien Entscheidungen gibt, nennt man (harte) Deterministen.\nBerühmte harte Deterministen sind beispielsweise Pierre-Simon de Laplace (1749-1827), Paul\u0002Henri d’Holbach (1723-1789), Gerhard Roth (*1942) und Wolf Singer (*1943).\nHarte Deterministen verneinen die 3 Prinzipien von Willensfreiheit, vor allem das Prinzip\nalternativer Möglichkeiten. Sie vertreten einen sehr schwachen Begriff von Freiheit. Ihrer Ansicht\nnach sind Verantwortung und Schuldfähigkeit ebenfalls an Willensfreiheit gebunden.\nDa Deterministen jedoch Willensfreiheit im starken Sinn verneinen, halten sie Menschen im\nmoralischen Sinn nicht für verantwortlich und schuldfähig. Die Strafe für Straftäter dient ihrer\nAnsicht nach lediglich dem Schutz der Gesellschaft (negative Generalprävention).\n\nDer Kern des inkompatibilistischen Freiheitsbegriffs ist also das Prinzip alternativer\nMöglichkeiten. Eine Person ist dann willensfrei, wenn sie unter gegebenen Bedingungen so oder\nanders handeln kann.\nLibertarier bejahen diese Form von Freiheit, Deterministen verneinen, dass es sie gibt.\nEs gibt aber auch Philosophen, die meinen, dass Willensfreiheit auch in einer\ndeterministischen Welt möglich ist. Eine solche Position nennt man Kompatibilismus.\nDer Kompatibilismus vertritt die These, dass Freiheit und Determinismus miteinander vereinbar -\nkompatibel - sind. Kompatibilisten bzw. weiche Deterministen sind davon überzeugt, dass es in\nunserer Welt freie Entscheidungen gibt, obwohl der Determinismus wahr ist.\nBerühmte Kompatibilisten sind beispielsweise David Hume (1711-1776), John Locke (1632- 1704),\nGeorge Edward Moore (1873-1958) und Peter Bieri (*1944).\nKompatibilisten (weiche Deterministen) vertreten jedoch häufig einen sehr schwachen Begriff von\nFreiheit. Sie sind der Auffassung, dass Verantwortung und Schuldfähigkeit nicht an Willensfreiheit im\nstarken Sinn gebunden sind. Ein Willensentschluss ist laut Auffassung der meisten Kompatibilisten\nbereits dann frei, wenn er ohne Zwang und äußere Hindernisse zustande gekommen ist.\nKompatibilisten beziehen folgendermaßen Stellung zu den drei Prinzipien der\nWillensfreiheit:\n1.) Prinzip alternativer Möglichkeiten\nDas Prinzip alternativer Möglichkeiten besagt, dass jemand auch anders hätte entscheiden und\nhandeln können. In der neueren Kompatibilismusdebatte geht es vor allem um die Klärung der\nBegriffe „Können“ und „Anderskönnen“.\nTeilweise wird von Kompatibilisten (z.B. Hobbes, Hume, Moore) unter Freiheit ganz einfach\nHandlungsfreiheit und nicht Willensfreiheit verstanden. Mit „Können“ ist demnach „Tun\u0002Können“ gemeint.\nAndere Kompatibilisten leugnen, dass Anders-Handeln- und Sich-Anders-Entscheiden-Können\neine notwendige Bedingung für Freiheit bzw. Verantwortlichkeit ist. Harry Frankfurt\nargumentiert beispielsweise, dass man auch dann für eine Entscheidung verantwortlich sein kann,\nwenn man sich nicht anders entscheiden kann.\n2.) Autonomieprinzip\nDas Autonomieprinzip besagt, dass die Handlung nicht vollständig von äußeren Einflussfaktoren\nabhängt, sondern auf selbstbestimmten, autonomen Grundsätzen beruht. Es geht also darum, dass\nich meine Entscheidungen und damit auch meine Handlungen kontrollieren kann.\nDiese Idee spielt in John Lockes (1632-1704) Theorie der Willensfreiheit eine entscheidende Rolle.\n\nLaut Locke können wir - zumindest in vielen Fällen - vor einer Entscheidung innehalten und\nüberlegen, was wir in der gegebenen Situation tun sollten. Wir können uns beispielsweise fragen,\nwas moralisch richtig wäre oder was unseren eigenen Interessen am meisten nützen würde. Für\nLocke ist eine Voraussetzung von Willensfreiheit, vor dem Handeln innehalten und\nnachdenken zu können. Die zweite Voraussetzung ist, dass man dann dem Ergebnis der\neigenen Überlegung gemäß entscheiden (und entsprechend handeln) kann.\nKompatibilistisch ist diese Position, weil die Entscheidungen und Handlungen einer Person mit\nkausaler Notwendigkeit dem Ergebnis ihrer Überlegungen folgen. Das ist aber laut Locke „kein\nMangel, sondern ein Vorzug unserer Natur“. Denn niemand hat ein Interesse daran, etwas anderes\nzu tun, als das, was er nach reiflicher Überlegung als richtig erkannt hat.\n3.) Prinzip der Urheberschaft\nDas Prinzip der Urheberschaft besagt, dass die Entscheidung von der entscheidenden Person selbst\ngetroffen wurde.\nDoch was bedeutet es eigentlich, dass ich etwas tue bzw. dass ich eine Entscheidung treffe? Eine\nkompatibilistische Antwort ist, dass ich eine bestimmte Handlung ausführe, wenn meine Wünsche\nund meine Entscheidungen zu dieser Handlung führen, und dass ich etwas entscheide,\nwenn diese Entscheidung abhängig von meinen Wünschen, Überzeugungen und\nÜberlegungen ist. Demnach bin ich auch dann der Urheber meiner Handlungen und\nEntscheidungen, wenn diese auf bestimmte Ereignisse zurückgehen - nämlich darauf, dass ich\nbestimmte Wünsche habe und bestimmte Entscheidungen treffe, bzw. darauf, dass ich bestimmte\nÜberlegungen anstelle. Wünsche und Überlegungen können auch dann meine Wünsche und\nÜberlegungen sein, wenn sie determiniert sind. Also kann ich auch dann der Urheber einer\nEntscheidung sein, wenn sie von vorangegangenen Ereignissen kausal hervorgerufen wurde.\nKritik am Kompatibilismus: Das Konsequenz-Argument\nDer Libertarier Peter van Inwagen übt mit seinem berühmten Konsequenzargument Kritik am\nKompatibilismus. Seiner Ansicht nach ist der Determinismus unvereinbar mit der These, dass wir\nanders handeln können, als wir es tun. Also ist der Determinismus unvereinbar mit dem freien\nWillen.\nDas Argument lautet stark vereinfacht so:\n(P1) Wenn der Determinismus wahr ist, folgen unsere Handlungen aus Naturgesetzen und\nEreignissen der fernen Vergangenheit.\n(P2) Es steht nicht in unserer Macht, die Naturgesetze oder die Ereignisse der fernen\nVergangenheit zu ändern.\n(K) Also stehen auch die kausalen Konsequenzen der Vergangenheit und der Naturgesetze\nnicht in unserer Macht, unsere eigenen Handlungen eingeschlossen.\n\nVan Inwagen vertritt als Libertarier die Auffassung, dass die Konklusion falsch ist. Daraus\nschließt er, dass die erste Prämisse, also der Determinismus, falsch ist.\nMan kann das Argument auch umdrehen und sagen: Mein Handeln steht in meiner Macht. Dies ist\nbei Annahme des Determinismus nur möglich, wenn die Naturgesetze oder die Vergangenheit\nanders wären. Beides ist nicht möglich, also muss der Determinismus falsch sein. Das\nArgument leitet aus allgemein akzeptierten Prämissen eine Folgerung ab, die ein Kompatibilist zwar\nablehnt, die er aber vernünftigerweise nicht ablehnen dürfte. Es handelt sich nämlich um ein gültiges\nArgument. Aus den beiden Prämissen folgt zwingend die Konklusion. Wenn er es dennoch tut, muss\ner eine der beiden Prämissen ablehnen.\nDie erste Prämisse ist nur eine Erläuterung oder eine direkte Konsequenz aus der These des\nDeterminismus. Der Determinismus ist eine universale Behauptung über den\nWeltlauf. Unsere Handlungen sind Teil des Weltlaufs, also unterliegen auch sie der Determination\ndurch Naturgesetze und Anfangsbedingungen.\nDie zweite Prämisse ist zweiteilig: Dass wir die Vergangenheit nicht ändern können, ist\nunumstritten. Dass wir die Naturgesetze nicht ändern können, sollte ebenfalls unumstritten sein,\nwenn man sich klarmacht, was gemeint ist.\nNach van Inwagen ist gemeint, dass wir ein Naturgesetz nicht falsch machen können. Wir können\nzwar Gesetzeshypothesen als falsch erweisen - „falsifizieren“ -, doch niemand kann Wahres in\nFalsches verwandeln. Anders gesagt: Was auch immer wir falsifizieren, es kann kein Naturgesetz\ngewesen sein, denn wir nennen nur wahre Aussagen Naturgesetze.\nWenn also ein Kompatibilist die Konklusion ablehnt, kann er nur die erste Prämisse ablehnen und\nmuss demnach den Determinismus verneinen.\n\nPolitische\nPhilosophie\n3. Semester\n\nLehrplan\nProgramm S7 Philo4: Themenfeld: Staatsphilosophie\nPositionen Begriffe\nUnterbegriffe\nFakultative Fragestellungen\nVertragstheorien,\nLiberalismus\nDemokratie\nDer Staat\nNaturzustand\nRegierungsform\nMacht und Gewalt\nGesellschaft\nFreiheit und Gleichheit\nRecht und\nGerechtigkeit\nGesellschaftsvertrag\nLegalität und Legitimität\nMenschenrechte\nUngleichheit\nWiderstandsrecht\nStaatsbürgerschaft\nRechte und Pflichten\nEntfremdung und\nBefreiung Weltbürgertum\nDer Staat\n• Kann es eine Gesellschaft ohne eine Staatsgewalt\ngeben?\n• Ist Demokratie die schlechteste Regierungsform,\nvon allen anderen bekannten mal abgesehen?\n• Kann ein Mensch außerhalb einer Gesellschaft\nleben?"},{"id":"polphil_intro","name":"Einführung Politische Philosophie","sem":"Staatsphilosophie","content":"Überblick: Leitfragen der Politischen Philosophie\n1. Staat und Legitimität\n• Wozu gibt es den Staat?\n• Auf welcher Grundlage ist Herrschaft gerechtfertigt?\n• Ist der Staat ein „natürliches“ Gebilde (Platon, Aristoteles) oder ein künstlicher Vertrag (Hobbes,\nLocke, Rousseau)?\n2. Macht und Herrschaft\n• Wie funktioniert Macht?\n• Soll Macht geteilt oder konzentriert werden?\n• Unterschiedliche Sichtweisen:\n• Macht als Mittel zur Herrschaft (Machiavelli)\n• Macht als kollektives Handeln (Arendt)\n• Macht als Durchsetzungsfähigkeit (Weber).\n3. Recht und Moral\n• Soll Recht immer moralisch gerecht sein?\n• Oder gilt: „Gesetz ist Gesetz“ (Rechtspositivismus)?\n• Konflikt zwischen Naturrecht und positivem Recht.\n\n4. Gerechtigkeit\n• Wie sollen Chancen und Güter verteilt werden?\n• Ist Gleichheit oder Freiheit wichtiger?\n• Positionen: Egalitarismus (Rousseau, Marx), liberaler Egalitarismus (Rawls), Liberalismus (Smith,\nNozick).\n5. Demokratie\n• Was bedeutet es, wenn „das Volk herrscht“?\n• Welche Gefahren drohen der Demokratie (z. B. Populismus, „sanfte Tyrannei“ bei Tocqueville)?\n• Unterschiedliche Modelle: direkte Demokratie (Rousseau), repräsentative Demokratie\n(Schumpeter), partizipative Demokratie (Arendt).\n6. Menschenrechte und Weltfrieden\n• Sind Menschenrechte universell oder kulturell bedingt?\n• Wie lässt sich Frieden zwischen Staaten sichern (Kant)?\n• Welche Bedeutung haben Menschenrechte heute im Zeitalter von Globalisierung und Migration?\n\nBasis-Begriffe der\nStaatsphilosophie\nBegriff Kurze Erklärung\nDemokratie Herrschaft des Volkes: Entscheidungen werden von allen oder durch\ngewählte Vertreter getroffen.\nMonarchie Herrschaft eines Einzelnen, meist eines Königs oder Kaisers.\nDiktatur Eine Person oder Gruppe herrscht mit unbeschränkter Macht, oft\nunterdrückend.\nOligarchie Herrschaft weniger, meist reicher oder mächtiger Familien.\nAnarchie Zustand ohne staatliche Ordnung oder Regierung.\nRepublik Staatsform, in der die Macht vom Volk ausgeht und kein Monarch\nherrscht.\nTheokratie Herrschaft durch religiöse Führer oder auf Grundlage heiliger\nSchriften.\nFöderalismus Staatsorganisation, bei der sich mehrere Einheiten (z. B.\nBundesländer) zusammenschließen.\nVolkssouveränität Das Volk ist die höchste politische Autorität; alle Macht geht vom Volk\naus.\nFreiheit Die Möglichkeit, selbstbestimmt zu handeln und eigene\nEntscheidungen zu treffen.\nGerechtigkeit Das Prinzip, dass alle Menschen fair und gleich behandelt werden\nsollen.\nStaat\nUtopie\nGemeinwohl\n\nAnarchie\nAnarchie\nDer Begriff Anarchie kommt aus dem Griechischen (an-arché =\n„ohne Herrschaft“).\nIn politischem Sinn bezeichnet er einen Zustand der Gesetzlosigkeit:\nEs gibt keine staatliche Herrschaft, keine Regierung und keine\nverbindlichen Gesetze.\nGesellschaftliches Leben ist frei von Autorität und Hierarchien.\nRegeln entstehen - wenn überhaupt - nur durch spontane\nVereinbarungen oder freiwillige Zusammenarbeit.\nOft wird Anarchie gleichgesetzt mit Chaos, Unsicherheit und Gewalt.\nManche politische Theorien (z. B. Anarchismus) verstehen darunter\njedoch auch die Möglichkeit einer freiheitlichen Ordnung ohne\nZwang, in der Menschen gleichberechtigt und solidarisch\nzusammenleben.\n\nWiderstandsrecht\nDas Widerstandsrecht bezeichnet die Befugnis - und nach manchen\nAuffassungen sogar die Pflicht -,\neiner Obrigkeit zu widerstehen, wenn diese grundlegende Rechte\nverletzt. Dabei stützt man sich\nauf höhere Rechtsnormen, etwa das Naturrecht oder göttliches\nRecht. In diesem Fall gilt\nWiderstand auch mit Gewalt als gerechtfertigt.\nIm modernen Rechtsstaat kann das Widerstandsrecht nur als letztes\nMittel (Ultima Ratio)\nverstanden werden. Es soll nur dann angewendet werden, wenn die\ngesamte Verfassungsordnung\nzerstört oder systematisch missbraucht wird - nicht jedoch bei\neinzelnen Rechtsverletzungen.\nVom Widerstandsrecht ist der zivile Ungehorsam zu unterscheiden:\nEr bleibt gewaltfrei und\nverfolgt politische Ziele innerhalb einer bestehenden Ordnung (z. B.\nProteste, Streiks,\nSitzblockaden).\nDie Idee des Widerstandsrechts ist alt: Schon in der Antike wurde\ndarüber diskutiert, oft in\nVerbindung mit dem Gedanken des Tyrannenmords. Auch in späteren\nEpochen wurde es immer\nwieder anhand historischer Beispiele gerechtfertigt, etwa in\nAuseinandersetzungen mit willkürlicher\noder absolutistischer Herrschaft.\nRepräsentation\n\nAntike Staatstheorie\nPlatons Staatstheorie"},{"id":"platon_staat","name":"Platon – Staatsphilosophie","sem":"Staatsphilosophie","content":"Überblick Platon Staatsphilosophie (Politeia)\nEinführung\nPlaton (427-347 v. Chr.) ist einer der bekanntesten Philosophen der Antike. Er war Schüler von\nSokrates und Lehrer von Aristoteles. In seinem Werk „Politeia“ (Der Staat) stellt er die Frage: Wie\nmuss ein Staat organisiert sein, damit er gerecht ist und das gute Leben für alle ermöglicht?\nSeine Antwort: Ein gerechter Staat braucht eine klare Ordnung, in der jeder seine Rolle erfüllt,\nund Herrscher, die klug, weise und nur dem Gemeinwohl verpflichtet sind.\nZentrale Positionen\n1. Der Mensch und das Gute\nPlaton sieht den Menschen als ein Wesen, das nach dem Guten strebt. Dieses erkennt er aber erst\ndurch Erziehung und Bildung. Weil der Mensch Vernunft, Mut und Triebe in sich vereint, muss er\nerzogen werden, damit die Vernunft die Führung übernimmt.\n2. Gerechtigkeit als Harmonie\nFür Platon bedeutet Gerechtigkeit Ordnung und Harmonie - in der Seele wie im Staat:\n• In der Seele: Vernunft soll die Triebe leiten, unterstützt durch den Mut.\n• Im Staat: Jede gesellschaftliche Gruppe erfüllt ihre Aufgabe und trägt so zum Ganzen bei.\n3. Die drei Klassen im Staat\n• Bauern / Volk: sichern die materiellen Grundlagen (Landwirtschaft, Handwerk, Handel).\n• Wächter: verteidigen den Staat und wahren die innere Ordnung; sie werden streng erzogen,\num Tapferkeit und Gemeinsinn zu entwickeln.\n• Herrscher (Philosophenkönige): regieren gerecht und weise, weil sie durch Bildung und\nEinsicht die Idee des Guten erkennen. Ihre Herrschaft gründet auf Vernunft und Tugend, nicht auf\nGewalt.\n4. Erziehung als Schlüssel\nDie richtige Erziehung entscheidet, welche Rolle ein Mensch im Staat übernimmt. Besonders die\nWächter und Herrscher durchlaufen eine lange, anspruchsvolle Ausbildung in Körper, Musik,\nMathematik und Philosophie. So sollen nur die Fähigsten zur Herrschaft gelangen.\n\n5. Ziel des idealen Staates\nPlatons Staat strebt nach einer harmonischen Ordnung, in der jeder seinen Platz hat und die\nPhilosophenkönige gerecht regieren. Die Harmonie im Staat entspricht der Harmonie in der Seele\njedes Einzelnen.\nWichtige Zitate\n•„Solange nicht die Philosophen Könige werden […] gibt es keine Ruhe von den Übeln der Staaten.“\n•„Gerechtigkeit bedeutet, dass jeder das Seine tut und sich nicht in das Seine der anderen einmischt.“\n\nVertiefung: Platons Staatstheorie\n1. Der Staat als natürliche Gemeinschaft\nPlaton (427-347 v. Chr.) bestimmt jenen Staat als den besten, der den menschlichen Bedürfnissen\nam besten gerecht wird. Da die Menschen unterschiedliche Fähigkeiten haben und zugleich\nvoneinander abhängig sind, ist es für das Gemeinwohl wie für den Einzelnen besser, wenn sie sich\narbeitsteilig spezialisieren: einer ist Bauer, einer Handwerker, einer Soldat.\nWenn Menschen in dieser Weise zusammenleben, erfüllt der Staat die menschliche Natur. Er ist\nalso nicht bloß eine zweckhafte Vereinigung, sondern seine Ordnung erscheint Platon als natürlich,\nweil sie die Begabungen der Menschen widerspiegelt.\n2. Die Seelenlehre und die Ständeordnung\nPlaton leitet die Struktur des Staates von der Struktur der menschlichen Seele ab.\n• Vernunft (zur Weisheit fähig) → Herrscher (archontes)\n• Mut/Wille (zur Tapferkeit fähig) → Wächter (phylakes)\n• Begierde (muss durch Mäßigung gezügelt werden) → Ernährer (demiurgoi: Bauern,\nHandwerker)\nJeder Stand entspricht also einem Teil der Seele. Ein\nStaat ist gerecht, wenn jeder Stand seiner Aufgabe\nnachgeht und keiner sich in die Aufgaben des anderen\neinmischt.\n3. Philosophenherrscher und\nErziehung\nDie Tugendhaftesten und Klügsten aus diesem\nWächterstand werden schließlich zum Stand der\nHerrscher (archontes) ausgebildet. Ganz\nselbstverständlich geht Platon davon aus, dass nur jene im Staat herrschen sollen, deren Veranlagung\nzur Weisheit am stärksten ausgebildet ist und die durch eine jahrelange asketische, intellektuelle\nund disziplinierende Erziehung geschult werden, unparteilich das für alle Beste zu erkennen. Damit\nsie wirklich das Beste für alle erkennen können, sollen sie eine lange und strenge Ausbildung\ndurchlaufen:\n• bis 20 Jahre: Elementarerziehung\n• bis 30 Jahre: Mathematik, Astronomie, Harmonie\n• bis 35 Jahre: Dialektik\n\n• bis 50 Jahre: praktische Tätigkeit im Staat\n• ab 50 Jahren: Herrschaft als Philosophenkönige\nDie Philosophenherrscher sollen auf jedes Privatleben, Vergnügen und Besitz verzichten, um frei\nvon Egoismus zu sein. Nur so können sie unparteiisch regieren und dem allgemeinen Wohl dienen.\nDie Wächter sind Alleinherrscher, an kein Gesetz und kein Recht gebunden. Sie selbst bestimmen\nin jedem Einzelfall, was gerecht ist. Eine Kontrollinstanz oder ein Mitspracherecht der anderen\nStände sind nicht vorgesehen. Garanten der Gerechtigkeit dieses besten Staats sind nach zum einen\ndie Natürlichkeit der Ständeordnung, die den ungleichen Bedürfnissen und Fähigkeiten entspricht,\nzum anderen die Sorgfalt und Präzision in der\nAusbildung der Alleinherrscher.\nAus heutiger Perspektive erscheint beides mehr als\nfraglich. Von den elf Kennzeichen einer Demokratie (cf.\nspäter) findet sich in Platons Idealstaat nur das erste:\ndie Gemeinwohlorientierung der Politik.\n4. Gerechtigkeit im Staat\nPlaton versteht Gerechtigkeit so: Jeder soll das tun,\nwozu er von Natur aus bestimmt ist.\nDie Bauern sorgen für Nahrung, die Wächter für\nSchutz, die Herrscher für kluge Leitung. Eingriffe oder\nVermischungen führen zur Ungerechtigkeit.\nStand Funktion Tugend Seelenteil\nPhilosophen (Lehrstand) Lenkung des Staates Weisheit Vernunft\nKrieger (Wehrstand) Verteidigung des Staates Tapferkeit Mut\nBauern (Nährstand) Versorgung des\nStaates\nMäßigung/\nBesonnenheit Begehren\n\nBewertung\nPositive Aspekte\n• Betonung des Gemeinwohls statt Einzelinteressen.\n• Klare Verbindung von Ethik und Politik: Herrscher müssen tugendhaft sein.\n• Idee einer systematischen Ausbildung der Herrscher - für die Antike sehr fortschrittlich.\n• Keine Vererbung der Standeszugehörigkeit: Zuweisung erfolgt nach Fähigkeiten, nicht nach\nGeburt.\n• Keine erzieherischen Unterschiede zwischen Mädchen und Jungen: auch Frauen können\nWächterinnen werden, gemeinsam trainieren und kämpfen.\nKritische Aspekte\n• Platons Modell ist elitär und autoritär: Nur wenige Philosophen sollen herrschen, das Volk\nbleibt ohne Mitbestimmung.\n• Er lehnt Demokratie als instabil ab, obwohl sie heute als wichtigster Garant für Freiheit gilt.\n• Keine Gewaltenteilung: Herrscher sind an kein Gesetz gebunden, Missbrauch der Macht\nwäre kaum zu verhindern.\n• Das Ideal der Philosophenherrschaft setzt voraus, dass Menschen völlig uneigennützig handeln\nkönnen - eine sehr realitätsferne Annahme.\n• Private Freiheit wird stark eingeschränkt: Herrscher und Wächter dürfen weder Familie noch\nBesitz haben.\n• Von den elf Kennzeichen einer Demokratie findet sich nur die Gemeinwohlorientierung.\n• Staatliche Lenkung der Fortpflanzung und Kontrolle der Bevölkerungszahlen (Eugenik, Aussetzen\nunerwünschter Kinder).\n• Zensur der Literatur (z. B. Homer), um schlechten Einfluss zu verhindern.\n\nExkurse\nExkurs: Platons Erziehungsstaat - Totalitäre Strukturen avant la\nlettre?\nPlatons Idealstaat ist durch eine radikale Erziehungs- und Gesellschaftsordnung geprägt. Kinder\nsollen nicht in ihren Familien aufwachsen, sondern vom Staat erzogen werden. Wächter und\nHerrscher verzichten auf Privateigentum, Familienleben und persönliche Bindungen, um\nausschließlich dem Gemeinwohl verpflichtet zu sein. Literatur, Musik und Kunst werden streng\nkontrolliert, um „schädliche Einflüsse“ auf den Charakter zu verhindern.\nPositiv betrachtet: Platon will Korruption und Machtmissbrauch verhindern. Wenn die\nWächter weder Eigentum noch Familie haben, fehlt ihnen das Motiv für Eigennutz. Der Staat sorgt\nfür eine einheitliche, sorgfältig geplante Erziehung, die Tugend und Gemeinwohlorientierung fördern\nsoll.\nKritisch betrachtet: Aus heutiger Sicht erscheinen diese Maßnahmen als Ausdruck totalitärer\nKontrolle. Die vollständige Unterordnung des Individuums unter die Gemeinschaft, die Auflösung\nvon Familie und Privatleben sowie die umfassende Zensur sind Mechanismen, die wir aus\nmodernen Diktaturen kennen. Der Staat greift in die intimsten Lebensbereiche ein - ein Modell, das\ndie Freiheit des Einzelnen zugunsten einer vermeintlich perfekten Ordnung opfert.\nDiskussionsfrage: Lässt sich eine gerechte Gesellschaft überhaupt durch totale Kontrolle\nherstellen - oder zerstört Kontrolle immer die Freiheit, die Gerechtigkeit voraussetzt?\nExkurs: Platons Idealstaat und die Demokratie\nPlaton war ein scharfer Kritiker der Demokratie. Für ihn führte die Volksherrschaft zwangsläufig\nzur Herrschaft der Unwissenden. In der Demokratie hätten alle Bürger das gleiche Stimmrecht -\nunabhängig von Bildung, Tugend oder Einsicht. Das öffne Tür und Tor für Demagogen, die das Volk\nverführen und ins Chaos stürzen. Seine eigenen Erfahrungen prägten diese Haltung: Athen hatte im\nPeloponnesischen Krieg eine politische Krise durchlebt, und Sokrates war durch ein\ndemokratisches Gericht zum Tode verurteilt worden.\nPlatons Gegenentwurf: Nicht die Mehrheit, sondern die Besten - die Philosophen - sollten\nherrschen. Sie seien aufgrund ihrer Weisheit, Selbstdisziplin und Ausbildung in der Lage, das\nGemeinwohl unparteiisch zu erkennen.\nPositive Aspekte: Platons Skepsis gegenüber Demokratie berührt bis heute relevante Fragen:\nWie stabil ist eine Demokratie angesichts von Populismus, Fake News oder charismatischen, aber\n\nverantwortungslosen Führungsfiguren? Seine Warnung vor dem Einfluss von Massenstimmungen\nklingt angesichts moderner Medienlandschaften fast prophetisch.\nKritische Bewertung: Dennoch ignoriert Platon die Stärke der Demokratie: ihre Fähigkeit zur\nSelbstkorrektur, Teilhabe und Freiheit. Während Platons Modell eine Herrschaft der „Besten“\nvorsieht, bleibt unklar, wer bestimmt, wer die „Besten“ sind. In der Demokratie dagegen liegt\nLegitimität in der Beteiligung aller - auch wenn dies Fehler und Umwege einschließt.\nDiskussionsfrage: Ist Demokratie trotz aller Schwächen die „schlechteste Staatsform - außer\nallen anderen“ (Churchill)?\nExkurs : Platon und die Zensur im Staat\nEin zentraler Aspekt von Platons Idealstaat ist die umfassende Kontrolle von Kunst und Kultur.\nPlaton fordert die Zensur von Literatur, Musik und Theater, um zu verhindern, dass „falsche“\nVorbilder oder moralisch fragwürdige Geschichten die Bürger verderben. So sollten etwa die\nWerke Homers teilweise verboten werden, weil die Götter darin lügen, betrügen und sich\nunmoralisch verhalten - und damit als schlechte Vorbilder für die Jugend gelten.\nZiel Platons: Die Bürger sollen durch „richtige“ Kunst zu Tugend und Gemeinwohlorientierung\nerzogen werden. Die Zensur dient also nicht primär der Unterdrückung, sondern der moralischen\nErziehung.\nKritische Perspektive: Diese Form der kulturellen Steuerung ist aus heutiger Sicht\nproblematisch. Kunst und Literatur verlieren ihre Freiheit und Vielfalt, wenn sie nur noch als\npädagogisches Instrument für staatliche Zwecke dienen. Der Staat entscheidet, was als „wahr“ und\n„gut“ gilt - ein Mechanismus, der historisch häufig zur Rechtfertigung von Diktaturen und\nIdeologien diente.\nDiskussionsfrage: Soll Kunst erziehen - oder soll sie frei sein, auch wenn sie provoziert und\nanstößig wirkt?\n\nDiskussionsfragen\n1. Herrschaft und Legitimation\n• Wer sollte deiner Meinung nach in einem Staat herrschen: die Mehrheit (Demokratie) oder die\n„Besten“ (Philosophenkönige)?\n• Wer entscheidet, wer die „Besten“ sind?\n2. Gemeinwohl vs. Freiheit\n• Ist es gerecht, das Leben des Einzelnen (Familie, Eigentum, Kunstfreiheit) für das Gemeinwohl zu\nopfern?\n• Wie würdest du den Konflikt zwischen persönlicher Freiheit und gesellschaftlicher Ordnung\nlösen?\n3. Bildung und Erziehung\n• Platon fordert eine jahrzehntelange Erziehung für Herrscher. Ist Bildung wirklich die beste\nGarantie für gerechtes Regieren?\n• Soll der Staat bestimmen, wie Kinder erzogen werden, oder gehört das ausschließlich in die\nFamilie?\n4. Zensur und Kunst\n• Platon will Homers Werke teilweise verbieten. Soll der Staat Kunst zensieren, wenn sie als\ngefährlich oder moralisch fragwürdig gilt?\n• Darf Kunst lügen, provozieren oder „schlechte“ Vorbilder zeigen?\n5. Aktualität\n• Platons Angst vor Demagogie: Sehen wir heute ähnliche Gefahren in der Demokratie (z. B. durch\nPopulismus, Fake News oder Social Media)?\n• Ist Platons Idealstaat eher ein Modell für Gerechtigkeit - oder eine frühe Form von\nTotalitarismus?\n\nAristoteles’ Staatstheorie"},{"id":"aristoteles_staat","name":"Aristoteles – Staatstheorie","sem":"Staatsphilosophie","content":"Überblick Aristoteles’ Staatstheorie\nEinführung\nAristoteles (384-322 v. Chr.) war Schüler Platons, wandte sich aber stärker der empirischen\nBeobachtung zu. Statt einen idealen Staat wie Platon zu entwerfen, untersuchte er die realen\nVerfassungen griechischer Stadtstaaten. Sein Ziel war es, eine Staatslehre zu entwickeln, die sich am\nGemeinwohl orientiert und der Natur des Menschen entspricht.\nZentrale Begriffe\n• Zoon logon echon bedeutet auf Griechisch „Lebewesen mit Vernunft und Sprache“.\nAristoteles beschreibt damit den Menschen als ein Wesen, das sich vom Tier unterscheidet, weil\nes denken, sprechen und gemeinsam Überlegungen anstellen kann.\n• Zoon politikon bedeutet auf Griechisch „politisches Lebewesen“. Aristoteles meint damit,\ndass der Mensch von Natur aus in Gemeinschaft lebt. Nur im Staat (Polis) kann er seine Vernunft\nund Sprache vollständig entfalten und ein gutes Leben führen.\n• Eudaimonia: Glückseligkeit als höchstes Ziel des Lebens - erreichbar nur in der Polis.\n• Polis: Stadtstaat als natürliche Gemeinschaft, in der der Mensch tugendhaft leben kann.\n• Politie: „Mischverfassung“ aus Demokratie und Oligarchie, die am Gemeinwohl orientiert ist.\nZentrale Ideen\n1. Menschenbild\n• Der Mensch ist ein zoon politikon (politisches Lebewesen). Er lebt von Natur aus in\nGemeinschaften und findet seine Erfüllung nur dort.\n• Durch Vernunft und Sprache unterscheidet er sich von den Tieren.\n2. Ziel des Menschen\n• Das höchste Ziel ist die Eudaimonia (Glückseligkeit). Diese erreicht man nur in der Gemeinschaft,\ndurch ein tugendhaftes Leben.\n3. Aufgabe der Polis (Staat)\n• Der Staat soll das Glück seiner Bürger fördern. Er muss Bedingungen schaffen, damit Menschen\nihre Tugenden entfalten können.\n4. Staatsformen\n• Gute Staatsform = Politie (Mischung aus Demokratie und Oligarchie).\n• Schlechte Staatsformen sind Extreme wie Tyrannei oder reine Demokratie.\n\n• Maßstab für die Bewertung = das Gemeinwohl statt Eigennutz.\n5. Bedeutung des Mittelstands\n• Der Mittelstand sorgt für Stabilität, Vernunft und Ausgleich.\n• Er neigt weniger zu Ungerechtigkeit als Arme oder Reiche.\n• Solidarität und Freundschaft entstehen leichter im Mittelstand.\nZitate & Beispiele\n• „Der Mensch ist von Natur aus ein staatenbildendes Lebewesen.“ (Politik I, 2)\n• „Wo der Mittelstand zahlreich ist, da entstehen am wenigsten Aufstände und Zwiste.“ (Politik IV, 11)\n\nVertiefung: Aristoteles’ Staatsphilosophie\nEmpirischer Ansatz\nAristoteles (384–322 v. Chr.) unterscheidet sich grundlegend von Platon durch seine\nVorgehensweise. Während Platon eine ideale Staatsordnung vor allem theoretisch entwirft, geht\nAristoteles empirisch vor: Er untersucht die real existierenden Stadtstaaten seiner Zeit, etwa\nAthen oder Sparta, und versucht aus diesen Beobachtungen allgemeine Aussagen darüber zu\ngewinnen, wie ein guter Staat beschaffen sein sollte.\nAuch in der Begründung des Staates setzt Aristoteles anders an als Platon. Platon erklärt die\nEntstehung des Staates aus der Schwäche und Unvollständigkeit des Einzelnen. Aristoteles hingegen\nsieht im Menschen selbst eine natürliche Neigung zur Gemeinschaft. Berühmt ist seine\nFormulierung, der Mensch sei „von Natur aus ein staatenbildendes Wesen“ (ánthropos physei\npolitikón zôon).\nDamit meint Aristoteles: Der Mensch lebt nicht nur aus Not oder zum bloßen Überleben in\nGemeinschaft, sondern ist von seinem Wesen her auf gemeinsames Leben angelegt. Erst innerhalb\nder politischen Gemeinschaft kann er das gute Leben (eudaimonia) führen und Tugenden\nentwickeln.\nEin zentrales Argument für diese Natürlichkeit des Staates ist für Aristoteles die Sprache (logos).\nTiere verfügen lediglich über Laute, mit denen sie Gefühle wie Schmerz oder Lust ausdrücken.\nMenschen hingegen können mithilfe der Sprache über Gut und Böse, Gerechtigkeit und\nUngerechtigkeit sowie über das Gemeinwohl nachdenken und sich darüber austauschen. Die\nFähigkeit zur Sprache zeigt daher, dass der Mensch auf ein gemeinschaftliches und gerechtes\nZusammenleben hin angelegt ist, nicht nur auf das bloße Überleben.\n\nEntwicklung der Gemeinschaft\nFür Aristoteles entsteht der Staat nicht plötzlich oder künstlich, sondern in einer natürlichen\nEntwicklungsabfolge menschlicher Gemeinschaften.\nAm Anfang stehen die Grundgemeinschaften: die Beziehung von Mann und Frau, von Eltern\nund Kindern sowie das Verhältnis von Herr und Sklave. Diese elementaren Gemeinschaften dienen\nder Sicherung des alltäglichen Lebens und der Fortpflanzung.\nMehrere dieser Grundgemeinschaften schließen sich zur Hausgemeinschaft (oikos) zusammen.\nDer oikos ist auf die unmittelbaren Bedürfnisse des Lebens ausgerichtet, etwa Ernährung, Schutz\nund wirtschaftliches Überleben.\nAus dem Zusammenschluss mehrerer Häuser entsteht das Dorf, das bereits über das bloße\nÜberleben hinausgeht, aber noch nicht vollständig selbstständig ist.\nErst der Zusammenschluss mehrerer Dörfer zur Polis (Stadtstaat) stellt die vollendete Form\nder Gemeinschaft dar. Die Polis ermöglicht Autarkie, also Selbstgenügsamkeit und Unabhängigkeit,\nund schafft damit die Voraussetzung für ein gutes und tugendhaftes Leben. Der Staat dient bei\nAristoteles daher nicht nur dem Leben selbst, sondern dem guten Leben.\nAufgabe des Staates\nDer Staat ist für Aristoteles nicht nur ein Zweckbündnis, um Sicherheit oder Eigentum zu schützen\n(wie später bei Hobbes oder Locke). Vielmehr soll er den Bürgern ermöglichen, ihre Tugenden zu\nentfalten und das glückselige Leben zu führen. Der Staat ist also immer auch eine moralische und\nsittliche Gemeinschaft.\n\nStaatsformenlehre\nAristoteles unterscheidet sechs Staatsformen, die er danach bewertet, wer regiert und in wessen\nInteresse regiert wird:\nDie „rechte Mitte“ - Bedeutung des Mittelstands\nIn der Politik wie in seiner Ethik betont Aristoteles die Mitte zwischen Extremen. Ein stabiler Staat\nbasiert auf einem starken Mittelstand.\nDrei Gründe nennt er:\n1. Der Mittelstand ist eher bereit, der Vernunft zu folgen, während Reiche zu Übermut und\nArme zu Heimtücke neigen.\n2. Der Mittelstand ist frei von Neid und Verachtung und daher fähiger zu Solidarität und\nFreundschaft.\n3. Eine Herrschaft des Mittelstands garantiert politische Stabilität: „Wo der Mittelstand\nzahlreich ist, da entstehen am wenigsten Aufstände und Zwiste unter den Bürgern.“\nDie Politie - Aristoteles’ Idealstaat\nUnter den drei „guten“ Staatsformen bevorzugt Aristoteles die Politie, eine Mischverfassung aus\nDemokratie und Oligarchie.\n• Demokratisch ist sie, weil alle freien Vollbürger am Entscheidungsprozess teilnehmen.\n• Oligarchisch ist sie, weil sie zugleich auf Tugendhaftigkeit und Gemeinwohlorientierung setzt.\nZiel: Eine Staatsordnung, die möglichst vielen Bürgern erlaubt, sich tugendhaft zu entfalten und so\nglücklich zu werden.\nWarum der Staat das tugendhafte Leben ermöglicht\nFür Aristoteles ist der Staat nicht nur eine pragmatische Zweckgemeinschaft, sondern die\nBedingung für das gute Leben.\n1. Ziel des Staates ist Eudaimonia:\nGute Formen (am Gemeinwohl orientiert): Schlechte Formen (am Eigeninteresse\norientiert):\nMonarchie - Herrschaft eines Einzelnen Tyrannis - Alleinherrschaft für den eigenen Vorteil\nAristokratie - Herrschaft der Tugendhaftesten/\nWenigen\nOligarchie - Herrschaft der Reichen\nPolitie - Mischform, Herrschaft aller freien Bürger Demokratie - Herrschaft der Armen gegen die\nReichen\n\n• Der Staat existiert nicht nur für Sicherheit oder Eigentum. Er schafft die Bedingungen, unter\ndenen Menschen tugendhaft handeln können.\n2. Tugend braucht Gemeinschaft:\n• Tugenden wie Gerechtigkeit, Mut oder Freundschaft entstehen nur im Umgang mit anderen.\n• Erst in der Polis wird der Mensch ein „vollständiger Bürger“.\n3. Erziehung durch den Staat:\n• Gemeinsame Erziehung sorgt dafür, dass Bürger lernen, für das Gemeinwohl einzutreten.\n4. Gesetz als Schule der Tugend:\n• Gesetze haben nicht nur Ordnungs-, sondern auch Erziehungsfunktion. Sie bringen die Bürger\ndazu, tugendhaft zu handeln und schlechte Gewohnheiten abzulegen.\nKurz: Ohne Staat könnten Menschen zwar überleben, aber nicht gut leben. Der Staat ist die\nBedingung dafür, dass Menschen ihre Vernunft nutzen, Tugenden entfalten und so zu wahrer\nGlückseligkeit (eudaimonia) gelangen.\n\nBewertung\nPositive Aspekte\n1. Realistischer Ansatz:\n• Im Gegensatz zu Platon entwirft Aristoteles keinen utopischen Idealstaat, sondern untersucht\nempirisch die realen Stadtstaaten seiner Zeit. Dadurch wirkt seine Theorie praxisnäher und\nweniger abgehoben.\n2. Der Mensch als Gemeinschaftswesen:\n• Aristoteles’ Gedanke, dass der Mensch von Natur aus ein zoon politikon ist, prägt bis heute das\npolitische Denken. Er erkennt: Menschen können ihre Fähigkeiten und Tugenden nur in\nGemeinschaft entfalten.\n3. Bedeutung des Mittelstands:\n• Aristoteles betont die stabilisierende Rolle des Mittelstands. Diese Idee gilt auch heute als\nrelevant: Viele moderne Demokratien beruhen auf einer starken Mittelschicht, die soziale\nStabilität garantiert.\n4. Ziel des Staates: das gute Leben (eudaimonia):\n• Für Aristoteles ist Politik nicht nur Macht- oder Wirtschaftsorganisation, sondern soll das gute\nLeben aller ermöglichen. Der Staat wird zur Schule der Tugend - ein normativer Anspruch, der\nauch moderne Demokratien herausfordert.\nKritische Aspekte\n1. Ausschluss vieler Menschen:\n• Nur freie männliche Bürger gelten als vollwertige Mitglieder der Polis. Frauen, Sklaven, Bauern\nund Fremde sind von politischer Teilhabe ausgeschlossen.\n2. Hierarchisches Menschenbild:\n• Aristoteles sieht Sklaverei als „natürlich“ und rechtfertigt Herrschaft von „Höherstehenden“\nüber „Niedrigstehende“. Dieses Denken ist aus heutiger Perspektive problematisch und\nwiderspricht modernen Menschenrechtsvorstellungen.\n3. Begrenzte Demokratie:\n• Auch wenn Aristoteles die Politie als Mischform schätzt, bewertet er die Demokratie\n(verstanden als Herrschaft der Armen) negativ. Moderne Demokratien hingegen setzen auf\ngleiche politische Rechte für alle Bürger.\n\nExkurse\nExkurs: Aristoteles und der Kommunitarismus\n1. Historischer Hintergrund\nDer Kommunitarismus ist eine politische und philosophische Strömung des späten 20.\nJahrhunderts, besonders stark vertreten in den USA und Großbritannien. Er entstand als Kritik am\nLiberalismus - also an der Idee, dass das Individuum völlig unabhängig von Gemeinschaften gedacht\nwerden könne. Kommunitaristen wie Michael Sandel, Charles Taylor oder Amitai Etzioni betonen,\ndass Menschen immer in soziale, kulturelle und moralische Kontexte eingebunden sind. Werte,\nIdentität und Sinn entstehen nicht isoliert, sondern im Miteinander.\n2. Die Grundidee des Kommunitarismus\n• Der Mensch ist kein „freies Atom“, das erst später in Gesellschaften eintritt, sondern von Anfang\nan Teil von Gemeinschaften (Familie, Dorf, Nation, Kultur).\n• Gemeinschaften prägen, was wir als gut, gerecht oder wertvoll empfinden. Ohne diesen\nHintergrund könnten wir unsere Identität gar nicht entwickeln.\n• Politik soll deshalb nicht nur individuelle Rechte schützen, sondern auch gemeinsame Werte und\ndas Gemeinwohl fördern.\n3. Parallelen zu Aristoteles\nAristoteles schrieb schon im 4. Jahrhundert v. Chr.: „Der Mensch ist von Natur aus ein\nstaatenbildendes Wesen (zoon politikon).“\n• Auch für ihn ist das Individuum ohne Gemeinschaft unvollständig. Ein Mensch, der ohne Polis lebt,\nsei entweder „ein Tier oder ein Gott“.\n• Tugenden wie Gerechtigkeit, Freundschaft oder Mut können nur im Zusammenleben entstehen\nund praktiziert werden.\n• Der Staat (Polis) hat die Aufgabe, Bedingungen für ein „gutes Leben“ (eudaimonia) zu schaffen -\nalso nicht nur für Sicherheit oder Eigentum zu sorgen, sondern für moralische Entfaltung.\n4. Unterschiede\n• Aristoteles dachte die Gemeinschaft fast ausschließlich in der Form der Polis (griechischer\nStadtstaat), während Kommunitaristen moderne Großgesellschaften im Blick haben.\n• Aristoteles betont die „Natürlichkeit“ des Staates, während moderne Kommunitaristen stärker\ndie historische und kulturelle Bedingtheit hervorheben.\n• Aristoteles verknüpft Politik eng mit Tugendethik, Kommunitaristen eher mit Identität und\nSolidarität.\n\n5. Aktualität\nHeute erleben viele Gesellschaften Individualisierung, Vereinzelung und Wertepluralismus.\nKommunitaristen erinnern daran, dass Demokratie und Freiheit nur funktionieren, wenn es einen\ngemeinsamen Wertehorizont gibt. In diesem Punkt greifen sie eine zentrale Einsicht von Aristoteles\nauf: Gemeinschaft ist nicht nur nützlich, sondern notwendig, damit Menschen ein gutes Leben\nführen können.\nKurz: Der Kommunitarismus ist eine moderne Ausprägung einer sehr alten Idee. Schon\nAristoteles erkannte, dass Menschen Gemeinschaft brauchen, um ihre Tugenden zu entfalten. Die\nKommunitaristen haben diesen Gedanken in eine Welt übertragen, die viel komplexer und größer\nist als die griechische Polis.\nExkurs 2: Aristoteles und Sklaverei\nEin dunkler Aspekt in Aristoteles’ Denken ist seine Rechtfertigung der Sklaverei.\n• Er unterscheidet zwischen Menschen, die „von Natur aus frei“ sind, und solchen, die „von Natur\naus Sklaven“ seien. Letztere hätten angeblich nicht die Fähigkeit, sich selbst zu bestimmen, und\nsollten daher von anderen geleitet werden.\n• Diese Sichtweise war in der antiken Welt nicht ungewöhnlich, steht aber im klaren Widerspruch\nzu modernen Vorstellungen von Freiheit, Gleichheit und Menschenwürde.\n• Kritik: Aristoteles verkennt, dass Sklaverei kein „natürlicher Zustand“ ist, sondern ein soziales\nMachtverhältnis. Seine Position gilt daher heute als problematisch und wird als Beleg dafür\ngesehen, dass Philosophie immer auch zeitgebunden ist.\nExkurs 3: Aristoteles und die Bedeutung der Mitte\nAristoteles’ Ethik ist berühmt für die „Lehre von der Mitte“ (mesotes). Tugendhaftes Handeln\nbedeutet, das richtige Maß zwischen Extremen zu finden (z. B. Mut als Mitte zwischen Feigheit und\nTollkühnheit).\n• Dieses Prinzip überträgt er auch auf die Politik: Ein stabiler Staat gründet sich nicht auf die\nExtreme von Reichtum oder Armut, sondern auf den Mittelstand.\n• Aktualität: Auch heute wird oft gesagt, dass eine „starke Mitte“ für die Stabilität von\nDemokratien entscheidend ist, während extreme Polarisierung (links/rechts, arm/reich)\nGesellschaften spalten kann.\nAristoteles’ Politik ist also direkt mit seiner Ethik verbunden - beide Male ist die Mitte das, was\nBestand und Gerechtigkeit sichert.\nExkurs 4: Aristoteles und die Demokratie\nAristoteles steht der Demokratie skeptisch gegenüber. Für ihn bedeutet Demokratie die\nHerrschaft der Armen über die Reichen - und damit eine Form der Eigeninteressenpolitik.\n\n• Trotzdem erkennt er die Bedeutung der Beteiligung vieler Bürger an: Seine Politie ist eine\nMischform aus Demokratie und Oligarchie und kommt modernen Verfassungen sehr nahe.\n• Heute sehen wir Demokratie nicht mehr primär als „Herrschaft der Armen“, sondern als ein\nSystem, das Freiheit, Gleichheit und Teilhabe garantiert.\n• Aristoteles bleibt aber aktuell: Seine Idee, dass eine gute Verfassung beide Extreme (Armut/\nReichtum) ausgleichen muss, erinnert an moderne Mischverfassungen und Gewaltenteilung.\n\nDiskussionsfragen\n1. Natur des Menschen und Gemeinschaft\n• Aristoteles nennt den Menschen ein „staatenbildendes Wesen“ (zoon politikon).\n→ Brauchen wir den Staat wirklich, um ein gutes Leben zu führen?\n• Könnte man heute auch in kleinen Gemeinschaften oder als Einzelner ein erfülltes Leben haben?\n2. Aufgabe des Staates\n• Der Staat soll Tugend fördern und die Bürger erziehen.\n→ Ist es Aufgabe des Staates, moralisch zu erziehen - oder sollte das privat bleiben?\n3. Mittelstand und Stabilität\n• Aristoteles betont die Bedeutung eines starken Mittelstands.\n→ Ist eine stabile Demokratie heute ebenfalls von einer „Mitte“ abhängig?\n4. Politische Teilhabe\n• In der Politie sollen alle Vollbürger am politischen Leben teilnehmen.\n→ Wer gilt heute als „Vollbürger“? Sind Migranten, Jugendliche oder Nicht-Wähler\nausgeschlossen?\n• Sollte politische Teilhabe stärker an Bildung oder Einkommen gebunden sein?\n5. Grenzen und Probleme seiner Theorie\n• Aristoteles rechtfertigte Sklaverei mit „natürlicher Unterlegenheit“.\n→ Was sagt uns das über die Grenzen seiner Philosophie?\n• Gibt es heute noch vergleichbare Denkweisen, die Menschen abwerten oder ausschließen?\n6. Aktualität\n• In sozialen Medien entstehen neue Gemeinschaften.\n→ Würde Aristoteles das als „politische Gemeinschaften“ ansehen - oder spalten sie eher?\n• In einer Einwanderungsgesellschaft: Brauchen wir gemeinsame Leitwerte (z. B. Menschenrechte),\num zusammenzuleben?\n• Viele ziehen sich ins Private zurück und engagieren sich nicht politisch.\n→ Gefährdet das die Demokratie, wenn der Mensch nicht mehr als zoon politikon lebt?\n\nHistorischer Abriss:\nRömisches Reich und\nMittelalter\n1. Politische Philosophie im Römischen Reich\n• Pragmatischer Ansatz: Römer waren stärker auf Recht und Institutionen konzentriert als\nauf Idealstaaten.\n• Cicero (106-43 v. Chr.):\n- Werk: De re publica, De legibus.\n- Idee des Naturrechts: ein ewiges, universales Gesetz, das für alle Menschen gilt.\n- Zitat: „Es gibt ein wahres Gesetz, die rechte Vernunft, das der Natur entspricht. Es ist unveränderlich\nund ewig.“\n• Römisches Recht:\n• Aufbau eines komplexen Rechtssystems."},{"id":"hobbes","name":"Thomas Hobbes – Leviathan","sem":"Staatsphilosophie","content":"Überblick: Thomas Hobbes - Der Staat als Leviathan\nThomas Hobbes (1588-1679)\nThomas Hobbes wurde 1588 in England geboren - im Jahr, als die\nspanische Armada England bedrohte. Später sagte er, er sei „mit der\nAngst geboren“ - ein Satz, der sein Denken gut beschreibt.\nHobbes wuchs in einer Zeit politischer und religiöser Konflikte auf.\nEngland wurde von Bürgerkriegen, Machtkämpfen zwischen König\nund Parlament und Spannungen zwischen katholischer und\nprotestantischer Kirche erschüttert. Diese Erfahrung dauernder\nUnsicherheit prägte sein Menschenbild und seine Vorstellung vom Staat. Er studierte in Oxford,\narbeitete als Hauslehrer und Begleiter adeliger Familien in ganz Europa und lernte dort die\nSchriften von Galilei und Descartes kennen. Er war beeindruckt von der neuen Naturwissenschaft\nund wollte auch die Gesellschaft nach rationalen Gesetzen erklären.\nWährend des Englischen Bürgerkriegs (1642-1649) floh Hobbes nach Frankreich. Dort verfasste er\nsein berühmtestes Werk, den Leviathan (1651), das er aus Angst vor Verfolgung anonym\nveröffentlichte. Nach seiner Rückkehr nach England lebte er zurückgezogen unter dem Schutz von\nKönig Karl II.\nHobbes starb 1679 im hohen Alter von 91 Jahren. Er hinterließ das Bild eines Denkers, der das\npolitische Denken seiner Zeit revolutionierte - und zugleich polarisierte. Seine Lebensgeschichte\n\nzeigt einen Menschen, der aus der Erfahrung von Angst, Gewalt und Unsicherheit nach einer\nrationalen Ordnung für das Zusammenleben suchte.\nEinführung\nDer Kontraktualismus (Vertragstheorie) erklärt die Legitimität politischer Ordnung nicht\ndurch Tradition oder göttliches Recht, sondern durch die Zustimmung freier und\nvernünftiger Menschen. Diese Zustimmung kann als historisch gedacht oder als\ntheoretisches Gedankenexperiment verstanden werden. Entscheidend ist: Politische Herrschaft ist\nnur dann legitim, wenn sie auf dem Einverständnis der Regierten beruht.\nDen Ausgangspunkt der modernen Vertragstheorie bildet Thomas Hobbes. In seinem Werk\nLeviathan (1651) beschreibt er einen Naturzustand, in dem keine verbindliche politische Ordnung\nexistiert. Dieser Zustand ist von Unsicherheit, Gewalt und Angst geprägt. Um diesem Zustand zu\nentkommen, schließen die Menschen einen Vertrag: Sie verzichten auf einen Teil ihrer Freiheit und\nübertragen ihre Macht auf einen Souverän. Dieser garantiert im Gegenzug Frieden und Sicherheit.\nPolitische Ordnung entsteht bei Hobbes somit aus der Furcht vor Unsicherheit und dem\nrationalen Interesse an Selbsterhaltung.\nZentrale Ideen (Hobbes)\n1. Naturzustand\nOhne eine übergeordnete Macht leben Menschen im „Krieg aller gegen alle“. Sicherheit, Eigentum,\nRecht, Kultur und verlässliche Kooperation sind nicht dauerhaft gesichert.\n2. Naturrecht und Naturgesetze\nJeder Mensch besitzt ein natürliches Recht auf Selbsterhaltung. Aus der Vernunft folgen allgemeine\nFriedensregeln, etwa Verträge einzuhalten. Ohne Zwang bleiben diese Regeln jedoch unsicher und\nbrüchig.\n3. Gesellschaftsvertrag\nUm dem Naturzustand zu entkommen, schließen die Menschen aus Vernunft einen Vertrag. Sie\nverzichten wechselseitig auf ihr „Recht auf alles“ und autorisieren einen Souverän, der Frieden und\nOrdnung garantiert.\n4. Souveränität\nDie Macht des Souveräns ist ungeteilt und oberste Gewalt. Sie umfasst Gesetzgebung,\nRechtsprechung, Entscheidungen über Krieg und Frieden sowie die Kontrolle der öffentlichen\nReligion. Eine Machtteilung würde den Rückfall in Anarchie begünstigen.\n\n5. Repräsentation\nDer Souverän handelt im Namen der Untertanen. Seine Entscheidungen gelten als von ihnen\nautorisiert, da sie ihm diese Macht durch den Vertrag übertragen haben.\n6. Ziel der Politik\nZiel staatlicher Ordnung ist nicht das tugendhafte oder „gute Leben“, sondern Sicherheit. Freiheit\nbedeutet vor allem Freiheit von äußeren Hindernissen. Staatliche Eingriffe sind legitim, solange sie\ndem Schutz des Lebens dienen.\n7. Kirche und Staat\nNeben dem Staat darf es keine konkurrierende Autorität geben. Religiöse Spaltung gefährdet den\nFrieden und muss der staatlichen Ordnung untergeordnet werden.\nZentrale Begriffe\nNaturzustand\nDer Naturzustand bezeichnet die Vorstellung eines vorstaatlichen Zustandes, in dem die Menschen\nohne Herrschaft oder staatliche Ordnung lebten. Sie waren auf sich gestellt und folgten nur den\n„Gesetzen der Natur“, also ihren Trieben, Bedürfnissen und Vernunftfähigkeiten.\nWie dieser Zustand zu beurteilen ist, hängt davon ab, welches Menschenbild man zugrunde legt:\nManche Philosophen (z. B. Rousseau) sehen ihn als eine Art paradiesische Ursprünglichkeit, andere\n(z. B. Hobbes) als von Gewalt und Unsicherheit geprägt.\nOb der Naturzustand je wirklich existierte oder nur eine gedankliche Konstruktion ist, bleibt offen.\nFür viele Philosophen dient er als theoretisches Modell, um die Notwendigkeit von Recht, Moral\nund Staat zu erklären. Denn: Erst in einer Gemeinschaft können Sittlichkeit und Recht entstehen.\nHomo Homini Lupus\nDie lateinische Wendung bedeutet: „Der Mensch ist dem Menschen ein Wolf.“\nThomas Hobbes verwendet dieses Bild in seinem Werk Leviathan (1651), um den Naturzustand zu\nbeschreiben. Ohne staatliche Ordnung verfolgt jeder Mensch aus Selbsterhaltungstrieb und\nLuststreben seine eigenen Interessen - oft rücksichtslos und auf Kosten anderer.\nDa alle Menschen von Natur aus gleich sind und das gleiche Recht auf Selbstentfaltung haben, führt\ndieses Verhalten zwangsläufig zu Konkurrenz, Misstrauen und Gewalt. Die notwendige Folge ist der\n„Krieg aller gegen alle“ (bellum omnium contra omnes).\n\nErst durch den Gesellschaftsvertrag, also die Unterwerfung unter eine gemeinsame Staatsgewalt,\nwird Sicherheit, Frieden und soziales Zusammenleben möglich.\nNaturrecht:\nNaturrecht bezeichnet die Vorstellung, dass es neben den von Menschen gesetzten Gesetzen\n(Positivrecht) überzeitliche, allgemeingültige Rechtsnormen gibt. Diese sollen sich aus der Natur\ndes Menschen, seiner Vernunft oder aus einem göttlichen Ursprung ableiten lassen.\nDas Naturrecht gilt unabhängig von Ort, Zeit oder staatlicher Ordnung und soll allen Menschen\ngleichermaßen zustehen. Typische Beispiele für solche unveräußerlichen Rechte sind das Recht auf\nLeben, Freiheit oder körperliche Unversehrtheit.\nIm Unterschied dazu steht das positive Recht, das durch konkrete staatliche Gesetzgeber festgelegt\nwird und sich ändern kann.\nFür Hobbes bedeutet Naturrecht (ius naturale) das Recht jedes Menschen, im Naturzustand alles\nzu tun, was er für seine Selbsterhaltung notwendig hält. Es gibt also keine moralischen Schranken\noder verbindlichen Gesetze - jeder darf grundsätzlich alles beanspruchen, sogar das Leben anderer.\nGesellschaftsvertrag:\nDie Vertragstheorien sind ein Versuch, die Fragen nach dem Ursprung und der Notwendigkeit\npolitischer Herrschaft sowie nach der optimalen Staatsform durch eine Vertragstheorie zu\nbeantworten.\nAusgangspunkt aller Vertragstheorien ist die Überlegung eines Naturzustands: ein vorstaatliches\nZusammenleben der Menschen ohne verbindliche Ordnung. Auch wenn die Philosoph:innen den\nNaturzustand sehr unterschiedlich charakterisieren, sind sie sich in einem Punkt einig:\nEs liegt im Interesse jedes Einzelnen, diesen Zustand zu überwinden.\nDies geschieht durch eine (fiktive) Willenserklärung der Individuen: Sie übertragen ihre\nursprünglichen Rechte ganz oder teilweise auf einen Souverän oder auf eine Gemeinschaft.\nDadurch treten sie aus der Vereinzelung heraus und werden Teil einer geordneten Gesellschaft.\nZitate\n• „Während Menschen ohne gemeinsame Macht leben, sind sie in einem Zustand, der Krieg heißt.“\n• „Das Leben des Menschen ist einsam, arm, ekelhaft, tierisch und kurz.“\n• „Verträge ohne Schwert sind bloße Worte.“\n• „Krieg eines jeden gegen jeden“ (bellum omnium contra omnes).\n\n• „Homo homini lupus“ - ursprünglich Plautus; drückt aber Hobbes’ Diagnose des Naturzustands treffend\naus.\n\nVertiefung: Thomas Hobbes - Der Staat als\n„Leviathan“ (1651)\nMit Hobbes beginnt in der Neuzeit eine neue Art, über den Staat nachzudenken. Während Platon\noder Aristoteles den Staat noch als „natürlich“ ansahen - weil der Mensch von Natur aus ein\nGemeinschaftswesen sei -, stellt Hobbes eine radikale Frage: Warum brauchen wir überhaupt einen\nStaat, und warum sollten wir ihm gehorchen? Seine Antwort: Der Staat ist kein Naturprodukt und\nkein göttliches Geschenk, sondern ein künstliches Werk der Menschen - geschaffen aus Angst,\nVernunft und Eigeninteresse.\nDer Naturzustand als Gedankenexperiment\nHobbes entwirft zunächst das Modell eines Naturzustands. Man stelle sich eine Welt ohne Polizei,\nohne Gesetze, ohne Gerichte vor - nur einzelne Menschen mit ihren Trieben, Wünschen und\nÄngsten. Dieser Naturzustand ist keine historische Epoche, sondern ein Gedankenexperiment, das\nerklären soll, warum ein Staat notwendig ist.\nIm Naturzustand sind alle Menschen im Kern gleich. Nicht, weil alle gleich stark oder klug wären,\nsondern weil List, Überraschung und Waffen es auch Schwachen ermöglichen, Stärkere zu\nüberwältigen. Aus dieser Gleichheit erwächst eine Gleichheit der Hoffnungen - jeder glaubt, seine\nWünsche durchsetzen zu können.\nFreiheit ohne Sicherheit\nIm Naturzustand ist jeder Mensch frei - aber diese Freiheit ist gefährlich.\n• Freiheit bedeutet für Hobbes: Niemand ist durch äußere Gesetze daran gehindert, seine\nWünsche zu verfolgen. Wenn jemand ausgeraubt oder getötet wird, kommt keine Polizei, um den\nTäter aufzuhalten.\n• Dieser Zustand wird als Anarchie bezeichnet (griech.: „gesetzlos“, „ohne Herrschaft“).\n• Wichtig ist: Für Hobbes heißt Freiheit nicht, dass der Mensch unabhängig von seinen Trieben\nhandeln könnte. Im Gegenteil - er ist von seinen Selbsterhaltungs- und Machttrieben bestimmt.\nFrei ist er nur deshalb, weil es keine Gesetze gibt, die diese Triebe einschränken.\nKurz: Es gibt maximale Freiheit, aber keine Garantie für Sicherheit.\nNaturzustand = Kriegszustand\nDiese ungebremste Freiheit führt unausweichlich zu Konflikten. Hobbes nennt drei Hauptursachen\nfür Gewalt:\n1. Konkurrenz (um Besitz und Vorteile),\n2. Misstrauen (zur Sicherung der eigenen Position),\n\n3. Ruhmsucht (aus Ehre und Ansehen).\nSo verwandelt sich der Naturzustand in einen\nKriegszustand - den berühmten „Krieg aller\ngegen alle“ (bellum omnium contra omnes).\nNiemand kann sich sicher fühlen, jeder muss\njederzeit mit Angriffen rechnen.\nStillstand von Kultur und\nGesellschaft\nIn einem solchen Zustand ist gesellschaftliche\nEntwicklung unmöglich. Hobbes beschreibt\ndrastisch, was fehlt:\n• kein sicheres Eigentum,\n• keine festen Staatsgrenzen,\n• keine Gesetze, die Sicherheit garantieren,\n• keine Kultur, Wissenschaft oder Bildung,\n• kein Fortschritt, da niemand sicher sein\nkann, die Früchte seiner Arbeit zu behalten.\nAlles hängt allein von der eigenen Kraft und List ab - eine prekäre und gefährliche Existenz.\nNaturrecht und Naturgesetze\nHobbes unterscheidet zwei Ebenen:\n• Naturrecht (ius naturale): Jeder darf alles tun, was seinem Überleben dient.\n• Naturgesetze (leges naturales): Durch Vernunft erkennbare Regeln, die Frieden empfehlen (z.\nB. Gerechtigkeit, Dankbarkeit, Bescheidenheit).\nDas wichtigste lautet: „Suche Frieden, wenn du ihn erreichen kannst; und wenn nicht, gebrauche\nalle Mittel des Krieges.“\nDie Vernunft „zwingt“ den Menschen also, aus dem zerstörerischen Naturzustand herauszutreten:\nNur durch Frieden kann Selbsterhaltung gelingen.\nVom Vertrag zum Staat\nUm Frieden zu sichern, beschließen die Menschen, auf ihr schrankenloses Naturrecht zu verzichten\n- unter der Bedingung, dass alle anderen dasselbe tun. Sie übertragen ihre Rechte auf eine zentrale\nInstanz, den Souverän. Dieser kann ein Monarch oder eine Versammlung sein, wichtig ist nur: Er hat\ndie Macht, verbindliche Regeln zu setzen und durchzusetzen.\n\nDer Vertrag wird dabei nicht zwischen Volk und Herrscher geschlossen, sondern allein unter den\nIndividuen. Indem sie einander versprechen, sich zu unterwerfen, autorisieren sie eine oberste\nGewalt. Hobbes beschreibt den entstehenden Staat in seinem Werk Leviathan als einen\n„künstlichen Körper“, in dem der Souverän das Haupt und die Bürger die Glieder sind.\nRechte und Pflichten von Souverän und Untertanen\n• Rechte des Souveräns: Gesetzgebung, Rechtsprechung, Strafen, Krieg und Frieden,\nRepräsentation der Gesamtheit. Seine Macht ist ungeteilt und nicht begrenzt.\n• Pflichten des Souveräns: Schutz und Sicherheit der Bürger. Nur dafür ist er autorisiert.\nWenn er diese Aufgabe nicht mehr erfüllt, fällt das Naturrecht an die Individuen zurück.\n• Pflichten der Untertanen: Gehorsam gegenüber den Gesetzen und Verzicht auf das\nNaturrecht. Widerstand ist nicht erlaubt - solange der Souverän seine Schutzfunktion erfüllt.\nAutorisierung und Repräsentation\nDie Legitimität des Staates erklärt Hobbes durch Autorisierung und Repräsentation:\n• Die Bürger autorisieren den Souverän, in ihrem Namen zu handeln.\n• Der Souverän repräsentiert die Gesamtheit; seine Akte gelten als Wille aller.\n• Deshalb ist seine Herrschaft nicht „fremd“, sondern Ausdruck des gemeinsamen Entschlusses.\n\nFazit\nHobbes begründet eine radikal neue Sicht: Der Staat ist nicht naturgegeben oder göttlich, sondern\nein Vernunftprodukt, geschaffen aus Furcht vor dem Tod und dem Streben nach Sicherheit. Der\nPreis dafür ist der Verzicht auf Freiheit, die im Naturzustand nur Gewalt und Unsicherheit\nbedeutet. Der Gewinn ist die Sicherheit durch einen starken Souverän. Doch bleibt die Spannung:\nAbsolute Macht schützt - kann aber zugleich selbst zur Gefahr werden.\n• Deshalb ist die Macht des Souveräns nicht vertraglich begrenzt.\n• Legitimität erhält er allein durch die ursprüngliche Autorisierung.\nWas man verliert - und was man gewinnt\n•Vor dem Vertrag: Maximale Freiheit, minimale\nSicherheit.\n•Nach dem Vertrag: Eingeschränkte Freiheit,\ndafür Schutz, Eigentum, Planbarkeit, Kultur,\nWissenschaft.\nFür Hobbes ist das ein guter Tausch: Sicherheit\nzuerst - sie macht alles andere überhaupt erst\nmöglich.\nWarum heißt das Buch\n„Leviathan“?\nDer Leviathan ist ein Bild aus der Bibel (ein\ngewaltiges Seeungeheuer, z. B. im Buch Hiob) -\nSymbol für überwältigende,\nfurchteinflößende Macht. Hobbes wählt diesen\nNamen, um zu zeigen: Der Staat muss stark\ngenug sein, alle zu beeindrucken und Gewalt zu\nverhindern. In der berühmten Titelgrafik (Frontispiz) ist der Souverän als riesige Gestalt aus\nlauter kleinen Menschen zusammengesetzt - die Bürger selbst bilden den Staat. Hobbes\nnennt ihn den „sterblichen Gott“: nicht göttlich im religiösen Sinn, aber mächtig genug, Frieden zu\nsichern. Die Botschaft: Nur eine überlegene, einheitliche Macht stoppt Angst,\nMisstrauen und Gewalt.\n\nBegriffsnetz zu Thomas Hobbes Leviathan\n\nBewertung\nPositive Aspekte\n1. Säkulare Legitimation von Herrschaft (säkular = nicht religiös begründet)\nPolitische Macht beruht auf der Zustimmung der Beherrschten und nicht auf göttlichem Recht\noder Tradition. Herrschaft wird rational begründet, nicht religiös legitimiert.\n2. Vorrang der Sicherheit\nHobbes erklärt überzeugend, warum Menschen bereit sind, starke staatliche Institutionen zu\nakzeptieren. Seine Theorie ist besonders anschlussfähig zur Analyse von Bürgerkriegen,\ngescheiterten Staaten (failed states) oder mafiösen Machtstrukturen.\n3. Nüchterner Realismus über Konflikte\nHobbes benennt Konkurrenz, Misstrauen und Streben nach Anerkennung als zentrale Ursachen\nvon Gewalt. Damit liefert er einen realistischen Blick auf Machtpolitik, Abschreckung und\ninternationale Beziehungen.\n4. Repräsentation als Grundprinzip politischer Ordnung\nDer Gedanke, dass politische Herrschaft durch autorisierte Stellvertretung ausgeübt wird, prägt\nmoderne Staats- und Demokratietheorien bis heute.\n5. Gewaltmonopol und Rechtsordnung\nHobbes liefert eine frühe Begründung für das staatliche Gewaltmonopol. Nur der Staat darf\nlegitimerweise Gewalt ausüben, was die Grundlage für Polizei, Gerichte und rechtliche Sicherheit\nbildet.\n6. These der grundlegenden Gleichheit\nAlle Menschen sind in ihrer Verletzbarkeit einander ähnlich. Aus dieser gemeinsamen\nVerwundbarkeit folgt eine grundlegende Gleichheit, auch wenn sie bei Hobbes negativ begründet\nist.\n7. Klarheit und Systematik der Theorie\nDie Argumentation folgt einer stringenten Struktur vom Naturzustand über den\nGesellschaftsvertrag bis zur Souveränität. Diese innere Logik macht die Theorie besonders\nübersichtlich und gut überprüfbar.\nSchwächen / Einwände\n1. Pessimistisches Menschenbild\n\nHobbes zeichnet ein sehr düsteres Bild des Menschen und unterschätzt dabei Fähigkeiten wie\nKooperation, Empathie und Vertrauen. Historische und soziale Praxis zeigen, dass Ordnung oft auch\nohne einen allmächtigen Staat entstehen kann.\n2. Problem des „Unterwerfungsvertrags“\nDie Zustimmung zum Gesellschaftsvertrag erfolgt einmalig und meist stillschweigend. Damit bleibt\nfraglich, ob von einer echten Zustimmung gesprochen werden kann, insbesondere im Hinblick auf\nspätere Generationen.\n3. Gefahr des Absolutismus\nDie Forderung nach ungeteilter Souveränität ohne Gewaltenteilung oder Grundrechte öffnet\nMachtmissbrauch und Willkür Tür und Tor.\n4. Problem der Legitimität und Kontrolle\nDa der Souverän selbst keine Vertragspartei ist, fehlt eine interne Kontrollinstanz. Die behauptete\nZustimmung der Untertanen bleibt theoretisch und kann praktisch nicht eingefordert werden.\n5. Rechtspositivistische Tendenz\nRecht gilt bei Hobbes als verbindlich, weil es gesetzlich gesetzt ist, selbst wenn es moralisch"},{"id":"locke","name":"John Locke – Gesellschaftsvertrag","sem":"Staatsphilosophie","content":"John Locke - Gesellschaftsvertrag - Überblick\nJohn Locke wurde 1632 in der Nähe von Bristol geboren. Sein\nVater kämpfte im englischen Bürgerkrieg auf Seiten des\nParlaments - gegen die königliche Macht. Diese Erfahrungen\nprägten Lockes Haltung gegenüber Autorität und seine\nWertschätzung politischer Freiheit.\nEr studierte in Oxford Philosophie, Medizin und\nNaturwissenschaften und arbeitete später als Arzt und Berater\nfür den liberalen Politiker Lord Shaftesbury, mit dem ihn eine\nenge Freundschaft verband. Als Shaftesbury wegen politischer\nKonflikte ins Exil ging, floh auch Locke 1683 in die Niederlande,\nwo er in einer Atmosphäre religiöser Toleranz seine wichtigsten Werke schrieb, darunter die Zwei\nAbhandlungen über die Regierung und den Brief über Toleranz.\nNach der „Glorious Revolution“ (1688) kehrte Locke nach England zurück. Seine Ideen über\nFreiheit, Eigentum und begrenzte Staatsmacht fanden nun große Zustimmung und beeinflussten die\nneue englische Verfassung.\nEr verbrachte seine letzten Jahre zurückgezogen auf dem Land in Essex, wo er 1704 starb.\nLockes Leben steht exemplarisch für den Übergang Englands von absoluter zu parlamentarischer\nHerrschaft und für den Geist der Vernunft und Toleranz, der die Aufklärung prägen sollte.\nEinführung\nJohn Locke (1632-1704) gilt als Begründer des Liberalismus und einer der einflussreichsten\npolitischen Philosophen der Neuzeit. In seinen Zwei Abhandlungen über die Regierung (1690)\nentwickelt er eine Theorie, die die Legitimität von Herrschaft aus der Zustimmung freier,\nvernünftiger Menschen erklärt - nicht aus göttlicher Ordnung oder Tradition. Locke entwirft damit\nein Modell eines liberalen, parlamentarischen, konstitutionellen Staates, das zur Grundlage\nmoderner Demokratien wurde - besonders in Großbritannien und den USA. Im Zentrum stehen\nFreiheit, Eigentum, Gesetz und das Recht auf Widerstand.\n\nZentrale Ideen (Locke)\n1. Naturzustand\nDer Naturzustand ist kein Zustand des Krieges, sondern ein Zustand natürlicher Freiheit und\nGleichheit. Alle Menschen besitzen von Natur aus unveräußerliche Rechte auf Leben, Freiheit und\nEigentum (natural rights). Problematisch ist jedoch, dass es im Naturzustand keine allgemein\nverbindlichen Gesetze, keine neutralen Richter und keine durchsetzende Gewalt gibt. Dadurch\nbleibt der Schutz dieser Rechte unsicher.\n2. Gesellschaftsvertrag\nMenschen verlassen den Naturzustand freiwillig und aus Vernunft, um ihre natürlichen Rechte\nbesser zu sichern. Der Gesellschaftsvertrag wird zwischen den Individuen geschlossen, die sich zu\neiner politischen Gemeinschaft zusammenschließen. Die politische Macht wird nicht absolut\nübertragen, sondern zeitlich begrenzt und im Vertrauen auf die Mehrheit der Bürger delegiert.\n3. Gewaltenteilung und Rechtsstaatlichkeit\nLocke unterscheidet zwischen der gesetzgebenden Gewalt (Legislative) und der ausführenden\nGewalt (Exekutive). Diese Gewalten müssen getrennt bleiben, um Machtmissbrauch zu verhindern.\nZugleich sind beide strikt an allgemeine, vorher bekannte Gesetze gebunden. Staatliches Handeln\ndarf nicht willkürlich erfolgen, sondern nur auf der Grundlage von Recht und Gesetz. Damit legt\nLocke einen zentralen Grundstein des modernen Rechtsstaats, in dem auch die Regierung selbst\ndem Gesetz unterworfen ist.\n4. Zweck des Staates\nDer Staat hat die Aufgabe, Frieden, Sicherheit und insbesondere den Schutz von Eigentum zu\ngewährleisten. Regierungshandeln darf nicht willkürlich sein, sondern muss sich am Gemeinwohl\nund an der Rechtsordnung orientieren. Staatliche Macht dient dem Schutz der Freiheit, nicht ihrer\nAufhebung.\n5. Widerstandsrecht\nMissbraucht die Regierung ihre Macht oder verletzt systematisch die natürlichen Rechte der\nBürger, fällt die politische Gewalt an das Volk zurück. In diesem Fall besitzt das Volk ein Recht auf\nWiderstand gegen tyrannische Herrschaft.\nZentrale Begriffe\nGewaltenteilung\nPrinzip der Machtbegrenzung, das auf Locke und Montesquieu zurückgeht. Die Staatsgewalt\nwird nicht einer einzelnen Person oder Institution überlassen, sondern auf mehrere\nGewalten verteilt, die sich gegenseitig kontrollieren.\n\nMerkmale:\n• Legislative: erlässt Gesetze.\n• Exekutive: führt Gesetze aus.\n• Judikative: spricht Recht (bei Montesquieu ergänzt).\n• Jede Gewalt ist an Gesetze gebunden und darf nicht willkürlich handeln.\n• Ziel: Sicherung der Freiheit durch gegenseitige Kontrolle.\nBeispiel: moderne Verfassungsstaaten mit Parlament, Regierung, unabhängiger Justiz.\nNaturrecht\nbezeichnet jene Rechte, die dem Menschen von Natur aus zukommen - unabhängig von\nOrt, Zeit oder politischer Ordnung. Sie beruhen auf der Idee, dass es überstaatliche\nmoralische Maßstäbe gibt, die bestimmen, was gerecht ist. Beispiele sind das Recht auf\nLeben, Freiheit und körperliche Unversehrtheit. Das Naturrecht soll universell gelten, also\nfür alle Menschen in gleicher Weise, und steht häufig in engem Zusammenhang mit der\nVernunft oder mit göttlicher Ordnung. Es bildet die Grundlage vieler moderner\nMenschenrechtsvorstellungen.\nEigentum\nEigentum bezeichnet das Recht einer Person, über etwas frei zu verfügen - also es zu\nbesitzen, zu nutzen und darüber zu bestimmen. Es kann sich auf materielle Güter (z. B. Haus,\nKleidung, Werkzeuge) oder auf geistige Werte (z. B. Ideen, Kunstwerke) beziehen.\nPhilosophisch gesehen ist Eigentum mehr als bloßer Besitz: Es steht für die Beziehung\nzwischen Mensch und Welt, die durch Arbeit, Nutzung oder schöpferische Tätigkeit\nentsteht.\nIn der politischen Philosophie spielt Eigentum eine zentrale Rolle:\n• Für viele Denker (u. a. Locke) ist der Schutz des Eigentums die Hauptaufgabe des\nStaates.\n• In modernen Demokratien gilt Eigentum als Grundrecht, das aber durch soziale\nVerantwortung begrenzt wird.\n• In der marxistischen Tradition wird Eigentum dagegen als Quelle sozialer Ungleichheit\nverstanden, weil Produktionsmittel in den Händen weniger liegen.\nLiberalismus\nDer Liberalismus (von lat. liberalis = „die Freiheit betreffend“) ist eine politische und\ngeistige Haltung, die die Freiheit des Individuums in den Mittelpunkt stellt
