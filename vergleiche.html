<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Philosophie 4 – Vergleiche</title>
<style>
:root {
  --bg:#0f172a; --bg-2:#1e293b; --surface:#1e293b; --surface-2:#273548;
  --text:#f1f5f9; --text-2:#cbd5e1; --text-3:#94a3b8; --muted:#64748b;
  --border:rgba(255,255,255,.09); --border-2:rgba(255,255,255,.14);
  --nav-bg:rgba(15,23,42,.85);
  --accent:#f97316; --accent-hover:#fb923c;
  --accent-soft:rgba(249,115,22,.12); --accent-glow:rgba(249,115,22,.25);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",system-ui,sans-serif;
  --serif:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Georgia,serif;
  --r:10px; --rl:14px;
  --topnav-h:52px; --sidebar-w:220px;
  /* legacy aliases */
  --b:#f1f5f9; --bm:#94a3b8; --bl:rgba(255,255,255,.09); --ba:#64748b;
  --w:#1e293b; --br:rgba(255,255,255,.09);
  --gold:#fbbf24; --goldl:rgba(251,191,36,.12);
}
html.light {
  --bg:#ffffff; --bg-2:#f8fafc; --surface:#f8fafc; --surface-2:#f1f5f9;
  --text:#0f172a; --text-2:#1e293b; --text-3:#475569; --muted:#94a3b8;
  --border:rgba(0,0,0,.08); --border-2:rgba(0,0,0,.13);
  --nav-bg:rgba(255,255,255,.88);
  --accent:#ea6c00; --accent-hover:#f97316;
  --accent-soft:rgba(234,108,0,.1); --accent-glow:rgba(234,108,0,.2);
  --b:#0f172a; --bm:#475569; --bl:rgba(0,0,0,.08); --ba:#64748b;
  --w:#ffffff; --br:rgba(0,0,0,.08);
  --gold:#d97706; --goldl:rgba(217,119,6,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{padding-top:52px;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}

.brand b{font-size:13.5px;} .brand small{font-size:10px;opacity:.7;display:block;}
.srch{flex:1;max-width:260px;position:relative;}
.srch input{width:100%;padding:5px 9px 5px 25px;border:1px solid rgba(255,255,255,.25);
  border-radius:5px;background:rgba(255,255,255,.12);color:#fff;font-size:12px;}
.srch input::placeholder{color:rgba(255,255,255,.55);}
.srch input:focus{outline:none;background:rgba(255,255,255,.2);}
.si{position:absolute;left:7px;top:50%;transform:translateY(-50%);opacity:.7;font-size:11px;}


.nb:hover{background:rgba(255,255,255,.2);}


.nb.fw.on{background:rgba(255,200,50,.3);}
.layout{display:flex;height:calc(100vh - 46px);}
.sidebar{width:215px;flex-shrink:0;background:var(--w);border-right:1px solid var(--br);overflow-y:auto;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.cbar{background:var(--w);border-bottom:1px solid var(--br);padding:6px 1rem;
  display:flex;align-items:center;gap:7px;font-size:12px;flex-wrap:wrap;}
.cnt{flex:1;overflow-y:auto;padding:1rem;}
.slbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);padding:.5rem 1rem .2rem;}
.ni{display:flex;align-items:center;gap:6px;padding:5px 1rem;font-size:11.5px;
  color:var(--text-3);cursor:pointer;border-left:2px solid transparent;transition:all .12s;}
.ni:hover{background:#f0f5ff;color:var(--b);}
.ni.on{background:var(--accent-soft);color:var(--bm);border-left-color:var(--bm);font-weight:500;}
.fni{display:flex;align-items:center;gap:6px;padding:5px 1rem;font-size:11.5px;
  color:var(--text-3);cursor:pointer;border-left:2px solid transparent;}
.fni:hover{background:var(--goldl);color:var(--gold);}
.fni.on{background:var(--goldl);color:var(--gold);border-left-color:var(--gold);font-weight:500;}
.nd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.hero{background:linear-gradient(135deg,var(--b),var(--bm));color:#fff;
  border-radius:var(--rl);padding:1rem;margin-bottom:1rem;}
.hero h1{font-size:18px;font-weight:600;margin-bottom:2px;}
.hero p{font-size:12px;opacity:.85;}
.stats{display:flex;gap:.5rem;margin-top:.6rem;}
.stat{background:rgba(255,255,255,.15);border-radius:5px;padding:5px 10px;text-align:center;}
.stn{font-size:17px;font-weight:700;} .stl{font-size:9px;opacity:.8;}
.hometabs{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem;}
.htab{border-radius:var(--r);padding:.75rem;cursor:pointer;}
.htab h3{font-size:13px;font-weight:600;margin-bottom:2px;}
.htab p{font-size:11px;opacity:.85;line-height:1.4;}
.ssec{margin-bottom:1rem;}
.shdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  padding:4px 0;margin-bottom:.4rem;border-bottom:2px solid;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:5px;}
.tile{background:var(--w);border:1px solid var(--br);border-radius:var(--r);
  padding:8px 10px;cursor:pointer;transition:border-color .12s;}
.tile:hover{border-color:var(--ba);}
.tn{font-size:12px;font-weight:500;margin-bottom:2px;}
.tp{font-size:10px;color:var(--muted);}
.thdr{margin-bottom:.8rem;}
.thdr h2{font-size:16px;font-weight:600;margin-bottom:2px;}
.sbdg{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;
  border-radius:99px;margin-bottom:5px;}
.lf{background:var(--bl);border-left:3px solid var(--ba);border-radius:0 var(--r) var(--r) 0;
  padding:7px 10px;font-size:12px;color:var(--b);font-style:italic;line-height:1.5;}
.vtog{display:flex;gap:4px;margin-bottom:.6rem;}
.vb{padding:3px 8px;border:1px solid var(--br);background:var(--w);border-radius:4px;
  cursor:pointer;font-size:11px;color:var(--text-3);}
.vb.on{background:var(--bm);color:#fff;border-color:var(--bm);}
.ptbl{width:100%;border-collapse:collapse;background:var(--w);
  border:1px solid var(--br);border-radius:var(--rl);overflow:hidden;
  margin-bottom:.9rem;table-layout:fixed;}
.ptbl th{padding:7px 10px;font-size:11px;font-weight:600;color:#fff;text-align:left;vertical-align:top;}
.ptbl th.rh{background:var(--bg-2);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.05em;width:100px;}
.ptbl td{padding:7px 10px;font-size:11.5px;color:var(--text-2);vertical-align:top;
  border-top:1px solid var(--border);line-height:1.55;}
.ptbl td.rl{background:var(--bg-2);color:var(--muted);font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;border-right:1px solid #eee;}
.ptbl tr:hover td{background:#fafbff;}
.ptbl tr:hover td.rl{background:var(--surface-2);}
.ptbl tbody tr:nth-child(even) td{background:var(--surface-2);}
.ptbl tbody tr:nth-child(even) td.rl{background:var(--surface-2);}
.ptbl tbody tr:nth-child(even):hover td{background:#f0f4ff;}
.mr td{font-style:italic;font-size:12.5px;color:#5C3D00;background:#FFF0A0 !important;border-top:2px solid #E6C200 !important;border-bottom:2px solid #E6C200 !important;}
.mr td.rl{font-style:normal;background:#FFD700 !important;color:#3D2800;font-weight:800;font-size:10px;letter-spacing:.04em;border-top:2px solid #E6C200 !important;border-bottom:2px solid #E6C200 !important;}
.pgrid{display:grid;gap:8px;margin-bottom:.9rem;}
.pc{background:var(--w);border:1px solid var(--br);border-radius:var(--rl);overflow:hidden;}
.pc.ex{border-color:var(--ba);}
.pch{padding:8px 11px;cursor:pointer;display:flex;align-items:flex-start;gap:7px;}
.pcb{width:3px;flex-shrink:0;border-radius:2px;min-height:30px;align-self:stretch;}
.pct{flex:1;} .pcn{font-size:12px;font-weight:600;} .pcr{font-size:11px;color:var(--text-3);margin-top:1px;}
.pcv{color:var(--muted);font-size:13px;margin-top:2px;transition:transform .15s;}
.pc.ex .pcv{transform:rotate(180deg);}
.pcm{font-size:11.5px;color:var(--text-3);font-style:italic;padding:6px 11px 9px 21px;
  border-top:1px solid var(--border);line-height:1.5;}
.pcd{padding:8px 11px 10px;border-top:1px solid var(--border);background:var(--bg-2);}
.dl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
  margin-bottom:2px;margin-top:6px;} .dl:first-child{margin-top:0;}
.dt{font-size:11.5px;color:var(--text-2);line-height:1.55;}
.conns{margin-top:.6rem;}
.cl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--border-2);margin-bottom:3px;}
.chip{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:99px;
  border:1px solid var(--br);background:var(--w);cursor:pointer;margin:2px 2px 2px 0;color:var(--text-3);}
.chip:hover{border-color:var(--ba);color:var(--b);}
.cslot{background:#f0f5ff;border:1px dashed var(--ba);border-radius:5px;
  padding:3px 9px;font-size:11px;color:var(--bm);display:flex;align-items:center;gap:4px;}
.cslot.fi{border-style:solid;background:var(--bl);}
.srm{cursor:pointer;font-size:11px;}
.cgo{padding:3px 10px;background:var(--bm);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;}
.cgo:disabled{opacity:.35;cursor:not-allowed;}
.ctbl{width:100%;border-collapse:collapse;background:var(--w);border:1px solid var(--br);border-radius:var(--rl);overflow:hidden;}
.ctbl th{padding:8px 11px;font-size:11px;font-weight:600;color:#fff;text-align:left;vertical-align:top;}
.ctbl th.e{background:var(--bg-2);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.05em;width:95px;}
.ctbl td{padding:7px 11px;font-size:11.5px;color:var(--text-2);border-top:1px solid var(--border);vertical-align:top;line-height:1.5;}
.ctbl td.rl{background:var(--bg-2);color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-right:1px solid #eee;}
.lfgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px;}
.lfc{background:var(--w);border:1px solid var(--br);border-radius:var(--rl);padding:10px;}
.lfs{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.lft{font-size:10px;color:var(--muted);margin-bottom:5px;}
.lfq{font-size:12px;color:var(--text-2);font-style:italic;line-height:1.5;margin-bottom:5px;}
.lfb{font-size:11px;color:var(--bm);background:none;border:none;cursor:pointer;font-weight:500;padding:0;}
.lfb:hover{text-decoration:underline;}
.qwrap{max-width:540px;margin:0 auto;}
.qcard{background:var(--w);border:1px solid var(--br);border-radius:var(--rl);padding:1rem;}
.qprog{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);margin-bottom:.6rem;}
.qpb{height:3px;background:var(--surface-2);border-radius:2px;flex:1;margin-left:8px;}
.qpf{height:100%;background:var(--bm);border-radius:2px;transition:width .3s;}
.qlbl{font-size:13px;color:var(--text-2);margin-bottom:.4rem;}
.qqt{font-size:13.5px;font-weight:600;font-style:italic;color:var(--b);
  background:var(--bl);border-left:3px solid var(--ba);border-radius:0 var(--r) var(--r) 0;
  padding:8px 12px;margin:.5rem 0 .7rem;line-height:1.6;}
.qtopic{font-size:10px;color:var(--muted);margin-bottom:.7rem;}
.qopts{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.qo{padding:7px 10px;background:var(--bg);border:1.5px solid var(--br);border-radius:var(--r);
  cursor:pointer;font-size:11.5px;color:var(--text-2);text-align:left;}
.qo:hover:not(:disabled){border-color:var(--ba);background:#f0f5ff;}
.qo.ok{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;}
.qo.ko{background:#ffeeee;border-color:#e57373;color:#c62828;}
.qo:disabled{cursor:default;}
.qfb{margin-top:.6rem;padding:7px 10px;border-radius:var(--r);font-size:12px;line-height:1.4;}
.qfb.ok{background:#e8f5e9;color:#2e7d32;} .qfb.ko{background:#ffeeee;color:#c62828;}
.qnext{margin-top:.6rem;padding:5px 15px;background:var(--bm);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;}
.scard{text-align:center;padding:2rem .5rem;}
.scn{font-size:44px;font-weight:700;color:var(--bm);}
.scl{font-size:13px;color:var(--text-3);margin-bottom:1rem;}
.scr{padding:8px 18px;background:var(--bm);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;}
.sri{background:var(--w);border:1px solid var(--br);border-radius:var(--r);
  padding:8px 11px;margin-bottom:5px;cursor:pointer;}
.sri:hover{border-color:var(--ba);}
.srt{font-size:10px;color:var(--muted);margin-bottom:1px;}
.srn{font-size:13px;font-weight:600;}
.srtxt{font-size:11px;color:var(--text-3);margin-top:2px;line-height:1.4;}
mark{background:#fef08a;color:inherit;border-radius:2px;}
.fwhero{background:linear-gradient(135deg,#4a3000,#6b5a30);color:#fff;
  border-radius:var(--rl);padding:1rem;margin-bottom:1rem;}
.fwhero h1{font-size:17px;font-weight:600;margin-bottom:2px;}
.fwhero p{font-size:11.5px;opacity:.85;}
.fwgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:5px;margin-bottom:1rem;}
.fwtile{background:var(--w);border:1px solid var(--br);border-radius:var(--r);
  padding:8px 10px;cursor:pointer;}
.fwtile:hover{border-color:var(--gold);}
.ftsem{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.ftn{font-size:12px;font-weight:500;}
.fwart{max-width:720px;}
.fwah{margin-bottom:.8rem;}
.fwah h2{font-size:17px;font-weight:600;}
.fwsem{display:inline-block;font-size:9.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;padding:2px 8px;border-radius:99px;background:var(--goldl);color:var(--gold);margin-bottom:.6rem;}
.fwbody{font-size:12.5px;color:var(--text-2);line-height:1.75;white-space:pre-wrap;
  background:var(--w);border:1px solid var(--br);border-radius:var(--rl);
  padding:1rem;max-height:70vh;overflow-y:auto;}
.fwnav{display:flex;gap:5px;margin-top:.65rem;}
.fwnb{padding:4px 10px;border:1px solid var(--br);background:var(--w);border-radius:4px;
  cursor:pointer;font-size:11px;color:var(--text-3);}
.fwnb:hover{border-color:var(--gold);color:var(--gold);}
@media print{.topbar,.sidebar,.vtog,.conns,.cbar{display:none!important;}
  .layout{display:block;height:auto;}
  .ptbl td,.ptbl th{font-size:10px;padding:4px 6px;}}
@media(max-width:560px){.sidebar{width:180px;} .ptbl{display:none;} .qopts{grid-template-columns:1fr;}}

/* unified topnav */

*{box-sizing:border-box;margin:0;padding:0;}
body{padding-top:52px;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;}













.topnav{position:fixed;top:0;left:0;right:0;z-index:300;
  background:#1a1d24;height:48px;
  display:flex;align-items:center;padding:0 1rem;gap:.25rem;
  box-shadow:0 2px 10px rgba(26,29,36,.18);}
.topnav .brand{color:#fff;font-weight:700;font-size:13px;margin-right:.5rem;white-space:nowrap;flex-shrink:0;}
.topnav a{color:rgba(255,255,255,.65);text-decoration:none;font-size:11.5px;
  padding:4px 8px;border-radius:5px;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.topnav a:hover{background:rgba(255,255,255,.12);color:#fff;}
.topnav a.active{background:rgba(255,255,255,.2);color:#fff;font-weight:600;}
.topnav .sp{flex:1;}


/* Span rows (Synthese, Zusammenfassung) */
.span-row td { background:rgba(249,115,22,.07) !important; }
.span-label { color:var(--accent) !important; font-weight:700 !important; border-right:1px solid var(--border); }
.span-cell { color:var(--text-2) !important; font-size:12px; line-height:1.65; white-space:pre-line; }
html.light .span-row td { background:rgba(234,108,0,.06) !important; }
html.light .span-cell { color:#1e293b !important; }


/* ── HAMBURGER MOBILE ── */
.topnav .nav-hamburger{display:none;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);width:34px;height:34px;border-radius:8px;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s;}
.topnav .nav-hamburger:hover{background:rgba(255,255,255,.15);color:#fff;}
html.light .topnav .nav-hamburger{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:var(--text-3);}
.topnav .nav-links{display:contents;}
@media(max-width:640px){
  .topnav .nav-hamburger{display:flex;}
  .topnav .nav-links{display:none;position:fixed;top:52px;left:0;right:0;background:var(--nav-bg,rgba(15,23,42,.95));backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);flex-direction:column;padding:.5rem 1rem .75rem;gap:.25rem;z-index:299;}
  .topnav .nav-links.open{display:flex;}
  .topnav .nav-links a{font-size:14px;padding:10px 12px;border-radius:8px;width:100%;}
}
</style>
<style>
/* ═══════════════════════════════════════════════
   NEW DESIGN SYSTEM — injected override
   ═══════════════════════════════════════════════ */

html.light {
  --bg:#ffffff; --bg-2:#f8fafc; --surface:#f8fafc; --surface-2:#f1f5f9;
  --text:#0f172a; --text-2:#1e293b; --text-3:#475569; --muted:#94a3b8;
  --border:rgba(0,0,0,.07); --border-2:rgba(0,0,0,.11);
  --nav-bg:rgba(255,255,255,.85);
  --accent:#ea6c00; --accent-hover:#f97316;
  --accent-soft:rgba(234,108,0,.1); --accent-glow:rgba(234,108,0,.2);
  --b:#0f172a; --bm:#475569; --bl:rgba(0,0,0,.07); --ba:#64748b;
  --w:#ffffff; --br:rgba(0,0,0,.07);
}

/* ── Base ─────────────────────────────────────── */
*, *::before, *::after { box-sizing:border-box; }
body {
  background:var(--bg) !important;
  color:var(--text) !important;
  font-family:var(--font) !important;
  padding-top:52px !important;
  -webkit-font-smoothing:antialiased;
}
html.light body { color:var(--text) !important; }

/* ── Nav ──────────────────────────────────────── */
.topnav {
  position:fixed !important; top:0 !important; left:0 !important; right:0 !important;
  z-index:300 !important; height:52px !important;
  background:var(--nav-bg) !important;
  backdrop-filter:saturate(180%) blur(20px) !important;
  -webkit-backdrop-filter:saturate(180%) blur(20px) !important;
  border-bottom:1px solid var(--border) !important;
  box-shadow:none !important;
  display:flex !important; align-items:center !important;
  padding:0 1.5rem !important; gap:.25rem !important;
}
.topnav .brand, .topnav .nav-home {
  color:var(--text) !important; font-weight:700 !important; font-size:15px !important;
  margin-right:1.25rem !important; white-space:nowrap !important;
  letter-spacing:-.02em !important; text-decoration:none !important;
  flex-shrink:0 !important;
}
.topnav .brand span, .topnav .nav-home span { color:var(--accent) !important; }
.topnav a {
  color:var(--text-3) !important; text-decoration:none !important; font-size:13px !important;
  padding:6px 11px !important; border-radius:6px !important;
  transition:background .15s,color .15s !important; font-weight:400 !important;
  white-space:nowrap !important; flex-shrink:0 !important;
}
.topnav a:hover { background:rgba(255,255,255,.07) !important; color:var(--text) !important; }
html.light .topnav a:hover { background:rgba(0,0,0,.05) !important; }
.topnav a.active {
  color:var(--accent) !important; font-weight:600 !important;
  background:var(--accent-soft) !important;
}
.topnav .sp { flex:1 !important; min-width:0 !important; }
.topnav .srch input {
  background:rgba(255,255,255,.07) !important; border:1px solid var(--border-2) !important;
  color:var(--text) !important; border-radius:8px !important;
  font-family:var(--font) !important;
}
.topnav .srch input:focus {
  background:var(--surface) !important; border-color:var(--accent) !important;
  box-shadow:0 0 0 3px var(--accent-soft) !important;
}
.topnav .srch input::placeholder { color:var(--muted) !important; }

        "values": [
          "**Popper – Falsifikationismus**\n• **Falsifizierbarkeit**: Wissenschaftliche Theorien müssen widerlegbar sein: Es muss möglich sein, Beweise zu finden, die sie widerlegen könnten – im Gegensatz zur bloßen Bestätigung durch Beobachtung.\n\n• **Fallibilismus**: Keine Theorie ist absolut sicher oder wahr. Selbst die am besten bestätigte Theorie bleibt vorläufig und kann durch neue Beobachtungen widerlegt werden.",
          "**Kuhn – Paradigmenwechsel**\n• **Paradigma**: Ein gemeinsamer theoretischer und methodischer Rahmen, der von einer wissenschaftlichen Gemeinschaft geteilt wird. Er legt fest, welche Fragen als sinnvoll gelten, welche Methoden legitim sind und welche Erklärungen akzeptiert werden (z. B. ptolemäisches Weltbild, Newtonsche Physik).\n\n• **Normalwissenschaft**: In dieser Phase arbeiten Forschende vollständig innerhalb des Paradigmas. Ziel ist das «Rätsellösen»: Probleme werden nach festgelegten Regeln bearbeitet. Das Paradigma selbst wird nicht infrage gestellt.\n\n• Anomalien und Krise: Mit der Zeit treten Beobachtungen auf, die nicht zum Paradigma passen (Anomalien). Häufen sich diese, gerät das Vertrauen in das Paradigma ins Wanken – es entsteht eine wissenschaftliche Krise.\n\n• **Inkommensurabilität**: Alte und neue Paradigmen sind nicht direkt vergleichbar: Sie verwenden unterschiedliche Begriffe, stellen andere Fragen und nutzen verschiedene Bewertungskriterien. Ein rein logischer Vergleich ist daher nicht möglich.",
          "**Feyerabend – Wissenschaftsanarchismus**\n• «Anything goes»: Es gibt keine universelle Methode. Logik und starre Methodologie versperren den Blick auf relevante Phänomene.\n\n• Wissenschaftlicher Erfolg: Der Erfolg einer Wissenschaft verdankt sich nicht bestimmten Ideen und Methoden, sondern liegt oft im Verstoß gegen die herrschende Methodik (z. B. Galilei, Kopernikus)."
        ]
      },
      {
        "label": "Argumente",
        "values": [
          "• Kritik des Induktivismus: Es gibt keine logische Rechtfertigung für den Schluss von spezifischen Beobachtungen auf allgemeine Gesetze (Induktionsproblem).\n\n• Deduktive Methode: Theorien werden deduktiv aus bestehenden Theorien abgeleitet und dann empirisch überprüft – im Gegensatz zur induktiven Methode.\n\n• Kritischer Rationalismus: Wissenschaftler sollen Theorien auf Grundlage neuer Beweise und Argumente verwerfen oder überarbeiten. Wissenschaft sucht nach Fehlern, nicht nach Bestätigung.\n\n• Revolutionäre Wissenschaft: Wissenschaftlicher Fortschritt erfolgt oft durch revolutionäre Theorien, die alte Theorien ersetzen, wenn sie besser zu Daten passen oder neue empirische Vorhersagen liefern.",
          "1. **Normalwissenschaft** → Anomalien\n• Wissenschaftler arbeiten im Normalbetrieb innerhalb des akzeptierten Paradigmas. Sie hinterfragen es nicht, sondern lösen Rätsel nach festgelegten Regeln. Erste Beobachtungen, die nicht ins **Paradigma** passen (Anomalien), werden zunächst ignoriert oder als Messfehler abgetan.\n\n2. Krise\n• Häufen sich Anomalien, verliert das Paradigma seine Überzeugungskraft. Forschende beginnen, nach Alternativen zu suchen – es entsteht eine Krise.\n\n3. Wissenschaftliche Revolution\n• Ein neues Paradigma entsteht, das die bisherigen Probleme besser erklärt. Es wird von der wissenschaftlichen Gemeinschaft akzeptiert und ersetzt das alte vollständig. Dieser Wechsel ist kein schrittweiser Wissenszuwachs, sondern ein revolutionärer Bruch.\n\n4. **Inkommensurabilität**\n• Altes und neues Paradigma sind nicht direkt vergleichbar («inkommensurabel»): Wie zwei Menschen, die verschiedene Sprachen sprechen, verwenden sie unterschiedliche Begriffe und Maßstäbe. Deshalb ist ein **Paradigmenwechsel** keine rein rationale Entscheidung, sondern auch ein sozialer und kultureller Prozess.\n\n5. Keine kumulative Wahrheit\n• Neue Paradigmen sind nicht einfach «wahrer» als alte. Fortschritt bedeutet bei Kuhn: mehr Probleme lösen können – nicht: der objektiven Endwahrheit näherkommen.\n\n• Beispiel: Kopernikus ersetzte das ptolemäische Weltbild, Einstein die Newtonsche Physik – jeweils als revolutionärer Bruch, nicht als schrittweise Erweiterung.",
          "• Gegen Poppers Rationalismus: Poppers Modell (Problem → Theorie → Fehlerelimination → neues Problem) ist zu grob und einseitig. Es gibt auch falsch formulierte Probleme, die man nicht lösen, sondern nur auflösen kann.\n\n• Eine gute Theorie erklärt nicht mehr als eine andere – entscheidend ist die Perspektive, die sie eröffnet.\n\n• Aus Tatsachen lassen sich keine Theorien zwingend ableiten. Sie beweisen letztlich nichts, weil das Denken einen viel zu weiten Spielraum eröffnet.\n\n• Der Erkenntnisprozess erfasst fortwährend die Welt neu.\n\n• Auch irrationales Vorgehen führt zu Wissenschaftsfortschritt – historische Beispiele (Galilei, Kopernikus) beweisen dies."
        ]
      },
      {
        "label": "Konsequenzen",
        "values": [
          "• Kritischer Rationalismus: Wissenschaftler sollen ihre Theorien stets hinterfragen und immer nach Fehlern suchen, nicht nach Bestätigung.\n\n• Revolutionäre Wissenschaft: Wissenschaftlicher Fortschritt kann durch revolutionäre Theorien entstehen, die alte Theorien ersetzen, wenn sie besser zu Daten passen oder neue empirische Vorhersagen liefern.",
          "• Weltbild-Wechsel: Mit einem **Paradigmenwechsel** verändert sich nicht nur die Theorie, sondern das gesamte wissenschaftliche Weltbild: Alte Probleme müssen mit anderen Augen gesehen und neu interpretiert werden.\n\n• Wissenschaft ist sozial eingebettet: Paradigmen werden von wissenschaftlichen Gemeinschaften getragen. Akzeptanz und Ausbildung spielen eine zentrale Rolle – nicht nur logische Argumente.\n\n• Kein linearer Fortschritt: Phasen stabiler **Normalwissenschaft** wechseln sich mit Krisen und Revolutionen ab. Fortschritt verläuft in Brüchen, nicht stetig.",
          "• Theoriepluralismus & Methodenanarchismus: Intuition und Kreativität sind gefragt. Man darf und soll alle Ideen und Methoden verwenden, wenn es um Erkenntnis und Problemlösung geht.\n\n• Wissenschaftliche Autonomie: Jeder Wissenschaftler muss die Freiheit haben, selbst zu entscheiden, welche Wege er gehen will.\n\nTrennung von Staat/Schule und Wissenschaft – aber keine Trennung von Wissenschaft und Mythos."
        ]

      {

          "• Ist Falsifikation selbst falsifizierbar?\n• Wissenschaftler halten oft an Theorien fest, auch wenn Anomalien auftreten (Problem der Hilfshypothesen).\n• Beschreibt Ideal-Wissenschaft, nicht die reale Praxis.",
          "• Relativistisch: Wenn Paradigmen inkommensurabel sind, gibt es keinen objektiven Maßstab für Fortschritt – wie soll man dann Theorien überhaupt vergleichen?\n• Kuhn beschreibt, erklärt aber nicht, warum ein **Paradigma** besser ist als ein anderes.\n• Wissenschaftliche Revolutionen erscheinen irrational, da logische Argumente keine entscheidende Rolle spielen – soziale Akzeptanz scheint wichtiger.",
          "• «Anything goes» kann als Ablehnung jeder Qualitätskontrolle missverstanden werden.\n• Wie unterscheidet man dann noch Wissenschaft von Pseudowissenschaft?\n• Bietet keine normative Orientierung für die wissenschaftliche Praxis."

          "• **Mehrwert-Theorie**: Die Ausbeutung der Arbeiter erfolgt dadurch, dass sie nicht den vollen Wert ihrer Arbeit erhalten, sondern der Mehrwert von Kapitalisten einbehalten wird.\n\n• Kritik am Privateigentum: Das Privateigentum an Produktionsmitteln führt zu Ungleichheit und entfremdet die Arbeiter von ihrer Arbeit, ihrem Produkt und sich selbst.\n\n• Kommunistische Perspektive: Gerechtigkeit erfordert die Abschaffung des Privateigentums an Produktionsmitteln und die Vergesellschaftung von Ressourcen.\n\n• **Entfremdung** und Menschlichkeit: Nur in einer klassenlosen Gesellschaft kann der Mensch seine volle Menschlichkeit entfalten, indem er kreativ und selbstbestimmt arbeitet.\n\n• Klasse als Schicksal: Im Kapitalismus bestimmt die Klassenherkunft über Chancen, Bildung und Lebensperspektiven – strukturelle Ungerechtigkeit ist kein Zufall, sondern System.",

          "• Prinzip der Gerechtigkeit im Erwerb: Eigentum ist rechtmäßig, wenn es ohne Verletzung der Rechte anderer erworben wurde.\n\n• Prinzip der Gerechtigkeit im Transfer: Eigentum kann übertragen werden, solange der Transfer freiwillig ist.\n\n• Entitlement-Theorie: Soziale Gerechtigkeit ergibt sich aus dem rechtmäßigen Besitz und nicht aus einer angestrebten Gleichheit oder Umverteilung.\n\n• Kritik an Verteilungstheorien: Zentralisierte Umverteilungsmaßnahmen, wie sie Rawls vorschlägt, sind Zwang und verletzen individuelle Rechte.\n\n• Wilt-Chamberlain-Argument: Wenn alle frei tauschen dürfen, entsteht Ungleichheit automatisch – wer sie rückgängig machen will, muss ständig in freiwillige Transaktionen eingreifen."

          "• Stabilität der Gesellschaft: Eine gerechte Gesellschaft, die auf den Prinzipien der Gerechtigkeit basiert, wird als stabiler und friedlicher angesehen, da sie von den Mitgliedern als legitim und fair betrachtet wird.\n\n• Verbesserte Lebensbedingungen für Benachteiligte: Die Anwendung des Differenzprinzips führt dazu, dass soziale und wirtschaftliche Maßnahmen ergriffen werden, um die Situation der am wenigsten begünstigten Mitglieder der Gesellschaft zu verbessern.\n\n• Legitimation von Ungleichheiten: Soziale und wirtschaftliche Ungleichheiten werden legitimiert, sofern sie den Benachteiligten zugutekommen.\n\n• Wohlfahrtsstaat als Konsequenz: Rawls' Theorie liefert die philosophische Grundlage für progressive Besteuerung, Sozialversicherungen und öffentliche Bildung als Instrumente der Chancengerechtigkeit.",

const FW=[{"id":"platon_erk","name":"Platons Ideenlehre","sem":"Erkenntnistheorie","content":"Übersicht Platons Ideenlehre\nMini-Biographie: Platon (427-347 v. Chr.)\nPlaton wurde 427 v. Chr. in Athen in eine wohlhabende und einflussreiche\nFamilie geboren. Ursprünglich sollte er eine politische Laufbahn einschlagen,\ndoch die Hinrichtung seines Lehrers Sokrates (399 v. Chr.) erschütterte ihn\nso sehr, dass er sich endgültig der Philosophie zuwandte.\nNach Reisen nach Süditalien, Sizilien und Ägypten gründete Platon in Athen\ndie Akademie, eine der ersten philosophischen Schulen Europas. Dort\nunterrichtete er jahrzehntelang und prägte Generationen von Denkern,\ndarunter auch seinen berühmtesten Schüler Aristoteles.\nSein Werk umfasst zahlreiche Dialoge, in denen er philosophische Themen in lebendiger\nGesprächsform darstellt. Zentral ist die Ideenlehre: Platon unterscheidet zwischen der\nvergänglichen Sinneswelt und der ewigen, unveränderlichen Welt der Ideen, die allein wahres\nWissen ermöglichen. Das berühmte Höhlengleichnis aus der Politeia veranschaulicht diesen\nAufstieg von der Täusch"},{"id":"descartes","name":"René Descartes – Rationalismus","sem":"Erkenntnistheorie","content":"Überblick - René Descartes\n1. Einführung\nRené Descartes (1596-1650) gilt als Begründer des\nneuzeitlichen Rationalismus. Er wollte ein Fundament\nschaffen, das so sicher ist wie die Mathematik. Dazu\nentwickelte er den methodischen Zweifel: Alles, was\nauch nur den geringsten Anlass zum Zweifel bietet,\nwird infrage gestellt. Nur das, was sich dem Zweifel\nentzieht, kann Grundlage des Wissens sein.\n2. Zentrale Begriffe\nAngeborene Ideen\nDefinition:\nBegriffe, Vorstellungen oder Wahrheiten, von\ndenen angenommen wird, sie könnten durch sinnliche Erfahrungen nicht erworben worden\nsein, weil sie nicht - wie sinnlich erfahrbare Gegenstände - greifbar oder sichtbar sind (z.B.\nmathematische Begriffe oder ethische Werte). Daher müssten solche Ideen zu einer Art\nursprünglicher Ausstattung des menschlichen Geistes gehören. Der Streit um die Existenz\nderartiger Begriffe beherrschte die erkenntnistheoretische Diskussion des 17. und 18. Jh.\nzwischen Rationalismus und Empirismus.\nKontext:\nFür Descartes genü"},{"id":"empirismus","name":"Empirismus: Locke & Hume","sem":"Erkenntnistheorie","content":"Übersicht Empirismus\n1. Einführung\nDer Empirismus ist eine erkenntnistheoretische Strömung der Neuzeit, die alle Erkenntnis aus der\nErfahrung ableitet. Im Gegensatz zum Rationalismus, der die Vernunft in den Mittelpunkt stellt,\nbetonen Empiristen die Rolle der Sinneswahrnehmung. Der Geist gleicht zu Beginn einem\nunbeschriebenen Blatt (tabula rasa), das erst durch Eindrücke und Erfahrungen gefüllt wird.\nZentrale Vertreter sind John Locke und David Hume. Locke begründet den Empirismus\nsystematisch, während Hume ihn radikalisiert, indem er auch die scheinbare Gewissheit von\nNaturgesetzen infrage stellt.\n2. Zentrale Begriffe\nEmpirisch\nEtwas ist empirisch, wenn es auf Erfahrung beruht. Ein empirisches Urteil ist eine Aussage,\ndie auf Beobachtungen oder Experimenten basiert. Beispiele sind Naturgesetze, die durch\nwissenschaftliche Experimente bestätigt werden.\nEmpirismus\nDer Empirismus ist die philosophische Lehre, dass alle Erkenntnis aus der Erfahrung\nstammt. Für die Empiristen ist die ein"},{"id":"kant_erk","name":"Immanuel Kant – Kritizismus","sem":"Erkenntnistheorie","content":"Übersicht: Kant und der Kritizismus\n1. Einführung\nImmanuel Kant (1724-1804) gilt als einer der bedeutendsten Philosophen der Neuzeit. Mit seiner\n„kopernikanischen Wende“ in der Philosophie versuchte er, den Streit zwischen Rationalismus\n(Vernunft als Quelle des Wissens) und Empirismus (Erfahrung als Grundlage) zu überwinden. Sein\nAnsatz wird Kritizismus genannt, weil er die Bedingungen und Grenzen der menschlichen\nErkenntnis „kritisch“ untersuchen wollte.\nKants Kernidee: Wir erkennen die Welt nicht, wie sie „an sich“ ist, sondern so, wie sie uns durch\nunsere eigenen Denkstrukturen erscheint.\n2. Zentrale Begriffe\nA priori:\n• Von vornherein, unter Absehung von aller Erfahrung, auch: rein.\n• Erkenntnisse, welche von der Erfahrung unabhängig sind\n• Erkenntnis aus Vernunft\n• Kant: Erkenntnisse (wie Intuition, Konzepte, Urteile), welche von der Erfahrung unabhängig\nsind\n• Descartes: angeborene Ideen sind eine Form apriorischer Ideen\nDing an sich\nEin zentraler Begriff in Kants Philosophie. Da"},{"id":"wiss_intro","name":"Wissenschaftstheorie","sem":"Erkenntnistheorie","content":"Übersicht - Wissenschaftstheorie\n1. Einführung\nDie Wissenschaftstheorie untersucht, wie Wissenschaft funktioniert, wie sie zu Erkenntnissen\ngelangt und wodurch sie sich von Pseudowissenschaft unterscheidet. Seit der Neuzeit versuchen\nPhilosophen, Kriterien für sicheres Wissen zu finden und die Methoden der Wissenschaft zu\nreflektieren.\nZentrale Fragen sind:\n• Wie entsteht neues Wissen?\n• Welche Methoden sind legitim?\n• Gibt es einen festen Fortschritt in der Wissenschaft - oder nur wechselnde Theorien?\n2. Zentrale Begriffe\n1. Wissenschaft – was ist das überhaupt?\nWissenschaft\n= systematischer Versuch, Wirklichkeit methodisch, begründet und nachprüfbar zu erklären.\nAbgrenzung:\n• nicht bloß Meinung\n• nicht Glaube\n• nicht Alltagswissen\n2. Erkenntnis & Wahrheit\n\nErkenntnis\n= begründetes Wissen über Zusammenhänge der Wirklichkeit.\nWahrheit\n= Übereinstimmung einer Aussage mit der Wirklichkeit\n(→ in der Wissenschaft meist: vorläufig, revidierbar).\nObjektivität\n= Unabhängigkeit von persönliche"},{"id":"popper","name":"Karl Popper – Falsifikationismus","sem":"Erkenntnistheorie","content":"Übersicht: Karl Popper und der Falsifikationismus\n1. Einführung\nKarl Popper (1902-1994) gilt als einer der einflussreichsten Wissenschaftstheoretiker des 20.\nJahrhunderts. Mit seinem Falsifikationismus wollte er das Problem der Induktion (Hume)\nüberwinden und ein klares Kriterium dafür liefern, was Wissenschaft von Pseudowissenschaft\nunterscheidet.\n\n2. Zentrale Begriffe\nFalsifikation\nEine Theorie ist nur dann wissenschaftlich, wenn man sich grundsätzlich eine Beobachtung oder ein\nExperiment vorstellen kann, das sie widerlegt.\nNicht Bestätigung, sondern Widerlegbarkeit ist das entscheidende Kriterium für Wissenschaft.\nBeispiel:\n„Alle Schwäne sind weiß.“ – Ein schwarzer Schwan würde die Theorie widerlegen.\nBewährung\nTheorien können viele Tests bestehen und sich bewähren, aber sie sind niemals endgültig wahr.\nBewährung bedeutet vorläufige Geltung, keine absolute Sicherheit.\nBeispiel:\nDie Newtonsche Physik war lange bewährt, wurde aber später teilweise korrigiert.\nTheoriegetränktheit der B"},{"id":"kuhn","name":"Thomas Kuhn – Paradigmenwechsel","sem":"Erkenntnistheorie","content":"Übersicht: Thomas Kuhn - Paradigmen und\nwissenschaftliche Revolutionen\n1. Einführung\nThomas S. Kuhn (1922–1996) war ein US-amerikanischer Wissenschaftshistoriker und\nWissenschaftsphilosoph. In seinem einflussreichen Werk The Structure of Scientific Revolutions\n\n(1962) stellte er die verbreitete Vorstellung infrage, wissenschaftlicher Fortschritt verlaufe stetig\nund kumulativ.\nKuhn argumentiert, dass Wissenschaft sich überwiegend innerhalb stabiler Denkrahmen vollzieht\nund nur gelegentlich durch wissenschaftliche Revolutionen grundlegend verändert wird. Diese\nUmbrüche bezeichnet er als Paradigmenwechsel. Wissenschaftlicher Fortschritt ist nach Kuhn\ndaher nicht linear, sondern von Phasen der Stabilität und des radikalen Umbruchs geprägt.\n2. Zentrale Begriffe\nParadigma:\nEin gemeinsamer theoretischer und methodischer Rahmen einer wissenschaftlichen Gemeinschaft.\nEr bestimmt,\n• welche Fragen als sinnvoll gelten,\n• welche Methoden legitim sind,\n• welche Erklärungen akzeptiert werden.\nNormalw"},{"id":"feyerabend","name":"Paul Feyerabend – Methodenpluralismus","sem":"Erkenntnistheorie","content":"Übersicht: Paul Feyerabend und der\nMethodenpluralismus\n1. Einführung\n\nPaul Feyerabend (1924-1994) war ein österreichischer Wissenschaftsphilosoph, der mit seinem\nWerk Against Method (Wider den Methodenzwang, 1975) für Aufsehen sorgte. Er vertrat eine\nradikal-kritische Haltung gegenüber starren Regeln in der Wissenschaft und prägte das provokante\nMotto: „Anything goes“. Seine Schriften gehören zu den umstrittensten und zugleich\neinflussreichsten Beiträgen der Wissenschaftsphilosophie des 20. Jahrhunderts.\n⸻\n2. Zentrale Begriffe\n• Methodenpluralismus: Es gibt keine einheitliche, allgemeingültige Methode für Wissenschaft.\nUnterschiedliche Methoden sind nötig und fruchtbar.\n• „Anything goes“: Provokative Zuspitzung seiner Forderung, wissenschaftliche Kreativität\nnicht durch starre Regeln einzuengen.\n• Kritik am Wissenschaftsglauben: Wissenschaft sollte nicht als einzig legitime Form von\nWissen gelten.\n• Demokratisierung des Wissens: Wissenschaft braucht Kontrolle durch Gesellschaft und\nEth"},{"id":"aristoteles_eth","name":"Aristoteles – Tugendethik & Eudaimonia","sem":"Ethik","content":"Übersicht: Aristoteles und das gute Leben\nMini-Biographie\nAristoteles (384-322 v. Chr.) war ein griechischer Philosoph und\nSchüler von Platon. Er gilt als einer der bedeutendsten Denker der\nwestlichen Philosophie und Wissenschaft. Aristoteles entwickelte\numfassende Theorien in Bereichen wie Metaphysik, Ethik, Politik,\nLogik und Naturwissenschaften. In seiner Nikomachischen Ethik\nführte er die Idee des Eudaimonia ein, das höchste Ziel des\nmenschlichen Lebens, welches durch tugendhaftes Handeln erreicht\nwird. Seine Logik-Lehre prägte das Denken für Jahrhunderte, und\nseine Ideen über die Kausalität und das Sein beeinflussten die\nMetaphysik nachhaltig.\n1. Einführung\nAristoteles (384–322 v. Chr.) entwickelt eine Tugendethik, die sich am Ziel eines gelungenen Lebens\norientiert. Im Gegensatz zu Platon denkt er weniger idealistisch, sondern beobachtet die reale\nWelt. Für ihn ist Ethik eng mit der Natur des Menschen verbunden: Der Mensch hat ein Ziel, das er\ndurch vernünftiges Handeln verwirkli"},{"id":"epikur","name":"Epikur – Hedonismus","sem":"Ethik","content":"Übersicht\n1. Einführung\nNach Aristoteles verschiebt sich der Fokus der Ethik: Statt politischem Engagement tritt ein\nRückzug ins Private in den Vordergrund.\nEpikur entwickelt eine Philosophie, die nicht mehr den Staat, sondern das individuelle Glück in den\nMittelpunkt stellt. Seine Ethik ist eine Form des Hedonismus, allerdings nicht im Sinne von\nmaßlosem Genuss, sondern als Suche nach innerem Frieden und Ausgeglichenheit.\nPhilosophie hat für Epikur eine praktische Aufgabe: Sie soll dem Menschen helfen, ein glückliches\nund angstfreies Leben zu führen.\n2. Zentrale Begriffe\n• Hedonismus: Lehre, nach der Lust das Ziel des Lebens ist\n• Ataraxia: Seelenruhe, innerer Friede\n• Aponie: Freiheit von körperlichem Schmerz\n• Kinetische Lust: kurzfristige Lust (Genuss, Befriedigung)\n• Katastematische Lust: dauerhafte Zustandslust (Ruhe, Ausgeglichenheit)\n• Bedürfnislehre: Unterscheidung zwischen natürlichen und nichtigen Bedürfnissen\n3. Zentrale Ideen\n\n1. Materialistisches Weltbild\n• Die Welt beste"},{"id":"utilitarismus_fw","name":"Utilitarismus","sem":"Ethik","content":"Überblick Utilitarismus\n1. Einführung\nDer Utilitarismus ist eine ethische Theorie, die Handlungen danach beurteilt, welche Folgen sie\nhaben. Im Zentrum steht dabei nicht die Absicht des Handelnden oder eine moralische Regel,\nsondern die Frage, ob eine Handlung insgesamt zu mehr Glück und weniger Leid führt.\nEine Handlung gilt als moralisch richtig, wenn sie das Wohlergehen aller Betroffenen\nmaximiert.\nDer Begriff „Utilitarismus“ leitet sich vom lateinischen utilitas ab und bedeutet „Nutzen“. Diese\nHerkunft verweist bereits auf den Kern der Theorie: Moralisches Handeln soll sich am\nNutzen orientieren. Dieser Nutzen wird im klassischen Utilitarismus vor allem als Lust,\nFreude oder Glück verstanden, während Leid als negativ gilt. In neueren Varianten, insbesondere bei\nPeter Singer, wird der Begriff des Nutzens erweitert und stärker als Erfüllung von Interessen oder\nPräferenzen interpretiert.\nDer Utilitarismus entsteht im 18. und 19. Jahrhundert im Kontext von Aufklärung, gesellschaftliche"},{"id":"kant_eth","name":"Immanuel Kant – Pflichtethik","sem":"Ethik","content":"Überblick Kants Pflichtethik\nEinführung\nKants Ethik beginnt mit einem ziemlich radikalen Gedanken: Moral hat nichts mit Gefühlen, Glück\noder guten Absichten zu tun. Entscheidend ist allein, ob wir aus Vernunft handeln.\nEr stellt sich gegen die Idee, dass wir moralisch handeln, weil wir Mitgefühl haben oder gute Folgen\nerreichen wollen. Für ihn ist das alles zu unsicher. Heute fühlst du dich großzügig, morgen nicht.\nMoral würde so zu einer Laune werden.\nStattdessen fordert Kant etwas Unbequemes: Wir sollen so handeln, dass unsere Entscheidungen\nfür alle Menschen gelten könnten. Und wir sollen jeden Menschen immer als Zweck behandeln,\nniemals nur als Mittel.\nDamit macht er Moral streng, aber auch konsequent. Sie gilt unabhängig davon, ob es uns passt\noder nicht. Kant zwingt uns im Grunde, uns selbst ernst zu nehmen als vernünftige Wesen, die\nVerantwortung für ihr Handeln tragen.\nArgumentation kurzgefasst\n1. Ausgangsproblem: Was ist moralisch richtig?\nKant sagt:\nMoral darf nicht abhängen"},{"id":"jonas","name":"Hans Jonas – Verantwortungsethik","sem":"Ethik","content":"mehr fassen kann [...] und uns eine neue, nie zuvor erträumte Dimension der Verantwortung\naufzwingt\" Verantwortung ist also ein ethischer Schlüsselbegriff der modernen technologischen\nZivilisation. Er benennt in moderner Sprache das, was früher Pflichtbewusstsein hieß. Aber\ner legt, da der Begriff „Antwort\" in ihm steckt, das Gewicht stärker auf die sprachliche,\n\nrationale Begründbarkeit des Handelns gegenüber anderen. Verantwortung\nübernehmen heißt: Vernünftig antworten können auf die Frage nach dem\nHandlungsgrund. Der Begriff ist mehrstellig.\nZu fragen ist\n•nach der Zeitdimension: Wann wird Verantwortung übernommen;\n•nach den Akteuren: Wer übernimmt Verantwortung;\n•nach den zu verantwortenden Handlungen: Was wird verantwortet;\n•nach den Folgen: Wofür muss Verantwortung übernommen werden;\n•nach der Instanz: Wovor wird Verantwortung übernommen und grundsätzlich\n•nach der Begründung und dem Motiv dafür, Verantwortung zu übernehmen: Warum?\nFRAGEN ZU DEN DIMENSIONEN DER VERANTWORTUNG\nWann"},{"id":"relativismus_fw","name":"Relativismus & Universalismus","sem":"Ethik","content":"alternativlos festgelegt. Naturgesetze und Anfangsbedingungen bestimmen alle weiteren\nWeltzustände, sodass es zu jedem Zeitpunkt genau eine mögliche Zukunft gibt.\nDer universale Determinismus enthält 2 Hauptaussagen:\n1.) Jedes Ereignis hat eine Ursache. Das Kausalprinzip gilt also uneingeschränkt und es gibt keine\nkausale Unbestimmtheit bzw. keine kausalen Lücken im Weltgeschehen.\n2.) Die Ursache-Wirkungs-Relationen verlaufen nach strikten Gesetzmäßigkeiten. Alle\nNaturprozesse zeigen strenge Regelmäßigkeiten und unterliegen keinen zufälligen Schwankungen.\nMan kann sich den Weltverlauf als eine Abfolge von einzelnen Weltzuständen\nvorstellen. Diese sind einerseits durch die Lage ihrer kleinsten Teile bestimmt und andererseits\ndurch die Naturgesetze kausal miteinander verknüpft. Daraus folgt, dass der Weltverlauf für jeden\neinzelnen Zeitpunkt und in allen Einzelheiten festgelegt ist.\n→ & → & → & → & → & → & → & → & → & → & → & → & → & →\nAuf den Menschen bezogen bedeutet dies, dass auch me"},{"id":"polphil_intro","name":"Einführung Politische Philosophie","sem":"Staatsphilosophie","content":"Überblick: Leitfragen der Politischen Philosophie\n1. Staat und Legitimität\n• Wozu gibt es den Staat?\n• Auf welcher Grundlage ist Herrschaft gerechtfertigt?\n• Ist der Staat ein „natürliches“ Gebilde (Platon, Aristoteles) oder ein künstlicher Vertrag (Hobbes,\nLocke, Rousseau)?\n2. Macht und Herrschaft\n• Wie funktioniert Macht?\n• Soll Macht geteilt oder konzentriert werden?\n• Unterschiedliche Sichtweisen:\n• Macht als Mittel zur Herrschaft (Machiavelli)\n• Macht als kollektives Handeln (Arendt)\n• Macht als Durchsetzungsfähigkeit (Weber).\n3. Recht und Moral\n• Soll Recht immer moralisch gerecht sein?\n• Oder gilt: „Gesetz ist Gesetz“ (Rechtspositivismus)?\n• Konflikt zwischen Naturrecht und positivem Recht.\n\n4. Gerechtigkeit\n• Wie sollen Chancen und Güter verteilt werden?\n• Ist Gleichheit oder Freiheit wichtiger?\n• Positionen: Egalitarismus (Rousseau, Marx), liberaler Egalitarismus (Rawls), Liberalismus (Smith,\nNozick).\n5. Demokratie\n• Was bedeutet es, wenn „das Volk herrscht“?\n• Welche Gefahren"},{"id":"platon_staat","name":"Platon – Staatsphilosophie","sem":"Staatsphilosophie","content":"Überblick Platon Staatsphilosophie (Politeia)\nEinführung\nPlaton (427-347 v. Chr.) ist einer der bekanntesten Philosophen der Antike. Er war Schüler von\nSokrates und Lehrer von Aristoteles. In seinem Werk „Politeia“ (Der Staat) stellt er die Frage: Wie\nmuss ein Staat organisiert sein, damit er gerecht ist und das gute Leben für alle ermöglicht?\nSeine Antwort: Ein gerechter Staat braucht eine klare Ordnung, in der jeder seine Rolle erfüllt,\nund Herrscher, die klug, weise und nur dem Gemeinwohl verpflichtet sind.\nZentrale Positionen\n1. Der Mensch und das Gute\nPlaton sieht den Menschen als ein Wesen, das nach dem Guten strebt. Dieses erkennt er aber erst\ndurch Erziehung und Bildung. Weil der Mensch Vernunft, Mut und Triebe in sich vereint, muss er\nerzogen werden, damit die Vernunft die Führung übernimmt.\n2. Gerechtigkeit als Harmonie\nFür Platon bedeutet Gerechtigkeit Ordnung und Harmonie - in der Seele wie im Staat:\n• In der Seele: Vernunft soll die Triebe leiten, unterstützt durch den Mut"},{"id":"aristoteles_staat","name":"Aristoteles – Staatstheorie","sem":"Staatsphilosophie","content":"Überblick Aristoteles’ Staatstheorie\nEinführung\nAristoteles (384-322 v. Chr.) war Schüler Platons, wandte sich aber stärker der empirischen\nBeobachtung zu. Statt einen idealen Staat wie Platon zu entwerfen, untersuchte er die realen\nVerfassungen griechischer Stadtstaaten. Sein Ziel war es, eine Staatslehre zu entwickeln, die sich am\nGemeinwohl orientiert und der Natur des Menschen entspricht.\nZentrale Begriffe\n• Zoon logon echon bedeutet auf Griechisch „Lebewesen mit Vernunft und Sprache“.\nAristoteles beschreibt damit den Menschen als ein Wesen, das sich vom Tier unterscheidet, weil\nes denken, sprechen und gemeinsam Überlegungen anstellen kann.\n• Zoon politikon bedeutet auf Griechisch „politisches Lebewesen“. Aristoteles meint damit,\ndass der Mensch von Natur aus in Gemeinschaft lebt. Nur im Staat (Polis) kann er seine Vernunft\nund Sprache vollständig entfalten und ein gutes Leben führen.\n• Eudaimonia: Glückseligkeit als höchstes Ziel des Lebens - erreichbar nur in der Polis.\n• Polis:"},{"id":"hobbes","name":"Thomas Hobbes – Leviathan","sem":"Staatsphilosophie","content":"Überblick: Thomas Hobbes - Der Staat als Leviathan\nThomas Hobbes (1588-1679)\nThomas Hobbes wurde 1588 in England geboren - im Jahr, als die\nspanische Armada England bedrohte. Später sagte er, er sei „mit der\nAngst geboren“ - ein Satz, der sein Denken gut beschreibt.\nHobbes wuchs in einer Zeit politischer und religiöser Konflikte auf.\nEngland wurde von Bürgerkriegen, Machtkämpfen zwischen König\nund Parlament und Spannungen zwischen katholischer und\nprotestantischer Kirche erschüttert. Diese Erfahrung dauernder\nUnsicherheit prägte sein Menschenbild und seine Vorstellung vom Staat. Er studierte in Oxford,\narbeitete als Hauslehrer und Begleiter adeliger Familien in ganz Europa und lernte dort die\nSchriften von Galilei und Descartes kennen. Er war beeindruckt von der neuen Naturwissenschaft\nund wollte auch die Gesellschaft nach rationalen Gesetzen erklären.\nWährend des Englischen Bürgerkriegs (1642-1649) floh Hobbes nach Frankreich. Dort verfasste er\nsein berühmtestes Werk, den Leviathan (1"},{"id":"locke","name":"John Locke – Gesellschaftsvertrag","sem":"Staatsphilosophie","content":"John Locke - Gesellschaftsvertrag - Überblick\nJohn Locke wurde 1632 in der Nähe von Bristol geboren. Sein\nVater kämpfte im englischen Bürgerkrieg auf Seiten des\nParlaments - gegen die königliche Macht. Diese Erfahrungen\nprägten Lockes Haltung gegenüber Autorität und seine\nWertschätzung politischer Freiheit.\nEr studierte in Oxford Philosophie, Medizin und\nNaturwissenschaften und arbeitete später als Arzt und Berater\nfür den liberalen Politiker Lord Shaftesbury, mit dem ihn eine\nenge Freundschaft verband. Als Shaftesbury wegen politischer\nKonflikte ins Exil ging, floh auch Locke 1683 in die Niederlande,\nwo er in einer Atmosphäre religiöser Toleranz seine wichtigsten Werke schrieb, darunter die Zwei\nAbhandlungen über die Regierung und den Brief über Toleranz.\nNach der „Glorious Revolution“ (1688) kehrte Locke nach England zurück. Seine Ideen über\nFreiheit, Eigentum und begrenzte Staatsmacht fanden nun große Zustimmung und beeinflussten die\nneue englische Verfassung.\nEr verbrachte seine le"},{"id":"rousseau","name":"Jean-Jacques Rousseau – Contrat Social","sem":"Staatsphilosophie","content":"Überblick: Jean-Jacques Rousseau - Du Contrat\nSocial\nEinführung\nJean-Jacques Rousseau (1712-1778) gilt als einer der wichtigsten Denker der Aufklärung und der\npolitischen Philosophie. Er entwickelt in seinem Werk Du contrat social (1762) eine Theorie, die die\nGrundlage moderner Demokratievorstellungen bildet: die Idee der Volkssouveränität und des\nallgemeinen Willens (volonté générale). Rousseau reagiert auf Hobbes’ pessimistisches Menschenbild\n\nund auf Lockes liberalen Vertragsgedanken. Er will einen Staat begründen, der Freiheit und\nGleichheit sichert, ohne dass Menschen ihre Selbstbestimmung aufgeben müssen.\nZentrale Ideen\n1. Der Gesellschaftsvertrag\nRousseau versteht den Staat als freiwillige Übereinkunft freier und gleicher Menschen. Jeder\nEinzelne verzichtet auf seine natürliche Freiheit (alles tun zu können, was er will), um bürgerliche\nFreiheit zu gewinnen. Das ist die Freiheit, nach Gesetzen zu leben, die man sich selbst gemeinsam\nmit anderen gibt.\nDer Gesellschaftsvertrag ver"},{"id":"macht_fw","name":"Machiavelli · Arendt · Weber – Macht","sem":"Staatsphilosophie","content":"Überblick: Drei Machtbegriffe im Vergleich\nEinleitung\nDer Begriff der Macht zählt zu den zentralen Themen der politischen Philosophie. Macht\nbezeichnet die Fähigkeit, das Handeln anderer zu beeinflussen oder zu bestimmen. Sie kann sich auf\nZwang, Zustimmung, Wissen oder Institutionen stützen und tritt in unterschiedlichen Formen auf –\nals Herrschaft, Autorität, Gewalt oder Überzeugungskraft. Während Macht für das Funktionieren\njeder politischen Ordnung unverzichtbar ist, birgt sie zugleich die Gefahr des Missbrauchs.\nPhilosophen haben deshalb immer wieder gefragt, wie Macht entsteht, wodurch sie legitimiert wird\nund wo ihre Grenzen liegen.\nIm Folgenden werden drei prägende Positionen vorgestellt: Niccolò Machiavelli versteht Macht als\nInstrument zur Sicherung und Ausübung der Herrschaft, Hannah Arendt als kollektives und\ngewaltfreies Handeln, und Max Weber als soziale Beziehung, in der sich der Wille des einen gegen\nden anderer durchsetzt.\nWesentliche Begriffe\nMacht\nMacht bedeutet die"},{"id":"naturrecht_fw","name":"Naturrecht vs. Positives Recht","sem":"Staatsphilosophie","content":"Überblick: Naturrecht vs. Positives Recht\n1. Einführung: Wann ist ein Gesetz gerecht?\nDieses Kapitel untersucht eine der zentralen Fragen der Rechts- und politischen Philosophie:\nReicht es aus, dass ein Gesetz gültig ist – oder muss es auch gerecht sein?\nIm Zentrum steht der Konflikt zwischen\n• positivem Recht: staatlich gesetztes, formal gültiges Recht\n• Naturrecht: moralische Prinzipien, die über dem Gesetz stehen\nDie Debatte wird besonders relevant dort,\n• wo Gesetze moralisch versagen,\n• wo Menschenrechte verletzt werden,\n• oder wo Individuen aus Gewissensgründen Widerstand leisten.\nDamit berührt sie Grundfragen von Rechtsgehorsam, moralischer Verantwortung und politischem\nWiderstand.\n2. Zentrale Begriffe und Grundunterscheidung\nRecht und Moral\nIn modernen Rechtsstaaten gilt eine klare Trennung:\n• Recht\n• wird vom Staat gesetzt\n• gilt ab einem bestimmten Zeitpunkt\n• ist einklagbar und mit Strafen verbunden\n• unterscheidet klar zwischen legal und illegal\n•\n\n• Moral\n• bindet das Gewi"},{"id":"menschenrechte_fw","name":"Menschenrechte","sem":"Staatsphilosophie","content":"1. Überblick: Was sind Menschenrechte?\nDie Idee der Menschenrechte beruht auf der Annahme, dass jeder Mensch allein aufgrund seines\nMenschseins bestimmte grundlegende Rechte besitzt. Diese Rechte hängen nicht davon ab,\n• wo jemand lebt,\n• welcher Religion er angehört,\n• oder ob ein Staat sie anerkennt.\nZwei anthropologische Grundannahmen stehen im Zentrum:\n• Würde\nJeder Mensch besitzt einen unbedingten Wert und darf nicht bloß als Mittel behandelt werden.\n• Autonomie\nMenschen sind fähig, selbstständig zu denken, Entscheidungen zu treffen und moralisch zu handeln.\nErste Vorformen dieser Idee finden sich bereits\n• im Naturrecht der Stoa\n• sowie in den monotheistischen Religionen, die die Gleichheit aller Menschen vor Gott betonen.\nEine konsequente rechtliche Umsetzung bleibt dort jedoch aus.\nErst die Aufklärung formuliert den Gedanken universal: Wenn alle Menschen Vernunft besitzen,\ndann besitzen sie auch gleiche Würde und gleiche Rechte.\nPolitisch wird diese Idee in zentralen Dokumenten"},{"id":"sozgerech_fw","name":"Soziale Gerechtigkeit","sem":"Staatsphilosophie","content":"Überblick: Soziale Gerechtigkeit\n1. Einführung\nDie Frage der Verteilungsgerechtigkeit beschäftigt sich damit, wie Ressourcen, Chancen und Rechte\nin einer Gesellschaft gerecht verteilt werden sollen. Menschen unterscheiden sich in vielen\nAspekten – Einkommen, Vermögen, Herkunft, Bildung, Gesundheit oder Talent. Ethisch relevant wird\nUngleichheit immer dann, wenn sie zu Benachteiligungen führt, die das menschenwürdige Leben\ngefährden oder wenn Unterschiede nicht gerechtfertigt werden können.\n2. Zentrale Positionen\nA. Egalitarismus: Alle sollen möglichst gleich leben\nGrundidee: Ungleichheit entsteht nicht natürlich, sondern durch Macht und Eigentum. Sie soll\nweitgehend aufgehoben werden.\nMenschenbild:\nDer Mensch ist ursprünglich friedlich, genügsam, harmonisch (Rousseau). Erst Eigentum und\nKonkurrenz zerstören diese Gleichheit.\nGerechtigkeit bedeutet:\n• materielle Gleichheit\n• Ausgleich von Benachteiligungen\n• gemeinsame Verantwortung\n• Auflösung oder starke Begrenzung von Eigentum als Qu"},{"id":"demokratie_fw","name":"Demokratiekonzepte","sem":"Staatsphilosophie","content":"Liberaler Egalitarismus:\nStartchancen müssen aktiv verbessert werden (z. B. Bildungsgerechtigkeit, Gesundheitsversorgung),\ndamit alle reale Chancen haben.\nLiberalismus:\nStartchancen sind weniger relevant; entscheidend ist, dass es keine formalen Diskriminierungen\ngibt.\nIn modernen Demokratien wird zunehmend betont:\nUngleiche Startchancen lassen sich nicht allein durch gleiche Rechte ausgleichen.\nSie beeinflussen, wie frei Menschen ihr Leben tatsächlich gestalten können.\nExkurs 3: Meritokratie und soziale Mobilität\n„Meritokratie“ bedeutet:\nJeder soll entsprechend seiner Leistung („merit“) belohnt werden.\nDas klingt fair – aber in der Praxis ist das Konzept umstritten.\nProbleme:\n1. Leistung hängt von Voraussetzungen ab: Wer bessere Bildung, Gesundheit oder Unterstützung\nhat, kann eher „Leistung“ zeigen.\n2. Überbewertung bestimmter Talente: Nicht jede Arbeit wird als „wertvoll“ angesehen, obwohl\nsie gesellschaftlich notwendig ist (Pflege, Müllentsorgung).\n3. Meritokratie erzeugt Sieger un"},{"id":"anthr_intro","name":"Einführung Anthropologie","sem":"Anthropologie","content":"Wiederbelebung des politischen Handelns im öffentlichen Raum.\n• Joseph Schumpeter verabschiedet sich vom Ideal der Volksherrschaft und versteht\nDemokratie als realistisches Verfahren des Wettbewerbs um politische Führung.\nDiese drei Positionen bieten unterschiedliche Antworten auf dieselbe Grundfrage: Wie kann\nDemokratie unter den Bedingungen moderner Massengesellschaften erhalten werden?\nZentrale Begriffe zur Demokratie\n\nVolk\nDas Volk bezeichnet die Gesamtheit der Bürger eines Staates, die Träger politischer Souveränität\nsind. In modernen Demokratien ist das Volk jedoch keine homogene Einheit, sondern besteht aus\nIndividuen mit unterschiedlichen Interessen, Überzeugungen und Lebensformen.\n→ Problem: Es gibt keinen einheitlichen „Volkswillen“.\nVolkssouveränität\nVolkssouveränität bedeutet, dass alle politische Macht vom Volk ausgeht. Sie kann entweder direkt\n(Abstimmungen) oder indirekt (Wahlen von Vertretern) ausgeübt werden.\nWichtig: Volkssouveränität heißt nicht, dass das Volk jederz"},{"id":"ess_exist","name":"Essentialismus & Existentialismus","sem":"Anthropologie","content":"ins Private sozial erklärt, kritisiert Arendt die strukturelle Reduktion von Politik auf Verwaltung.\nPolitik wird auf Wahlen, Verwaltung und Expertenentscheidungen reduziert. Bürger nehmen kaum\nnoch aktiv am politischen Geschehen teil, sondern delegieren Verantwortung an Parteien und\nInstitutionen.\nDas zentrale Problem lautet für Arendt daher:\nWie kann politische Freiheit dauerhaft institutionalisiert werden, ohne in Bürokratie\n(Verwaltungsstaat) und Elitenherrschaft zu verschwinden?\n2.5 Grundidee des Rätemodells\nArendts Antwort ist das Rätemodell. Dabei handelt es sich nicht um ein theoretisch konstruiertes\nIdealmodell, sondern um eine Form politischer Organisation, die historisch immer wieder spontan\nentstanden ist, wenn Menschen begannen, sich selbst politisch zu organisieren.\nRäte entstehen dort, wo Bürger:\n• gemeinsam handeln wollen,\n• Verantwortung übernehmen,\n• politische Entscheidungen nicht delegieren, sondern selbst tragen.\nDas Rätemodell ist damit Ausdruck gelebter Volkssouv"},{"id":"gehlen","name":"Arnold Gehlen – Mängelwesen","sem":"Anthropologie","content":"Freiheit ist minimalistisch verstanden: Wahlfreiheit und die Möglichkeit, Führung friedlich\nauszutauschen.\nDiese unterschiedlichen Freiheitsbegriffe führen zu sehr verschiedenen Demokratiekonzeptionen.\n4. Rolle der Bürger\nAuch die Rolle der Bürger wird grundlegend verschieden bestimmt:\nTocqueville:\nBürger müssen aktiv bleiben, um Freiheit zu bewahren.\nArendt:\nBürger sind Politik, sobald sie handeln.\nSchumpeter:\nBürger legitimieren politische Führung, mehr nicht.\nDamit verschiebt sich das Verständnis von Demokratie:\nvon Bürgern als Trägern politischer Praxis zu Bürgern als Wählern in einem Verfahren.\n5. Institutionelle Konsequenzen\nDiese Unterschiede schlagen sich unmittelbar in den institutionellen Modellen nieder:\n• Tocqueville setzt auf Zivilgesellschaft und lokale Selbstverwaltung.\n• Arendt entwickelt das Rätemodell als Gegenfigur zur Parteienherrschaft.\n• Schumpeter legitimiert Parteien, Eliten und Wettbewerb als notwendige Bestandteile\nmoderner Demokratie.\n\nWährend Tocqueville und"},{"id":"sartre","name":"Jean-Paul Sartre – Existentialismus","sem":"Anthropologie","content":"• Muss Kunst Regeln brechen?\n• Sind Natur und Kunst Gegensätze?\n• Warum wird Kunst mit Kreativität assoziiert?\n• Hat Kunst schön zu sein?\nIdentität\n• Gibt es einen Sinn des Lebens?\n• Sollte man sein Leben als ein Kunstwerk\n• Sollte man in einer sich verändernden Welt der\nGleiche bleiben?\n• Was bestimmt mein Geschlecht?\n\n\nEinführung: Was ist philosophische Anthropologie?\nDie philosophische Anthropologie ist ein zentrales Teilgebiet der Philosophie. Sie fragt, was den\nMenschen im Unterschied zu anderen Lebewesen ausmacht - biologisch, geistig und kulturell. Dabei\nsteht nicht nur im Mittelpunkt, was der Mensch „ist“, sondern auch, wie er sich selbst versteht, sich\nzur Welt in Beziehung setzt - und welchen Platz er im Ganzen des Seins einnimmt..\nWas ist philosophische Anthropologie?\n• Sie untersucht den Menschen nicht nur biologisch oder psychologisch, sondern in seiner\ngeistigen und kulturellen Dimension.\n• Der Mensch ist ein leibliches, sprachfähiges, symbolisch handelndes und\ndenkendes"},{"id":"frankl","name":"Viktor Frankl – Logotherapie","sem":"Anthropologie","content":"Zentrale Idee:\n\nTechnik ist keine Option, sondern eine notwendige Konsequenz menschlicher Entwicklung. Wir\nleben in einer Welt, die ohne Wissenschaft und Technik nicht mehr funktionsfähig ist.\nArgumente:\n• Der Mensch hat immer Natur durch Technik beeinflusst: Jagen, Roden, Heilen, Bauen.\n• Moderne Gesellschaften sind vollständig von Technik abhängig (z.B. Energie, Medizin, Ernährung).\n• Der Mensch verändert auch sich selbst - z.B. durch Reproduktionsmedizin und Gentechnik.\n• Es gibt keine Alternative zur technisierten Welt - ein Rückzug wäre katastrophal.\nBewertung:\nMittelstraß sieht in Technik kein Risiko, sondern eine anthropologische Notwendigkeit. Der Mensch\nist technisch - mit allen Konsequenzen. Der Mensch kann sich daher nicht gegen Technik\nentscheiden – sondern nur entscheiden, wie er mit ihr umgeht. Diese Position stellt ethische\nGrenzen grundsätzlich infrage und betont die Autonomie wissenschaftlicher Erkenntnis.\n⸻\nBernd-Olaf Küppers: Technik befreit den Menschen\nvon der Natu"},{"id":"arbeit_fw","name":"Arbeit & Technik","sem":"Anthropologie","content":"• Schön ist, was „ohne Interesse“ gefällt.\nBewertung:\nKunst muss nicht gefallen, wie das Angenehme - aber ein Urteil über Schönheit strebt\nKommunizierbarkeit und Resonanz an.\nFriedrich Nietzsche: Kunst als Gegengewicht zur Hässlichkeit der\nWahrheit\nZentrale Idee:\nDie Wahrheit ist oft grausam - daher braucht der Mensch die Kunst als Mittel zur\nLebensbewältigung. Kunst muss nicht schön sein, aber sie soll trösten und erheben.\nZitat:\n„Die Wahrheit ist hässlich: wir haben die Kunst, damit wir nicht an der Wahrheit zugrunde gehen.“\nBewertung:\nNietzsche lehnt das Ideal des Schönen nicht völlig ab - aber er sieht es nicht als Ziel der Kunst,\nsondern als möglichen Ausdruck einer tieferen, existenziellen Auseinandersetzung mit dem Leben.\nTheodor W. Adorno: Kunst muss nicht schön,\nsondern kritisch sein\nZentrale Idee:\nTheodor W. Adorno, Vertreter der Kritischen Theorie, lehnt die Idee ab, dass Kunst in erster Linie\nschön sein muss. In seiner „Ästhetischen Theorie“ argumentiert er, dass wahre Kuns"}];

// Words that should NOT trigger auto-bold before a colon
const _noBold=new Set(["Beispiel","Beispiele","Das","Die","Der","Ein","Eine","Er","Sie","Es","Wer","Was","Für","Dass","Wenn","Hier","Also","Aber","Doch","Dann","Nur","Auch","So"]);

function _boldLine(line){
  // Bold "Term:" at start of line when term is short (≤4 words, ≤42 chars) and not a common word
  const ci=line.indexOf(":");
  if(ci>0&&ci<=42){
    const term=line.slice(0,ci).trim();
    const words=term.split(/\s+/);
    const firstWord=words[0];
    if(words.length<=4&&!_noBold.has(firstWord)&&/^[A-ZÄÖÜ«]/.test(firstWord)){
      const eterm=term.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const erest=line.slice(ci+1).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return `<strong>${eterm}:</strong>${erest}`;
    }
  }
  return line.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Render **text** markdown → <strong>text</strong>
function _md(s){
  // escape HTML first, then convert **...**
  s=s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
}

function fc(v){
  if(!v)return"";
  const lines=v.split("\n");
  const hasBullets=lines.some(l=>l.startsWith("• "));
  return lines.map((line,i)=>{
    if(line.startsWith("• ")){
      // Bullet: render **md** markers, then also bold "Term:" at start if no ** present
      const inner=line.slice(2);
      if(inner.includes("**"))return"• "+_md(inner);
      return"• "+_boldLine(inner);
    } else if(line.startsWith("→ ")){
      return"→ "+_md(line.slice(2));
    } else if(i===0&&hasBullets&&line.trim()){
      // First line before bullets → immer ganze Zeile fett (** Marker entfernen, ganze Zeile = Überschrift)
      const clean=line.replace(/\*\*/g,"");
      const e=clean.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return`<strong>${e}</strong>`;
    } else {
      // Regular line: **md** markers first, then "Term:" heuristic
      if(line.includes("**"))return _md(line);
      return _boldLine(line);
    }
  }).join("<br>");
}

      <button class="lfb" onclick="selT('${id}')">Positionen →</button></div>`;

  h+=`</div>`;$("cnt").innerHTML=h;
}

// QUIZ
function startQuiz(){
  const pool=[];
  ORDER.forEach(id=>{const t=TOPICS[id];
    const mr=t.rows.find(r=>r.label&&r.label.toLowerCase().includes("merksatz"));if(!mr)return;
    t.positions.forEach((pos,i)=>{const m=mr.values[i];if(m&&m.trim())pool.push({id,pos,m,topic:t.name});});
  });
  const q=pool.sort(()=>Math.random()-.5).slice(0,12);
  quiz={q,idx:0,score:0,done:false};renderQ();
}
function renderQ(){
  if(quiz.idx>=quiz.q.length){endQ();return;}
  const q=quiz.q[quiz.idx];
  const others=quiz.q.filter((_,i)=>i!==quiz.idx).sort(()=>Math.random()-.5).slice(0,3).map(x=>x.pos);
  const opts=[...others,q.pos].sort(()=>Math.random()-.5);
  const pct=Math.round(quiz.idx/quiz.q.length*100);
  let h=`<div class="qwrap"><div class="qcard">
    <div class="qprog"><span>Frage ${quiz.idx+1}/${quiz.q.length} · ✓ ${quiz.score}</span>
      <div class="qpb"><div class="qpf" style="width:${pct}%"></div></div></div>
    <div class="qlbl">Welcher Philosoph / welche Strömung vertritt diesen Merksatz?</div>
    <div class="qqt">${q.m}</div>
    <div class="qtopic">Thema: ${q.topic}</div>
    <div class="qopts">`;
  opts.forEach(o=>{
    const os=o.replace(/'/g,"\\'");
    const qs=q.pos.replace(/'/g,"\\'");
    h+=`<button class="qo" onclick="ansQ(this,'${os}','${qs}')">${o}</button>`;
  });
  h+=`</div><div id="qfb"></div></div></div>`;$("cnt").innerHTML=h;
}
function ansQ(btn,chosen,correct){
  if(quiz.done)return;quiz.done=true;
  const ok=chosen===correct;if(ok)quiz.score++;
  document.querySelectorAll(".qo").forEach(b=>{b.disabled=true;
    if(b.textContent.trim()===correct)b.classList.add("ok");
    else if(b===btn&&!ok)b.classList.add("ko");});
  const fb=$("qfb");fb.className="qfb "+(ok?"ok":"ko");
  fb.innerHTML=ok?"✓ Richtig!":`✗ Falsch. Richtig: <strong>${correct}</strong>`;
  const nb=document.createElement("button");nb.className="qnext";
  nb.textContent=quiz.idx+1<quiz.q.length?"Nächste →":"Ergebnis →";
  nb.onclick=()=>{quiz.idx++;quiz.done=false;renderQ();};
  document.querySelector(".qcard").appendChild(nb);
}
function endQ(){
  const pct=Math.round(quiz.score/quiz.q.length*100);
  const msg=pct>=80?"Ausgezeichnet! 🎉":pct>=60?"Gut gemacht! 👍":"Noch üben 📚";
  $("cnt").innerHTML=`<div class="qwrap"><div class="scard">
    <div class="scn">${quiz.score}/${quiz.q.length}</div>
    <div class="scl">${msg} (${pct}%)</div>
    <button class="scr" onclick="startQuiz()">Nochmal</button></div></div>`;
}

// SEARCH
function doSearch(q){
  const lq=q.toLowerCase(),res=[];
  ORDER.forEach(id=>{const t=TOPICS[id];
    t.positions.forEach((pos,i)=>{
      const txt=[pos,...t.rows.map(r=>r.values[i]||"")].join(" ").toLowerCase();
      if(txt.includes(lq)){
        const mr=t.rows.find(r=>r.label&&r.label.toLowerCase().includes("merksatz"));
        res.push({type:"t",id,topic:t.name,sem:t.sem,pos,merk:mr?mr.values[i]:""});
      }
    });
  });
  FW.forEach(f=>{
    if((f.name+" "+f.content).toLowerCase().includes(lq)){
      const i=f.content.toLowerCase().indexOf(lq);
      const ex=i>=0?f.content.slice(Math.max(0,i-50),i+80):"";
      res.push({type:"fw",id:f.id,topic:f.name,sem:f.sem,pos:"",merk:ex});
    }
  });
  function hl(t){if(!t)return"";const i=t.toLowerCase().indexOf(lq);if(i<0)return t;
    return t.slice(0,i)+`<mark>${t.slice(i,i+q.length)}</mark>`+t.slice(i+q.length);}
  let h=`<div style="font-size:11.5px;color:#bbb;margin-bottom:.7rem">${res.length} Ergebnisse für «${q}»</div>`;
  res.forEach(r=>{
    const oc=r.type==="fw"?`selFW('${r.id}')`:`selT('${r.id}')`;
    const badge=r.type==="fw"?"📖":"📊";
    h+=`<div class="sri" onclick="${oc}">
      <div class="srt">${badge} ${r.sem} · ${r.topic}</div>
      ${r.pos?`<div class="srn">${hl(r.pos)}</div>`:""}
      ${r.merk?`<div class="srtxt">${hl(r.merk.slice(0,140))}${r.merk.length>140?"…":""}</div>`:""}
    </div>`;
  });
  if(!res.length)h+=`<div style="color:#ccc;font-size:13px;margin-top:2rem">Keine Ergebnisse.</div>`;
  $("cnt").innerHTML=h;
}

// MODE
function setMode(m){
  mode=m;
  ["Overview","Compare","Leitfragen","Quiz"].forEach(id=>{
    $("nb"+id).classList.toggle("on",id.toLowerCase()===m);});
  $("cbar").style.display=m==="compare"?"flex":"none";
  sq="";$("si").value="";sidebar();
  if(m==="quiz")startQuiz();
  else if(m==="leitfragen")leitfragen();
  else if(m==="compare")cmpUI();
  else if(m==="fachwissen")fwHome();
  else if(curId)renderT(curId);
  else home();
}

// Sidebar click in compare mode
$("sidebar").addEventListener("click",e=>{
  if(mode!=="compare")return;
  const item=e.target.closest(".ni");if(!item)return;
  const match=item.getAttribute("onclick").match(/'([^']+)'/);
  if(match){curId=match[1];topicForCmp(match[1]);}
});

$("si").addEventListener("input",e=>{
  sq=e.target.value.trim();
  if(!sq){
    if(mode==="fachwissen"&&fwId)selFW(fwId);
    else if(mode==="fachwissen")fwHome();
    else if(curId&&mode==="overview")renderT(curId);
    else if(mode==="overview")home();
    else setMode(mode);
  }else doSearch(sq);
});

// Init
// Handle ?id= deep link from leitfragen
try{
  const _p = new URLSearchParams(window.location.search);
  const _id = _p.get('id');
  sidebar();
  if(_id && TOPICS[_id]){selT(_id);}else{home();}
}catch(e){
  document.getElementById("cnt").innerHTML=`<div style="padding:2rem;color:red;font-family:monospace">
    Fehler beim Laden: ${e.message}<br>${e.stack}</div>`;
}

document.getElementById('vsi').addEventListener('input',e=>{
  sq=e.target.value.trim();
  if(!sq){if(curId&&mode==='overview')renderT(curId);else home();}
  else doSearch(sq);
});

document.getElementById('vsi').addEventListener('input',e=>{
  sq=e.target.value.trim();
  if(!sq){if(curId&&mode==='overview')renderT(curId);else home();}
  else doSearch(sq);
});
</script>
